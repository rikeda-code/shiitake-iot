<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新入社員QC発表会 管理ダッシュボード</title>
  <!-- React 18 UMD (no build step needed) -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <!-- htm: JSX-like tagged template, no Babel needed -->
  <script src="https://cdn.jsdelivr.net/npm/htm@3/dist/htm.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    select, input, textarea, button { font-family: inherit; font-size: 0.85rem; }
    textarea { resize: vertical; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    button:focus-visible, select:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 2px solid #38bdf8; outline-offset: 2px;
    }
  </style>
</head>
<body>
<div id="root" style="min-height:100vh"></div>

<script>
/* ═══════════════════════════════════════════════════════════════
   SETUP
═══════════════════════════════════════════════════════════════ */
const html = htm.bind(React.createElement);
const { useState, useEffect, useCallback } = React;

/* ─── CONSTANTS ─────────────────────────────────────────────── */
const MEMBERS = [
  { id:'nishida',  name:'西田智也',   factory:'志摩培養F', theme:'菌床の色が褐色化しない要因分析＋対策検討',  color:'#38bdf8' },
  { id:'sugiyama', name:'杉山颯',     factory:'いなべF',   theme:'椎茸栽培における水分調整方法',            color:'#a78bfa' },
  { id:'aoki',     name:'青木暉',     factory:'南丹F',     theme:'椎茸栽培における水分調整方法',            color:'#34d399' },
  { id:'yamamoto', name:'山本真之介', factory:'南丹F',     theme:'出荷効率について（パックスピード）',       color:'#fbbf24' },
];

const STEPS = [
  { id:1, name:'テーマ選定',     color:'#818cf8' },
  { id:2, name:'現状把握',      color:'#22d3ee' },
  { id:3, name:'目標設定',      color:'#2dd4bf' },
  { id:4, name:'活動計画作成',  color:'#4ade80' },
  { id:5, name:'要因解析',      color:'#facc15' },
  { id:6, name:'対策立案・実施',color:'#fb923c' },
  { id:7, name:'効果確認',      color:'#f87171' },
  { id:8, name:'歯止め',        color:'#c084fc' },
];

// 13 weeks: Jun 23 – Sep 21, 2025
const GANTT_START = new Date(2025, 5, 23);
const MS_PER_WEEK = 7 * 24 * 60 * 60 * 1000;
const WEEKS = Array.from({ length: 13 }, (_, i) => {
  const d   = new Date(GANTT_START.getTime() + i * MS_PER_WEEK);
  const mon = d.getMonth() + 1;
  const wom = Math.ceil(d.getDate() / 7);
  return { index: i, date: d, label: `${mon}月W${wom}`, shortLabel: `${mon}/${d.getDate()}` };
});

const DEFAULT_SCHEDULE = [
  { startWeek:0,  endWeek:1  },
  { startWeek:1,  endWeek:3  },
  { startWeek:3,  endWeek:4  },
  { startWeek:4,  endWeek:5  },
  { startWeek:5,  endWeek:8  },
  { startWeek:8,  endWeek:11 },
  { startWeek:11, endWeek:12 },
  { startWeek:12, endWeek:12 },
];
const DEFAULT_REVIEW_WEEKS = [4, 8, 12];

const TODAY = new Date();
const currentWeekIdx = Math.min(12, Math.max(-1,
  Math.floor((TODAY.getTime() - GANTT_START.getTime()) / MS_PER_WEEK)
));

/* ─── HELPERS ────────────────────────────────────────────────── */
function hexRgb(h) {
  return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;
}
function barColor(progress, stepColor, delayed) {
  if (progress === 0) return 'rgba(15,23,42,0.8)';
  if (delayed) return `rgba(239,68,68,${0.25 + progress / 100 * 0.55})`;
  return `rgba(${hexRgb(stepColor)},${0.18 + progress / 100 * 0.78})`;
}
function overallPct(member) {
  return Math.round(member.steps.reduce((s, t) => s + t.progress, 0) / member.steps.length);
}
function currentStepIdx(member) {
  const i = member.steps.findIndex(s => s.progress < 100);
  return i === -1 ? 7 : i;
}
function statusInfo(member) {
  const pct  = overallPct(member);
  const time = currentWeekIdx < 0 ? 0 : currentWeekIdx >= 12 ? 100 : Math.round(currentWeekIdx / 12 * 100);
  const diff = pct - time;
  if (diff >= 0)   return { label:'順調', color:'#4ade80', bg:'rgba(74,222,128,0.1)',  border:'rgba(74,222,128,0.35)'  };
  if (diff >= -20) return { label:'注意', color:'#fbbf24', bg:'rgba(251,191,36,0.1)',  border:'rgba(251,191,36,0.35)'  };
  return               { label:'遅延', color:'#f87171', bg:'rgba(248,113,113,0.1)', border:'rgba(248,113,113,0.35)' };
}
function stepDelayed(sd) {
  if (currentWeekIdx < 0 || currentWeekIdx < sd.startWeek) return false;
  const dur  = sd.endWeek - sd.startWeek + 1;
  const into = Math.min(currentWeekIdx - sd.startWeek + 1, dur);
  return sd.progress < Math.round(into / dur * 100) - 20;
}

/* ─── INITIAL STATE ──────────────────────────────────────────── */
function createState() {
  return {
    members: MEMBERS.map(m => ({
      ...m,
      steps: STEPS.map((_, i) => ({
        progress:  0,
        startWeek: DEFAULT_SCHEDULE[i].startWeek,
        endWeek:   DEFAULT_SCHEDULE[i].endWeek,
        risk:      null,
        memo:      '',
      })),
      reviews: DEFAULT_REVIEW_WEEKS.map(w => ({ weekIndex:w, completed:false, completedDate:null })),
      nextActionDate:    '',
      nextActionContent: '',
    })),
    selMemberId:  MEMBERS[0].id,
    selStepIndex: 0,
  };
}

/* ─── PERSISTENCE ────────────────────────────────────────────── */
const STORAGE_KEY = 'qc-dashboard-v1';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return createState();
    const parsed = JSON.parse(saved);
    // Merge saved member data into fresh state to pick up any new members/steps
    const fresh = createState();
    fresh.members = fresh.members.map(fm => {
      const sm = parsed.members?.find(m => m.id === fm.id);
      if (!sm) return fm;
      return {
        ...fm,
        steps: fm.steps.map((fs, i) => {
          const ss = sm.steps?.[i];
          return ss ? { ...fs, ...ss } : fs;
        }),
        reviews: fm.reviews.map((fr, i) => {
          const sr = sm.reviews?.[i];
          return sr ? { ...fr, ...sr } : fr;
        }),
        nextActionDate:    sm.nextActionDate    ?? fm.nextActionDate,
        nextActionContent: sm.nextActionContent ?? fm.nextActionContent,
      };
    });
    fresh.selMemberId  = parsed.selMemberId  ?? fresh.selMemberId;
    fresh.selStepIndex = parsed.selStepIndex ?? fresh.selStepIndex;
    return fresh;
  } catch (e) {
    return createState();
  }
}

function saveState(st) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      members:      st.members.map(m => ({
        id: m.id,
        steps:   m.steps.map(s => ({ progress:s.progress, startWeek:s.startWeek, endWeek:s.endWeek, risk:s.risk, memo:s.memo })),
        reviews: m.reviews.map(r => ({ weekIndex:r.weekIndex, completed:r.completed, completedDate:r.completedDate })),
        nextActionDate:    m.nextActionDate,
        nextActionContent: m.nextActionContent,
      })),
      selMemberId:  st.selMemberId,
      selStepIndex: st.selStepIndex,
    }));
  } catch (e) { /* storage full etc. */ }
}

/* ═══════════════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════════════ */
function App() {
  const [st, setSt] = useState(loadState);
  const [modal, setModal] = useState(null);
  const [tmpPct, setTmpPct] = useState(0);

  // Persist whenever state changes
  useEffect(() => { saveState(st); }, [st]);

  const updateStep = useCallback((mid, si, updates) => {
    setSt(prev => ({
      ...prev,
      members: prev.members.map(m =>
        m.id === mid
          ? { ...m, steps: m.steps.map((s, i) => i === si ? { ...s, ...updates } : s) }
          : m
      ),
    }));
  }, []);

  const updateMember = useCallback((mid, updates) => {
    setSt(prev => ({
      ...prev,
      members: prev.members.map(m => m.id === mid ? { ...m, ...updates } : m),
    }));
  }, []);

  const openModal = useCallback((mid, si) => {
    const member = st.members.find(m => m.id === mid);
    setTmpPct(member.steps[si].progress);
    setModal({ memberId: mid, stepIndex: si });
  }, [st.members]);

  const applyModal = useCallback(() => {
    if (modal) updateStep(modal.memberId, modal.stepIndex, { progress: tmpPct });
    setModal(null);
  }, [modal, tmpPct, updateStep]);

  const completeReview = useCallback((mid, ri) => {
    const date = TODAY.toLocaleDateString('ja-JP');
    setSt(prev => ({
      ...prev,
      members: prev.members.map(m =>
        m.id === mid
          ? { ...m, reviews: m.reviews.map((r, i) => i === ri ? { ...r, completed:true, completedDate:date } : r) }
          : m
      ),
    }));
  }, []);

  const todayStr = TODAY.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

  const handleReset = () => {
    if (confirm('全データをリセットしますか？この操作は元に戻せません。')) {
      localStorage.removeItem(STORAGE_KEY);
      setSt(createState());
    }
  };

  return html`
    <div style=${{ minHeight:'100vh', background:'#0f172a', color:'#e2e8f0' }}>

      <!-- HEADER -->
      <header style=${{
        borderBottom:'1px solid #1e293b', padding:'12px 28px',
        display:'flex', alignItems:'center', justifyContent:'space-between',
        background:'rgba(15,23,42,0.97)', position:'sticky', top:0, zIndex:50,
        boxShadow:'0 1px 12px rgba(0,0,0,0.4)',
      }}>
        <div>
          <h1 style=${{ fontSize:'1.15rem', fontWeight:800, letterSpacing:'-0.01em' }}>
            🍄 新入社員QC発表会 管理ダッシュボード
          </h1>
          <p style=${{ fontSize:'0.68rem', color:'#475569', marginTop:2 }}>
            2025年6〜9月 ／ QCストーリー8ステップ進捗管理
          </p>
        </div>
        <div style=${{ display:'flex', alignItems:'center', gap:16 }}>
          <div style=${{ textAlign:'right', fontSize:'0.7rem', color:'#475569' }}>
            <div>${todayStr}</div>
            ${currentWeekIdx >= 0 && currentWeekIdx <= 12 && html`
              <div style=${{ color:'#38bdf8', fontWeight:700, marginTop:2 }}>
                現在: ${WEEKS[currentWeekIdx].label}（Week ${currentWeekIdx+1}）
              </div>
            `}
          </div>
          <button onClick=${handleReset} title="全データをリセット" style=${{
            padding:'6px 12px', borderRadius:7, fontSize:'0.68rem',
            border:'1px solid #334155', background:'transparent',
            color:'#475569', cursor:'pointer',
          }}>🗑 リセット</button>
        </div>
      </header>

      <!-- MAIN -->
      <main style=${{ padding:'18px 24px', display:'flex', flexDirection:'column', gap:18 }}>
        <${StatusCards} members=${st.members} />
        <${GanttSection} members=${st.members} onBarClick=${openModal} onReviewComplete=${completeReview} />
        <${AdminPanel}
          members=${st.members}
          selMemberId=${st.selMemberId}
          selStepIndex=${st.selStepIndex}
          onSelectMember=${id => setSt(p => ({ ...p, selMemberId:id, selStepIndex:0 }))}
          onSelectStep=${i  => setSt(p => ({ ...p, selStepIndex:i }))}
          onUpdateStep=${updateStep}
          onUpdateMember=${updateMember}
          onReviewComplete=${completeReview}
        />
      </main>

      ${modal && html`
        <${ProgressModal}
          modal=${modal} members=${st.members}
          tmpPct=${tmpPct} onPctChange=${setTmpPct}
          onApply=${applyModal} onClose=${() => setModal(null)}
        />
      `}
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   STATUS CARDS
═══════════════════════════════════════════════════════════════ */
function StatusCards({ members }) {
  return html`
    <div style=${{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:14 }}>
      ${members.map(m => html`<${MemberCard} key=${m.id} member=${m} />`)}
    </div>
  `;
}

function MemberCard({ member }) {
  const pct  = overallPct(member);
  const csi  = currentStepIdx(member);
  const stat = statusInfo(member);
  const step = STEPS[csi];

  return html`
    <div style=${{
      background:'#1e293b', border:'1px solid #334155',
      borderRadius:12, borderTop:`3px solid ${member.color}`,
      padding:16, display:'flex', flexDirection:'column', gap:10,
    }}>
      <div style=${{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style=${{ fontWeight:700, fontSize:'0.95rem' }}>${member.name}</div>
          <div style=${{ fontSize:'0.68rem', color:'#475569', marginTop:1 }}>${member.factory}</div>
        </div>
        <span style=${{
          background:stat.bg, color:stat.color, border:`1px solid ${stat.border}`,
          borderRadius:999, padding:'2px 9px', fontSize:'0.68rem', fontWeight:800, whiteSpace:'nowrap',
        }}>${stat.label}</span>
      </div>

      <div style=${{ fontSize:'0.67rem', color:'#64748b', lineHeight:1.55 }}>${member.theme}</div>

      <div>
        <div style=${{ display:'flex', justifyContent:'space-between', fontSize:'0.7rem', marginBottom:4 }}>
          <span style=${{ color:'#64748b' }}>全体進捗</span>
          <span style=${{ fontWeight:800, color:member.color }}>${pct}%</span>
        </div>
        <div style=${{ background:'#334155', borderRadius:4, height:7, overflow:'hidden' }}>
          <div style=${{ background:member.color, width:`${pct}%`, height:'100%', borderRadius:4, transition:'width .4s ease' }} />
        </div>
      </div>

      <div style=${{
        background:'#0f172a', borderRadius:8, padding:'9px 12px',
        borderLeft:`3px solid ${step.color}`,
      }}>
        <div style=${{ fontSize:'0.62rem', color:'#475569', marginBottom:2 }}>現在のステップ</div>
        <div style=${{ fontWeight:700, fontSize:'0.8rem', color:step.color }}>
          Step ${csi+1}：${step.name}
        </div>
        <div style=${{ fontSize:'0.68rem', color:'#64748b', marginTop:2 }}>
          ${member.steps[csi].progress}% 完了
          ${member.steps[csi].risk ? html`<span style=${{ marginLeft:6 }}>
            ${member.steps[csi].risk==='red'?'🔴':member.steps[csi].risk==='yellow'?'🟡':'🟢'}
          </span>` : ''}
        </div>
      </div>

      ${(member.nextActionDate || member.nextActionContent) && html`
        <div style=${{ fontSize:'0.66rem', color:'#64748b', borderTop:'1px solid #1e293b', paddingTop:8 }}>
          次回アクション：
          ${member.nextActionDate && html`<span style=${{ color:'#fbbf24', fontWeight:700 }}>
            ${new Date(member.nextActionDate + 'T00:00').toLocaleDateString('ja-JP',{ month:'short', day:'numeric' })}
          </span>`}
          ${member.nextActionDate && member.nextActionContent ? ' ' : ''}
          <span style=${{ color:'#94a3b8' }}>${member.nextActionContent}</span>
        </div>
      `}
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   GANTT
═══════════════════════════════════════════════════════════════ */
function Diamond({ completed, size=12 }) {
  return html`
    <span style=${{
      display:'inline-block', width:size, height:size,
      transform:'rotate(45deg)',
      background: completed ? '#4ade80' : 'transparent',
      border:`2px solid ${completed ? '#4ade80' : '#64748b'}`,
      borderRadius:2, flexShrink:0,
    }} />
  `;
}

function GanttSection({ members, onBarClick, onReviewComplete }) {
  return html`
    <div style=${{ background:'#1e293b', border:'1px solid #334155', borderRadius:12, overflow:'hidden' }}>
      <div style=${{
        padding:'12px 20px', borderBottom:'1px solid #334155',
        display:'flex', alignItems:'center', gap:12, flexWrap:'wrap', rowGap:6,
      }}>
        <h2 style=${{ fontWeight:700, fontSize:'0.9rem' }}>📊 ガントチャート</h2>
        <div style=${{ display:'flex', gap:16, marginLeft:'auto', fontSize:'0.65rem', color:'#475569', alignItems:'center', flexWrap:'wrap' }}>
          <span style=${{ display:'inline-flex', alignItems:'center', gap:4 }}>
            <span style=${{ width:12, height:9, borderRadius:2, border:'1px solid #475569', display:'inline-block', background:'rgba(15,23,42,0.8)' }} /> 未着手
          </span>
          <span style=${{ display:'inline-flex', alignItems:'center', gap:4 }}>
            <span style=${{ width:12, height:9, borderRadius:2, display:'inline-block', background:'rgba(74,222,128,0.55)' }} /> 進行中/完了
          </span>
          <span style=${{ display:'inline-flex', alignItems:'center', gap:4 }}>
            <span style=${{ width:12, height:9, borderRadius:2, display:'inline-block', background:'rgba(248,113,113,0.55)' }} /> 遅延
          </span>
          <span style=${{ display:'inline-flex', alignItems:'center', gap:4 }}>
            <${Diamond} completed=${false} /> 予定レビュー
          </span>
          <span style=${{ display:'inline-flex', alignItems:'center', gap:4 }}>
            <${Diamond} completed=${true} /> 実施済
          </span>
        </div>
      </div>

      <div style=${{ overflowX:'auto' }}>
        <div style=${{ minWidth:1000 }}>
          <!-- Week header -->
          <div style=${{
            display:'grid', gridTemplateColumns:'185px repeat(13,1fr)',
            background:'#0a1526', borderBottom:'1px solid #334155',
          }}>
            <div style=${{ padding:'6px 10px', fontSize:'0.62rem', color:'#475569', borderRight:'1px solid #334155' }}>
              メンバー / ステップ
            </div>
            ${WEEKS.map((w,i) => html`
              <div key=${i} style=${{
                padding:'5px 3px', textAlign:'center', fontSize:'0.62rem',
                color: i===currentWeekIdx ? '#38bdf8' : '#475569',
                fontWeight: i===currentWeekIdx ? 800 : 400,
                borderRight: i<12 ? '1px solid #1e293b' : 'none',
                borderBottom: i===currentWeekIdx ? '2px solid #38bdf8' : '2px solid transparent',
              }}>${w.label}</div>
            `)}
          </div>

          ${members.map((m,mi) => html`
            <${MemberRows}
              key=${m.id} member=${m} isLast=${mi===members.length-1}
              onBarClick=${onBarClick} onReviewComplete=${onReviewComplete}
            />
          `)}
        </div>
      </div>
    </div>
  `;
}

function MemberRows({ member, isLast, onBarClick, onReviewComplete }) {
  const [collapsed, setCollapsed] = useState(false);
  const pct  = overallPct(member);
  const stat = statusInfo(member);

  return html`
    <div style=${{ borderBottom: isLast ? 'none' : '2px solid #334155' }}>
      <!-- member header row -->
      <div
        style=${{
          display:'grid', gridTemplateColumns:'185px repeat(13,1fr)',
          background:'#131f33', cursor:'pointer', userSelect:'none',
        }}
        onClick=${() => setCollapsed(c => !c)}
      >
        <div style=${{
          padding:'7px 10px', borderRight:'1px solid #334155',
          display:'flex', alignItems:'center', gap:6,
        }}>
          <span style=${{ color:'#475569', fontSize:'0.6rem', width:8, flexShrink:0 }}>${collapsed?'▶':'▼'}</span>
          <div style=${{ flex:1, minWidth:0 }}>
            <div style=${{ fontWeight:700, fontSize:'0.8rem', color:member.color, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
              ${member.name}
            </div>
            <div style=${{ fontSize:'0.6rem', color:'#475569' }}>${member.factory}</div>
          </div>
          <span style=${{ fontSize:'0.7rem', fontWeight:800, color:stat.color, flexShrink:0 }}>${pct}%</span>
        </div>

        <!-- diamond markers -->
        ${WEEKS.map((_,wi) => {
          const rev = member.reviews.find(r => r.weekIndex === wi);
          return html`
            <div key=${wi} style=${{
              display:'flex', alignItems:'center', justifyContent:'center', minHeight:34,
              borderRight: wi<12 ? '1px solid #1e293b' : 'none',
              background: wi===currentWeekIdx ? 'rgba(56,189,248,0.05)' : 'transparent',
            }}>
              ${rev && html`
                <button
                  onClick=${e => { e.stopPropagation(); if(!rev.completed) onReviewComplete(member.id, member.reviews.indexOf(rev)); }}
                  title=${rev.completed ? `レビュー済：${rev.completedDate}` : 'クリックでレビュー完了'}
                  style=${{ background:'none', border:'none', padding:3, cursor: rev.completed?'default':'pointer', display:'flex', alignItems:'center', justifyContent:'center' }}
                >
                  <${Diamond} completed=${rev.completed} />
                </button>
              `}
            </div>
          `;
        })}
      </div>

      <!-- step rows -->
      ${!collapsed && STEPS.map((step, si) => {
        const sd = member.steps[si];
        const delayed = stepDelayed(sd);
        return html`
          <div key=${step.id} style=${{
            display:'grid', gridTemplateColumns:'185px repeat(13,1fr)',
            borderTop:'1px solid #0f1e30', minHeight:28,
          }}>
            <div style=${{
              padding:'3px 8px 3px 24px', borderRight:'1px solid #334155',
              display:'flex', alignItems:'center', gap:5, fontSize:'0.68rem',
            }}>
              <span style=${{
                background:step.color, color:'#0f172a',
                borderRadius:3, padding:'1px 5px', fontSize:'0.58rem', fontWeight:800, flexShrink:0,
              }}>S${si+1}</span>
              <span style=${{ color:'#94a3b8', fontSize:'0.66rem', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                ${step.name}
              </span>
              ${sd.risk && html`
                <span style=${{ marginLeft:'auto', fontSize:10, flexShrink:0 }}>
                  ${sd.risk==='red'?'🔴':sd.risk==='yellow'?'🟡':'🟢'}
                </span>
              `}
            </div>

            ${WEEKS.map((_,wi) => {
              const inRange = wi >= sd.startWeek && wi <= sd.endWeek;
              const isFirst = wi === sd.startWeek;
              const isLast2 = wi === sd.endWeek;
              return html`
                <div key=${wi}
                  onClick=${inRange ? () => onBarClick(member.id, si) : undefined}
                  style=${{
                    borderRight: wi<12 ? '1px solid #0f1e30' : 'none',
                    background: wi===currentWeekIdx ? 'rgba(56,189,248,0.03)' : 'transparent',
                    cursor: inRange ? 'pointer' : 'default',
                    position:'relative', display:'flex', alignItems:'center', padding:'2px 1px',
                  }}
                >
                  ${inRange && html`
                    <div style=${{
                      position:'absolute', inset:`2px ${isLast2?'1px':'0px'} 2px ${isFirst?'1px':'0px'}`,
                      background: barColor(sd.progress, step.color, delayed),
                      borderRadius:`${isFirst?4:0}px ${isLast2?4:0}px ${isLast2?4:0}px ${isFirst?4:0}px`,
                      border:`1px solid ${delayed?'rgba(248,113,113,0.2)':step.color+'22'}`,
                      transition:'background .25s',
                      display:'flex', alignItems:'center', justifyContent:'center',
                    }}>
                      ${isFirst && sd.progress > 0 && html`
                        <span style=${{ fontSize:'0.55rem', color:'#fff', fontWeight:800, textShadow:'0 1px 3px rgba(0,0,0,0.8)' }}>
                          ${sd.progress}%
                        </span>
                      `}
                    </div>
                  `}
                </div>
              `;
            })}
          </div>
        `;
      })}
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   PROGRESS MODAL
═══════════════════════════════════════════════════════════════ */
function ProgressModal({ modal, members, tmpPct, onPctChange, onApply, onClose }) {
  const member = members.find(m => m.id === modal.memberId);
  const step   = STEPS[modal.stepIndex];

  return html`
    <div
      style=${{
        position:'fixed', inset:0, background:'rgba(0,0,0,0.75)',
        display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999,
      }}
      onClick=${onClose}
    >
      <div
        style=${{
          background:'#1e293b', border:'1px solid #334155', borderRadius:16,
          padding:28, width:360,
          boxShadow:'0 30px 60px rgba(0,0,0,0.7)',
        }}
        onClick=${e => e.stopPropagation()}
      >
        <div style=${{ fontWeight:800, fontSize:'0.95rem', marginBottom:4 }}>進捗を更新</div>
        <div style=${{ fontSize:'0.75rem', color:'#64748b', marginBottom:22 }}>
          ${member?.name}　／　Step ${modal.stepIndex+1}：${step.name}
        </div>

        <div style=${{ display:'flex', gap:8, marginBottom:16 }}>
          ${[0,25,50,75,100].map(pct => html`
            <button key=${pct} onClick=${() => onPctChange(pct)} style=${{
              flex:1, padding:'10px 2px', borderRadius:8,
              border:`2px solid ${tmpPct===pct ? step.color : '#334155'}`,
              background: tmpPct===pct ? step.color+'28' : '#0f172a',
              color: tmpPct===pct ? step.color : '#64748b',
              cursor:'pointer', fontWeight: tmpPct===pct ? 800 : 400,
              fontSize:'0.85rem', transition:'all .15s',
            }}>${pct}%</button>
          `)}
        </div>

        <div style=${{ background:'#334155', borderRadius:5, height:10, marginBottom:24, overflow:'hidden' }}>
          <div style=${{
            background:step.color, width:`${tmpPct}%`, height:'100%',
            borderRadius:5, transition:'width .3s ease',
          }} />
        </div>

        <div style=${{ display:'flex', gap:10 }}>
          <button onClick=${onClose} style=${{
            flex:1, padding:10, borderRadius:8,
            border:'1px solid #334155', background:'transparent',
            color:'#64748b', cursor:'pointer',
          }}>キャンセル</button>
          <button onClick=${onApply} style=${{
            flex:2, padding:10, borderRadius:8, border:'none',
            background:step.color, color:'#0f172a', cursor:'pointer',
            fontWeight:800, fontSize:'0.9rem',
          }}>更新する</button>
        </div>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   ADMIN PANEL
═══════════════════════════════════════════════════════════════ */
function AdminPanel({ members, selMemberId, selStepIndex, onSelectMember, onSelectStep, onUpdateStep, onUpdateMember, onReviewComplete }) {
  const selMember = members.find(m => m.id === selMemberId);
  const selStep   = selMember?.steps[selStepIndex];
  const stepColor = STEPS[selStepIndex].color;

  const [memo,       setMemo]       = useState('');
  const [actDate,    setActDate]    = useState('');
  const [actContent, setActContent] = useState('');
  const [savedMemo,  setSavedMemo]  = useState(false);
  const [savedAct,   setSavedAct]   = useState(false);

  useEffect(() => { setMemo(selStep?.memo || ''); },                          [selMemberId, selStepIndex]);
  useEffect(() => { setActDate(selMember?.nextActionDate || ''); setActContent(selMember?.nextActionContent || ''); }, [selMemberId]);

  const saveMemo = () => {
    onUpdateStep(selMemberId, selStepIndex, { memo });
    setSavedMemo(true); setTimeout(() => setSavedMemo(false), 2000);
  };
  const saveAction = () => {
    onUpdateMember(selMemberId, { nextActionDate: actDate, nextActionContent: actContent });
    setSavedAct(true); setTimeout(() => setSavedAct(false), 2000);
  };
  const setRisk = r => onUpdateStep(selMemberId, selStepIndex, { risk: selStep?.risk === r ? null : r });

  const IS = {  // input style
    width:'100%', background:'#0a1526', color:'#e2e8f0',
    border:'1px solid #334155', borderRadius:8, padding:'7px 11px', outline:'none',
  };
  const LS = { // label style
    fontSize:'0.65rem', color:'#475569', display:'block', marginBottom:6,
    fontWeight:700, textTransform:'uppercase', letterSpacing:'0.07em',
  };

  return html`
    <div style=${{ background:'#1e293b', border:'1px solid #334155', borderRadius:12, overflow:'hidden' }}>
      <div style=${{ padding:'12px 20px', borderBottom:'1px solid #334155' }}>
        <h2 style=${{ fontWeight:700, fontSize:'0.9rem' }}>⚙️ 管理者アクション＆メモ</h2>
      </div>

      <div style=${{ display:'grid', gridTemplateColumns:'230px 1fr 235px' }}>

        <!-- LEFT: selector + risk -->
        <div style=${{ padding:18, borderRight:'1px solid #334155', display:'flex', flexDirection:'column', gap:12 }}>
          <div>
            <label style=${LS}>メンバー選択</label>
            <select value=${selMemberId} onChange=${e => onSelectMember(e.target.value)} style=${IS}>
              ${members.map(m => html`<option key=${m.id} value=${m.id}>${m.name}（${m.factory}）</option>`)}
            </select>
          </div>

          <div>
            <label style=${LS}>ステップ選択</label>
            <select value=${selStepIndex} onChange=${e => onSelectStep(+e.target.value)} style=${IS}>
              ${STEPS.map((s,i) => html`<option key=${s.id} value=${i}>Step${i+1}：${s.name}</option>`)}
            </select>
          </div>

          <div>
            <label style=${LS}>リスクフラグ（ステップ単位）</label>
            <div style=${{ display:'flex', gap:8 }}>
              ${[['red','🔴','要注意'],['yellow','🟡','注意'],['green','🟢','良好']].map(([v,e,t]) => html`
                <button key=${v} onClick=${() => setRisk(v)} title=${t} style=${{
                  flex:1, padding:'8px 4px', borderRadius:8, fontSize:'1.05rem',
                  border:`2px solid ${selStep?.risk===v ? '#94a3b8' : '#1e293b'}`,
                  background: selStep?.risk===v ? '#334155' : '#0a1526',
                  cursor:'pointer', transition:'all .15s',
                }}>${e}</button>
              `)}
            </div>
          </div>

          <!-- summary -->
          <div style=${{
            background:'#0a1526', borderRadius:8, padding:'10px 12px',
            flex:1, borderLeft:`3px solid ${stepColor}`,
          }}>
            <div style=${{ fontSize:'0.62rem', color:'#475569', marginBottom:4 }}>選択中のステップ状態</div>
            <div style=${{ fontWeight:700, fontSize:'0.78rem', color:stepColor, marginBottom:3 }}>
              ${STEPS[selStepIndex].name}
            </div>
            <div style=${{ fontSize:'0.7rem', color:'#64748b' }}>
              進捗：<span style=${{ color:'#e2e8f0', fontWeight:700 }}>${selStep?.progress ?? 0}%</span>
              ${selStep?.risk ? html`<span style=${{ marginLeft:6 }}>
                ${selStep.risk==='red'?'🔴':selStep.risk==='yellow'?'🟡':'🟢'}
              </span>` : ''}
            </div>
            ${selStep?.memo && html`
              <div style=${{ fontSize:'0.64rem', color:'#475569', marginTop:6, borderTop:'1px solid #1e293b', paddingTop:5, lineHeight:1.5 }}>
                ${selStep.memo.slice(0,70)}${selStep.memo.length>70?'…':''}
              </div>
            `}
          </div>
        </div>

        <!-- CENTER: memo -->
        <div style=${{ padding:18, borderRight:'1px solid #334155', display:'flex', flexDirection:'column', gap:10 }}>
          <label style=${LS}>
            メモ　Step${selStepIndex+1}：${STEPS[selStepIndex].name}　／　${selMember?.name}
          </label>
          <textarea
            value=${memo}
            onInput=${e => setMemo(e.target.value)}
            placeholder="気づき、懸念事項、指導内容などを記録…"
            rows=9
            style=${{ ...IS, lineHeight:1.7, fontFamily:'inherit', flex:1 }}
          />
          <div style=${{ display:'flex', alignItems:'center', gap:10 }}>
            <button onClick=${saveMemo} style=${{
              flex:1, padding:'9px', borderRadius:8, border:'none',
              background:stepColor, color:'#0f172a', cursor:'pointer', fontWeight:800,
            }}>メモを保存</button>
            ${savedMemo && html`<span style=${{ fontSize:'0.72rem', color:'#4ade80', fontWeight:700 }}>✓ 保存しました</span>`}
          </div>
          ${selStep?.memo && selStep.memo !== memo && html`
            <div style=${{ fontSize:'0.67rem', color:'#fb923c' }}>※ 未保存の変更があります</div>
          `}
        </div>

        <!-- RIGHT: reviews + next action -->
        <div style=${{ padding:18, display:'flex', flexDirection:'column', gap:16 }}>
          <div>
            <label style=${LS}>管理者レビュー状況</label>
            <div style=${{ display:'flex', flexDirection:'column', gap:7 }}>
              ${selMember?.reviews.map((rev,ri) => html`
                <div key=${ri} style=${{
                  background:'#0a1526', borderRadius:8, padding:'8px 10px',
                  display:'flex', alignItems:'center', gap:8,
                  border:`1px solid ${rev.completed?'rgba(74,222,128,0.2)':'#1e293b'}`,
                }}>
                  <${Diamond} completed=${rev.completed} />
                  <div style=${{ flex:1, minWidth:0 }}>
                    <div style=${{ fontSize:'0.72rem', color:'#94a3b8' }}>
                      ${WEEKS[rev.weekIndex]?.label}
                      ${rev.completed && html`<span style=${{ color:'#4ade80', marginLeft:6 }}>✓ 実施済</span>`}
                    </div>
                    ${rev.completed && html`<div style=${{ fontSize:'0.62rem', color:'#475569' }}>${rev.completedDate}</div>`}
                  </div>
                  ${!rev.completed && html`
                    <button onClick=${() => onReviewComplete(selMemberId, ri)} style=${{
                      padding:'3px 8px', borderRadius:6, whiteSpace:'nowrap', flexShrink:0,
                      border:'1px solid #334155', background:'transparent',
                      color:'#64748b', cursor:'pointer', fontSize:'0.62rem',
                    }}>実施済にする</button>
                  `}
                </div>
              `)}
            </div>
          </div>

          <div>
            <label style=${LS}>次回アクション</label>
            <input type="date" value=${actDate} onInput=${e => setActDate(e.target.value)}
              style=${{ ...IS, marginBottom:7 }} />
            <input type="text" value=${actContent} onInput=${e => setActContent(e.target.value)}
              placeholder="例：Step3確認・フィードバック"
              style=${{ ...IS, marginBottom:9 }} />
            <div style=${{ display:'flex', alignItems:'center', gap:10 }}>
              <button onClick=${saveAction} style=${{
                flex:1, padding:'9px', borderRadius:8,
                border:'1px solid #334155', background:'#0a1526',
                color:'#94a3b8', cursor:'pointer', fontWeight:700,
              }}>アクションを保存</button>
              ${savedAct && html`<span style=${{ fontSize:'0.72rem', color:'#4ade80', fontWeight:700 }}>✓</span>`}
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ─── MOUNT ──────────────────────────────────────────────────── */
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(App)
);
</script>
</body>
