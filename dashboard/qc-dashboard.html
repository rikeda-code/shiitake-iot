<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新入社員QC発表会 管理ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htm@3/dist/htm.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      background: #0f172a; color: #e2e8f0;
      font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Segoe UI', sans-serif;
      min-height: 100vh;
    }
    select, input, textarea, button { font-family: inherit; font-size: 0.85rem; }
    textarea { resize: vertical; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
    button:focus-visible, select:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 2px solid #38bdf8; outline-offset: 2px;
    }
    .sub-name-input {
      background: transparent; border: none; color: #64748b;
      font-size: 0.62rem; flex: 1; outline: none; cursor: text;
      min-width: 0;
    }
    .sub-name-input:focus { color: #94a3b8; }
    .sub-name-input::placeholder { color: #334155; }
  </style>
</head>
<body>
<div id="root" style="min-height:100vh"></div>

<script>
const html = htm.bind(React.createElement);
const { useState, useEffect, useCallback, useRef } = React;

/* ═══════════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════════ */
const MEMBERS = [
  { id:'nishida',  name:'西田智也',   factory:'志摩培養F', theme:'菌床の色が褐色化しない要因分析＋対策検討',  color:'#38bdf8' },
  { id:'sugiyama', name:'杉山颯',     factory:'いなべF',   theme:'椎茸栽培における水分調整方法',            color:'#a78bfa' },
  { id:'aoki',     name:'青木暉',     factory:'南丹F',     theme:'椎茸栽培における水分調整方法',            color:'#34d399' },
  { id:'yamamoto', name:'山本真之介', factory:'南丹F',     theme:'出荷効率について（パックスピード）',       color:'#fbbf24' },
];

const STEPS = [
  { id:1, name:'テーマ選定',      color:'#818cf8' },
  { id:2, name:'現状把握',        color:'#22d3ee' },
  { id:3, name:'目標設定',        color:'#2dd4bf' },
  { id:4, name:'活動計画作成',    color:'#4ade80' },
  { id:5, name:'要因解析',        color:'#facc15' },
  { id:6, name:'対策立案・実施',  color:'#fb923c' },
  { id:7, name:'効果確認',        color:'#f87171' },
  { id:8, name:'歯止め',          color:'#c084fc' },
];

const GANTT_START = new Date(2025, 5, 23);
const MS_PER_WEEK = 7 * 24 * 60 * 60 * 1000;
const WEEKS = Array.from({ length: 13 }, (_, i) => {
  const d   = new Date(GANTT_START.getTime() + i * MS_PER_WEEK);
  const mon = d.getMonth() + 1;
  const wom = Math.ceil(d.getDate() / 7);
  return { index: i, date: d, label: `${mon}月W${wom}`, shortLabel: `${mon}/${d.getDate()}` };
});

const DEFAULT_SCHEDULE = [
  { startWeek:0,  endWeek:1  },
  { startWeek:1,  endWeek:3  },
  { startWeek:3,  endWeek:4  },
  { startWeek:4,  endWeek:5  },
  { startWeek:5,  endWeek:8  },
  { startWeek:8,  endWeek:11 },
  { startWeek:11, endWeek:12 },
  { startWeek:12, endWeek:12 },
];
const DEFAULT_REVIEW_WEEKS = [4, 8, 12];

const TODAY = new Date();
const currentWeekIdx = Math.min(12, Math.max(-1,
  Math.floor((TODAY.getTime() - GANTT_START.getTime()) / MS_PER_WEEK)
));

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
function hexRgb(h) {
  return `${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;
}
function barColor(progress, stepColor, delayed) {
  if (progress === 0) return 'rgba(15,23,42,0.8)';
  if (delayed) return `rgba(239,68,68,${0.25 + progress/100*0.55})`;
  return `rgba(${hexRgb(stepColor)},${0.18 + progress/100*0.78})`;
}
function overallPct(member) {
  return Math.round(member.steps.reduce((s,t) => s + t.progress, 0) / member.steps.length);
}
function currentStepIdx(member) {
  const i = member.steps.findIndex(s => s.progress < 100);
  return i === -1 ? 7 : i;
}
function statusInfo(member) {
  const pct  = overallPct(member);
  const time = currentWeekIdx < 0 ? 0 : currentWeekIdx >= 12 ? 100 : Math.round(currentWeekIdx/12*100);
  const diff = pct - time;
  if (diff >= 0)   return { label:'順調', color:'#4ade80', bg:'rgba(74,222,128,0.1)',  border:'rgba(74,222,128,0.35)'  };
  if (diff >= -20) return { label:'注意', color:'#fbbf24', bg:'rgba(251,191,36,0.1)',  border:'rgba(251,191,36,0.35)'  };
  return               { label:'遅延', color:'#f87171', bg:'rgba(248,113,113,0.1)', border:'rgba(248,113,113,0.35)' };
}
function stepDelayed(sd) {
  if (currentWeekIdx < 0 || currentWeekIdx < sd.startWeek) return false;
  const dur  = sd.endWeek - sd.startWeek + 1;
  const into = Math.min(currentWeekIdx - sd.startWeek + 1, dur);
  return sd.progress < Math.round(into/dur*100) - 20;
}
function genId() {
  return `${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
}

/* ═══════════════════════════════════════════════════════════════
   INITIAL STATE
═══════════════════════════════════════════════════════════════ */
function createState() {
  return {
    members: MEMBERS.map(m => ({
      ...m,
      steps: STEPS.map((_, i) => ({
        progress:  0,
        startWeek: DEFAULT_SCHEDULE[i].startWeek,
        endWeek:   DEFAULT_SCHEDULE[i].endWeek,
        risk:      null,
        memo:      '',
        subItems:  [],
      })),
      reviews: DEFAULT_REVIEW_WEEKS.map(w => ({ weekIndex:w, completed:false, completedDate:null })),
      mtg: { date:'', minutesUrl:'', purpose:'', content:'', nextAction:'' },
      mtgHistory: [],
    })),
    selMemberId:  MEMBERS[0].id,
    selStepIndex: 0,
  };
}

/* ═══════════════════════════════════════════════════════════════
   PERSISTENCE
═══════════════════════════════════════════════════════════════ */
const STORAGE_KEY = 'qc-dashboard-v2';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return createState();
    const parsed = JSON.parse(saved);
    const fresh = createState();
    fresh.members = fresh.members.map(fm => {
      const sm = parsed.members?.find(m => m.id === fm.id);
      if (!sm) return fm;
      return {
        ...fm,
        steps: fm.steps.map((fs, i) => {
          const ss = sm.steps?.[i];
          if (!ss) return fs;
          return {
            ...fs,
            progress:  ss.progress  ?? fs.progress,
            startWeek: ss.startWeek ?? fs.startWeek,
            endWeek:   ss.endWeek   ?? fs.endWeek,
            risk:      ss.risk      ?? fs.risk,
            memo:      ss.memo      ?? fs.memo,
            subItems:  (ss.subItems || []).map(si => ({
              id:        si.id        || genId(),
              name:      si.name      || '',
              progress:  si.progress  ?? 0,
              startWeek: si.startWeek ?? fs.startWeek,
              endWeek:   si.endWeek   ?? fs.endWeek,
              memo:      si.memo      || '',
            })),
          };
        }),
        reviews: fm.reviews.map((fr, i) => {
          const sr = sm.reviews?.[i];
          return sr ? { ...fr, ...sr } : fr;
        }),
        mtg: sm.mtg ? {
          date:       sm.mtg.date       || sm.nextActionDate    || '',
          minutesUrl: sm.mtg.minutesUrl || '',
          purpose:    sm.mtg.purpose    || '',
          content:    sm.mtg.content    || '',
          nextAction: sm.mtg.nextAction || sm.nextActionContent || '',
        } : {
          date:       sm.nextActionDate    || '',
          minutesUrl: '',
          purpose:    '',
          content:    '',
          nextAction: sm.nextActionContent || '',
        },
        mtgHistory: (sm.mtgHistory || []).map(r => ({
          id:         r.id         || genId(),
          date:       r.date       || '',
          minutesUrl: r.minutesUrl || '',
          purpose:    r.purpose    || '',
          content:    r.content    || '',
          nextAction: r.nextAction || '',
        })),
      };
    });
    fresh.selMemberId  = parsed.selMemberId  ?? fresh.selMemberId;
    fresh.selStepIndex = parsed.selStepIndex ?? fresh.selStepIndex;
    return fresh;
  } catch(e) { return createState(); }
}

function saveState(st) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      members: st.members.map(m => ({
        id: m.id,
        steps: m.steps.map(s => ({
          progress:  s.progress,
          startWeek: s.startWeek,
          endWeek:   s.endWeek,
          risk:      s.risk,
          memo:      s.memo,
          subItems:  (s.subItems || []).map(si => ({
            id:        si.id,
            name:      si.name,
            progress:  si.progress,
            startWeek: si.startWeek,
            endWeek:   si.endWeek,
            memo:      si.memo || '',
          })),
        })),
        reviews: m.reviews.map(r => ({
          weekIndex: r.weekIndex, completed: r.completed, completedDate: r.completedDate,
        })),
        mtg: m.mtg,
        mtgHistory: m.mtgHistory || [],
      })),
      selMemberId:  st.selMemberId,
      selStepIndex: st.selStepIndex,
    }));
  } catch(e) {}
}

/* ═══════════════════════════════════════════════════════════════
   APP
═══════════════════════════════════════════════════════════════ */
function App() {
  const [st, setSt]       = useState(loadState);
  const [modal, setModal] = useState(null);   // { memberId, stepIndex, subItemId }
  const [tmpPct, setTmpPct] = useState(0);

  useEffect(() => { saveState(st); }, [st]);

  /* ── step callbacks ── */
  const updateStep = useCallback((mid, si, updates) => {
    setSt(prev => ({
      ...prev,
      members: prev.members.map(m =>
        m.id === mid
          ? { ...m, steps: m.steps.map((s,i) => i===si ? { ...s, ...updates } : s) }
          : m
      ),
    }));
  }, []);

  const updateMtg = useCallback((mid, updates) => {
    setSt(prev => ({
      ...prev,
      members: prev.members.map(m =>
        m.id===mid ? { ...m, mtg: { ...m.mtg, ...updates } } : m
      ),
    }));
  }, []);

  const saveMtgRecord = useCallback((mid) => {
    setSt(prev => {
      const member = prev.members.find(m => m.id === mid);
      if (!member) return prev;
      const record = { ...member.mtg, id: genId() };
      return {
        ...prev,
        members: prev.members.map(m =>
          m.id === mid
            ? { ...m, mtgHistory: [record, ...(m.mtgHistory || [])] }
            : m
        ),
      };
    });
  }, []);

  const deleteMtgRecord = useCallback((mid, recordId) => {
    setSt(prev => ({
      ...prev,
      members: prev.members.map(m =>
        m.id === mid
          ? { ...m, mtgHistory: (m.mtgHistory || []).filter(r => r.id !== recordId) }
          : m
      ),
    }));
  }, []);

  const updateMember = useCallback((mid, updates) => {
    setSt(prev => ({
      ...prev,
      members: prev.members.map(m => m.id===mid ? { ...m, ...updates } : m),
    }));
  }, []);

  /* ── sub-item callbacks ── */
  const addSubItem = useCallback((mid, si) => {
    setSt(prev => {
      const member = prev.members.find(m => m.id === mid);
      const step   = member?.steps[si];
      const count  = step?.subItems?.length ?? 0;
      const newItem = {
        id:        genId(),
        name:      `小項目${count + 1}`,
        progress:  0,
        startWeek: step?.startWeek ?? DEFAULT_SCHEDULE[si].startWeek,
        endWeek:   step?.endWeek   ?? DEFAULT_SCHEDULE[si].endWeek,
        memo:      '',
      };
      return {
        ...prev,
        members: prev.members.map(m =>
          m.id === mid
            ? { ...m, steps: m.steps.map((s,i) => i===si
                ? { ...s, subItems: [...(s.subItems||[]), newItem] }
                : s) }
            : m
        ),
      };
    });
  }, []);

  const updateSubItem = useCallback((mid, si, subId, updates) => {
    setSt(prev => ({
      ...prev,
      members: prev.members.map(m =>
        m.id === mid
          ? { ...m, steps: m.steps.map((s,i) => i===si
              ? { ...s, subItems: (s.subItems||[]).map(sub => sub.id===subId ? { ...sub, ...updates } : sub) }
              : s) }
          : m
      ),
    }));
  }, []);

  const deleteSubItem = useCallback((mid, si, subId) => {
    if (!confirm('この小項目を削除しますか？')) return;
    setSt(prev => ({
      ...prev,
      members: prev.members.map(m =>
        m.id === mid
          ? { ...m, steps: m.steps.map((s,i) => i===si
              ? { ...s, subItems: (s.subItems||[]).filter(sub => sub.id !== subId) }
              : s) }
          : m
      ),
    }));
  }, []);

  /* ── modal ── */
  const openModal = useCallback((mid, si, subId = null) => {
    const member = st.members.find(m => m.id === mid);
    const pct = subId
      ? (member?.steps[si]?.subItems || []).find(s => s.id === subId)?.progress ?? 0
      : member?.steps[si]?.progress ?? 0;
    setTmpPct(pct);
    setModal({ memberId: mid, stepIndex: si, subItemId: subId });
  }, [st.members]);

  const applyModal = useCallback(() => {
    if (!modal) return;
    if (modal.subItemId) {
      updateSubItem(modal.memberId, modal.stepIndex, modal.subItemId, { progress: tmpPct });
    } else {
      updateStep(modal.memberId, modal.stepIndex, { progress: tmpPct });
    }
    setModal(null);
  }, [modal, tmpPct, updateStep, updateSubItem]);

  /* ── period modal ── */
  const [periodModal, setPeriodModal] = useState(null); // { memberId, stepIndex, subItemId }
  const openPeriodModal = useCallback((mid, si, subId = null) => {
    setPeriodModal({ memberId: mid, stepIndex: si, subItemId: subId });
  }, []);
  const applyPeriod = useCallback((startWeek, endWeek) => {
    if (!periodModal) return;
    if (periodModal.subItemId) {
      updateSubItem(periodModal.memberId, periodModal.stepIndex, periodModal.subItemId, { startWeek, endWeek });
    } else {
      updateStep(periodModal.memberId, periodModal.stepIndex, { startWeek, endWeek });
    }
    setPeriodModal(null);
  }, [periodModal, updateStep, updateSubItem]);

  /* ── review ── */
  const completeReview = useCallback((mid, ri) => {
    const date = TODAY.toLocaleDateString('ja-JP');
    setSt(prev => ({
      ...prev,
      members: prev.members.map(m =>
        m.id === mid
          ? { ...m, reviews: m.reviews.map((r,i) => i===ri ? { ...r, completed:true, completedDate:date } : r) }
          : m
      ),
    }));
  }, []);

  /* ── tabs ── */
  const [activeTab, setActiveTab] = useState(() => {
    try { return localStorage.getItem('qc-active-tab') || 'all'; } catch(e) { return 'all'; }
  });
  const handleTabChange = (tab) => {
    setActiveTab(tab);
    try { localStorage.setItem('qc-active-tab', tab); } catch(e) {}
    if (tab !== 'all') setSt(p => ({ ...p, selMemberId: tab, selStepIndex: 0 }));
  };

  const visibleMembers = activeTab === 'all'
    ? st.members
    : st.members.filter(m => m.id === activeTab);

  /* ── reset ── */
  const handleReset = () => {
    if (confirm('全データをリセットしますか？この操作は元に戻せません。')) {
      localStorage.removeItem(STORAGE_KEY);
      setSt(createState());
    }
  };

  const todayStr = TODAY.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

  return html`
    <div style=${{ minHeight:'100vh', background:'#0f172a', color:'#e2e8f0' }}>

      <!-- HEADER -->
      <header style=${{
        borderBottom:'1px solid #1e293b', padding:'12px 28px',
        display:'flex', alignItems:'center', justifyContent:'space-between',
        background:'rgba(15,23,42,0.97)', position:'sticky', top:0, zIndex:50,
        boxShadow:'0 1px 12px rgba(0,0,0,0.4)',
      }}>
        <div>
          <h1 style=${{ fontSize:'1.15rem', fontWeight:800, letterSpacing:'-0.01em' }}>
            🍄 新入社員QC発表会 管理ダッシュボード
          </h1>
          <p style=${{ fontSize:'0.68rem', color:'#475569', marginTop:2 }}>
            2025年6〜9月 ／ QCストーリー8ステップ進捗管理
          </p>
        </div>
        <div style=${{ display:'flex', alignItems:'center', gap:16 }}>
          <div style=${{ textAlign:'right', fontSize:'0.7rem', color:'#475569' }}>
            <div>${todayStr}</div>
            ${currentWeekIdx >= 0 && currentWeekIdx <= 12 && html`
              <div style=${{ color:'#38bdf8', fontWeight:700, marginTop:2 }}>
                現在: ${WEEKS[currentWeekIdx].label}（Week ${currentWeekIdx+1}）
              </div>
            `}
          </div>
          <button onClick=${handleReset} title="全データをリセット" style=${{
            padding:'6px 12px', borderRadius:7, fontSize:'0.68rem',
            border:'1px solid #334155', background:'transparent',
            color:'#475569', cursor:'pointer',
          }}>🗑 リセット</button>
        </div>
      </header>

      <!-- TABS -->
      <div style=${{
        display:'flex', borderBottom:'1px solid #1e293b',
        background:'rgba(15,23,42,0.97)', padding:'0 24px',
        position:'sticky', top:57, zIndex:40,
      }}>
        ${[{ id:'all', name:'全員', color:'#94a3b8' }, ...MEMBERS.map(m => ({ id:m.id, name:m.name, color:m.color }))].map(tab => {
          const active = activeTab === tab.id;
          const tabMember = tab.id !== 'all' ? st.members.find(m => m.id === tab.id) : null;
          return html`
            <button key=${tab.id} onClick=${() => handleTabChange(tab.id)} style=${{
              padding:'10px 18px', fontSize:'0.82rem', fontWeight: active ? 800 : 500,
              border:'none', borderBottom: active ? `2px solid ${tab.color}` : '2px solid transparent',
              background:'transparent', color: active ? tab.color : '#475569',
              cursor:'pointer', transition:'all .15s', whiteSpace:'nowrap',
            }}>
              ${tab.name}
              ${tabMember && html`
                <span style=${{ marginLeft:6, fontSize:'0.65rem', fontWeight:700, color:statusInfo(tabMember).color }}>
                  ${overallPct(tabMember)}%
                </span>
              `}
            </button>
          `;
        })}
      </div>

      <!-- MAIN -->
      <main style=${{ padding:'18px 24px', display:'flex', flexDirection:'column', gap:18 }}>
        <${StatusCards} members=${visibleMembers} />
        <${GanttSection}
          members=${visibleMembers}
          onBarClick=${openModal}
          onReviewComplete=${completeReview}
          onSubItemAdd=${addSubItem}
          onSubItemUpdate=${updateSubItem}
          onSubItemDelete=${deleteSubItem}
          onPeriodEdit=${openPeriodModal}
        />
        <${AdminPanel}
          members=${st.members}
          selMemberId=${activeTab !== 'all' ? activeTab : st.selMemberId}
          selStepIndex=${st.selStepIndex}
          onSelectMember=${id => setSt(p => ({ ...p, selMemberId:id, selStepIndex:0 }))}
          onSelectStep=${i  => setSt(p => ({ ...p, selStepIndex:i }))}
          onUpdateStep=${updateStep}
          onUpdateMtg=${updateMtg}
          onSaveMtg=${saveMtgRecord}
          onDeleteMtg=${deleteMtgRecord}
          onSubItemAdd=${addSubItem}
          onSubItemUpdate=${updateSubItem}
          onSubItemDelete=${deleteSubItem}
        />
      </main>

      ${modal && html`
        <${ProgressModal}
          modal=${modal} members=${st.members}
          tmpPct=${tmpPct} onPctChange=${setTmpPct}
          onApply=${applyModal} onClose=${() => setModal(null)}
        />
      `}
      ${periodModal && html`
        <${PeriodModal}
          periodModal=${periodModal} members=${st.members}
          onApply=${applyPeriod} onClose=${() => setPeriodModal(null)}
        />
      `}
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   STATUS CARDS
═══════════════════════════════════════════════════════════════ */
function StatusCards({ members }) {
  const cols = members.length === 1 ? '1fr' : members.length === 2 ? 'repeat(2,1fr)' : members.length === 3 ? 'repeat(3,1fr)' : 'repeat(4,1fr)';
  return html`
    <div style=${{ display:'grid', gridTemplateColumns:cols, gap:14 }}>
      ${members.map(m => html`<${MemberCard} key=${m.id} member=${m} />`)}
    </div>
  `;
}

function MemberCard({ member }) {
  const pct  = overallPct(member);
  const csi  = currentStepIdx(member);
  const stat = statusInfo(member);
  const step = STEPS[csi];
  return html`
    <div style=${{
      background:'#1e293b', border:'1px solid #334155',
      borderRadius:12, borderTop:`3px solid ${member.color}`,
      padding:16, display:'flex', flexDirection:'column', gap:10,
    }}>
      <div style=${{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
        <div>
          <div style=${{ fontWeight:700, fontSize:'0.95rem' }}>${member.name}</div>
          <div style=${{ fontSize:'0.68rem', color:'#475569', marginTop:1 }}>${member.factory}</div>
        </div>
        <span style=${{
          background:stat.bg, color:stat.color, border:`1px solid ${stat.border}`,
          borderRadius:999, padding:'2px 9px', fontSize:'0.68rem', fontWeight:800, whiteSpace:'nowrap',
        }}>${stat.label}</span>
      </div>
      <div style=${{ fontSize:'0.67rem', color:'#64748b', lineHeight:1.55 }}>${member.theme}</div>
      <div>
        <div style=${{ display:'flex', justifyContent:'space-between', fontSize:'0.7rem', marginBottom:4 }}>
          <span style=${{ color:'#64748b' }}>全体進捗</span>
          <span style=${{ fontWeight:800, color:member.color }}>${pct}%</span>
        </div>
        <div style=${{ background:'#334155', borderRadius:4, height:7, overflow:'hidden' }}>
          <div style=${{ background:member.color, width:`${pct}%`, height:'100%', borderRadius:4, transition:'width .4s ease' }} />
        </div>

      <div style=${{ background:'#0f172a', borderRadius:8, padding:'9px 12px', borderLeft:`3px solid ${step.color}` }}>

        <div style=${{ fontWeight:700, fontSize:'0.8rem', color:step.color }}>Step ${csi+1}：${step.name}</div>
        <div style=${{ fontSize:'0.68rem', color:'#64748b', marginTop:2 }}>
          ${member.steps[csi].progress}% 完了
          ${member.steps[csi].risk ? html`<span style=${{ marginLeft:6 }}>${member.steps[csi].risk==='red'?'🔴':member.steps[csi].risk==='yellow'?'🟡':'🟢'}</span>` : ''}
        </div>
      </div>
      ${(member.nextActionDate || member.nextActionContent) && html`
        <div style=${{ fontSize:'0.66rem', color:'#64748b', borderTop:'1px solid #1e293b', paddingTop:8 }}>
          次回アクション：
          ${member.nextActionDate && html`<span style=${{ color:'#fbbf24', fontWeight:700 }}>
            ${new Date(member.nextActionDate+'T00:00').toLocaleDateString('ja-JP',{month:'short',day:'numeric'})}
          </span>`}
          ${member.nextActionDate && member.nextActionContent ? ' ' : ''}
          <span style=${{ color:'#94a3b8' }}>${member.nextActionContent}</span>
        </div>
      `}
    </div>
  `;
}

function MemberRows({ member, isLast, onBarClick, onReviewComplete, onSubItemAdd, onSubItemUpdate, onSubItemDelete, onPeriodEdit }) {

  return html`
    <div style=${{ borderBottom: isLast?'none':'2px solid #334155' }}>

      <div
        style=${{ display:'grid', gridTemplateColumns:GRID, background:'#131f33', cursor:'pointer', userSelect:'none' }}

      >
        <div style=${{ padding:'7px 10px', borderRight:'1px solid #334155', display:'flex', alignItems:'center', gap:6 }}>
          <span style=${{ color:'#475569', fontSize:'0.6rem', width:8, flexShrink:0 }}>${collapsed?'▶':'▼'}</span>
          <div style=${{ flex:1, minWidth:0 }}>
            <div style=${{ fontWeight:700, fontSize:'0.8rem', color:member.color, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>${member.name}</div>
            <div style=${{ fontSize:'0.6rem', color:'#475569' }}>${member.factory}</div>
          </div>
          <span style=${{ fontSize:'0.7rem', fontWeight:800, color:stat.color, flexShrink:0 }}>${pct}%</span>
        </div>
        ${WEEKS.map((_,wi) => {
          const rev = member.reviews.find(r => r.weekIndex===wi);
          return html`
            <div key=${wi} style=${{
              display:'flex', alignItems:'center', justifyContent:'center', minHeight:34,
              borderRight: wi<12?'1px solid #1e293b':'none',
              background: wi===currentWeekIdx?'rgba(56,189,248,0.05)':'transparent',

              ${rev && html`
                <button

                >
                  ${inRange && html`
                    <div style=${{

                      background: barColor(sd.progress, step.color, delayed),
                      borderRadius:`${isFst?4:0}px ${isLst?4:0}px ${isLst?4:0}px ${isFst?4:0}px`,
                      border:`1px solid ${delayed?'rgba(248,113,113,0.2)':step.color+'22'}`,

                <input

                  value=${sub.name}
                  placeholder="小項目名を入力"

                  onClick=${e => e.stopPropagation()}
                />
                <button
                  onClick=${e => { e.stopPropagation(); onPeriodEdit(member.id, si, sub.id); }}
                  title="期間を変更（${WEEKS[sub.startWeek]?.label}〜${WEEKS[sub.endWeek]?.label}）"
                  style=${{
                    background:'rgba(56,189,248,0.08)', border:'1px solid rgba(56,189,248,0.2)',
                    color:'#38bdf8', borderRadius:3, padding:'0 3px', cursor:'pointer',

                    background:'none', border:'none', color:'#475569', cursor:'pointer',
                    padding:'0 2px', fontSize:'0.75rem', flexShrink:0, lineHeight:1,
                  }}
                >✕</button>
              </div>
              ${WEEKS.map((_,wi) => {
                const inR  = wi>=sub.startWeek && wi<=sub.endWeek;
                const isFst = wi===sub.startWeek;
                const isLst = wi===sub.endWeek;
                return html`
                  <div key=${wi}
                    onClick=${inR ? () => onBarClick(member.id, si, sub.id) : undefined}
                    style=${{
                      borderRight: wi<12?'1px solid #080d18':'none',
                      background: wi===currentWeekIdx?'rgba(56,189,248,0.02)':'transparent',
                      cursor: inR?'pointer':'default',
                      position:'relative', padding:'3px 1px',

                  >
                    ${inR && html`
                      <div style=${{
                        position:'absolute', inset:`3px ${isLst?'1px':'0px'} 3px ${isFst?'1px':'0px'}`,
                        background: barColor(sub.progress, step.color, false),
                        borderRadius:`${isFst?3:0}px ${isLst?3:0}px ${isLst?3:0}px ${isFst?3:0}px`,
                        border:`1px solid ${step.color}18`, opacity:0.85,
                        display:'flex', alignItems:'center', justifyContent:'center',
                      }}>
                        ${isFst && sub.progress>0 && html`
                          <span style=${{ fontSize:'0.5rem', color:'#fff', fontWeight:800, textShadow:'0 1px 2px rgba(0,0,0,0.9)' }}>
                            ${sub.progress}%
                          </span>
                        `}
                      </div>
                    `}
                  </div>
                `;
              })}
            </div>
          `)}
        `;
      })}
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   PERIOD MODAL
═══════════════════════════════════════════════════════════════ */
function PeriodModal({ periodModal, members, onApply, onClose }) {
  const member  = members.find(m => m.id === periodModal.memberId);
  const step    = STEPS[periodModal.stepIndex];
  const sd      = member?.steps[periodModal.stepIndex];
  const subItem = periodModal.subItemId
    ? (sd?.subItems || []).find(s => s.id === periodModal.subItemId)
    : null;

  const current = subItem || sd;
  const [startWeek, setStartWeek] = useState(current?.startWeek ?? 0);
  const [endWeek,   setEndWeek]   = useState(current?.endWeek   ?? 0);

  const handleApply = () => {
    const s = Math.min(startWeek, endWeek);
    const e = Math.max(startWeek, endWeek);
    onApply(s, e);
  };

  const SS = {
    background:'#0a1526', color:'#e2e8f0', border:'1px solid #334155',
    borderRadius:8, padding:'7px 10px', outline:'none', flex:1,
  };

  return html`
    <div
      style=${{ position:'fixed', inset:0, background:'rgba(0,0,0,0.75)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:9999 }}
      onClick=${onClose}
    >
      <div
        style=${{ background:'#1e293b', border:'1px solid #334155', borderRadius:16, padding:28, width:420, boxShadow:'0 30px 60px rgba(0,0,0,0.7)' }}
        onClick=${e => e.stopPropagation()}
      >
        <div style=${{ fontWeight:800, fontSize:'0.95rem', marginBottom:4 }}>期間を設定</div>
        <div style=${{ fontSize:'0.75rem', color:'#64748b', marginBottom: subItem ? 6 : 20 }}>
          ${member?.name}　／　Step ${periodModal.stepIndex+1}：${step.name}
        </div>
        ${subItem && html`
          <div style=${{
            fontSize:'0.72rem', color:step.color, marginBottom:20,
            background:step.color+'15', borderRadius:6, padding:'5px 10px', borderLeft:`3px solid ${step.color}`,
          }}>
            小項目：${subItem.name || '（名称未設定）'}
          </div>
        `}

        <!-- week selectors -->
        <div style=${{ display:'flex', alignItems:'center', gap:10, marginBottom:18 }}>
          <div style=${{ flex:1 }}>
            <div style=${{ fontSize:'0.65rem', color:'#475569', marginBottom:5, fontWeight:700 }}>開始週</div>
            <select value=${startWeek} onChange=${e => setStartWeek(+e.target.value)} style=${SS}>
              ${WEEKS.map((w,i) => html`<option key=${i} value=${i}>${w.label}（${w.shortLabel}〜）</option>`)}
            </select>
          </div>
          <div style=${{ color:'#475569', fontSize:'1.2rem', marginTop:16 }}>〜</div>
          <div style=${{ flex:1 }}>
            <div style=${{ fontSize:'0.65rem', color:'#475569', marginBottom:5, fontWeight:700 }}>終了週</div>
            <select value=${endWeek} onChange=${e => setEndWeek(+e.target.value)} style=${SS}>
              ${WEEKS.map((w,i) => html`<option key=${i} value=${i}>${w.label}（〜${w.shortLabel}）</option>`)}
            </select>
          </div>
        </div>

        <!-- visual preview -->
        <div style=${{ marginBottom:22 }}>
          <div style=${{ fontSize:'0.65rem', color:'#475569', marginBottom:6, fontWeight:700 }}>プレビュー</div>
          <div style=${{ display:'flex', borderRadius:6, overflow:'hidden', border:'1px solid #334155', height:20 }}>
            ${WEEKS.map((_,i) => {
              const s = Math.min(startWeek, endWeek);
              const e = Math.max(startWeek, endWeek);
              const inRange = i >= s && i <= e;
              return html`
                <div key=${i} style=${{
                  flex:1, height:'100%',
                  background: inRange ? step.color+'aa' : 'rgba(15,23,42,0.6)',
                  borderRight: i<12 ? '1px solid #1e293b' : 'none',
                  transition:'background .15s',
                }} title=${WEEKS[i].label} />
              `;
            })}
          </div>
          <div style=${{ display:'flex', justifyContent:'space-between', fontSize:'0.6rem', color:'#475569', marginTop:3 }}>
            <span>${WEEKS[0].label}</span>
            <span style=${{ color:step.color, fontWeight:700 }}>
              ${WEEKS[Math.min(startWeek,endWeek)].label} 〜 ${WEEKS[Math.max(startWeek,endWeek)].label}
              （${Math.max(startWeek,endWeek) - Math.min(startWeek,endWeek) + 1}週間）
            </span>
            <span>${WEEKS[12].label}</span>
          </div>
        </div>

        <div style=${{ display:'flex', gap:10 }}>
          <button onClick=${onClose} style=${{ flex:1, padding:10, borderRadius:8, border:'1px solid #334155', background:'transparent', color:'#64748b', cursor:'pointer' }}>キャンセル</button>
          <button onClick=${handleApply} style=${{ flex:2, padding:10, borderRadius:8, border:'none', background:step.color, color:'#0f172a', cursor:'pointer', fontWeight:800, fontSize:'0.9rem' }}>期間を確定する</button>
        </div>
      </div>
    </div>
  `;
}

    <div style=${{ background:'#1e293b', border:'1px solid #334155', borderRadius:12, overflow:'hidden' }}>
      <div style=${{ padding:'12px 20px', borderBottom:'1px solid #334155' }}>
        <h2 style=${{ fontWeight:700, fontSize:'0.9rem' }}>📝 MTG内容メモ</h2>
      </div>

      <!-- header row: member + date -->
      <div style=${{ display:'flex', gap:16, padding:'14px 20px', borderBottom:'1px solid #334155', flexWrap:'wrap', alignItems:'flex-end' }}>
        <div style=${{ minWidth:200, flex:'0 0 220px' }}>
          <label style=${LS}>メンバー選択</label>
          <select value=${selMemberId} onChange=${e => onSelectMember(e.target.value)} style=${IS}>
            ${members.map(m => html`<option key=${m.id} value=${m.id}>${m.name}（${m.factory}）</option>`)}
          </select>
        </div>
        <div style=${{ flex:'0 0 180px' }}>
          <label style=${LS}>MTG実施日</label>
          <input type="date" value=${mtg.date || ''} onInput=${e => upd('date', e.target.value)} style=${IS} />
        </div>
        <div style=${{ flex:1, minWidth:120, display:'flex', alignItems:'flex-end', paddingBottom:1 }}>
          ${mtg.date && html`<span style=${{ fontSize:'0.78rem', color:'#64748b' }}>${selMember?.name} との MTG</span>`}
        </div>
      </div>

      <!-- 4-field stack -->
      <div style=${{ display:'flex', flexDirection:'column', gap:0 }}>

        <!-- 1. 議事録URL -->
        <div style=${{ padding:'16px 20px', borderBottom:'1px solid #334155' }}>
          <label style=${LS}>① 議事録URL</label>
          <input
            type="url"
            value=${mtg.minutesUrl || ''}
            onInput=${e => upd('minutesUrl', e.target.value)}
            placeholder="https://docs.google.com/..."
            style=${IS}
          />
          ${mtg.minutesUrl && html`
            <a href=${mtg.minutesUrl} target="_blank" rel="noopener" style=${{ display:'inline-block', marginTop:6, fontSize:'0.72rem', color:'#38bdf8' }}>
              🔗 議事録を開く
            </a>
          `}
        </div>

        <!-- 2. 会議目的 -->
        <div style=${{ padding:'16px 20px', borderBottom:'1px solid #334155' }}>
          <label style=${LS}>② 会議目的</label>
          <textarea
            value=${mtg.purpose || ''}
            onInput=${e => upd('purpose', e.target.value)}
            placeholder="例：Step2の現状把握の進捗確認、課題整理"
            rows=3
            style=${{ ...IS, lineHeight:1.6, fontFamily:'inherit', resize:'vertical' }}
          />
        </div>

        <!-- 3. 内容・メモ -->
        <div style=${{ padding:'16px 20px', borderBottom:'1px solid #334155' }}>
          <label style=${LS}>③ 内容・メモ</label>
          <textarea
            value=${mtg.content || ''}
            onInput=${e => upd('content', e.target.value)}
            placeholder="気づき、指導内容、懸念事項、決定事項などを記録…"
            rows=7
            style=${{ ...IS, lineHeight:1.7, fontFamily:'inherit', resize:'vertical' }}
          />
        </div>

        <!-- 4. 次回アクション -->
        <div style=${{ padding:'16px 20px', borderBottom:'1px solid #334155' }}>
          <label style=${LS}>④ 次回アクション</label>
          <textarea
            value=${mtg.nextAction || ''}
            onInput=${e => upd('nextAction', e.target.value)}
            placeholder="例：・Step3の目標値を決める&#10;・データ追加収集&#10;・次回MTGまでに〇〇を実施"
            rows=5
            style=${{ ...IS, lineHeight:1.7, fontFamily:'inherit', resize:'vertical' }}
          />
        </div>
      </div>

      <!-- SAVE BUTTON -->
      <div style=${{ padding:'12px 20px', borderTop:'1px solid #334155', display:'flex', alignItems:'center', gap:14 }}>
        <button
          onClick=${handleSave}
          disabled=${!mtg.date}
          style=${{
            padding:'9px 28px', borderRadius:8, fontWeight:800, fontSize:'0.85rem', cursor: mtg.date ? 'pointer' : 'not-allowed',
            border:'none', background: mtg.date ? '#38bdf8' : '#334155', color: mtg.date ? '#0f172a' : '#475569',
            transition:'background .15s',
          }}
        >💾 このMTGを保存</button>
        ${saved && html`<span style=${{ fontSize:'0.78rem', color:'#4ade80', fontWeight:700 }}>✓ 保存しました</span>`}
        ${!mtg.date && html`<span style=${{ fontSize:'0.72rem', color:'#475569' }}>※ MTG実施日を入力してから保存してください</span>`}
      </div>

      <!-- MTG HISTORY -->
      ${(() => {
        const filtered = mtg.date ? mtgHistory.filter(r => r.date === mtg.date) : [];
        if (!filtered.length) return null;
        return html`
        <div style=${{ borderTop:'1px solid #334155', padding:'16px 20px' }}>
          <div style=${{ fontSize:'0.75rem', fontWeight:700, color:'#475569', marginBottom:12, textTransform:'uppercase', letterSpacing:'0.06em' }}>
            📁 ${mtg.date ? new Date(mtg.date).toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' }) : ''} の保存済み記録 (${filtered.length}件)
          </div>
          <div style=${{ display:'flex', flexDirection:'column', gap:8 }}>
            ${filtered.map(rec => html`
              <div key=${rec.id} style=${{ background:'#0a1526', borderRadius:10, border:'1px solid #334155', overflow:'hidden' }}>
                <!-- card header (always visible, clickable) -->
                <div
                  onClick=${() => setExpandedId(expandedId === rec.id ? null : rec.id)}
                  style=${{
                    display:'flex', alignItems:'center', gap:10, padding:'10px 14px',
                    cursor:'pointer', userSelect:'none',
                    background: expandedId === rec.id ? '#1e293b' : 'transparent',
                    transition:'background .15s',
                  }}
                >
                  <span style=${{ fontSize:'1rem' }}>${expandedId === rec.id ? '▼' : '▶'}</span>
                  <span style=${{ fontWeight:700, fontSize:'0.85rem', color:'#e2e8f0', flex:1 }}>
                    📅 ${rec.date ? new Date(rec.date).toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' }) : '日付なし'}
                  </span>
                  ${rec.purpose && html`
                    <span style=${{ fontSize:'0.72rem', color:'#64748b', maxWidth:220, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                      ${rec.purpose}
                    </span>
                  `}
                  <button
                    onClick=${e => { e.stopPropagation(); onDeleteMtg(selMemberId, rec.id); }}
                    title="削除"
                    style=${{
                      marginLeft:4, padding:'3px 8px', borderRadius:6, fontSize:'0.65rem', cursor:'pointer',
                      background:'rgba(248,113,113,0.1)', border:'1px solid rgba(248,113,113,0.25)', color:'#f87171',
                      flexShrink:0,
                    }}
                  >✕</button>
                </div>

                <!-- card body (expanded) -->
                ${expandedId === rec.id && html`
                  <div style=${{ padding:'14px 16px', borderTop:'1px solid #1e293b', display:'flex', flexDirection:'column', gap:12 }}>
                    ${rec.minutesUrl && html`
                      <div>
                        <div style=${{ fontSize:'0.6rem', color:'#475569', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4 }}>① 議事録URL</div>
                        <a href=${rec.minutesUrl} target="_blank" rel="noopener" style=${{ fontSize:'0.78rem', color:'#38bdf8', wordBreak:'break-all' }}>
                          🔗 ${rec.minutesUrl}
                        </a>
                      </div>
                    `}
                    ${rec.purpose && html`
                      <div>
                        <div style=${{ fontSize:'0.6rem', color:'#475569', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4 }}>② 会議目的</div>
                        <div style=${{ fontSize:'0.8rem', color:'#cbd5e1', lineHeight:1.6, whiteSpace:'pre-wrap' }}>${rec.purpose}</div>
                      </div>
                    `}
                    ${rec.content && html`
                      <div>
                        <div style=${{ fontSize:'0.6rem', color:'#475569', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4 }}>③ 内容・メモ</div>
                        <div style=${{ fontSize:'0.8rem', color:'#cbd5e1', lineHeight:1.6, whiteSpace:'pre-wrap' }}>${rec.content}</div>
                      </div>
                    `}
                    ${rec.nextAction && html`
                      <div style=${{ background:'#0f172a', borderRadius:8, padding:'10px 12px', borderLeft:'3px solid #38bdf8' }}>
                        <div style=${{ fontSize:'0.6rem', color:'#475569', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:4 }}>④ 次回アクション</div>
                        <div style=${{ fontSize:'0.8rem', color:'#cbd5e1', lineHeight:1.6, whiteSpace:'pre-wrap' }}>${rec.nextAction}</div>
                      </div>
                    `}
                  </div>
                `}
              </div>
            `)}
          </div>
        </div>
        `;
      })()}

      <!-- SUB-ITEMS SECTION -->
      <div style=${{ borderTop:'1px solid #334155', padding:18 }}>
        <div style=${{ display:'flex', alignItems:'center', gap:10, marginBottom:14, flexWrap:'wrap' }}>
          <h3 style=${{ fontSize:'0.82rem', fontWeight:700 }}>
            📋 小項目管理
          </h3>
          <select value=${selStepIndex} onChange=${e => onSelectStep(+e.target.value)} style=${{ ...SS, width:'auto', flex:'0 0 auto' }}>
            ${STEPS.map((s,i) => html`<option key=${s.id} value=${i}>Step${i+1}：${s.name}</option>`)}
          </select>
          <span style=${{ color:'#475569', fontSize:'0.72rem' }}>／ ${selMember?.name}</span>
          <button
            onClick=${() => onSubItemAdd(selMemberId, selStepIndex)}
            style=${{
              marginLeft:'auto', padding:'6px 14px', borderRadius:7, cursor:'pointer',
              border:`1px solid ${stepColor}55`, background:stepColor+'18',
              color:stepColor, fontWeight:700, fontSize:'0.75rem',
            }}
          >＋ 小項目を追加</button>
        </div>

        ${subItems.length === 0 && html`
          <div style=${{ textAlign:'center', color:'#334155', fontSize:'0.78rem', padding:'16px 0' }}>
            小項目はまだありません。「＋ 小項目を追加」か、ガントチャートのステップ行末「＋」から追加できます。
          </div>
        `}

        ${subItems.length > 0 && html`
          <!-- header -->
          <div style=${{
            display:'grid', gridTemplateColumns:'1fr 110px 110px 130px 36px',
            gap:8, padding:'4px 10px', marginBottom:4,
            fontSize:'0.62rem', color:'#475569', fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em',
          }}>
            <span>小項目名</span>
            <span style=${{ textAlign:'center' }}>開始週</span>
            <span style=${{ textAlign:'center' }}>終了週</span>
            <span style=${{ textAlign:'center' }}>進捗</span>
            <span></span>
          </div>
          ${subItems.map((sub, idx) => html`
            <div key=${sub.id} style=${{
              display:'flex', flexDirection:'column', gap:6,
              padding:'8px 10px', marginBottom:6,
              background:'#0a1526', borderRadius:8,
              border:`1px solid ${stepColor}22`,
            }}>
              <!-- main row -->
              <div style=${{ display:'grid', gridTemplateColumns:'1fr 110px 110px 130px 36px', gap:8, alignItems:'center' }}>
                <!-- name -->
                <input
                  type="text"
                  value=${sub.name}
                  placeholder="小項目名を入力"
                  onInput=${e => onSubItemUpdate(selMemberId, selStepIndex, sub.id, { name: e.target.value })}
                  style=${{ ...SS, width:'100%' }}
                />
                <!-- start week -->
                <select
                  value=${sub.startWeek}
                  onChange=${e => onSubItemUpdate(selMemberId, selStepIndex, sub.id, { startWeek: +e.target.value })}
                  style=${SS}
                >
                  ${WEEKS.map((w,i) => html`<option key=${i} value=${i}>${w.label}</option>`)}
                </select>
                <!-- end week -->
                <select
                  value=${sub.endWeek}
                  onChange=${e => onSubItemUpdate(selMemberId, selStepIndex, sub.id, { endWeek: +e.target.value })}
                  style=${SS}
                >
                  ${WEEKS.map((w,i) => html`<option key=${i} value=${i}>${w.label}</option>`)}
                </select>
                <!-- progress -->
                <div style=${{ display:'flex', gap:4 }}>
                  ${[0,25,50,75,100].map(pct => html`
                    <button key=${pct}
                      onClick=${() => onSubItemUpdate(selMemberId, selStepIndex, sub.id, { progress: pct })}
                      style=${{
                        flex:1, padding:'4px 2px', borderRadius:5, fontSize:'0.6rem', cursor:'pointer',
                        border:`1px solid ${sub.progress===pct?stepColor:'#1e293b'}`,
                        background: sub.progress===pct?stepColor+'30':'transparent',
                        color: sub.progress===pct?stepColor:'#475569',
                        fontWeight: sub.progress===pct?800:400,
                      }}
                    >${pct}%</button>
                  `)}
                </div>
                <!-- delete -->
                <button
                  onClick=${() => onSubItemDelete(selMemberId, selStepIndex, sub.id)}
                  title="削除"
                  style=${{
                    background:'rgba(248,113,113,0.1)', border:'1px solid rgba(248,113,113,0.3)',
                    color:'#f87171', borderRadius:6, padding:'5px 8px', cursor:'pointer', fontSize:'0.7rem',
                  }}
                >✕</button>
              </div>
              <!-- memo row -->
              <textarea
                value=${sub.memo || ''}
                onInput=${e => onSubItemUpdate(selMemberId, selStepIndex, sub.id, { memo: e.target.value })}
                placeholder="メモ（気づき・懸念・指導内容など）"
                rows="2"
                style=${{
                  width:'100%', background:'#0f172a', color:'#94a3b8',
                  border:'1px solid #1e293b', borderRadius:6, padding:'6px 9px',
                  fontSize:'0.72rem', lineHeight:1.5, outline:'none', resize:'vertical',
                  fontFamily:'inherit',
                }}
              />
            </div>
          `)}
        `}
      </div>
    </div>
  `;
}

/* ─── MOUNT ──────────────────────────────────────────────────── */
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
