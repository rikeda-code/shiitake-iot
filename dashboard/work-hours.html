function renderStdHoursTable(prodData) {
  const main = document.getElementById('main');
  const rows = loadStdSettings();
  const { months: prodMonths, records } = prodData;

  const commonMonths = prodMonths.map(m => normalizeMonth(m));

  function getProdVal(site, metricKey, mi) {
    const r = records.find(r => r.site === site && r.metric === metricKey);
    return r ? (r.values[mi] ?? null) : null;
  }

  const conv = loadCsConv();

  function calcRow(site, r, mi) {
    const v = r.val;
    if (v === null || v === undefined) return { h: null, basis: '—' };

    const mkey = r.metricKey || null;

    if (r.col === 'kgPerH' && v > 0) {
      const kg = getProdVal(site, mkey || '収穫量(kg)', mi);
      return { h: kg !== null ? kg / v : null,
               containers: kg };
    }
    if (r.col === 'fixedH') return { h: v, containers: null };

    if (r.col === 'perContainer') {
      const containers = getProdVal(site, mkey || '稼働コンテナ数', mi);
      if (containers !== null) {
        const hPer = r.unit === 'h' ? v : v / 60;
        return { h: containers * hPer, containers };
      }
      return { h: null, containers: null };
    }
    if (r.col === 'perPiece') {
      const pcs = getProdVal(site, mkey || '合計(点数)', mi);
      if (pcs !== null) {
        const secPer = r.unit === '秒' ? v : v * 60;
        return { h: pcs * secPer / 3600, containers: pcs };
      }
      return { h: null, containers: null };
    }
    if (r.col === 'perCs') {
      const pcs  = getProdVal(site, mkey || '合計(点数)', mi);
      const bara = getProdVal(site, conv.baraMetric || 'バラ数', mi) || 0;
      if (pcs !== null) {
        const cs = calcCs(pcs, bara, conv);
        const secPer = r.unit === '秒' ? v : v * 60;
        return { h: cs * secPer / 3600, containers: Math.round(cs) };
      }
      return { h: null, containers: null };
    }
    return { h: null, containers: null };
  }

  const availSites = [...new Set(records.map(r => r.site))].filter(s => SITE_COLORS[s]);
  const divCount = {};
  rows.forEach(r => { divCount[r.div] = (divCount[r.div] || 0) + 1; });

  let html = `<div class="prod-panel">
    <div class="chart-section-label">📋 標準工数(h) ／ 生産実績 × 標準工数設定
      <span style="font-size:0.72rem;font-weight:400;color:var(--muted);margin-left:12px">※ 稼働コンテナ数・合計点数は生産実績シートから取得　cs換算設定は⚙️タブで変更可</span>
    </div>`;

  availSites.forEach(site => {
    const siteColor = SITE_COLORS[site] || '#fff';
    html += `<div style="margin-bottom:28px">
      <div class="schart-header" style="color:${siteColor};margin-bottom:6px">📍 ${site}</div>
      <div class="prod-table-wrap"><table class="prod-table">
        <thead><tr>
          <th class="th-left" style="min-width:60px">業務区分</th>
          <th class="th-left" style="min-width:130px">作業区分</th>
          <th class="th-left" style="min-width:140px">計算根拠</th>
          ${commonMonths.map(m => `<th>${m}</th>`).join('')}
          <th class="th-left" style="min-width:130px">計算方法</th>
        </tr></thead><tbody>`;

    let lastDiv = '';
    rows.forEach(r => {
      const divCell = r.div !== lastDiv
        ? `<td class="col-site" style="color:${r.div === '栽培' ? 'var(--accent-gunma)' : 'var(--accent-inabe)'};font-weight:600" rowspan="${divCount[r.div]}">${r.div}</td>`
        : '';
      if (r.div !== lastDiv) lastDiv = r.div;

      const monthData = commonMonths.map((_, mi) => calcRow(site, r, mi));
      const hasData = monthData.some(d => d.h !== null);
      // Pick latest month's containers value as sample
      const sampleD = [...monthData].reverse().find(d => d.containers !== null);
      const sampleContainers = sampleD ? sampleD.containers : null;

      const mkey = r.metricKey || '';

      // Status icon
      const statusIcon = r.val === null
        ? '<span style="color:var(--muted)">未設定</span>'
        : hasData
          ? '<span style="color:#34d399">●</span>'
          : '<span style="color:#f59e0b">○</span>';

      // Basis description (skip if val not set)
      let basisDesc = '—';
      if (r.val !== null) {
        if (r.col === 'fixedH') {
          basisDesc = `固定 ${r.val} h/月`;
        } else if (r.col === 'kgPerH') {
          basisDesc = sampleContainers !== null
            ? `${sampleContainers.toLocaleString('ja-JP')} kg ÷ ${r.val} kg/h`
            : `${mkey}: データなし`;
        } else if (r.col === 'perContainer') {
          basisDesc = sampleContainers !== null
            ? `${mkey}: ${sampleContainers.toLocaleString('ja-JP')} コンテナ × ${r.val} ${r.unit}`
            : `${mkey}: データなし`;
        } else if (r.col === 'perPiece') {
          basisDesc = sampleContainers !== null
            ? `${sampleContainers.toLocaleString('ja-JP')} 点 × ${r.val} 秒`
            : `${mkey}: データなし`;
        } else if (r.col === 'perCs') {
          basisDesc = sampleContainers !== null
            ? `${sampleContainers.toLocaleString('ja-JP')} cs × ${r.val} 秒`
            : `${mkey}: データなし`;
        }
      }

      html += `<tr>${divCell}
        <td class="col-metric" style="font-size:0.82rem">${r.task}</td>
        <td class="col-metric" style="font-size:0.75rem">
          ${statusIcon} <span style="color:var(--muted)">${basisDesc}</span>
        </td>`;

      monthData.forEach(d => {
        if (d.h !== null) {
          const disp = d.h < 10 ? d.h.toFixed(1) : Math.round(d.h).toLocaleString('ja-JP');
          html += `<td class="col-num">${disp}<span style="font-size:0.68rem;color:var(--muted)"> h</span></td>`;
        } else {
          html += `<td class="col-num empty" style="color:#444">—</td>`;
        }
      });

      html += `<td class="col-metric" style="font-size:0.72rem;color:var(--muted)">${r.note}</td></tr>`;
    });

    // Subtotals per div
    ['栽培', '出荷'].forEach(div => {
      const divRows = rows.filter(r => r.div === div);
      const totals = commonMonths.map((_, mi) => {
        const vals = divRows.map(r => calcRow(site, r, mi).h).filter(v => v !== null);
        return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
      });
      const color = div === '栽培' ? 'var(--accent-gunma)' : 'var(--accent-inabe)';
      html += `<tr style="font-weight:600;background:#1a1f35">
        <td class="col-site" colspan="3" style="text-align:right;padding-right:10px;color:var(--muted)">
          ${div} 小計
        </td>`;
      totals.forEach(t => {
        html += t !== null
          ? `<td class="col-num" style="color:${color}">${t < 10 ? t.toFixed(1) : Math.round(t).toLocaleString('ja-JP')}<span style="font-size:0.68rem;opacity:0.7"> h</span></td>`
          : `<td class="col-num empty">—</td>`;
      });
      html += `<td></td></tr>`;
    });

    // Grand total
    const grandTotals = commonMonths.map((_, mi) => {
      const vals = rows.map(r => calcRow(site, r, mi).h).filter(v => v !== null);
      return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
    });
    html += `<tr style="font-weight:700;background:#141827;border-top:2px solid #3a3f5c">
      <td class="col-site" colspan="3" style="text-align:right;padding-right:10px;color:#e2e8f0">総合計</td>`;
    grandTotals.forEach(t => {
      html += t !== null
        ? `<td class="col-num" style="color:#e2e8f0">${t < 10 ? t.toFixed(1) : Math.round(t).toLocaleString('ja-JP')}<span style="font-size:0.68rem;opacity:0.7"> h</span></td>`
        : `<td class="col-num empty">—</td>`;
    });
    html += `<td></td></tr>`;

    html += `</tbody></table></div></div>`;
  });

  html += `</div>`;
  main.innerHTML = html;
}

/* ── Productivity ─────────────────────────────────────────────────── */

// "2025年10月" → "2025/10"
function normalizeMonth(m) {
  return String(m).replace(/(\d+)年(\d+)月/, (_, y, mo) => `${y}/${parseInt(mo)}`);
}

// "2026/5" のような "YYYY/M" 文字列を n ヶ月分ずらす（年をまたぐ場合も対応）
function shiftMonthStr(m, n) {
  const match = String(m).match(/^(\d+)\/(\d+)$/);
  if (!match) return m;
  let year = parseInt(match[1]);
  let month = parseInt(match[2]) + n;
  while (month > 12) { month -= 12; year++; }
  while (month < 1) { month += 12; year--; }
  return `${year}/${month}`;
}

// 整理済み_Mは10日締め（対象期間は前月11日〜当月10日）で、PR#29以降のラベルは締め日の年月
// （例：「6/10締」→「2026年6月」）。一方、整理済み_分析（生産実績）の月はカレンダー通りの暦月
// （例："2026/5"は5/1〜5/31）。よって「6/10締」の実質勤務時間は実態としては5月分が中心であり、
// 生産実績の暦月と突き合わせる際は「整理済み_M側の月 = 整理済み_分析側の月 + 1」という
// 固定オフセットが必要（表示ラベルは整理済み_分析側の値をそのまま使う）。
const PROD_TO_WORK_MONTH_OFFSET = 1;

const productivityChartInstances = {};

function renderProductivityTab() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">生産性データを計算中...</div>';

  Object.values(productivityChartInstances).forEach(c => c.destroy());
  Object.keys(productivityChartInstances).forEach(k => delete productivityChartInstances[k]);

  if (!allData) { main.innerHTML = '<div class="error-msg">勤務データが未ロードです</div>'; return; }

  fetchProductionSheet().then(prodData => {
    renderProductivityCharts(getActiveData(), prodData);
  }).catch(e => {
    main.innerHTML = `<div class="error-msg">エラー: ${e.message}</div>`;
    console.error(e);
  });
}

function renderProductivityCharts(workData, prodData) {
  const main = document.getElementById('main');
  const { months: workMonths, employees } = workData;
  const { months: prodMonths, records } = prodData;

  // Normalize work-hours months for matching
  const normWorkMonths = workMonths.map(normalizeMonth);

  // Common months that appear in both datasets（整理済み_M側は+1ヶ月オフセットして突き合わせる）
  const commonMonths = prodMonths.filter(m => normWorkMonths.includes(shiftMonthStr(m, PROD_TO_WORK_MONTH_OFFSET)));
  if (!commonMonths.length) {
    main.innerHTML = '<div class="loading">共通月が見つかりません（月ラベル形式を確認してください）</div>';
    return;
  }

  // Collect all sites that appear in production data
  const prodSites = [...new Set(records.map(r => r.site))];
  // Use sites that appear in both work data and production data
  const sites = SITES.filter(s => prodSites.includes(s) && employees.some(e => e.base === s));
  if (!sites.length) {
    main.innerHTML = '<div class="loading">拠点データの突合ができませんでした</div>';
    return;
  }

  // Helper: sum hours by workType filter for a site, indexed by common month
  // （commonMonthsは整理済み_分析側の暦月。整理済み_M側は+1ヶ月した列を参照する）
  function workHours(site, typeFilter) {
    const emps = employees.filter(e => e.base === site && e.workType && typeFilter(e.workType));
    return commonMonths.map(m => {
      const wi = normWorkMonths.indexOf(shiftMonthStr(m, PROD_TO_WORK_MONTH_OFFSET));
      if (wi < 0) return null;
      const total = emps.reduce((s, e) => s + (e.hours[wi] ?? 0), 0);
      return total > 0 ? Math.round(total * 10) / 10 : null;
    });
  }

  // Helper: get production metric values aligned to commonMonths
  function prodVals(site, metric) {
    const r = records.find(x => x.site === site && x.metric === metric);
    if (!r) return commonMonths.map(() => null);
    return commonMonths.map(m => {
      const pi = prodMonths.indexOf(m);
      return (pi >= 0 && r.values[pi] !== null) ? r.values[pi] : null;
    });
  }

  // Calculate productivity per site
  const data = {};
  sites.forEach(site => {
    // Match summary table classification (配送・栽培 → 配送, not 栽培)
    const cultivationH = workHours(site, wt => workTypeClass(wt) === 'wt-栽培');
    const shippingH    = workHours(site, wt => workTypeClass(wt) === 'wt-出荷');
    const harvest      = prodVals(site, '収穫量(kg)');
    const shipKg       = prodVals(site, '出荷量(kg)');
    const shipPcs      = prodVals(site, '合計(点数)');

    const ratio = (a, b) => a.map((v, i) =>
      (v !== null && b[i] !== null && b[i] > 0) ? Math.round(v / b[i] * 10) / 10 : null
    );

    data[site] = {
      cultivationH,
      shippingH,
      harvestPerH:  ratio(harvest, cultivationH),
      shipKgPerH:   ratio(shipKg,  shippingH),
      shipPcsPerH:  ratio(shipPcs, shippingH),
      harvest,
      shipKg,
      shipPcs,
    };
  });

  // Build latest-month KPI values
  const lastMonth = commonMonths[commonMonths.length - 1];
  const lastIdx   = commonMonths.length - 1;

  function kpiHtml(label, site, key, unit, decimals = 1) {
    const v = data[site]?.[key]?.[lastIdx];
    const color = SITE_COLORS[site] || '#e2e8f0';
    return `<div class="kpi">
      <div class="kpi-label" style="color:${color}">${site}</div>
      <div class="kpi-value">${v !== null && v !== undefined ? v.toFixed(decimals) : '—'} <span style="font-size:0.7em;color:var(--muted)">${unit}</span></div>
    </div>`;
  }

  // Chart definitions: productivity line (left Y) + volume/time bars (right Y)
  const barMode = window._prodBarMode || 'volume';
  const metrics = [
    { key: 'harvestPerH', title: '① 栽培生産性', sub: '栽培時間あたり収穫量', unit: 'kg/h', decimals: 1,
      volKey: 'harvest',    volUnit: 'kg', volLabel: '収穫量',
      hKey:   'cultivationH', hUnit: 'h', hLabel: '栽培時間' },
    { key: 'shipKgPerH',  title: '② 出荷生産性（重量）', sub: '出荷時間あたり出荷量', unit: 'kg/h', decimals: 1,
      volKey: 'shipKg',     volUnit: 'kg', volLabel: '出荷量',
      hKey:   'shippingH',  hUnit: 'h', hLabel: '出荷時間' },
    { key: 'shipPcsPerH', title: '③ 出荷生産性（点数）', sub: '出荷時間あたり合計点数', unit: '点/h', decimals: 0,
      volKey: 'shipPcs',    volUnit: '点', volLabel: '合計点数',
      hKey:   'shippingH',  hUnit: 'h', hLabel: '出荷時間' },
  ];

  // Combo chart options: left Y = productivity (line), right Y = volume/time (bar)
  function comboOpts(ratioUnit, ratioDecimals, barUnit) {
    return {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8892a4', font: { size: 11 }, boxWidth: 12, padding: 8 } },
        tooltip: {
          backgroundColor: '#1e2235', borderColor: '#3a3f5c', borderWidth: 1,
          titleColor: '#e2e8f0', bodyColor: '#a0aec0',
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (v === null || v === undefined) return null;
              if (ctx.dataset.yAxisID === 'y') {
                return `${ctx.dataset.label}: ${ratioDecimals === 0 ? Math.round(v).toLocaleString('ja-JP') : v.toFixed(ratioDecimals)} ${ratioUnit}`;
              }
              const u = ctx.dataset._barUnit || barUnit;
              return `${ctx.dataset.label}: ${u === '点' ? Math.round(v).toLocaleString('ja-JP') : v.toLocaleString('ja-JP')} ${u}`;
            },
          },
        },
      },
      scales: {
        x: { ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
        y: {
          position: 'left',
          ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} ${ratioUnit}` },
          grid: { color: '#1e2235' }, suggestedMin: 0,
          title: { display: true, text: ratioUnit, color: '#8892a4', font: { size: 10 } },
        },
        y1: {
          position: 'right',
          ticks: { color: '#6b7a90', font: { size: 10 }, callback: v => v >= 1000 ? `${(v/1000).toFixed(0)}k` : `${v}` },
          grid: { drawOnChartArea: false }, suggestedMin: 0,
          title: { display: true, text: barUnit, color: '#6b7a90', font: { size: 10 } },
        },
      },
    };
  }

  // Render HTML
  let html = `<div class="prod-panel">
    <div class="chart-section-label">📈 生産性 ／ 最新月: ${lastMonth}
      <span style="float:right;display:flex;align-items:center;gap:6px;font-size:0.78rem">
        <span style="color:var(--muted)">棒グラフ:</span>
        <button id="prd-toggle-vol" class="select-btn" style="padding:2px 10px" onclick="switchProdBar('volume')">生産量</button>
        <button id="prd-toggle-time" class="select-btn" style="padding:2px 10px" onclick="switchProdBar('time')">時間</button>
      </span>
    </div>
    <div class="kpi-row">
      ${metrics.map(m => sites.map(s => kpiHtml(m.title, s, m.key, m.unit, m.decimals)).join('')).join('')}
    </div>`;

  metrics.forEach((m, i) => {
    html += `<div class="schart-section">
      <div class="schart-header">${m.title}
        <span style="font-weight:400;font-size:0.8rem;color:var(--muted)">${m.sub}</span>
        <span style="float:right;font-size:0.72rem;color:var(--muted)">折れ線(左軸): ${m.unit}　棒(右軸): 生産量/時間 切替</span>
      </div>
      <div class="schart-wrap" style="height:340px"><canvas id="prd-${i}"></canvas></div>
    </div>`;
  });

  html += `</div>`;
  main.innerHTML = html;

  // Store references for toggle function
  window._prodBarMode = barMode;
  window._prodBarData = { metrics, data, sites };

  // Draw combo charts
  metrics.forEach((m, i) => {
    const ctx = document.getElementById(`prd-${i}`)?.getContext('2d');
    if (!ctx) return;

    const datasets = [];

    // Productivity lines per site (left Y)
    sites.forEach(site => {
      const color = SITE_COLORS[site] || '#fff';
      datasets.push({
        type: 'line',
        label: `${site} (${m.unit})`,
        data: data[site][m.key],
        borderColor: color,
        backgroundColor: color + '22',
        borderWidth: 2.5,
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.3,
        spanGaps: true,
        yAxisID: 'y',
        order: 0,
      });
    });

    // Volume/time bars per site (right Y) — controlled by barMode
    const barKey  = barMode === 'volume' ? m.volKey  : m.hKey;
    const barUnit = barMode === 'volume' ? m.volUnit : m.hUnit;
    const barLbl  = barMode === 'volume' ? m.volLabel : m.hLabel;
    sites.forEach(site => {
      const color = SITE_COLORS[site] || '#fff';
      datasets.push({
        type: 'bar',
        label: `${site} ${barLbl}(${barUnit})`,
        data: data[site][barKey],
        backgroundColor: color + '44',
        borderColor: color + '88',
        borderWidth: 1,
        yAxisID: 'y1',
        order: 2,
        _barUnit: barUnit,
      });
    });

    productivityChartInstances[`prd-${i}`] = new Chart(ctx, {
      data: { labels: commonMonths, datasets },
      options: comboOpts(m.unit, m.decimals, barUnit),
    });
  });

  // Set initial toggle button styles
  updateProdToggleButtons();
}

function updateProdToggleButtons() {
  const volBtn  = document.getElementById('prd-toggle-vol');
  const timeBtn = document.getElementById('prd-toggle-time');
  if (!volBtn || !timeBtn) return;
  const accentStyle = 'background:var(--accent-inabe);color:#000;border-color:var(--accent-inabe)';
  const plainStyle  = '';
  if (window._prodBarMode === 'time') {
    volBtn.style.cssText  = plainStyle;
    timeBtn.style.cssText = accentStyle;
  } else {
    volBtn.style.cssText  = accentStyle;
    timeBtn.style.cssText = plainStyle;
  }
}

window.switchProdBar = function(mode) {
  window._prodBarMode = mode;
  updateProdToggleButtons();
  // Need access to metrics and data; re-read from closure via a stored reference
  if (!window._prodBarData) return;
  const { metrics, data, sites } = window._prodBarData;
  metrics.forEach((m, i) => {
    const chart = productivityChartInstances[`prd-${i}`];
    if (!chart) return;
    const isVol   = mode === 'volume';
    const barKey  = isVol ? m.volKey  : m.hKey;
    const barUnit = isVol ? m.volUnit : m.hUnit;
    const barLbl  = isVol ? m.volLabel : m.hLabel;
    const n = sites.length;
    sites.forEach((site, si) => {
      const ds = chart.data.datasets[n + si];
      ds.data     = data[site][barKey];
      ds.label    = `${site} ${barLbl}(${barUnit})`;
      ds._barUnit = barUnit;
    });
    chart.options.scales.y1.title.text = barUnit;
    chart.update();
  });
};

/* ── Main ────────────────────────────────────────────────────────── */
async function loadAll() {
  // 更新前のタブ状態（メインタブ・サマリーのサブタブ・雇用区分フィルター）を保持しておき、
  // データ再取得後に同じ表示へ戻す（振替あり/なしのトグルはグローバル変数のままなので触れない）
  const prevActiveMode = activeMode;
  const prevActiveBase = activeBase;
  const prevSummarySubtab = activeMode === 'summary'
    ? (document.querySelector('.summary-subtab.active')?.dataset.tab || 'table')
    : null;
  const prevEmpTypeChecked = empTypeFilter ? new Set(empTypeFilter) : null;
  const prevEmpTypeAll = empTypeFilter ? new Set(Object.keys(empTypeColorMap)) : null;
  const prevPeriodStart = periodStartMonth;
  const prevPeriodCount = periodMonthCount;

  document.getElementById('main').innerHTML = '<div class="loading">データを読み込み中...</div>';
  document.getElementById('tabs').innerHTML = '';
  document.getElementById('last-updated').textContent = '';
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  if (countChartInstance) { countChartInstance.destroy(); countChartInstance = null; }
  productionData = null; // 生産実績タブ等に戻った際、更新ボタンで実際に再取得されるようキャッシュも破棄する

  try {
    const json = await fetchSheet();
    allData = buildDataset(json);
    renderPeriodFilterUI(prevPeriodStart, prevPeriodCount);
    renderEmpTypeFilterUI(prevEmpTypeChecked, prevEmpTypeAll);

    try {
      const adjJson = await fetchAdjustSheet();
      const adjustRecords = parseAdjustRecords(adjJson);
      transferAdjusted = computeTransferAdjustments(allData, adjustRecords);
    } catch (adjErr) {
      console.error(adjErr);
      transferAdjusted = { employees: allData.employees, alerts: [`「${ADJUST_SHEET_NAME}」シートの取得に失敗したため、振替は反映されていません（${adjErr.message}）`] };
    }

    const bases = SITES.filter(s => allData.employees.some(e => e.base === s));
    if (bases.length === 0) throw new Error('拠点データが見つかりません');

    // 更新前のタブ状態を復元する（拠点が無くなっていた場合のみ先頭拠点にフォールバック）
    if (prevActiveMode === 'site' && bases.includes(prevActiveBase)) {
      activeMode = 'site';
      activeBase = prevActiveBase;
    } else if (prevActiveMode && prevActiveMode !== 'site') {
      activeMode = prevActiveMode;
      activeBase = bases[0];
    } else {
      activeMode = 'site';
      activeBase = bases[0];
    }

    renderTabs(bases);
    document.getElementById('main').innerHTML = '';
    renderActiveTabContent(prevSummarySubtab);

    document.getElementById('last-updated').textContent =
      `最終更新: ${new Date().toLocaleString('ja-JP')}`;
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="error-msg">データ取得エラー: ${e.message}</div>`;
    console.error(e);
  }
}

// 現在の activeMode に応じたタブ内容を描画する（更新ボタン押下後、直前のタブ状態を復元するために使用）
function renderActiveTabContent(summarySubtab) {
  if (activeMode === 'site') {
    renderBasePanel();
  } else if (activeMode === 'summary') {
    renderSummary();
    switchToSummarySubtab(summarySubtab);
  } else if (activeMode === 'production') {
    renderProductionTab();
  } else if (activeMode === 'productivity') {
    renderProductivityTab();
  } else if (activeMode === 'stdset') {
    renderStdSetTab();
  } else if (activeMode === 'stdhours') {
    renderStdHoursTab();
  } else if (activeMode === 'compare') {
    renderCompareTab();
  }
  renderTransferAlerts();
}

/* ── 比較タブ: 標準工数 vs 実績工数 ────────────────────────────── */
function renderCompareTab() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">比較データを計算中...</div>';
  if (!allData) { main.innerHTML = '<div class="error-msg">勤務データが未ロードです</div>'; return; }
  fetchProductionSheet().then(prodData => {
    renderCompareCharts(prodData);
  }).catch(e => {
    main.innerHTML = `<div class="error-msg">生産データ取得エラー: ${e.message}</div>`;
  });
}

function renderCompareCharts(prodData) {
  const main = document.getElementById('main');
  const { months: workMonths, employees } = getActiveData();
  const { months: prodMonths, records } = prodData;
  const rows = loadStdSettings();
  const conv = loadCsConv();

  const normWorkMonths = workMonths.map(m => normalizeMonth(m));
  // 整理済み_M側は+1ヶ月オフセットして突き合わせる（集計期間フィルターで絞り込まれたworkMonthsにも連動する）
  const commonMonths = prodMonths.filter(m => normWorkMonths.includes(shiftMonthStr(m, PROD_TO_WORK_MONTH_OFFSET)));

  const availSites = [...new Set(records.map(r => r.site))].filter(s => SITE_COLORS[s]);

  // mはcommonMonths（整理済み_分析側の暦月）の値。commonMonthsはprodMonthsの絞り込み後の
  // 部分集合になり得るため、prodMonths内の対応位置をここで都度引き直す
  function getProdVal(site, metricKey, m) {
    const r = records.find(r => r.site === site && r.metric === metricKey);
    if (!r) return null;
    const pi = prodMonths.indexOf(m);
    return pi >= 0 ? (r.values[pi] ?? null) : null;
  }

  function calcRow(site, r, m) {
    const v = r.val;
    if (v === null || v === undefined) return { h: null };
    const mkey = r.metricKey || null;
    if (r.col === 'kgPerH' && v > 0) {
      const kg = getProdVal(site, mkey || '収穫量(kg)', m);
      return { h: kg !== null ? kg / v : null };
    }
    if (r.col === 'fixedH') return { h: v };
    if (r.col === 'perContainer') {
      const containers = getProdVal(site, mkey || '稼働コンテナ数', m);
      if (containers !== null) {
        const hPer = r.unit === 'h' ? v : v / 60;
        return { h: containers * hPer };
      }
      return { h: null };
    }
    if (r.col === 'perPiece') {
      const pcs = getProdVal(site, mkey || '合計(点数)', m);
      if (pcs !== null) {
        const secPer = r.unit === '秒' ? v : v * 60;
        return { h: pcs * secPer / 3600 };
      }
      return { h: null };
    }
    if (r.col === 'perCs') {
      const pcs  = getProdVal(site, mkey || '合計(点数)', m);
      const bara = getProdVal(site, conv.baraMetric || 'バラ数', m) || 0;
      if (pcs !== null) {
        const cs = calcCs(pcs, bara, conv);
        const secPer = r.unit === '秒' ? v : v * 60;
        return { h: cs * secPer / 3600 };
      }
      return { h: null };
    }
    return { h: null };
  }

  // commonMonthsは整理済み_分析側の暦月。整理済み_M側は+1ヶ月した列を参照する
  function workHours(site, typeFilter) {
    const emps = employees.filter(e => e.base === site && e.workType && typeFilter(e.workType));
    return commonMonths.map(m => {
      const wi = normWorkMonths.indexOf(shiftMonthStr(m, PROD_TO_WORK_MONTH_OFFSET));
      if (wi < 0) return null;
      const total = emps.reduce((s, e) => s + (e.hours[wi] ?? 0), 0);
      return total > 0 ? Math.round(total * 10) / 10 : null;
    });
  }

  // Task colors for stacked bar（拠点色 SITE_COLORS: 青/紫/緑、および①拠点別
  // サブタブの実績工数バー固定色 #f87171 と被らないよう、赤・橙・黄系のみで構成。
  // validate_palette.jsで拠点色・実績色との衝突・CVD分離を確認済み
  const TASK_COLORS = [
    '#ef4444','#f97316','#eab308','#fb7185','#fb923c',
    '#fde047','#fdba74','#dc2626','#fef08a','#e11d48',
  ];

  const divs = ['栽培', '出荷'];

  // 拠点別（①）・拠点サマリ（②）の両サブタブから共通で使うデータを先に組み立てておく
  window._cmpChartData = {};
  availSites.forEach(site => {
    divs.forEach(div => {
      const divRows = rows.filter(r => r.div === div);
      const typeFilter = div === '栽培'
        ? wt => workTypeClass(wt) === 'wt-栽培'
        : wt => workTypeClass(wt) === 'wt-出荷';
      window._cmpChartData[`${site}-${div}`] = { divRows, actualH: workHours(site, typeFilter), div };
    });
  });

  let compareChartInstances = {};
  function destroyCompareCharts() {
    Object.values(compareChartInstances).forEach(c => c.destroy());
    compareChartInstances = {};
  }

  function tooltipOpts(showStdFooter, showActualTotal) {
    return {
      backgroundColor: '#1e2235', borderColor: '#3a3f5c', borderWidth: 1,
      titleColor: '#e2e8f0', bodyColor: '#e2e8f0',
      footerColor: '#e2e8f0', footerFont: { weight: 'normal' },
      callbacks: {
        label: ctx => {
          const v = ctx.parsed.y;
          if (v === null || v === undefined) return null;
          return `${ctx.dataset.label}: ${v.toLocaleString('ja-JP')} h`;
        },
        // 拠点別内訳（実績側）の直下に実績合計を差し込む。footerは常にbody全体の後に
        // 表示されるため、統合グラフ（実績＋標準）では使えず、実績側の最後の行に付与する
        // _actualGroup/_stdGroupはツールチップ集計専用の目印（Chart.jsのstack機能とは無関係）。
        // 実績工数（拠点別）グラフはグループ化バー表示のため、実際のstackプロパティは付与しない
        afterLabel: showActualTotal ? function (ctx) {
          const actualItems = (this.dataPoints || []).filter(i => i.dataset._actualGroup && i.parsed.y != null);
          if (!actualItems.length) return;
          const last = actualItems[actualItems.length - 1];
          if (ctx.datasetIndex !== last.datasetIndex || ctx.dataIndex !== last.dataIndex) return;
          const actualTotal = actualItems.reduce((s, i) => s + i.parsed.y, 0);
          if (actualTotal === 0) return;
          return `実績合計: ${Math.round(actualTotal).toLocaleString('ja-JP')} h`;
        } : undefined,
        footer: showStdFooter ? items => {
          const stdTotal = items
            .filter(i => i.dataset._stdGroup && i.parsed.y != null)
            .reduce((s, i) => s + i.parsed.y, 0);
          if (stdTotal === 0) return;
          // 実績合計（body側）と左端の見た目を揃えるための全角スペース。
          // 実績合計が表示されないチャートでは不要なため付けない
          const indent = showActualTotal ? '　' : '';
          return `${indent}標準合計: ${Math.round(stdTotal).toLocaleString('ja-JP')} h`;
        } : undefined,
      },
    };
  }

  // ① 拠点別：拠点ごとに、業務区分ごとの「標準工数(積み上げ) vs 実績工数」を1チャートで表示（従来通り）
  function renderCompareSiteView() {
    const content = document.getElementById('compare-content');
    let html = '';
    availSites.forEach(site => {
      const siteColor = SITE_COLORS[site] || '#fff';
      html += `<div>
        <div class="schart-header" style="color:${siteColor}">${site}</div>`;
      divs.forEach(div => {
        html += `<div class="schart-section">
          <div class="schart-header">${div}
            <span style="font-weight:400;font-size:0.8rem;color:var(--muted)"> 標準 vs 実績（h）</span>
          </div>
          <div class="schart-wrap" style="height:320px"><canvas id="cmp-${site}-${div}"></canvas></div>
        </div>`;
      });
      html += `</div>`;
    });
    content.innerHTML = html;

    // フィルター適用後のデータをもとに、ページ内の全拠点グラフでdivごとに共通の軸上限を算出
    const divYMax = {};
    divs.forEach(div => {
      const valueArrays = availSites.map(site => {
        const d = window._cmpChartData[`${site}-${div}`];
        if (!d) return [];
        return commonMonths.flatMap((m, mi) => {
          const stdTotal = d.divRows.reduce((s, r) => {
            const res = calcRow(site, r, m);
            return s + (res.h !== null ? res.h : 0);
          }, 0);
          return [stdTotal, d.actualH[mi]];
        });
      });
      divYMax[div] = computeSharedAxisMax(valueArrays, 100);
    });

    availSites.forEach(site => {
      divs.forEach(div => {
        const key = `${site}-${div}`;
        const d = window._cmpChartData[key];
        const ctx = document.getElementById(`cmp-${key}`)?.getContext('2d');
        if (!d || !ctx) return;

        const { divRows, actualH } = d;
        const datasets = [];

        // 実績工数バー（左）
        datasets.push({
          type: 'bar',
          label: '実績工数',
          data: actualH,
          backgroundColor: '#f8717199',
          borderColor: '#f87171',
          borderWidth: 1,
          stack: 'actual',
          yAxisID: 'y',
          order: 1,
        });

        // 標準工数の積み上げバー（右・タスク別）
        divRows.forEach((r, ri) => {
          const data = commonMonths.map(m => {
            const res = calcRow(site, r, m);
            return res.h !== null ? Math.round(res.h * 10) / 10 : null;
          });
          datasets.push({
            type: 'bar',
            label: r.task,
            data,
            backgroundColor: TASK_COLORS[ri % TASK_COLORS.length] + 'cc',
            borderColor: TASK_COLORS[ri % TASK_COLORS.length],
            borderWidth: 0,
            stack: 'std',
            yAxisID: 'y',
            order: 2,
            _stdGroup: true,
          });
        });

        const opts = {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
            tooltip: tooltipOpts(true),
          },
          scales: {
            x: { stacked: true, ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
            y: {
              stacked: true,
              position: 'left',
              ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
              grid: { color: '#1e2235' }, suggestedMin: 0,
              max: divYMax[div],
              title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } },
            },
          },
        };

        compareChartInstances[key] = new Chart(ctx, { data: { labels: commonMonths, datasets }, options: opts });
      });
    });
  }

  // ② 拠点サマリ：業務区分ごとに「実績工数（拠点別）」と「標準工数（工程別・3拠点合計）」を並べて表示
  function renderCompareSummaryView() {
    const content = document.getElementById('compare-content');
    let html = `<div class="schart-header">3拠点サマリ</div>`;
    divs.forEach(div => {
      html += `<div class="schart-section">
        <div class="schart-header">${div} <span style="font-weight:400;font-size:0.8rem;color:var(--muted)"> 実績工数（拠点別） / 標準工数（工程別・3拠点合計）</span></div>
        <div class="chart-section-label" style="padding-top:0;margin-bottom:6px">標準 vs 実績（統合・拠点別×工程別）</div>
        <div class="schart-wrap" style="height:320px"><canvas id="cmpsum-${div}-combined"></canvas></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div><div class="chart-section-label" style="padding-top:0;margin-bottom:6px">実績工数（拠点別）</div><div class="schart-wrap" style="height:320px"><canvas id="cmpsum-${div}-actual"></canvas></div></div>
          <div><div class="chart-section-label" style="padding-top:0;margin-bottom:6px">標準工数（工程別・3拠点合計）</div><div class="schart-wrap" style="height:320px"><canvas id="cmpsum-${div}-std"></canvas></div></div>
        </div>
      </div>`;
    });
    content.innerHTML = html;

    divs.forEach(div => {
      const divRows = rows.filter(r => r.div === div);

      // 実績工数：拠点ごとの値
      const actualBySite = availSites.map(site => window._cmpChartData[`${site}-${div}`]?.actualH || commonMonths.map(() => null));
      // 標準工数：工程ごとの3拠点合計
      const stdByTask = divRows.map(r => commonMonths.map(m => {
        const total = availSites.reduce((s, site) => {
          const res = calcRow(site, r, m);
          return s + (res.h !== null ? res.h : 0);
        }, 0);
        return total > 0 ? Math.round(total * 10) / 10 : null;
      }));

      // 実績（拠点別）・標準（工程別・積み上げ合計）を、同じdiv内で比較しやすいよう軸を統一
      const stdMonthlyTotals = commonMonths.map((_, mi) => stdByTask.reduce((s, data) => s + (data[mi] || 0), 0));
      const sharedMax = computeSharedAxisMax([...actualBySite, stdMonthlyTotals], 100);

      const actualCtx = document.getElementById(`cmpsum-${div}-actual`)?.getContext('2d');
      if (actualCtx) {
        compareChartInstances[`${div}-actual`] = new Chart(actualCtx, {
          type: 'bar',
          data: {
            labels: commonMonths,
            datasets: availSites.map((site, si) => ({
              label: site,
              data: actualBySite[si],
              backgroundColor: (SITE_COLORS[site] || '#fff') + '99',
              borderColor: SITE_COLORS[site] || '#fff',
              borderWidth: 1,
              _actualGroup: true,
            })),
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
              tooltip: tooltipOpts(false, true),
            },
            scales: {
              x: { ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
              y: {
                position: 'left',
                ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
                grid: { color: '#1e2235' }, suggestedMin: 0, max: sharedMax,
                title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } },
              },
            },
          },
        });
      }

      const stdCtx = document.getElementById(`cmpsum-${div}-std`)?.getContext('2d');
      if (stdCtx) {
        compareChartInstances[`${div}-std`] = new Chart(stdCtx, {
          type: 'bar',
          data: {
            labels: commonMonths,
            datasets: divRows.map((r, ri) => ({
              label: r.task,
              data: stdByTask[ri],
              backgroundColor: TASK_COLORS[ri % TASK_COLORS.length] + 'cc',
              borderColor: TASK_COLORS[ri % TASK_COLORS.length],
              borderWidth: 0,
              stack: 'std',
              _stdGroup: true,
            })),
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
              tooltip: tooltipOpts(true, false),
            },
            scales: {
              x: { stacked: true, ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
              y: {
                stacked: true, position: 'left',
                ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
                grid: { color: '#1e2235' }, suggestedMin: 0, max: sharedMax,
                title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } },
              },
            },
          },
        });
      }

      // 統合グラフ：①拠点別サブタブと同じ形式（左＝実績工数を拠点別に積み上げ、右＝標準工数を工程別に積み上げ）
      const combinedCtx = document.getElementById(`cmpsum-${div}-combined`)?.getContext('2d');
      if (combinedCtx) {
        const datasets = [];
        availSites.forEach((site, si) => {
          datasets.push({
            type: 'bar',
            label: site,
            data: actualBySite[si],
            backgroundColor: (SITE_COLORS[site] || '#fff') + 'cc',
            borderColor: SITE_COLORS[site] || '#fff',
            borderWidth: 0,
            stack: 'actual',
            order: 1,
            _actualGroup: true,
          });
        });
        divRows.forEach((r, ri) => {
          datasets.push({
            type: 'bar',
            label: r.task,
            data: stdByTask[ri],
            backgroundColor: TASK_COLORS[ri % TASK_COLORS.length] + 'cc',
            borderColor: TASK_COLORS[ri % TASK_COLORS.length],
            borderWidth: 0,
            stack: 'std',
            order: 2,
            _stdGroup: true,
          });
        });

        compareChartInstances[`${div}-combined`] = new Chart(combinedCtx, {
          data: { labels: commonMonths, datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
              tooltip: tooltipOpts(true, true),
            },
            scales: {
              x: { stacked: true, ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
              y: {
                stacked: true, position: 'left',
                ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
                grid: { color: '#1e2235' }, suggestedMin: 0, max: sharedMax,
                title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } },
              },
            },
          },
        });
      }
    });
  }

  function renderCompareContent() {
    destroyCompareCharts();
    if (compareSubtab === 'summary') renderCompareSummaryView();
    else renderCompareSiteView();
  }

  main.innerHTML = `
    <div class="compare-shell">
      <div class="compare-header-row">
        <div class="chart-section-label">📊 標準工数 vs 実績工数 比較　<span style="font-size:0.72rem;font-weight:400;color:var(--muted)">※ 左棒(赤) = 実績工数　右棒(積み上げ) = 標準工数（タスク別）</span></div>
        <div class="transfer-toggle" id="compare-subtabs">
          <button class="transfer-toggle-btn${compareSubtab === 'site' ? ' active' : ''}" data-tab="site">拠点別</button>
          <button class="transfer-toggle-btn${compareSubtab === 'summary' ? ' active' : ''}" data-tab="summary">拠点サマリ</button>
        </div>
      </div>
      <div id="compare-content"></div>
    </div>`;

  document.querySelectorAll('#compare-subtabs .transfer-toggle-btn').forEach(btn => {
    btn.onclick = () => {
      compareSubtab = btn.dataset.tab;
      document.querySelectorAll('#compare-subtabs .transfer-toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCompareContent();
    };
  });

  renderCompareContent();
}

loadAll();
</script>
</body>
</html>
