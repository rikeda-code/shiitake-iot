}

/* ── 予実・比較タブ: 予定標準工数 vs 実績工数 ──────────────────── */
function renderPlanCompareTab() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">比較データを計算中...</div>';
  if (!allData) { main.innerHTML = '<div class="error-msg">勤務データが未ロードです</div>'; return; }
  Promise.all([fetchPlanSheet(), fetchProductionSheet(), loadStdSettingsSheetOnce()]).then(([planData, prodData]) => {
    renderPlanCompareCharts(planData, prodData);
  }).catch(e => {
    main.innerHTML = `<div class="error-msg">データ取得エラー: ${e.message}</div>`;
  });
}

function renderPlanCompareCharts(planData, prodData) {
  const main = document.getElementById('main');
  const { months: planMonths, records: rawPlanRecords } = planData;
  const { months: actualMonths, records: actualRecords } = prodData || { months: [], records: [] };

  // 計画シートの実数計画カテゴリで null になっている月を、実績シートの同名メトリックで補完する
  // （過去月は計画シートに実績値がなく予定標準工数が 0 になるため）
  const records = rawPlanRecords.map(r => {
    if (r.cat !== '実数計画') return r;
    const hasNull = r.values.some(v => v === null);
    if (!hasNull) return r;
    const fallback = actualRecords.find(ar => ar.site === r.site && ar.metric === r.metric);
    if (!fallback) return r;
    const merged = r.values.map((v, pi) => {
      if (v !== null) return v;
      const month = planMonths[pi];
      const ai = actualMonths.indexOf(month);
      return ai >= 0 ? (fallback.values[ai] ?? null) : null;
    });
    return { ...r, values: merged };
  });
  const rows = loadYojitsuStdSettings();
  const conv = loadYojitsuCsConv();
  const originalCount = planMonths.length;
  const { calcRow, getProdVal } = createStdHoursEngine(records, planMonths, planMonths, originalCount, conv, null, '実数計画');

  // div ごとの生産計画量を拠点・月別に返す（右軸の折れ線用）
  const DIV_METRIC = { '栽培': '収穫量(kg)', '出荷': '出荷量(kg)' };
  const DIV_UNIT   = { '栽培': 'kg',          '出荷': 'kg' };
  function planVolume(site, div, mi) {
    return getProdVal(site, DIV_METRIC[div], mi);
  }

  const availSites = [...new Set(records.map(r => r.site))].filter(s => SITE_COLORS[s]);

  // 計画月（"2025/12"形式）に対応する実績工数を返す
  function workHoursForPlanMonths(site, typeFilter) {
    const { employees, months: activeMonths } = getActiveData();
    const emps = employees.filter(e => e.base === site && e.workType && typeFilter(e.workType));
    return planMonths.map(planMonth => {
      const ami = activeMonths.findIndex(m => normalizeMonth(m) === planMonth);
      if (ami < 0) return null;
      const total = emps.reduce((s, e) => s + (e.hours[ami] ?? 0), 0);
      return total > 0 ? Math.round(total * 10) / 10 : null;
    });
  }

  const TASK_COLORS = [
    '#ef4444','#f97316','#eab308','#fb7185','#fb923c',
    '#fde047','#fdba74','#dc2626','#fef08a','#e11d48',
  ];

  const divs = ['栽培', '出荷'];

  window._planCmpChartData = {};
  availSites.forEach(site => {
    divs.forEach(div => {
      const divRows = rows.filter(r => r.div === div);
      const typeFilter = div === '栽培'
        ? wt => workTypeClass(wt) === 'wt-栽培'
        : wt => workTypeClass(wt) === 'wt-出荷';
      window._planCmpChartData[`${site}-${div}`] = { divRows, actualH: workHoursForPlanMonths(site, typeFilter), div };
    });
  });

  let planCmpChartInstances = {};
  function destroyCharts() {
    Object.values(planCmpChartInstances).forEach(c => c.destroy());
    planCmpChartInstances = {};
  }

  // 表示する月のインデックスセット（任意の月を個別選択可）
  let planCmpSelected = new Set(planMonths.map((_, i) => i)); // 初期：全月選択
  const sl = arr => arr.filter((_, i) => planCmpSelected.has(i));
  function visMonths() { return planMonths.filter((_, i) => planCmpSelected.has(i)); }

  function tooltipOpts(showStdFooter, showActualTotal) {
    return {
      backgroundColor: '#1e2235', borderColor: '#3a3f5c', borderWidth: 1,
      titleColor: '#e2e8f0', bodyColor: '#e2e8f0',
      footerColor: '#e2e8f0', footerFont: { weight: 'normal' },
      callbacks: {
        label: ctx => {
          const v = ctx.parsed.y;
          if (v === null || v === undefined) return null;
          if (ctx.dataset._volumeLine) return `${ctx.dataset.label}: ${v.toLocaleString('ja-JP')} ${ctx.dataset._unit}`;
          return `${ctx.dataset.label}: ${v.toLocaleString('ja-JP')} h`;
        },
        afterLabel: showActualTotal ? function (ctx) {
          const actualItems = (this.dataPoints || []).filter(i => i.dataset._actualGroup && i.parsed.y != null);
          if (!actualItems.length) return;
          const last = actualItems[actualItems.length - 1];
          if (ctx.datasetIndex !== last.datasetIndex || ctx.dataIndex !== last.dataIndex) return;
          const actualTotal = actualItems.reduce((s, i) => s + i.parsed.y, 0);
          if (actualTotal === 0) return;
          return `実績合計: ${Math.round(actualTotal).toLocaleString('ja-JP')} h`;
        } : undefined,
        footer: showStdFooter ? items => {
          const stdTotal = items
            .filter(i => i.dataset._stdGroup && i.parsed.y != null)
            .reduce((s, i) => s + i.parsed.y, 0);
          if (stdTotal === 0) return;
          const indent = showActualTotal ? '　' : '';
          return `${indent}予定標準合計: ${Math.round(stdTotal).toLocaleString('ja-JP')} h`;
        } : undefined,
      },
    };
  }

  function volumeLineDataset(site, div) {
    const data = planMonths.map((_, mi) => {
      const v = planVolume(site, div, mi);
      return v !== null ? Math.round(v * 10) / 10 : null;
    });
    return {
      type: 'line', label: DIV_METRIC[div], data,
      borderColor: '#94a3b8', backgroundColor: 'transparent',
      borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#94a3b8',
      tension: 0.3, yAxisID: 'y2', order: 0,
      _volumeLine: true, _unit: DIV_UNIT[div],
    };
  }

  function y2Axis(div, volumeData, maxOverride) {
    const max = maxOverride !== undefined ? maxOverride : (computeSharedAxisMax([volumeData.filter(v => v !== null)], 1000) || undefined);
    return {
      position: 'right',
      ticks: { color: '#64748b', font: { size: 10 }, callback: v => v.toLocaleString('ja-JP') },
      grid: { drawOnChartArea: false },
      suggestedMin: 0, max,
      title: { display: true, text: DIV_UNIT[div], color: '#64748b', font: { size: 10 } },
    };
  }

  // 雇用区分シリーズ定義（社員・パート・技能実習生）
  const EMP_SERIES = [
    { label: '社員',       match: e => (e.employment||'').includes('社員') && !(e.employment||'').includes('技能'), color: '#60a5fa' },
    { label: 'パート',     match: e => ['パート','アルバイト'].some(k => (e.employment||'').includes(k)),          color: '#fb923c' },
    { label: '技能実習生', match: e => (e.employment||'').includes('技能実習'),                                    color: '#c084fc' },
  ];

  // 計画月ごとの実績工数を雇用区分でフィルタして返す
  function workHoursByEmpForPlanMonths(site, empMatcher) {
    const { employees, months: activeMonths } = getActiveData();
    const emps = employees.filter(e => e.base === site && e.workType && empMatcher(e));
    return planMonths.map(planMonth => {
      const ami = activeMonths.findIndex(m => normalizeMonth(m) === planMonth);
      if (ami < 0) return null;
      const total = emps.reduce((s, e) => s + (e.hours[ami] ?? 0), 0);
      return total > 0 ? Math.round(total * 10) / 10 : null;
    });
  }

  // 計画月ごとの人数を雇用区分でフィルタして返す（工数>0の人を1人と数える）
  function headcountByEmpForPlanMonths(site, empMatcher) {
    const { employees, months: activeMonths } = getActiveData();
    const emps = employees.filter(e => e.base === site && e.workType && empMatcher(e));
    return planMonths.map(planMonth => {
      const ami = activeMonths.findIndex(m => normalizeMonth(m) === planMonth);
      if (ami < 0) return null;
      const count = emps.filter(e => (e.hours[ami] ?? 0) > 0).length;
      return count > 0 ? count : null;
    });
  }

  // ① 拠点別
  let planCmpSiteTab = availSites[0] || 'いなべ';
  const SITE_TABS = [...availSites, '全拠点合計'];

  // 月の数値比較用ヘルパー（renderSiteView内で共用）
  const mnum = m => { const [y, mo] = m.split('/').map(Number); return y * 100 + mo; };
  const ACTUAL_CUTOFF = mnum('2026/6');
  const HEADCOUNT_CUTOFF = mnum('2026/5'); // 人数実績は2026/5まで
  const BASE_MONTH = '2026/5';

  // 拠点ごとの標準工数合計・実績・予想データを構築
  function computeSiteTotalData(site) {
    const stdTotalRaw = planMonths.map((_, mi) =>
      divs.reduce((sum, div) => {
        const d = window._planCmpChartData[`${site}-${div}`];
        if (!d) return sum;
        return sum + d.divRows.reduce((s, r) => {
          const res = calcRow(site, r, mi);
          return s + (res.h !== null ? res.h : 0);
        }, 0);
      }, 0) || null
    );
    const allActual = {};
    EMP_SERIES.forEach(et => { allActual[et.label] = workHoursByEmpForPlanMonths(site, et.match); });
    const baseIdx = planMonths.indexOf(BASE_MONTH);
    const baseH = {};
    EMP_SERIES.forEach(et => { baseH[et.label] = baseIdx >= 0 ? (allActual[et.label][baseIdx] ?? 0) : 0; });
    const techIncrement = planMonth => {
      const mn = mnum(planMonth);
      if (site === 'いなべ') return mn >= mnum('2026/8') ? 540 : 0;
      if (site === '群馬')   return mn >= mnum('2026/7') ? 180 : 0;
      if (site === '南丹')   return mn >= mnum('2026/8') ? 180 : 0;
      return 0;
    };
    const actualData = {}, forecastData = {};
    EMP_SERIES.forEach(et => {
      actualData[et.label] = planMonths.map((m, mi) =>
        mnum(m) <= ACTUAL_CUTOFF ? allActual[et.label][mi] : null
      );
      forecastData[et.label] = planMonths.map((m, mi) => {
        if (mnum(m) <= ACTUAL_CUTOFF) return null;
        if (et.label === '社員') return Math.round(baseH['社員'] * 10) / 10;
        if (et.label === '技能実習生') return Math.round((baseH['技能実習生'] + techIncrement(m)) * 10) / 10;
        return null;
      });
    });
    planMonths.forEach((m, mi) => {
      if (mnum(m) <= ACTUAL_CUTOFF) return;
      const std = stdTotalRaw[mi] ?? 0;
      const emp = forecastData['社員'][mi] ?? 0;
      const tech = forecastData['技能実習生'][mi] ?? 0;
      forecastData['パート'][mi] = Math.max(0, Math.round((std - emp - tech) * 10) / 10);
    });

    // 人数データ（実績: 〜2026/5、予想: 2026/7〜）
    const allActualCount = {};
    EMP_SERIES.forEach(et => { allActualCount[et.label] = headcountByEmpForPlanMonths(site, et.match); });
    const baseCount = {};
    EMP_SERIES.forEach(et => { baseCount[et.label] = baseIdx >= 0 ? (allActualCount[et.label][baseIdx] ?? 0) : 0; });
    // 2026/5時点のパート1人当たり工数
    const partHourPerPerson = baseCount['パート'] > 0 ? (baseH['パート'] / baseCount['パート']) : null;
    const actualCountData = {}, forecastCountData = {};
    EMP_SERIES.forEach(et => {
      actualCountData[et.label] = planMonths.map((m, mi) =>
        mnum(m) <= HEADCOUNT_CUTOFF ? allActualCount[et.label][mi] : null
      );
      forecastCountData[et.label] = planMonths.map((m, mi) => {
        if (mnum(m) <= ACTUAL_CUTOFF) return null; // 2026/6は空白
        if (et.label === '社員') return baseCount['社員'];
        if (et.label === '技能実習生') return baseCount['技能実習生'] + Math.round(techIncrement(m) / 180);
        if (et.label === 'パート') {
          if (!partHourPerPerson) return null;
          const fcH = forecastData['パート'][mi] ?? 0;
          return Math.round(fcH / partHourPerPerson * 10) / 10;
        }
        return null;
      });
    });

    return { stdTotalRaw, actualData, forecastData, actualCountData, forecastCountData };
  }

  // 標準工数合計 vs 勤務時間合計グラフを描画（単拠点 or 全拠点）
  // 「標準工数合計 vs 勤務時間合計」チャートの軸MAX算出用の実データ値一覧を返す。
  // std/actual/forecastはそれぞれ別スタックとして積み上げ表示されるため、
  // 実際にグラフ上で到達する高さ（＝スタック内の月ごとの合計）で判定する必要がある。
  // 雇用区分ごとの値を個別に見るだけだと、積み上げ後の実際の高さを過小評価してしまう
  function totalChartStackedValues(stdTotalRaw, actualDataMap, forecastDataMap) {
    const vm = visMonths();
    const actualTotals = stackedMonthlyTotals(vm, EMP_SERIES.map(et => ({ data: sl(actualDataMap[et.label]) })));
    const forecastTotals = stackedMonthlyTotals(vm, EMP_SERIES.map(et => ({ data: sl(forecastDataMap[et.label]) })));
    return [
      ...sl(stdTotalRaw).filter(v => v !== null),
      ...actualTotals,
      ...forecastTotals,
    ];
  }

  function renderTotalChart(canvasId, stdTotalRaw, actualDataMap, forecastDataMap, opts) {
    const ctx = document.getElementById(canvasId)?.getContext('2d');
    if (!ctx) return;
    const extraDatasets = (opts && opts.extraDatasets) || [];
    const extraScales   = (opts && opts.extraScales)   || {};
    const stdTotalData = sl(stdTotalRaw);
    const allVals = totalChartStackedValues(stdTotalRaw, actualDataMap, forecastDataMap);
    const yMax = (opts && opts.yMaxOverride !== undefined) ? opts.yMaxOverride : (computeSharedAxisMax([allVals], 100) || undefined);
    const datasets = [
      {
        type: 'bar', label: '予定標準工数合計', data: stdTotalData,
        backgroundColor: '#38bdf866', borderColor: '#38bdf8', borderWidth: 1,
        stack: 'std', yAxisID: 'y', order: 2, _stdGroup: true,
      },
      ...EMP_SERIES.map(et => ({
        type: 'bar', label: `${et.label}（実績）`, data: sl(actualDataMap[et.label]),
        backgroundColor: et.color + '99', borderColor: et.color, borderWidth: 0,
        stack: 'actual', yAxisID: 'y', order: 1,
      })),
      ...EMP_SERIES.map(et => ({
        type: 'bar', label: `${et.label}（予想）`, data: sl(forecastDataMap[et.label]),
        backgroundColor: et.color + '44', borderColor: et.color, borderWidth: 1,
        stack: 'forecast', yAxisID: 'y', order: 1,
      })),
      ...extraDatasets,
    ];
    planCmpChartInstances[canvasId] = new Chart(ctx, {
      data: { labels: visMonths(), datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
          tooltip: {
            callbacks: {
              label: ctx => {
                if (ctx.parsed.y == null) return null;
                if (ctx.dataset._countLine) return `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString('ja-JP')} 人`;
                return `${ctx.dataset.label}: ${Math.round(ctx.parsed.y).toLocaleString('ja-JP')} h`;
              },
              footer: items => {
                const workTotal = items.filter(i => (i.dataset.stack === 'actual' || i.dataset.stack === 'forecast') && !i.dataset._countLine && i.parsed.y != null).reduce((s, i) => s + i.parsed.y, 0);
                const stdTotal  = items.filter(i => i.dataset._stdGroup && i.parsed.y != null).reduce((s, i) => s + i.parsed.y, 0);
                const lines = [];
                if (workTotal > 0) lines.push(`勤務時間合計: ${Math.round(workTotal).toLocaleString('ja-JP')} h`);
                if (stdTotal  > 0) lines.push(`予定標準合計: ${Math.round(stdTotal).toLocaleString('ja-JP')} h`);
                return lines;
              },
            },
          },
        },
        scales: {
          x: { stacked: true, ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
          y: { stacked: true, position: 'left', ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` }, grid: { color: '#1e2235' }, suggestedMin: 0, max: yMax, title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } } },
          ...extraScales,
        },
      },
    });
  }

  // 拠点タブ(いなべ/群馬/南丹/全拠点合計)のHTML断片。固定エリア側(renderSiteTabBarFixed)から呼ぶ
  function siteTabBarHtml() {
    return SITE_TABS.map(t =>
      `<button class="plancmp-site-tab${planCmpSiteTab === t ? ' active' : ''}" data-site="${t}"
        style="padding:4px 14px;border-radius:6px;border:1px solid ${planCmpSiteTab === t ? '#38bdf8' : '#3a3f5c'};background:${planCmpSiteTab === t ? '#38bdf8' : 'transparent'};color:${planCmpSiteTab === t ? '#0f1117' : '#8892a4'};font-size:0.8rem;cursor:pointer;font-weight:${planCmpSiteTab === t ? '600' : '400'}">${t}</button>`
    ).join('');
  }

  // 拠点タブは表示月ドロップダウンと同じ固定エリア(#plancmp-site-tabbar-fixed)に表示する。
  // 'site'サブタブの時だけ表示し、他サブタブでは非表示にする
  function renderSiteTabBarFixed() {
    const el = document.getElementById('plancmp-site-tabbar-fixed');
    if (!el) return;
    if (planCmpSubtab !== 'site') { el.style.display = 'none'; el.innerHTML = ''; return; }
    el.style.display = 'flex';
    el.innerHTML = siteTabBarHtml();
    el.querySelectorAll('.plancmp-site-tab').forEach(btn => {
      btn.onclick = () => {
        planCmpSiteTab = btn.dataset.site;
        renderContent();
      };
    });
  }

  function renderSiteView() {
    const content = document.getElementById('compare-content');
    const vm = visMonths();

    let html = '';

    if (planCmpSiteTab === '全拠点合計') {
      divs.forEach(div => {
        html += `<div class="schart-section">
          <div class="schart-header">${div}（全拠点合計）
            <span style="font-weight:400;font-size:0.8rem;color:var(--muted)"> 予定標準 vs 実績（h）3拠点合計</span>
          </div>
          ${chartWrapHtml(`plancmp-all-${div}`, vm.length, { heightPx: 320, inlineHeight: true, forceResponsive: true })}
        </div>`;
      });
      html += `<div class="schart-section">
        <div class="schart-header">全拠点合計 - 標準工数 vs 勤務時間
          <span style="font-weight:400;font-size:0.8rem;color:var(--muted)"> 予定標準（栽培+出荷・3拠点合計） vs 実勤務（雇用区分別積み上げ・3拠点合計）</span>
        </div>
        ${chartWrapHtml('plancmp-all-total', vm.length, { heightPx: 320, inlineHeight: true, forceResponsive: true })}
      </div>`;
    } else {
      const site = planCmpSiteTab;
      divs.forEach(div => {
        html += `<div class="schart-section">
          <div class="schart-header">${div}
            <span style="font-weight:400;font-size:0.8rem;color:var(--muted)"> 予定標準 vs 実績（h）</span>
          </div>
          ${chartWrapHtml(`plancmp-${site}-${div}`, vm.length, { heightPx: 320, inlineHeight: true, forceResponsive: true })}
        </div>`;
      });
      html += `<div class="schart-section">
        <div class="schart-header">標準工数合計 vs 勤務時間合計
          <span style="font-weight:400;font-size:0.8rem;color:var(--muted)"> 予定標準（栽培+出荷） vs 実勤務（雇用区分別積み上げ）</span>
        </div>
        ${chartWrapHtml(`plancmp-${site}-total`, vm.length, { heightPx: 280, inlineHeight: true, forceResponsive: true })}
      </div>`;
    }

    content.innerHTML = html;

    if (planCmpSiteTab === '全拠点合計') {
      // 全拠点合計: 栽培・出荷チャート（3拠点集計）
      divs.forEach(div => {
        const ctx = document.getElementById(`plancmp-all-${div}`)?.getContext('2d');
        if (!ctx) return;
        const divRows = rows.filter(r => r.div === div);
        // 実績工数: 全拠点の actualH を合計
        const allActualH = planMonths.map((_, mi) =>
          availSites.reduce((s, site) => s + (window._planCmpChartData[`${site}-${div}`]?.actualH[mi] ?? 0), 0) || null
        );
        // 予定標準: 全拠点合計で各タスク行を集計
        const taskData = divRows.map(r =>
          planMonths.map((_, mi) => {
            const total = availSites.reduce((s, site) => {
              const res = calcRow(site, r, mi);
              return s + (res.h !== null ? res.h : 0);
            }, 0);
            return total > 0 ? Math.round(total * 10) / 10 : null;
          })
        );
        // 計画量（右軸）: 全拠点合計
        const volData = planMonths.map((_, mi) =>
          availSites.reduce((s, site) => {
            const v = planVolume(site, div, mi);
            return s + (v !== null ? v : 0);
          }, 0) || null
        );
        // 予定標準（std）は全タスク行が積み上げ表示されるため、軸MAXはタスクごとの
        // 個別値ではなく、月ごとにタスクを跨いで合計した値（実際にグラフ上で到達する
        // 高さ）で判定する必要がある。taskData/allActualHとも未スライスの同じ
        // planMonths基準のインデックスなので、ここで合計してからsl()する
        const stdMonthlyTotalsAll = planMonths.map((_, mi) => taskData.reduce((s, d) => s + (d[mi] || 0), 0));
        const allYValues = [
          ...sl(allActualH).filter(v => v !== null),
          ...sl(stdMonthlyTotalsAll).filter(v => v !== null),
        ];
        const yMax = computeSharedAxisMax([allYValues], 100) || undefined;
        const volMax = computeSharedAxisMax([sl(volData).filter(v => v !== null)], 1000) || undefined;
        const datasets = [
          {
            type: 'bar', label: '実績工数', data: sl(allActualH),
            backgroundColor: '#f8717199', borderColor: '#f87171', borderWidth: 1,
            stack: 'actual', yAxisID: 'y', order: 1,
          },
          ...divRows.map((r, ri) => ({
            type: 'bar', label: r.task, data: sl(taskData[ri]),
            backgroundColor: TASK_COLORS[ri % TASK_COLORS.length] + 'cc',
            borderColor: TASK_COLORS[ri % TASK_COLORS.length],
            borderWidth: 0, stack: 'std', yAxisID: 'y', order: 2, _stdGroup: true,
          })),
          {
            type: 'line', label: DIV_METRIC[div], data: sl(volData),
            borderColor: '#94a3b8', backgroundColor: 'transparent',
            borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#94a3b8',
            tension: 0.3, yAxisID: 'y2', order: 0,
            _volumeLine: true, _unit: DIV_UNIT[div],
          },
        ];
        planCmpChartInstances[`plancmp-all-${div}`] = new Chart(ctx, {
          data: { labels: visMonths(), datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
              tooltip: tooltipOpts(true),
            },
            scales: {
              x: { stacked: true, ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
              y: { stacked: true, position: 'left', ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` }, grid: { color: '#1e2235' }, suggestedMin: 0, max: yMax, title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } } },
              y2: {
                position: 'right',
                ticks: { color: '#64748b', font: { size: 10 }, callback: v => v.toLocaleString('ja-JP') },
                grid: { drawOnChartArea: false },
                suggestedMin: 0, max: volMax,
                title: { display: true, text: DIV_UNIT[div], color: '#64748b', font: { size: 10 } },
              },
            },
          },
        });
      });

      // 全拠点合計: 各拠点データを集約して描画
      const siteDataList = availSites.map(s => computeSiteTotalData(s));
      const allStdTotalRaw = planMonths.map((_, mi) =>
        siteDataList.reduce((sum, d) => sum + (d.stdTotalRaw[mi] ?? 0), 0) || null
      );
      const allActualData = {}, allForecastData = {};
      EMP_SERIES.forEach(et => {
        allActualData[et.label] = planMonths.map((_, mi) => {
          const total = siteDataList.reduce((s, d) => s + (d.actualData[et.label][mi] ?? 0), 0);
          return total > 0 ? Math.round(total * 10) / 10 : null;
        });
        allForecastData[et.label] = planMonths.map((m, mi) => {
          if (mnum(m) <= ACTUAL_CUTOFF) return null;
          const total = siteDataList.reduce((s, d) => s + (d.forecastData[et.label][mi] ?? 0), 0);
          return total > 0 ? Math.round(total * 10) / 10 : null;
        });
      });

      // 人数折れ線データ（全拠点合計）
      const allActualCountData = {}, allForecastCountData = {};
      EMP_SERIES.forEach(et => {
        allActualCountData[et.label] = planMonths.map((_, mi) => {
          const total = siteDataList.reduce((s, d) => s + (d.actualCountData[et.label][mi] ?? 0), 0);
          return total > 0 ? total : null;
        });
        allForecastCountData[et.label] = planMonths.map((m, mi) => {
          if (mnum(m) <= ACTUAL_CUTOFF) return null;
          const total = siteDataList.reduce((s, d) => s + (d.forecastCountData[et.label][mi] ?? 0), 0);
          return total > 0 ? Math.round(total * 10) / 10 : null;
        });
      });
      const countMax = computeSharedAxisMax([
        EMP_SERIES.flatMap(et => [
          ...sl(allActualCountData[et.label]).filter(v => v !== null),
          ...sl(allForecastCountData[et.label]).filter(v => v !== null),
        ]),
      ], 1) || undefined;
      const countDatasets = EMP_SERIES.flatMap(et => [
        {
          type: 'line', label: `${et.label}人数（実績）`, data: sl(allActualCountData[et.label]),
          borderColor: et.color, backgroundColor: 'transparent',
          borderWidth: 2, pointRadius: 3, pointBackgroundColor: et.color,
          tension: 0.3, yAxisID: 'y2', order: 0, _countLine: true, spanGaps: true,
        },
        {
          type: 'line', label: `${et.label}人数（予想）`, data: sl(allForecastCountData[et.label]),
          borderColor: et.color, backgroundColor: 'transparent',
          borderWidth: 2, borderDash: [5, 4],
          pointRadius: 3, pointBackgroundColor: et.color, pointBorderColor: et.color,
          tension: 0.3, yAxisID: 'y2', order: 0, _countLine: true, spanGaps: true,
        },
      ]);
      const countScale = {
        y2: {
          position: 'right',
          ticks: { color: '#64748b', font: { size: 10 }, callback: v => `${v} 人` },
          grid: { drawOnChartArea: false },
          suggestedMin: 0, max: countMax,
          title: { display: true, text: '人', color: '#64748b', font: { size: 10 } },
        },
      };
      renderTotalChart('plancmp-all-total', allStdTotalRaw, allActualData, allForecastData,
        { extraDatasets: countDatasets, extraScales: countScale });
    } else {
      // 単拠点: 栽培・出荷チャート + 合計チャート
      const site = planCmpSiteTab;

      // 軸MAXの統一（全拠点合計は対象外）：いなべ・群馬・南丹の3拠点間で、
      // 同じチャート（栽培/出荷/標準工数合計）の左軸・右軸それぞれの最大値を揃えるため、
      // 現在表示中のsiteだけでなくavailSites(実拠点)全体からMAXを算出する
      const siteValueArraysAllSites = divs.map(div =>
        availSites.map(s => {
          const d = window._planCmpChartData[`${s}-${div}`];
          if (!d) return [];
          return [...planCmpSelected].flatMap(mi => {
            const stdTotal = d.divRows.reduce((sum, r) => {
              const res = calcRow(s, r, mi);
              return sum + (res.h !== null ? res.h : 0);
            }, 0);
            return [stdTotal, d.actualH[mi]];
          });
        })
      );
      // volumeLineDataset()も拠点ごとに1回だけ計算し、下のチャート生成ループで再利用する
      const volDsAllSites = {};
      divs.forEach(div => {
        availSites.forEach(s => { volDsAllSites[`${s}-${div}`] = volumeLineDataset(s, div); });
      });

      const divYMax = {};
      const divVolMax = {};
      divs.forEach((div, di) => {
        divYMax[div] = computeSharedAxisMax(siteValueArraysAllSites[di], 100);
        divVolMax[div] = computeSharedAxisMax(
          availSites.map(s => sl(volDsAllSites[`${s}-${div}`].data).filter(v => v !== null)),
          1000
        );
      });

      divs.forEach(div => {
        const key = `${site}-${div}`;
        const d = window._planCmpChartData[key];
        const ctx = document.getElementById(`plancmp-${key}`)?.getContext('2d');
        if (!d || !ctx) return;
        const { divRows, actualH } = d;
        const datasets = [];
        datasets.push({
          type: 'bar', label: '実績工数', data: sl(actualH),
          backgroundColor: '#f8717199', borderColor: '#f87171', borderWidth: 1,
          stack: 'actual', yAxisID: 'y', order: 1,
        });
        divRows.forEach((r, ri) => {
          const fullData = planMonths.map((_, mi) => {
            const res = calcRow(site, r, mi);
            return res.h !== null ? Math.round(res.h * 10) / 10 : null;
          });
          datasets.push({
            type: 'bar', label: r.task, data: sl(fullData),
            backgroundColor: TASK_COLORS[ri % TASK_COLORS.length] + 'cc',
            borderColor: TASK_COLORS[ri % TASK_COLORS.length],
            borderWidth: 0, stack: 'std', yAxisID: 'y', order: 2, _stdGroup: true,
          });
        });
        const volDs = volDsAllSites[`${site}-${div}`];
        const slicedVolDs = { ...volDs, data: sl(volDs.data) };
        datasets.push(slicedVolDs);
        planCmpChartInstances[key] = new Chart(ctx, {
          data: { labels: visMonths(), datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
              tooltip: tooltipOpts(true),
            },
            scales: {
              x: { stacked: true, ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
              y: { stacked: true, position: 'left', ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` }, grid: { color: '#1e2235' }, suggestedMin: 0, max: divYMax[div], title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } } },
              y2: y2Axis(div, slicedVolDs.data, divVolMax[div] || undefined),
            },
          },
        });
      });

      // 「標準工数合計 vs 勤務時間合計」チャートも、いなべ・群馬・南丹の3拠点で
      // 左軸(h)・右軸(人)を統一する（全拠点合計は対象外・従来通り自動スケール）。
      // computeSiteTotalData()は全拠点分を1回だけ計算し、現拠点分はここから再利用する
      // （site単体分を別途計算し直すと同じ処理を2重に行ってしまうため）
      const allSitesTotalData = availSites.map(s => computeSiteTotalData(s));
      const siteTotalIdx = availSites.indexOf(site);
      const { stdTotalRaw, actualData, forecastData, actualCountData, forecastCountData } = allSitesTotalData[siteTotalIdx];
      const totalYMax = computeSharedAxisMax(
        allSitesTotalData.map(d => totalChartStackedValues(d.stdTotalRaw, d.actualData, d.forecastData)),
        100
      ) || undefined;
      const siteCountMax = computeSharedAxisMax(
        allSitesTotalData.map(d => EMP_SERIES.flatMap(et => [
          ...sl(d.actualCountData[et.label]).filter(v => v !== null),
          ...sl(d.forecastCountData[et.label]).filter(v => v !== null),
        ])),
        1
      ) || undefined;
      const siteCountDatasets = EMP_SERIES.flatMap(et => [
        {
          type: 'line', label: `${et.label}人数（実績）`, data: sl(actualCountData[et.label]),
          borderColor: et.color, backgroundColor: 'transparent',
          borderWidth: 2, pointRadius: 3, pointBackgroundColor: et.color,
          tension: 0.3, yAxisID: 'y2', order: 0, _countLine: true, spanGaps: true,
        },
        {
          type: 'line', label: `${et.label}人数（予想）`, data: sl(forecastCountData[et.label]),
          borderColor: et.color, backgroundColor: 'transparent',
          borderWidth: 2, borderDash: [5, 4],
          pointRadius: 3, pointBackgroundColor: et.color, pointBorderColor: et.color,
          tension: 0.3, yAxisID: 'y2', order: 0, _countLine: true, spanGaps: true,
        },
      ]);
      const siteCountScale = {
        y2: {
          position: 'right',
          ticks: { color: '#64748b', font: { size: 10 }, callback: v => `${v} 人` },
          grid: { drawOnChartArea: false },
          suggestedMin: 0, max: siteCountMax,
          title: { display: true, text: '人', color: '#64748b', font: { size: 10 } },
        },
      };
      renderTotalChart(`plancmp-${site}-total`, stdTotalRaw, actualData, forecastData,
        { extraDatasets: siteCountDatasets, extraScales: siteCountScale, yMaxOverride: totalYMax });
    }
  }

  // ③ 表ビュー
  function renderTableView() {
    const content = document.getElementById('compare-content');
    const vm = visMonths();
    const cellStyle = 'padding:5px 10px;text-align:right;font-size:0.78rem;white-space:nowrap;border:1px solid #2a2f4a';
    const headStyle = 'padding:5px 10px;text-align:center;font-size:0.75rem;white-space:nowrap;border:1px solid #2a2f4a;background:#1a1f35;color:#8892a4';
    const rowHeadStyle = 'padding:5px 10px;text-align:left;font-size:0.78rem;white-space:nowrap;border:1px solid #2a2f4a;background:#12172a;color:#cbd5e1;min-width:160px';
    const sectionHeadStyle = 'padding:5px 10px;text-align:left;font-size:0.78rem;font-weight:600;border:1px solid #2a2f4a;background:#0f1117;color:#38bdf8;';

    const fmt = (v, unit) => v === null || v === undefined ? '<span style="color:#3a3f5c">-</span>' : `${typeof v === 'number' ? (unit === 'h' ? Math.round(v).toLocaleString('ja-JP') : (Math.round(v * 10) / 10).toLocaleString('ja-JP')) : v}`;

    function buildSiteTable(site, siteLabel, siteData) {
      const { stdTotalRaw, actualData, forecastData, actualCountData, forecastCountData } = siteData;
      const months = visMonths();
      const mi = i => planMonths.indexOf(months[i]);

      const perPerson = (hours, count) => {
        if (hours === null || count === null || count === 0) return null;
        return Math.round(hours / count * 10) / 10;
      };
      const rows = [
        { label: '予定標準工数合計 (h)', unit: 'h', isSection: true },
        { label: '　予定標準工数合計', unit: 'h', getData: i => stdTotalRaw[mi(i)] },
        { label: '勤務時間 実績 (h)', unit: 'h', isSection: true },
        ...EMP_SERIES.map(et => ({ label: `　${et.label}（実績）`, unit: 'h', getData: i => actualData[et.label][mi(i)] })),
        { label: '勤務時間 予想 (h)', unit: 'h', isSection: true },
        ...EMP_SERIES.map(et => ({ label: `　${et.label}（予想）`, unit: 'h', getData: i => forecastData[et.label][mi(i)] })),
        { label: '人数 実績 (人)', unit: '人', isSection: true },
        ...EMP_SERIES.map(et => ({ label: `　${et.label}（実績）`, unit: '人', getData: i => actualCountData[et.label][mi(i)] })),
        { label: '人数 予想 (人)', unit: '人', isSection: true },
        ...EMP_SERIES.map(et => ({ label: `　${et.label}（予想）`, unit: '人', getData: i => forecastCountData[et.label][mi(i)] })),
        { label: '1人当たり勤務時間 実績 (h/人)', unit: 'h', isSection: true },
        ...EMP_SERIES.map(et => ({ label: `　${et.label}（実績）`, unit: 'h', getData: i => perPerson(actualData[et.label][mi(i)], actualCountData[et.label][mi(i)]) })),
        { label: '1人当たり勤務時間 予想 (h/人)', unit: 'h', isSection: true },
        ...EMP_SERIES.map(et => ({ label: `　${et.label}（予想）`, unit: 'h', getData: i => perPerson(forecastData[et.label][mi(i)], forecastCountData[et.label][mi(i)]) })),
      ];

      const headerCells = months.map(m => `<th style="${headStyle}">${m}</th>`).join('');
      const bodyRows = rows.map(row => {
        if (row.isSection) {
          return `<tr><td colspan="${months.length + 1}" style="${sectionHeadStyle}">${row.label}</td></tr>`;
        }
        const cells = months.map((_, i) => {
          const v = row.getData(i);
          return `<td style="${cellStyle};color:${v === null ? '#3a3f5c' : '#e2e8f0'}">${fmt(v, row.unit)}</td>`;
        }).join('');
        return `<tr><td style="${rowHeadStyle}">${row.label}</td>${cells}</tr>`;
      }).join('');

      return `<div class="schart-section" style="margin-bottom:24px">
        <div class="schart-header">${siteLabel}</div>
        <div style="overflow-x:auto">
          <table style="border-collapse:collapse;width:100%">
            <thead><tr><th style="${rowHeadStyle};background:#12172a">項目</th>${headerCells}</tr></thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>
      </div>`;
    }

    let html = '';
    // 各拠点
    availSites.forEach(site => {
      html += buildSiteTable(site, site, computeSiteTotalData(site));
    });

    // 全拠点合計
    const siteDataList = availSites.map(s => computeSiteTotalData(s));
    const allStdTotalRaw = planMonths.map((_, mi) =>
      siteDataList.reduce((sum, d) => sum + (d.stdTotalRaw[mi] ?? 0), 0) || null
    );
    const allActualData = {}, allForecastData = {}, allActualCountData = {}, allForecastCountData = {};
    EMP_SERIES.forEach(et => {
      allActualData[et.label] = planMonths.map((_, mi) => {
        const t = siteDataList.reduce((s, d) => s + (d.actualData[et.label][mi] ?? 0), 0);
        return t > 0 ? Math.round(t * 10) / 10 : null;
      });
      allForecastData[et.label] = planMonths.map((m, mi) => {
        if (mnum(m) <= ACTUAL_CUTOFF) return null;
        const t = siteDataList.reduce((s, d) => s + (d.forecastData[et.label][mi] ?? 0), 0);
        return t > 0 ? Math.round(t * 10) / 10 : null;
      });
      allActualCountData[et.label] = planMonths.map((_, mi) => {
        const t = siteDataList.reduce((s, d) => s + (d.actualCountData[et.label][mi] ?? 0), 0);
        return t > 0 ? t : null;
      });
      allForecastCountData[et.label] = planMonths.map((m, mi) => {
        if (mnum(m) <= ACTUAL_CUTOFF) return null;
        const t = siteDataList.reduce((s, d) => s + (d.forecastCountData[et.label][mi] ?? 0), 0);
        return t > 0 ? Math.round(t * 10) / 10 : null;
      });
    });
    html += buildSiteTable('all', '全拠点合計', {
      stdTotalRaw: allStdTotalRaw,
      actualData: allActualData,
      forecastData: allForecastData,
      actualCountData: allActualCountData,
      forecastCountData: allForecastCountData,
    });

    content.innerHTML = html;
  }

  // ② 拠点サマリ
  function renderSummaryView() {
    const content = document.getElementById('compare-content');
    let html = `<div class="schart-header">3拠点サマリ</div>`;
    divs.forEach(div => {
      const vm = visMonths();
      html += `<div class="schart-section">
        <div class="schart-header">${div} <span style="font-weight:400;font-size:0.8rem;color:var(--muted)"> 実績工数（拠点別） / 予定標準工数（工程別・3拠点合計）</span></div>
        <div class="chart-section-label" style="padding-top:0;margin-bottom:6px">予定標準 vs 実績（統合・拠点別×工程別）</div>
        ${chartWrapHtml(`plansum-${div}-combined`, vm.length, { heightPx: 320, inlineHeight: true, forceResponsive: true })}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div><div class="chart-section-label" style="padding-top:0;margin-bottom:6px">実績工数（拠点別）</div>${chartWrapHtml(`plansum-${div}-actual`, vm.length, { heightPx: 320, inlineHeight: true, forceResponsive: true })}</div>
          <div><div class="chart-section-label" style="padding-top:0;margin-bottom:6px">予定標準工数（工程別・3拠点合計）</div>${chartWrapHtml(`plansum-${div}-std`, vm.length, { heightPx: 320, inlineHeight: true, forceResponsive: true })}</div>
        </div>
      </div>`;
    });
    content.innerHTML = html;

    divs.forEach(div => {
      const divRows = rows.filter(r => r.div === div);
      const actualBySite = availSites.map(site => sl(window._planCmpChartData[`${site}-${div}`]?.actualH || planMonths.map(() => null)));
      const stdByTask = divRows.map(r => sl(planMonths.map((_, mi) => {
        const total = availSites.reduce((s, site) => {
          const res = calcRow(site, r, mi);
          return s + (res.h !== null ? res.h : 0);
        }, 0);
        return total > 0 ? Math.round(total * 10) / 10 : null;
      })));

      // 3拠点合計の計画量（右軸折れ線用）
      const volSummaryData = sl(planMonths.map((_, mi) =>
        availSites.reduce((s, site) => {
          const v = planVolume(site, div, mi);
          return s + (v !== null ? v : 0);
        }, 0) || null
      ));
      const volSummaryDs = {
        type: 'line', label: DIV_METRIC[div] + '（計画・3拠点合計）', data: volSummaryData,
        borderColor: '#94a3b8', backgroundColor: 'transparent',
        borderWidth: 2, pointRadius: 3, pointBackgroundColor: '#94a3b8',
        tension: 0.3, yAxisID: 'y2', order: 0,
        _volumeLine: true, _unit: DIV_UNIT[div],
      };

      // 「拠点サマリ」の統合チャートでは、実績工数(拠点別)・予定標準工数(工程別)とも
      // 複数系列が積み上げ(スタック)表示されるため、軸MAXは各系列を個別に見るのではなく、
      // 月ごとの積み上げ合計（実際にグラフ上で到達する高さ）で判定する必要がある。
      // vm(表示中の月)基準でインデックスを揃える（actualBySite/stdByTaskは既にsl()済みのため）
      const vm = visMonths();
      const actualMonthlyTotals = vm.map((_, mi) => actualBySite.reduce((s, arr) => s + (arr[mi] || 0), 0));
      const stdMonthlyTotals = vm.map((_, mi) => stdByTask.reduce((s, data) => s + (data[mi] || 0), 0));
      const sharedMax = computeSharedAxisMax([actualMonthlyTotals, stdMonthlyTotals], 100);
      const volSumMax = y2Axis(div, volSummaryData);

      const actualCtx = document.getElementById(`plansum-${div}-actual`)?.getContext('2d');
      if (actualCtx) {
        const ds = availSites.map((site, si) => ({
          type: 'bar', label: site, data: actualBySite[si],
          backgroundColor: (SITE_COLORS[site] || '#fff') + '99',
          borderColor: SITE_COLORS[site] || '#fff', borderWidth: 1, _actualGroup: true,
        }));
        ds.push({ ...volSummaryDs });
        planCmpChartInstances[`${div}-actual`] = new Chart(actualCtx, {
          data: { labels: visMonths(), datasets: ds },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
              tooltip: tooltipOpts(false, true),
            },
            scales: {
              x: { ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
              y: {
                position: 'left',
                ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
                grid: { color: '#1e2235' }, suggestedMin: 0, max: sharedMax,
                title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } },
              },
              y2: volSumMax,
            },
          },
        });
      }

      const stdCtx = document.getElementById(`plansum-${div}-std`)?.getContext('2d');
      if (stdCtx) {
        const ds = divRows.map((r, ri) => ({
          type: 'bar', label: r.task, data: stdByTask[ri],
          backgroundColor: TASK_COLORS[ri % TASK_COLORS.length] + 'cc',
          borderColor: TASK_COLORS[ri % TASK_COLORS.length],
          borderWidth: 0, stack: 'std', _stdGroup: true,
        }));
        ds.push({ ...volSummaryDs });
        planCmpChartInstances[`${div}-std`] = new Chart(stdCtx, {
          data: { labels: visMonths(), datasets: ds },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
              tooltip: tooltipOpts(true, false),
            },
            scales: {
              x: { stacked: true, ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
              y: {
                stacked: true, position: 'left',
                ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
                grid: { color: '#1e2235' }, suggestedMin: 0, max: sharedMax,
                title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } },
              },
              y2: volSumMax,
            },
          },
        });
      }

      const combinedCtx = document.getElementById(`plansum-${div}-combined`)?.getContext('2d');
      if (combinedCtx) {
        const datasets = [];
        availSites.forEach((site, si) => {
          datasets.push({
            type: 'bar', label: site, data: actualBySite[si],
            backgroundColor: (SITE_COLORS[site] || '#fff') + 'cc',
            borderColor: SITE_COLORS[site] || '#fff', borderWidth: 0,
            stack: 'actual', order: 1, _actualGroup: true,
          });
        });
        divRows.forEach((r, ri) => {
          datasets.push({
            type: 'bar', label: r.task, data: stdByTask[ri],
            backgroundColor: TASK_COLORS[ri % TASK_COLORS.length] + 'cc',
            borderColor: TASK_COLORS[ri % TASK_COLORS.length],
            borderWidth: 0, stack: 'std', order: 2, _stdGroup: true,
          });
        });
        datasets.push({ ...volSummaryDs });
        planCmpChartInstances[`${div}-combined`] = new Chart(combinedCtx, {
          data: { labels: visMonths(), datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
              tooltip: tooltipOpts(true, true),
            },
            scales: {
              x: { stacked: true, ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
              y: {
                stacked: true, position: 'left',
                ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
                grid: { color: '#1e2235' }, suggestedMin: 0, max: sharedMax,
                title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } },
              },
              y2: volSumMax,
            },
          },
        });
      }
    });
  }

  let planCmpSubtab = 'site';
  function renderContent() {
    destroyCharts();
    renderSiteTabBarFixed();
    if (planCmpSubtab === 'summary') renderSummaryView();
    else if (planCmpSubtab === 'table') renderTableView();
    else renderSiteView();
  }

  const dropdownOptionsHtml = planMonths.map((m, i) =>
    `<label style="display:flex;align-items:center;gap:6px;padding:4px 8px;cursor:pointer;border-radius:4px;white-space:nowrap" class="plancmp-opt" data-idx="${i}">
      <input type="checkbox" data-idx="${i}" checked style="accent-color:#38bdf8;cursor:pointer"> <span>${m}</span>
    </label>`
  ).join('');

  main.innerHTML = `
    <div class="compare-shell">
      <div class="compare-header-row" style="flex-wrap:wrap;gap:8px">
        <div class="chart-section-label" style="flex-shrink:0">📊 予定標準工数 vs 実績工数 比較
          <span style="font-size:0.72rem;font-weight:400;color:var(--muted);margin-left:8px">※ 左棒(赤)=実績　右棒(積み上げ)=予定標準</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
          <div class="transfer-toggle" id="plancmp-subtabs">
            <button class="transfer-toggle-btn${planCmpSubtab === 'site' ? ' active' : ''}" data-tab="site">拠点別</button>
            <button class="transfer-toggle-btn${planCmpSubtab === 'summary' ? ' active' : ''}" data-tab="summary">拠点サマリ</button>
            <button class="transfer-toggle-btn${planCmpSubtab === 'table' ? ' active' : ''}" data-tab="table">表</button>
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding:6px 0 10px;flex-wrap:wrap">
        <span style="font-size:0.78rem;color:var(--muted);flex-shrink:0">表示月</span>
        <div style="position:relative;display:inline-block">
          <button id="plancmp-dd-btn" style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;border:1px solid #3a3f5c;background:#1a1f35;color:#e2e8f0;font-size:0.8rem;cursor:pointer;min-width:160px;justify-content:space-between">
            <span id="plancmp-dd-label">全月選択中</span>
            <span style="font-size:0.6rem">▼</span>
          </button>
          <div id="plancmp-dd-panel" style="display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:200;background:#1a1f35;border:1px solid #3a3f5c;border-radius:6px;padding:6px 4px;min-width:160px;max-height:min(80vh, calc(100vh - 160px));overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,0.5)">
            <div style="display:flex;gap:6px;padding:0 4px 6px;border-bottom:1px solid #2a2f4a;margin-bottom:4px">
              <button id="plancmp-all" style="flex:1;padding:3px 0;font-size:0.73rem;border-radius:4px;border:1px solid #3a3f5c;background:transparent;color:#8892a4;cursor:pointer">全選択</button>
              <button id="plancmp-clear" style="flex:1;padding:3px 0;font-size:0.73rem;border-radius:4px;border:1px solid #3a3f5c;background:transparent;color:#8892a4;cursor:pointer">クリア</button>
            </div>
            <div id="plancmp-opts">${dropdownOptionsHtml}</div>
          </div>
        </div>
        <div id="plancmp-site-tabbar-fixed" style="display:none;gap:6px;flex-wrap:wrap"></div>
      </div>
      <div id="compare-content"></div>
    </div>`;

  function syncDropdownLabel() {
    const lbl = document.getElementById('plancmp-dd-label');
    if (!lbl) return;
    if (planCmpSelected.size === planMonths.length) lbl.textContent = '全月選択中';
    else if (planCmpSelected.size === 0) lbl.textContent = '未選択';
    else {
      const sorted = [...planCmpSelected].sort((a, b) => a - b);
      const names = sorted.map(i => planMonths[i]);
      lbl.textContent = names.length <= 3 ? names.join(', ') : `${names[0]}〜 他${names.length - 1}件`;
    }
  }

  function syncCheckboxes() {
    document.querySelectorAll('#plancmp-opts input[type=checkbox]').forEach(cb => {
      cb.checked = planCmpSelected.has(parseInt(cb.dataset.idx));
    });
    syncDropdownLabel();
  }

  // ドロップダウン開閉
  document.getElementById('plancmp-dd-btn').addEventListener('click', e => {
    e.stopPropagation();
    const panel = document.getElementById('plancmp-dd-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  });
  document.addEventListener('click', e => {
    const panel = document.getElementById('plancmp-dd-panel');
    if (panel && !panel.contains(e.target) && e.target.id !== 'plancmp-dd-btn') {
      panel.style.display = 'none';
    }
  }, true);

  // チェックボックス変更
  document.getElementById('plancmp-opts').addEventListener('change', e => {
    const cb = e.target;
    if (cb.type !== 'checkbox') return;
    const i = parseInt(cb.dataset.idx);
    if (cb.checked) {
      planCmpSelected.add(i);
    } else {
      if (planCmpSelected.size <= 1) { cb.checked = true; return; }
      planCmpSelected.delete(i);
    }
    syncDropdownLabel();
    renderContent();
  });

  document.getElementById('plancmp-all').onclick = () => {
    planMonths.forEach((_, i) => planCmpSelected.add(i));
    syncCheckboxes();
    renderContent();
  };
  document.getElementById('plancmp-clear').onclick = () => {
    const sorted = [...planCmpSelected].sort((a, b) => a - b);
    const keep = sorted[sorted.length - 1] ?? 0;
    planCmpSelected = new Set([keep]);
    syncCheckboxes();
    renderContent();
  };

  document.querySelectorAll('#plancmp-subtabs .transfer-toggle-btn').forEach(btn => {
    btn.onclick = () => {
      planCmpSubtab = btn.dataset.tab;
      document.querySelectorAll('#plancmp-subtabs .transfer-toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderContent();
    };
  });

  renderContent();
}

/* ── 比較タブ: 標準工数 vs 実績工数 ────────────────────────────── */
function renderCompareTab() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">比較データを計算中...</div>';
  if (!allData) { main.innerHTML = '<div class="error-msg">勤務データが未ロードです</div>'; return; }
  Promise.all([fetchProductionSheet(), loadStdSettingsSheetOnce()]).then(([prodData]) => {
    renderCompareCharts(prodData);
  }).catch(e => {
    main.innerHTML = `<div class="error-msg">データ取得エラー: ${e.message}</div>`;
  });
}

function renderCompareCharts(prodData) {
  const main = document.getElementById('main');
  const { employees } = getActiveData();
  const { months: prodMonths, records } = prodData;
  const rows = loadStdSettings();
  const conv = loadCsConv();

  // 表示列は「開始月から固定12本（シート実在最新月を超える分は見出しも空欄）」。
  // 生産実績側の実データは、選択範囲内(mi < originalCount)の月だけをnormalizeMonth()で
  // 突き合わせる。延長列・超過列には勤怠・生産実績いずれのデータも一切載せない
  const { months: commonMonths, originalCount } = getExtendedDisplayMonths();
  const { calcRow } = createStdHoursEngine(records, prodMonths, commonMonths, originalCount, conv);

  const availSites = [...new Set(records.map(r => r.site))].filter(s => SITE_COLORS[s]);

  function workHours(site, typeFilter) {
    const emps = employees.filter(e => e.base === site && e.workType && typeFilter(e.workType));
    return commonMonths.map((_, mi) => {
      if (mi >= originalCount) return null;
      const total = emps.reduce((s, e) => s + (e.hours[mi] ?? 0), 0);
      return total > 0 ? Math.round(total * 10) / 10 : null;
    });
  }

  // Task colors for stacked bar（拠点色 SITE_COLORS: 青/紫/緑、および①拠点別
  // サブタブの実績工数バー固定色 #f87171 と被らないよう、赤・橙・黄系のみで構成。
  // validate_palette.jsで拠点色・実績色との衝突・CVD分離を確認済み
  const TASK_COLORS = [
    '#ef4444','#f97316','#eab308','#fb7185','#fb923c',
    '#fde047','#fdba74','#dc2626','#fef08a','#e11d48',
  ];

  const divs = ['栽培', '出荷'];

  // 拠点別（①）・拠点サマリ（②）の両サブタブから共通で使うデータを先に組み立てておく
  window._cmpChartData = {};
  availSites.forEach(site => {
    divs.forEach(div => {
      const divRows = rows.filter(r => r.div === div);
      const typeFilter = div === '栽培'
        ? wt => workTypeClass(wt) === 'wt-栽培'
        : wt => workTypeClass(wt) === 'wt-出荷';
      window._cmpChartData[`${site}-${div}`] = { divRows, actualH: workHours(site, typeFilter), div };
    });
  });

  let compareChartInstances = {};
  function destroyCompareCharts() {
    Object.values(compareChartInstances).forEach(c => c.destroy());
    compareChartInstances = {};
  }

  function tooltipOpts(showStdFooter, showActualTotal) {
    return {
      backgroundColor: '#1e2235', borderColor: '#3a3f5c', borderWidth: 1,
      titleColor: '#e2e8f0', bodyColor: '#e2e8f0',
      footerColor: '#e2e8f0', footerFont: { weight: 'normal' },
      callbacks: {
        label: ctx => {
          const v = ctx.parsed.y;
          if (v === null || v === undefined) return null;
          return `${ctx.dataset.label}: ${v.toLocaleString('ja-JP')} h`;
        },
        // 拠点別内訳（実績側）の直下に実績合計を差し込む。footerは常にbody全体の後に
        // 表示されるため、統合グラフ（実績＋標準）では使えず、実績側の最後の行に付与する
        // _actualGroup/_stdGroupはツールチップ集計専用の目印（Chart.jsのstack機能とは無関係）。
        // 実績工数（拠点別）グラフはグループ化バー表示のため、実際のstackプロパティは付与しない
        afterLabel: showActualTotal ? function (ctx) {
          const actualItems = (this.dataPoints || []).filter(i => i.dataset._actualGroup && i.parsed.y != null);
          if (!actualItems.length) return;
          const last = actualItems[actualItems.length - 1];
          if (ctx.datasetIndex !== last.datasetIndex || ctx.dataIndex !== last.dataIndex) return;
          const actualTotal = actualItems.reduce((s, i) => s + i.parsed.y, 0);
          if (actualTotal === 0) return;
          return `実績合計: ${Math.round(actualTotal).toLocaleString('ja-JP')} h`;
        } : undefined,
        footer: showStdFooter ? items => {
          const stdTotal = items
            .filter(i => i.dataset._stdGroup && i.parsed.y != null)
            .reduce((s, i) => s + i.parsed.y, 0);
          if (stdTotal === 0) return;
          // 実績合計（body側）と左端の見た目を揃えるための全角スペース。
          // 実績合計が表示されないチャートでは不要なため付けない
          const indent = showActualTotal ? '　' : '';
          return `${indent}標準合計: ${Math.round(stdTotal).toLocaleString('ja-JP')} h`;
        } : undefined,
      },
    };
  }

  // ① 拠点別：拠点ごとに、業務区分ごとの「標準工数(積み上げ) vs 実績工数」を1チャートで表示（従来通り）
  function renderCompareSiteView() {
    const content = document.getElementById('compare-content');
    let html = '';
    availSites.forEach(site => {
      const siteColor = SITE_COLORS[site] || '#fff';
      html += `<div>
        <div class="schart-header" style="color:${siteColor}">${site}</div>`;
      divs.forEach(div => {
        html += `<div class="schart-section">
          <div class="schart-header">${div}
            <span style="font-weight:400;font-size:0.8rem;color:var(--muted)"> 標準 vs 実績（h）</span>
          </div>
          ${chartWrapHtml(`cmp-${site}-${div}`, commonMonths.length, { heightPx: 320, inlineHeight: true })}
        </div>`;
      });
      html += `</div>`;
    });
    content.innerHTML = html;

    // フィルター適用後のデータをもとに、ページ内の全拠点グラフでdivごとに共通の軸上限を算出
    const divYMax = {};
    divs.forEach(div => {
      const valueArrays = availSites.map(site => {
        const d = window._cmpChartData[`${site}-${div}`];
        if (!d) return [];
        return commonMonths.flatMap((m, mi) => {
          const stdTotal = d.divRows.reduce((s, r) => {
            const res = calcRow(site, r, mi);
            return s + (res.h !== null ? res.h : 0);
          }, 0);
          return [stdTotal, d.actualH[mi]];
        });
      });
      divYMax[div] = computeSharedAxisMax(valueArrays, 100);
    });

    availSites.forEach(site => {
      divs.forEach(div => {
        const key = `${site}-${div}`;
        const d = window._cmpChartData[key];
        const ctx = document.getElementById(`cmp-${key}`)?.getContext('2d');
        if (!d || !ctx) return;

        const { divRows, actualH } = d;
        const datasets = [];

        // 実績工数バー（左）
        datasets.push({
          type: 'bar',
          label: '実績工数',
          data: actualH,
          backgroundColor: '#f8717199',
          borderColor: '#f87171',
          borderWidth: 1,
          stack: 'actual',
          yAxisID: 'y',
          order: 1,
        });

        // 標準工数の積み上げバー（右・タスク別）
        divRows.forEach((r, ri) => {
          const data = commonMonths.map((m, mi) => {
            const res = calcRow(site, r, mi);
            return res.h !== null ? Math.round(res.h * 10) / 10 : null;
          });
          datasets.push({
            type: 'bar',
            label: r.task,
            data,
            backgroundColor: TASK_COLORS[ri % TASK_COLORS.length] + 'cc',
            borderColor: TASK_COLORS[ri % TASK_COLORS.length],
            borderWidth: 0,
            stack: 'std',
            yAxisID: 'y',
            order: 2,
            _stdGroup: true,
          });
        });

        const opts = {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
            tooltip: tooltipOpts(true),
          },
          scales: {
            x: { stacked: true, ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
            y: {
              stacked: true,
              position: 'left',
              ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
              grid: { color: '#1e2235' }, suggestedMin: 0,
              max: divYMax[div],
              title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } },
            },
          },
        };

        compareChartInstances[key] = new Chart(ctx, { data: { labels: commonMonths, datasets }, options: opts });
      });
    });
  }

  // ② 拠点サマリ：業務区分ごとに「実績工数（拠点別）」と「標準工数（工程別・3拠点合計）」を並べて表示
  function renderCompareSummaryView() {
    const content = document.getElementById('compare-content');
    let html = `<div class="schart-header">3拠点サマリ</div>`;
    divs.forEach(div => {
      html += `<div class="schart-section">
        <div class="schart-header">${div} <span style="font-weight:400;font-size:0.8rem;color:var(--muted)"> 実績工数（拠点別） / 標準工数（工程別・3拠点合計）</span></div>
        <div class="chart-section-label" style="padding-top:0;margin-bottom:6px">標準 vs 実績（統合・拠点別×工程別）</div>
        ${chartWrapHtml(`cmpsum-${div}-combined`, commonMonths.length, { heightPx: 320, inlineHeight: true })}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div><div class="chart-section-label" style="padding-top:0;margin-bottom:6px">実績工数（拠点別）</div>${chartWrapHtml(`cmpsum-${div}-actual`, commonMonths.length, { heightPx: 320, inlineHeight: true })}</div>
          <div><div class="chart-section-label" style="padding-top:0;margin-bottom:6px">標準工数（工程別・3拠点合計）</div>${chartWrapHtml(`cmpsum-${div}-std`, commonMonths.length, { heightPx: 320, inlineHeight: true })}</div>
        </div>
      </div>`;
    });
    content.innerHTML = html;

    divs.forEach(div => {
      const divRows = rows.filter(r => r.div === div);

      // 実績工数：拠点ごとの値
      const actualBySite = availSites.map(site => window._cmpChartData[`${site}-${div}`]?.actualH || commonMonths.map(() => null));
      // 標準工数：工程ごとの3拠点合計
      const stdByTask = divRows.map(r => commonMonths.map((m, mi) => {
        const total = availSites.reduce((s, site) => {
          const res = calcRow(site, r, mi);
          return s + (res.h !== null ? res.h : 0);
        }, 0);
        return total > 0 ? Math.round(total * 10) / 10 : null;
      }));

      // 実績（拠点別）・標準（工程別・積み上げ合計）を、同じdiv内で比較しやすいよう軸を統一。
      // 統合チャートでは実績工数も3拠点分が積み上げ表示されるため、拠点ごとの個別値ではなく
      // 月ごとに拠点を跨いで合計した値（実際にグラフ上で到達する高さ）で軸MAXを判定する
      const actualMonthlyTotals = commonMonths.map((_, mi) => actualBySite.reduce((s, arr) => s + (arr[mi] || 0), 0));
      const stdMonthlyTotals = commonMonths.map((_, mi) => stdByTask.reduce((s, data) => s + (data[mi] || 0), 0));
      const sharedMax = computeSharedAxisMax([actualMonthlyTotals, stdMonthlyTotals], 100);

      const actualCtx = document.getElementById(`cmpsum-${div}-actual`)?.getContext('2d');
      if (actualCtx) {
        compareChartInstances[`${div}-actual`] = new Chart(actualCtx, {
          type: 'bar',
          data: {
            labels: commonMonths,
            datasets: availSites.map((site, si) => ({
              label: site,
              data: actualBySite[si],
              backgroundColor: (SITE_COLORS[site] || '#fff') + '99',
              borderColor: SITE_COLORS[site] || '#fff',
              borderWidth: 1,
              _actualGroup: true,
            })),
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
              tooltip: tooltipOpts(false, true),
            },
            scales: {
              x: { ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
              y: {
                position: 'left',
                ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
                grid: { color: '#1e2235' }, suggestedMin: 0, max: sharedMax,
                title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } },
              },
            },
          },
        });
      }

      const stdCtx = document.getElementById(`cmpsum-${div}-std`)?.getContext('2d');
      if (stdCtx) {
        compareChartInstances[`${div}-std`] = new Chart(stdCtx, {
          type: 'bar',
          data: {
            labels: commonMonths,
            datasets: divRows.map((r, ri) => ({
              label: r.task,
              data: stdByTask[ri],
              backgroundColor: TASK_COLORS[ri % TASK_COLORS.length] + 'cc',
              borderColor: TASK_COLORS[ri % TASK_COLORS.length],
              borderWidth: 0,
              stack: 'std',
              _stdGroup: true,
            })),
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
              tooltip: tooltipOpts(true, false),
            },
            scales: {
              x: { stacked: true, ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
              y: {
                stacked: true, position: 'left',
                ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
                grid: { color: '#1e2235' }, suggestedMin: 0, max: sharedMax,
                title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } },
              },
            },
          },
        });
      }

      // 統合グラフ：①拠点別サブタブと同じ形式（左＝実績工数を拠点別に積み上げ、右＝標準工数を工程別に積み上げ）
      const combinedCtx = document.getElementById(`cmpsum-${div}-combined`)?.getContext('2d');
      if (combinedCtx) {
        const datasets = [];
        availSites.forEach((site, si) => {
          datasets.push({
            type: 'bar',
            label: site,
            data: actualBySite[si],
            backgroundColor: (SITE_COLORS[site] || '#fff') + 'cc',
            borderColor: SITE_COLORS[site] || '#fff',
            borderWidth: 0,
            stack: 'actual',
            order: 1,
            _actualGroup: true,
          });
        });
        divRows.forEach((r, ri) => {
          datasets.push({
            type: 'bar',
            label: r.task,
            data: stdByTask[ri],
            backgroundColor: TASK_COLORS[ri % TASK_COLORS.length] + 'cc',
            borderColor: TASK_COLORS[ri % TASK_COLORS.length],
            borderWidth: 0,
            stack: 'std',
            order: 2,
            _stdGroup: true,
          });
        });

        compareChartInstances[`${div}-combined`] = new Chart(combinedCtx, {
          data: { labels: commonMonths, datasets },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { labels: { color: '#8892a4', font: { size: 10 }, boxWidth: 10, padding: 6 } },
              tooltip: tooltipOpts(true, true),
            },
            scales: {
              x: { stacked: true, ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
              y: {
                stacked: true, position: 'left',
                ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
                grid: { color: '#1e2235' }, suggestedMin: 0, max: sharedMax,
                title: { display: true, text: 'h', color: '#8892a4', font: { size: 10 } },
              },
            },
          },
        });
      }
    });
  }

  function renderCompareContent() {
    destroyCompareCharts();
    if (compareSubtab === 'summary') renderCompareSummaryView();
    else renderCompareSiteView();
  }

  main.innerHTML = `
    <div class="compare-shell">
      <div class="compare-header-row">
        <div class="chart-section-label">📊 標準工数 vs 実績工数 比較　<span style="font-size:0.72rem;font-weight:400;color:var(--muted)">※ 左棒(赤) = 実績工数　右棒(積み上げ) = 標準工数（タスク別）</span></div>
        <div class="transfer-toggle" id="compare-subtabs">
          <button class="transfer-toggle-btn${compareSubtab === 'site' ? ' active' : ''}" data-tab="site">拠点別</button>
          <button class="transfer-toggle-btn${compareSubtab === 'summary' ? ' active' : ''}" data-tab="summary">拠点サマリ</button>
        </div>
      </div>
      <div id="compare-content"></div>
    </div>`;

  document.querySelectorAll('#compare-subtabs .transfer-toggle-btn').forEach(btn => {
    btn.onclick = () => {
      compareSubtab = btn.dataset.tab;
      document.querySelectorAll('#compare-subtabs .transfer-toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderCompareContent();
      saveSessionState();
    };
  });

  renderCompareContent();
}

/* ── 要員計画タブ ──────────────────────────────────────────── */
// Stage 0：表示レイアウトのみ。GAS側で60日サイクルモデル＋菌床数重み付けにより
// コンテナ数を算出し、ファーム勤務時間ファイル内「整理済み_計画_更新」シートに
// 書き込む新方式に移行することになったため、旧・ダッシュボード側でgvizから
// 「26/生産計画」を直接読み込んで計算する実装は廃止した。
// 実データ取得（「整理済み_計画_更新」シートの読み込み）は後続のStageで実装する

let staffplanGranularity = 'monthly'; // 'monthly' | 'daily'（Stage 7で実装予定。Stage 0時点では見た目のみ）

// Stage 1：GAS Webアプリ（疎通確認用）のURL。「26/生産計画」「ファーム勤務時間」どちらの
// スプレッドシートにも紐づかない、新規のスタンドアロンGASプロジェクトとしてデプロイ済み。
// デプロイ手順はgas/staffing-plan-webapp.gs冒頭のコメントを参照。
// コードを更新した場合は「デプロイを管理」から再デプロイしないと反映されない点に注意
const STAFFING_PLAN_GAS_URL = "https://script.google.com/macros/s/AKfycbwnzGGW6DI8Z7rZ5VRRle7bNwESm5XctpM3Ufkpqvoomlf8oHbYBUYTIWyLIxBekC-4pQ/exec";

function renderStaffingPlanTab() {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div style="display:flex;flex-direction:column;flex:1;min-height:0;gap:16px">
      <div class="compare-header-row" style="flex-wrap:wrap">
        <div class="chart-section-label">👷 要員計画</div>
        <div class="staffplan-controls">
          <label class="staffplan-period-label">
            表示対象期間
            <select id="staffplan-period-select" disabled>
              <option>（Stage 0：未実装）</option>
            </select>
          </label>
          <div class="transfer-toggle" id="staffplan-granularity-tabs">
            <button class="transfer-toggle-btn${staffplanGranularity === 'monthly' ? ' active' : ''}" data-mode="monthly">月次</button>
            <button class="transfer-toggle-btn${staffplanGranularity === 'daily' ? ' active' : ''}" data-mode="daily">日次</button>
          </div>
          <button id="staffplan-refresh-btn" class="staffplan-refresh-btn">↻ 更新</button>
        </div>
      </div>
      <div id="staffplan-content">
        <div class="loading">「更新」を押すとGAS Webアプリとの疎通確認を行います（Stage 1：実データ表示は未実装）</div>
      </div>
    </div>`;

  document.querySelectorAll('#staffplan-granularity-tabs .transfer-toggle-btn').forEach(btn => {
    btn.onclick = () => {
      staffplanGranularity = btn.dataset.mode;
      document.querySelectorAll('#staffplan-granularity-tabs .transfer-toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Stage 0時点では月次/日次で表示内容を切り替える実装は無い（Stage 7で実装予定）
    };
  });

  document.getElementById('staffplan-refresh-btn').onclick = runStaffingPlanGasPing;
}

// Stage 1：GAS Webアプリとの疎通確認のみ。コンテナ数の計算・シートへの書き込み・
// 実データ表示は行わない（後続のStageで実装）。ボタン押下→ローディング表示→
// GASからの応答待ち（同期的）→結果表示、という一連の流れが動くことを確認する
async function runStaffingPlanGasPing() {
  const content = document.getElementById('staffplan-content');
  const btn = document.getElementById('staffplan-refresh-btn');
  btn.disabled = true;
  content.innerHTML = '<div class="loading">GAS Webアプリと通信中...</div>';

  try {
    // Content-Type: application/jsonを指定するとブラウザがプリフライト(OPTIONS)を送るが、
    // GAS Webアプリはそれに応答できずCORSエラーになる。text/plain;charset=utf-8を指定すると
    // 「シンプルリクエスト」扱いになりプリフライトが発生しないため、これを使う
    // （ボディの中身自体はこれまで通りJSON文字列。GAS側でJSON.parse()して受け取る）。
    // Stage 1時点ではボディの中身はまだ使わないが、今後のStageで実データを送る前提を整えておく
    const res = await fetch(STAFFING_PLAN_GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({}),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    content.innerHTML = `<div class="loading">${data.message ?? '(messageフィールドがありません)'}</div>`;
    console.log('[要員計画] GAS疎通確認レスポンス:', data);
  } catch (e) {
    content.innerHTML = `<div class="error-msg">GAS Webアプリとの通信に失敗しました: ${e.message}</div>`;
    console.error('[要員計画] GAS疎通確認エラー:', e);
  } finally {
    btn.disabled = false;
  }
}

// ページ読み込み時（F5・Ctrl+Shift+R含む）に一度だけ、sessionStorageから直前の表示状態を
// グローバル変数へ反映する。以降の実際のタブ復元処理は、既存のloadAll()内の
// 「更新ボタン押下時の状態保持」ロジック（prevActiveBase等）にそのまま乗せる。
// summarySubtabだけは対応するグローバル変数が無く、loadAll()側もDOM（.summary-subtab.active）
// から読むため、まだ何も描画されていない初回だけ使うフォールバック値として保持しておく
let restoredSummarySubtab = null;
(function restoreSessionStateBeforeFirstLoad() {
  const s = loadSessionState();
  if (!s) return;
  if (s.activeBase) activeBase = s.activeBase;
  if (s.activeMode) activeMode = s.activeMode;
  if (s.compareSubtab) compareSubtab = s.compareSubtab;
  if (s.empChartSubtab) empChartSubtab = s.empChartSubtab;
  if (s.summarySubtab) restoredSummarySubtab = s.summarySubtab;
  if (s.periodStartMonth) periodStartMonth = s.periodStartMonth;
  if (typeof s.periodMonthCount === 'number') periodMonthCount = s.periodMonthCount;
  if (Array.isArray(s.empTypeFilter)) empTypeFilter = new Set(s.empTypeFilter);
  // renderEmpTypeFilterUI()が初回loadAll()実行時に「保存時点で存在した雇用区分」を
  // 正しく認識できるよう、empTypeColorMapのキーだけ先に復元しておく（値はダミーでよく、
  // renderEmpTypeFilterUI()自身が実データをもとに正しい色へ上書きする）
  if (Array.isArray(s.empTypeAllKnown)) {
    s.empTypeAllKnown.forEach(t => { empTypeColorMap[t] = null; });
  }
  if (typeof s.transferMode === 'boolean') {
    transferMode = s.transferMode;
    document.querySelectorAll('.transfer-toggle-btn').forEach(b => {
      b.classList.toggle('active', (b.dataset.mode === 'on') === transferMode);
    });
  }
})();

loadAll();
// 「標準工数設定」シートはページ読み込み時に一度だけ取得する（更新ボタンでは再取得しない）
loadStdSettingsSheetOnce().catch(e => console.error('[標準工数設定] 初回取得エラー:', e));
</script>
