    <div class="chart-section-label">📋 予定標準工数(h) ／ 生産計画 × 標準工数設定
      <span style="font-size:0.72rem;font-weight:400;color:var(--muted);margin-left:12px">※ 整理済み_計画_更新シートの計画値 × 標準工数設定で算出　係数は⚙️標準工数設定タブで変更可</span>
    </div>`;

  availSites.forEach(site => {
    const siteColor = SITE_COLORS[site] || '#fff';
    html += `<div style="margin-bottom:28px">
      <div class="schart-header" style="color:${siteColor};margin-bottom:6px">📍 ${site}</div>
      <div style="overflow-x:auto"><table class="prod-table">
        <thead><tr>
          <th class="th-left" style="min-width:60px">業務区分</th>
          <th class="th-left" style="min-width:130px">作業区分</th>
          <th class="th-left" style="min-width:140px">計算根拠</th>
          ${planMonths.map(m => `<th>${m}</th>`).join('')}
          <th class="th-left" style="min-width:130px">計算方法</th>
        </tr></thead><tbody>`;

    let lastDiv = '';
    rows.forEach(r => {
      const divCell = r.div !== lastDiv
        ? `<td class="col-site" style="color:${r.div === '栽培' ? 'var(--accent-gunma)' : 'var(--accent-inabe)'};font-weight:600" rowspan="${divCount[r.div]}">${r.div}</td>`
        : '';
      if (r.div !== lastDiv) lastDiv = r.div;

      const monthData = planMonths.map((_, mi) => calcRow(site, r, mi));
      const hasData = monthData.some(d => d.h !== null);
      const sampleD = [...monthData].reverse().find(d => d.containers !== null);
      const sampleContainers = sampleD ? sampleD.containers : null;
      const mkey = r.metricKey || '';

      const statusIcon = r.val === null
        ? '<span style="color:var(--muted)">未設定</span>'
        : hasData
          ? '<span style="color:#34d399">●</span>'
          : '<span style="color:#f59e0b">○</span>';

      let basisDesc = '—';
      if (r.val !== null) {
        if (r.col === 'fixedH') {
          basisDesc = `固定 ${r.val} h/月`;
        } else if (r.col === 'kgPerH') {
          basisDesc = sampleContainers !== null ? `${sampleContainers.toLocaleString('ja-JP')} kg ÷ ${r.val} kg/h` : `${mkey}: データなし`;
        } else if (r.col === 'perContainer') {
          basisDesc = sampleContainers !== null ? `${mkey}: ${sampleContainers.toLocaleString('ja-JP')} コンテナ × ${r.val} ${r.unit}` : `${mkey}: データなし`;
        } else if (r.col === 'perPiece') {
          basisDesc = sampleContainers !== null ? `${sampleContainers.toLocaleString('ja-JP')} 点 × ${r.val} 秒` : `${mkey}: データなし`;
        } else if (r.col === 'perCs') {
          basisDesc = sampleContainers !== null ? `${sampleContainers.toLocaleString('ja-JP')} cs × ${r.val} 秒` : `${mkey}: データなし`;
        }
      }

      html += `<tr>${divCell}
        <td class="col-metric" style="font-size:0.82rem">${r.task}</td>
        <td class="col-metric" style="font-size:0.75rem">${statusIcon} <span style="color:var(--muted)">${basisDesc}</span></td>`;

      monthData.forEach(d => {
        if (d.h !== null) {
          const disp = d.h < 10 ? d.h.toFixed(1) : Math.round(d.h).toLocaleString('ja-JP');
          html += `<td class="col-num">${disp}<span style="font-size:0.68rem;color:var(--muted)"> h</span></td>`;
        } else {
          html += `<td class="col-num empty" style="color:#444">—</td>`;
        }
      });

      html += `<td class="col-metric" style="font-size:0.72rem;color:var(--muted)">${r.note}</td></tr>`;
    });

    // Subtotals per div
    ['栽培', '出荷'].forEach(div => {
      const divRows = rows.filter(r => r.div === div);
      const totals = planMonths.map((_, mi) => {
        const vals = divRows.map(r => calcRow(site, r, mi).h).filter(v => v !== null);
        return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
      });
      const color = div === '栽培' ? 'var(--accent-gunma)' : 'var(--accent-inabe)';
      html += `<tr style="font-weight:600;background:#1a1f35">
        <td class="col-site" colspan="3" style="text-align:right;padding-right:10px;color:var(--muted)">${div} 小計</td>`;
      totals.forEach(t => {
        html += t !== null
          ? `<td class="col-num" style="color:${color}">${t < 10 ? t.toFixed(1) : Math.round(t).toLocaleString('ja-JP')}<span style="font-size:0.68rem;opacity:0.7"> h</span></td>`
          : `<td class="col-num empty">—</td>`;
      });
      html += `<td></td></tr>`;
    });

    // Grand total
    const grandTotals = planMonths.map((_, mi) => {
      const vals = rows.map(r => calcRow(site, r, mi).h).filter(v => v !== null);
      return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
    });
    html += `<tr style="font-weight:700;background:#141827;border-top:2px solid #3a3f5c">
      <td class="col-site" colspan="3" style="text-align:right;padding-right:10px;color:#e2e8f0">総合計</td>`;
    grandTotals.forEach(t => {
      html += t !== null
        ? `<td class="col-num" style="color:#e2e8f0">${t < 10 ? t.toFixed(1) : Math.round(t).toLocaleString('ja-JP')}<span style="font-size:0.68rem;opacity:0.7"> h</span></td>`
        : `<td class="col-num empty">—</td>`;
    });
    html += `<td></td></tr>`;

    html += `</tbody></table></div></div>`;
  });

  html += `</div>`;
  main.innerHTML = html;
}

// 期間フィルター（開始月・表示月数）を整理済み_分析側の月にも適用する。
// 整理済み_M側・整理済み_分析側とも実質月（暦月）基準のため、オフセットなしの単純一致で
// 期間フィルター後の勤怠側の月に対応する生産実績側の月だけに絞り込む
function filterProductionByPeriod({ months, records }) {
  if (!allData || !periodStartMonth) return { months, records };
  const normWorkMonths = getActiveData().months.map(normalizeMonth);
  const commonMonths = months.filter(m => normWorkMonths.includes(m));
  if (!commonMonths.length) return { months: [], records: records.map(r => ({ ...r, values: [] })) };
  const idxs = commonMonths.map(m => months.indexOf(m));
  return {
    months: commonMonths,
    records: records.map(r => ({ ...r, values: idxs.map(i => r.values[i]) })),
  };
}

function renderProductionTable({ months: filteredMonths, records }) {
  const main = document.getElementById('main');

  if (!records.length) {
    main.innerHTML = '<div class="loading">データが見つかりませんでした</div>';
    return;
  }

  // 表示列は「開始月から固定12本（シート実在最新月を超える分は見出しも空欄）」。
  // filterProductionByPeriod()が返す実データ（filteredMonths/records、選択範囲内のみ）は
  // ここで表示列と月をキーに紐付ける。延長列・超過列（mi >= originalCount）には
  // 生産実績データを一切載せない
  const { months, originalCount } = getExtendedDisplayMonths();
  const prodIdxByMonth = {};
  filteredMonths.forEach((m, i) => { prodIdxByMonth[m] = i; });
  const prodIdx = months.map((m, mi) => {
    if (mi >= originalCount || !m) return -1;
    const norm = normalizeMonth(m);
    return Object.prototype.hasOwnProperty.call(prodIdxByMonth, norm) ? prodIdxByMonth[norm] : -1;
  });

  // Group records by site preserving order
  const siteOrder = [];
  const bySite = {};
  records.forEach(r => {
    if (!bySite[r.site]) { bySite[r.site] = []; siteOrder.push(r.site); }
    bySite[r.site].push(r);
  });

  function rowClass(r, cat) {
    const classes = [];
    if (r.metric === '出荷量(kg)') return 'metric-syukka-kg';
    if (r.metric === '合計(点数)') classes.push('metric-goukei');
    if (cat.includes('生産実績')) classes.push('cat-seisan');
    else if (cat.includes('栽培')) classes.push('cat-saibai');
    else if (cat.includes('出荷')) classes.push('cat-syukka');
    return classes.join(' ');
  }

  let html = `<div class="prod-panel">
    <div class="chart-section-label">🌱 生産実績 ／ 整理済み_分析</div>
    <div class="prod-table-wrap">
    <table class="prod-table">
      <thead><tr>
        <th class="th-left" style="min-width:70px">拠点</th>
        <th class="th-left" style="min-width:120px">カテゴリ</th>
        <th class="th-left" style="min-width:130px">指標</th>
        ${months.map(m => `<th>${m}</th>`).join('')}
      </tr></thead>
      <tbody>`;

  siteOrder.forEach((site, si) => {
    const siteRecs = bySite[site];
    const siteColor = SITE_COLORS[site] || '#e2e8f0';

    // カテゴリ列は「行ごと」ではなく「カテゴリのまとまりごと」に1つの結合セル(rowspan)で表示する。
    // 出荷関連カテゴリは、シート上の生カテゴリ文言に依存せず指標の内容で判定し
    // 「出荷内訳（実績）」に統一する
    const blocks = groupIntoLabeledBlocks(siteRecs, () => '出荷内訳（実績）');

    let rowIdx = 0;
    blocks.forEach(block => {
      block.records.forEach((r, bi) => {
        const isFirstRow = rowIdx === 0;
        const isFirstOfBlock = bi === 0;
        const sepClass = (si > 0 && isFirstRow) ? 'site-start' : '';

        const rc = rowClass(r, block.label);
        html += `<tr class="${[rc, sepClass].filter(Boolean).join(' ')}">`;

        // Site cell: only on first row of site
        if (isFirstRow) {
          html += `<td class="col-site" rowspan="${siteRecs.length}" style="color:${siteColor}">${site}</td>`;
        }

        // Category cell: only on first row of category group
        if (isFirstOfBlock) {
          html += `<td class="col-cat" rowspan="${block.records.length}">${block.label}</td>`;
        }

        // Metric
        html += `<td class="col-metric">${r.metric}</td>`;

        // Values（延長列・超過列は空欄、選択範囲内はデータなしを「ー」で表示）
        prodIdx.forEach((pi, mi) => {
          if (mi >= originalCount) { html += '<td class="col-num"></td>'; return; }
          const v = pi >= 0 ? r.values[pi] : null;
          html += v !== null
            ? `<td class="col-num">${v.toLocaleString('ja-JP')}</td>`
            : `<td class="col-num empty">—</td>`;
        });

        html += '</tr>';
        rowIdx++;
      });
    });
  });

  html += `</tbody></table>
    </div></div>`;

  main.innerHTML = html;
}

/* ── 標準工数設定 ───────────────────────────────────────────────────── */

// pcsPerCs: パック・袋ともに30P/cs。バラ(バラ数メトリック)は1個=1cs
// （「標準工数設定」シートの取得に失敗した場合のフォールバック値としてのみ使用）
const STD_CS_DEFAULT = { pcsPerCs: 30, baraMetric: 'バラ数' };

// 生産実績シートの対応メトリック名（作業区分名をキーに突き合わせる）。
// 「標準工数設定」シート側にはmetricKey専用の列が無いため、この対応表はコード側に残す
const TASK_METRIC_KEYS = {
  '菌床入れ': '菌床入れ',
  '芽かき': '芽かき',
  '収穫': '収穫量(kg)',
  '注水': '注水',
  '散水': '散水',
  '廃棄': '廃棄',
  '計量時間': '収穫',
  'コンテナ移動時間': '稼働コンテナ数',
  'コンテナ点検時間': '稼働コンテナ数',
  'その他間接業': null,
  'パック並べる': 'パック数',
  '袋入れ・閉じ': '袋数',
  '段ボール詰める': '合計(点数)',
  '段ボール作成': '合計(点数)',
  '計量': '合計(点数)',
  '納品書・伝票作成': null,
  '椎茸運搬(生在庫)': '合計(点数)',
  '椎茸運搬(製品)': '合計(点数)',
};

// cs数 = (合計点数 - バラ数) / pcsPerCs + バラ数
function calcCs(pcs, bara, conv) {
  const nonBara = Math.max(0, pcs - bara);
  return nonBara / conv.pcsPerCs + bara;
}

// 標準工数(h)の計算エンジン（標準工数(h)タブ・比較タブ・要員計画タブで共通）。
// 「標準工数設定」の係数行(r: {col,val,unit,metricKey})を、生産量の実データ(records)と
// 突き合わせて工数(h)に変換する。records/prodMonthsを実績側（整理済み_分析）にすれば
// 従来通りの実績ベースの計算、予定側（要員計画で組み立てたrecords）にすれば計画ベースの
// 計算になり、ロジック自体は完全に共通。
//
// records: [{ site, metric, values: number[] }]（実データ本体。metricは'収穫量(kg)'
//   '稼働コンテナ数'等、TASK_METRIC_KEYSのmetricKeyと同じ語彙で揃えること）
// prodMonths: recordsのvaluesと対応する月ラベル配列（生産実績表記、例:"2025/10"）
// displayMonths: 表示列（work-hours表記、固定12本ルール適用後。延長列は実在月ラベル、
//   超過列は空文字）
// originalCount: displayMonthsのうち選択範囲内（実データを載せてよい）の本数
// conv: { pcsPerCs, baraMetric }（出荷cs換算設定）
// metricAliases: { [primaryKey]: fallbackKey } — 計画シート等で別名メトリックを使う場合に指定
//   例: { 'パック数': '出荷計画実数', '袋数': '出荷計画実数', '合計(点数)': '出荷計画実数' }
// preferredCat: 同名メトリックが複数カテゴリに存在する場合（計画シートの出荷内訳 vs 実数計画など）
// このカテゴリのレコードを優先して返す。該当なければ通常の先頭一致にフォールバック。
// また preferredCat 指定時は 'パック数' を 合計(点数)−袋数−バラ数 で導出する
// （計画シートの実数計画には パック数 行が存在しないため）。
function createStdHoursEngine(records, prodMonths, displayMonths, originalCount, conv, metricAliases, preferredCat) {
  const aliases = metricAliases || {};

  function getRawVal(site, metricKey, pi) {
    const lookup = (key, cat) => {
      if (cat) {
        const r = records.find(rr => rr.site === site && rr.metric === key && rr.cat === cat);
        if (r) return r;
      }
      return records.find(rr => rr.site === site && rr.metric === key);
    };
    let r = lookup(metricKey, preferredCat);
    if (!r && aliases[metricKey]) r = lookup(aliases[metricKey], preferredCat);
    if (!r) return null;
    return r.values[pi] ?? null;
  }

  function getProdVal(site, metricKey, mi) {
    if (mi >= originalCount) return null;
    const m = displayMonths[mi];
    if (!m) return null;
    const pi = prodMonths.indexOf(normalizeMonth(m));
    if (pi < 0) return null;

    // 計画シートで パック数 は実数計画カテゴリにないため合計−袋−バラで導出
    if (preferredCat && metricKey === 'パック数') {
      const total = getRawVal(site, '合計(点数)', pi);
      const bags  = getRawVal(site, '袋数', pi);
      const bara  = getRawVal(site, 'バラ数', pi);
      if (total !== null && bags !== null && bara !== null) return total - bags - bara;
      if (total !== null) return total; // 袋・バラが取れなければ合計で代替
    }

    return getRawVal(site, metricKey, pi);
  }

  function calcRow(site, r, mi) {
    const v = r.val;
    if (v === null || v === undefined) return { h: null, containers: null };
    const mkey = r.metricKey || null;

    if (r.col === 'kgPerH' && v > 0) {
      const kg = getProdVal(site, mkey || '収穫量(kg)', mi);
      return { h: kg !== null ? kg / v : null, containers: kg };
    }
    // 毎月固定時間の項目は実データを参照しないため、他の項目のように「実データなし=null」が
    // 自然には効かない。延長列・超過列（mi >= originalCount）では明示的に空欄にする
    if (r.col === 'fixedH') return { h: mi < originalCount ? v : null, containers: null };
    if (r.col === 'perContainer') {
      const containers = getProdVal(site, mkey || '稼働コンテナ数', mi);
      if (containers !== null) {
        const hPer = r.unit === 'h' ? v : v / 60;
        return { h: containers * hPer, containers };
      }
      return { h: null, containers: null };
    }
    if (r.col === 'perPiece') {
      const pcs = getProdVal(site, mkey || '合計(点数)', mi);
      if (pcs !== null) {
        const secPer = r.unit === '秒' ? v : v * 60;
        return { h: pcs * secPer / 3600, containers: pcs };
      }
      return { h: null, containers: null };
    }
    if (r.col === 'perCs') {
      const pcs  = getProdVal(site, mkey || '合計(点数)', mi);
      const bara = getProdVal(site, conv.baraMetric || 'バラ数', mi) || 0;
      if (pcs !== null) {
        const cs = calcCs(pcs, bara, conv);
        const secPer = r.unit === '秒' ? v : v * 60;
        return { h: cs * secPer / 3600, containers: Math.round(cs) };
      }
      return { h: null, containers: null };
    }
    return { h: null, containers: null };
  }

  return { getProdVal, calcRow };
}

// stdSettingsSheetData: 「標準工数設定」シートから読み取った値そのもの（リセット時の復元元）。
// currentStdRows/currentStdConv: 画面編集を反映する実行時の状態（保存はせず、リセットで
// stdSettingsSheetDataの値に戻す）。ページ読み込み時に一度だけ取得し、以降は
// 「更新」ボタンを押しても再取得しない（loadAll()とは独立したPromiseで管理する）
let stdSettingsSheetData = null;
let currentStdRows = null;
let currentStdConv = null;
let stdSettingsPromise = null;

// 予実グループ用の独立した標準工数設定（勤務実績タブとは別管理）
let yojitsuStdRows = null;
let yojitsuStdConv = null;

function loadStdSettingsSheetOnce() {
  if (!stdSettingsPromise) {
    stdSettingsPromise = fetchStdSettingsSheet().then(data => {
      stdSettingsSheetData = data;
      currentStdRows = JSON.parse(JSON.stringify(data.rows));
      currentStdConv = { ...data.conv };
      // 予実タブ用（初回読み込み時のみ初期化。以降は独立して編集可能）
      if (!yojitsuStdRows) {
        yojitsuStdRows = JSON.parse(JSON.stringify(data.rows));
        yojitsuStdConv = { ...data.conv };
      }
      return data;
    }).catch(e => {
      console.error('[標準工数設定] シート取得エラー:', e);
      stdSettingsSheetData = { conv: { ...STD_CS_DEFAULT }, rows: [], error: e.message };
      currentStdRows = [];
      currentStdConv = { ...STD_CS_DEFAULT };
      if (!yojitsuStdRows) { yojitsuStdRows = []; yojitsuStdConv = { ...STD_CS_DEFAULT }; }
      throw e;
    });
  }
  return stdSettingsPromise;
}

async function fetchStdSettingsSheet() {
  // headers=0：見出し行の結合をgvizに任せず、1行目から全行を生データのまま受け取る
  // （1〜3行目のcs換算設定はセル単位の値を個別に読む必要があるため）
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(STD_SETTINGS_SHEET_NAME)}&headers=0`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^{]+/, '').replace(/[^}]+$/, ''));
  return parseStdSettingsSheet(json);
}

function parseStdSettingsSheet(json) {
  const rows = json.table.rows || [];
  const cellAt = (rIdx, cIdx) => {
    const row = rows[rIdx];
    const c = row && row.c && row.c[cIdx];
    return c ? (c.v !== undefined ? c.v : null) : null;
  };

  // 出荷cs換算設定（1〜3行目）：ラベル文字列を含むセルを探し、同じ列の直下のセルを値として読む。
  // 実際の列位置に依存しない作りにすることで、シート側の細かいレイアウト差異を吸収する。
  // 1行目はタイトル行（例:「cs数=(合計点数-バラ数)÷P/cs+バラ数」）で"P/cs"のような
  // 短い文字列を含むことがあるため、検索は2行目以降に限定し、かつラベルは見出しに
  // 実際に入っている文言そのもの（十分に長い・特定的な文字列）で照合する
  function findLabelValue(labelSubstr, startRow = 1, endRow = 4) {
    for (let r = startRow; r < Math.min(endRow, rows.length); r++) {
      const row = rows[r];
      if (!row || !row.c) continue;
      for (let c = 0; c < row.c.length; c++) {
        const cell = row.c[c];
        const text = cell ? String(cell.v ?? cell.f ?? '') : '';
        if (text.includes(labelSubstr)) {
          return cellAt(r + 1, c);
        }
      }
    }
    return null;
  }
  const pcsPerCsRaw = findLabelValue('パック・袋P/cs') ?? findLabelValue('パック・袋');
  const baraMetricRaw = findLabelValue('バラのメトリック名') ?? findLabelValue('メトリック名');
  // gvizはセルの書式設定によって、数値であっても文字列型("10"等)でレスポンスを返すことが
  // あるため、typeofによる厳格な型チェックではなくNumber()で解釈できるかどうかで判定する
  const pcsPerCsNum = Number(pcsPerCsRaw);
  const conv = {
    pcsPerCs: (pcsPerCsRaw !== null && pcsPerCsRaw !== '' && !isNaN(pcsPerCsNum) && pcsPerCsNum > 0) ? pcsPerCsNum : STD_CS_DEFAULT.pcsPerCs,
    baraMetric: (typeof baraMetricRaw === 'string' && baraMetricRaw.trim()) ? baraMetricRaw.trim() : STD_CS_DEFAULT.baraMetric,
  };
  console.log('[標準工数設定] cs換算設定 パース結果:', JSON.stringify(conv), 'raw:', JSON.stringify({ pcsPerCsRaw, baraMetricRaw }), 'types:', typeof pcsPerCsRaw, typeof baraMetricRaw);

  // 4行目：列見出し（固定で分かっているためスキップ）。5行目以降が各作業のデータ行
  // A=業務区分, B=作業区分, C=1コンテナ当たり, D=時間当たり(kg/h), E=1cs当たり,
  // F=1個当たり, G=固定時間(h), H=単位, I=考え方
  const COL = { div: 0, task: 1, perContainer: 2, kgPerH: 3, perCs: 4, perPiece: 5, fixedH: 6, unit: 7, note: 8 };
  const COEF_COLS = ['perContainer', 'kgPerH', 'perCs', 'perPiece', 'fixedH'];
  const stdRows = [];
  let currentDiv = '';
  for (let r = 4; r < rows.length; r++) {
    const divVal = cellAt(r, COL.div);
    if (divVal) currentDiv = String(divVal).trim();
    const taskVal = cellAt(r, COL.task);
    if (!taskVal) continue; // 業務区分(A列結合)の見出し行・空行はスキップ
    const task = String(taskVal).trim();

    let col = null, val = null;
    for (const c of COEF_COLS) {
      const v = cellAt(r, COL[c]);
      if (v !== null && v !== '') { col = c; val = typeof v === 'number' ? v : parseFloat(v); break; }
    }
    if (val !== null && isNaN(val)) val = null;

    const unitVal = cellAt(r, COL.unit);
    const noteVal = cellAt(r, COL.note);

    stdRows.push({
      div: currentDiv,
      task,
      col,
      val,
      unit: unitVal ? String(unitVal).trim() : '',
      metricKey: Object.prototype.hasOwnProperty.call(TASK_METRIC_KEYS, task) ? TASK_METRIC_KEYS[task] : null,
      note: noteVal ? String(noteVal).trim() : '',
    });
  }

  return { conv, rows: stdRows };
}

  return currentStdRows || [];
}
function loadCsConv() {

}

/* ── 予実タブ用 標準工数設定（独立） ──────────────────────────────── */
function loadYojitsuStdSettings() {
  return yojitsuStdRows || [];
}
function loadYojitsuCsConv() {

function renderStdHoursTable(prodData) {
  const main = document.getElementById('main');
  const rows = loadStdSettings();
  const { months: filteredMonths, records } = prodData;

  // 表示列は「開始月から固定12本（シート実在最新月を超える分は見出しも空欄）」。
  // filterProductionByPeriod()が返す実データ（filteredMonths/records、選択範囲内のみ）は
  // ここで表示列と月をキーに紐付ける。延長列・超過列（mi >= originalCount）には
  // 生産実績データを一切載せない
  const { months, originalCount } = getExtendedDisplayMonths();
  const conv = loadCsConv();
  const { calcRow } = createStdHoursEngine(records, filteredMonths, months, originalCount, conv);

  const availSites = [...new Set(records.map(r => r.site))].filter(s => SITE_COLORS[s]);
  const divCount = {};
  rows.forEach(r => { divCount[r.div] = (divCount[r.div] || 0) + 1; });

  let html = `<div class="prod-panel">
    <div class="chart-section-label">📋 標準工数(h) ／ 生産実績 × 標準工数設定
      <span style="font-size:0.72rem;font-weight:400;color:var(--muted);margin-left:12px">※ 稼働コンテナ数・合計点数は生産実績シートから取得　cs換算設定は⚙️タブで変更可</span>
    </div>`;

  availSites.forEach(site => {
    const siteColor = SITE_COLORS[site] || '#fff';
    html += `<div style="margin-bottom:28px">
      <div class="schart-header" style="color:${siteColor};margin-bottom:6px">📍 ${site}</div>
      <div class="prod-table-wrap"><table class="prod-table">
        <thead><tr>
          <th class="th-left" style="min-width:60px">業務区分</th>
          <th class="th-left" style="min-width:130px">作業区分</th>
          <th class="th-left" style="min-width:140px">計算根拠</th>
          ${months.map(m => `<th>${m}</th>`).join('')}
          <th class="th-left" style="min-width:130px">計算方法</th>
        </tr></thead><tbody>`;

    let lastDiv = '';
    rows.forEach(r => {
      const divCell = r.div !== lastDiv
        ? `<td class="col-site" style="color:${r.div === '栽培' ? 'var(--accent-gunma)' : 'var(--accent-inabe)'};font-weight:600" rowspan="${divCount[r.div]}">${r.div}</td>`
        : '';
      if (r.div !== lastDiv) lastDiv = r.div;

      const monthData = months.map((_, mi) => calcRow(site, r, mi));
      const hasData = monthData.some(d => d.h !== null);
      // Pick latest month's containers value as sample
      const sampleD = [...monthData].reverse().find(d => d.containers !== null);
      const sampleContainers = sampleD ? sampleD.containers : null;

      const mkey = r.metricKey || '';

      // Status icon
      const statusIcon = r.val === null
        ? '<span style="color:var(--muted)">未設定</span>'
        : hasData
          ? '<span style="color:#34d399">●</span>'
          : '<span style="color:#f59e0b">○</span>';

      // Basis description (skip if val not set)
      let basisDesc = '—';
      if (r.val !== null) {
        if (r.col === 'fixedH') {
          basisDesc = `固定 ${r.val} h/月`;
        } else if (r.col === 'kgPerH') {
          basisDesc = sampleContainers !== null
            ? `${sampleContainers.toLocaleString('ja-JP')} kg ÷ ${r.val} kg/h`
            : `${mkey}: データなし`;
        } else if (r.col === 'perContainer') {
          basisDesc = sampleContainers !== null
            ? `${mkey}: ${sampleContainers.toLocaleString('ja-JP')} コンテナ × ${r.val} ${r.unit}`
            : `${mkey}: データなし`;
        } else if (r.col === 'perPiece') {
          basisDesc = sampleContainers !== null
            ? `${sampleContainers.toLocaleString('ja-JP')} 点 × ${r.val} 秒`
            : `${mkey}: データなし`;
        } else if (r.col === 'perCs') {
          basisDesc = sampleContainers !== null
            ? `${sampleContainers.toLocaleString('ja-JP')} cs × ${r.val} 秒`
            : `${mkey}: データなし`;
        }
      }

      html += `<tr>${divCell}
        <td class="col-metric" style="font-size:0.82rem">${r.task}</td>
        <td class="col-metric" style="font-size:0.75rem">
          ${statusIcon} <span style="color:var(--muted)">${basisDesc}</span>
        </td>`;

      // 延長列・超過列（mi >= originalCount）は空欄、選択範囲内はデータなしを「ー」で表示
      monthData.forEach((d, mi) => {
        if (mi >= originalCount) { html += '<td class="col-num"></td>'; return; }
        if (d.h !== null) {
          const disp = d.h < 10 ? d.h.toFixed(1) : Math.round(d.h).toLocaleString('ja-JP');
          html += `<td class="col-num">${disp}<span style="font-size:0.68rem;color:var(--muted)"> h</span></td>`;
        } else {
          html += `<td class="col-num empty" style="color:#444">—</td>`;
        }
      });

      html += `<td class="col-metric" style="font-size:0.72rem;color:var(--muted)">${r.note}</td></tr>`;
    });

    // Subtotals per div
    ['栽培', '出荷'].forEach(div => {
      const divRows = rows.filter(r => r.div === div);
      const totals = months.map((_, mi) => {
        const vals = divRows.map(r => calcRow(site, r, mi).h).filter(v => v !== null);
        return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
      });
      const color = div === '栽培' ? 'var(--accent-gunma)' : 'var(--accent-inabe)';
      html += `<tr style="font-weight:600;background:#1a1f35">
        <td class="col-site" colspan="3" style="text-align:right;padding-right:10px;color:var(--muted)">
          ${div} 小計
        </td>`;
      totals.forEach((t, mi) => {
        if (mi >= originalCount) { html += '<td class="col-num"></td>'; return; }
        html += t !== null
          ? `<td class="col-num" style="color:${color}">${t < 10 ? t.toFixed(1) : Math.round(t).toLocaleString('ja-JP')}<span style="font-size:0.68rem;opacity:0.7"> h</span></td>`
          : `<td class="col-num empty">—</td>`;
      });
      html += `<td></td></tr>`;
    });

    // Grand total
    const grandTotals = months.map((_, mi) => {
      const vals = rows.map(r => calcRow(site, r, mi).h).filter(v => v !== null);
      return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
    });
    html += `<tr style="font-weight:700;background:#141827;border-top:2px solid #3a3f5c">
      <td class="col-site" colspan="3" style="text-align:right;padding-right:10px;color:#e2e8f0">総合計</td>`;
    grandTotals.forEach((t, mi) => {
      if (mi >= originalCount) { html += '<td class="col-num"></td>'; return; }
      html += t !== null
        ? `<td class="col-num" style="color:#e2e8f0">${t < 10 ? t.toFixed(1) : Math.round(t).toLocaleString('ja-JP')}<span style="font-size:0.68rem;opacity:0.7"> h</span></td>`
        : `<td class="col-num empty">—</td>`;
    });
    html += `<td></td></tr>`;

    html += `</tbody></table></div></div>`;
  });

  html += `</div>`;
  main.innerHTML = html;
}

// "2025年10月" → "2025/10"
function normalizeMonth(m) {
  return String(m).replace(/(\d+)年(\d+)月/, (_, y, mo) => `${y}/${parseInt(mo)}`);
}

// 整理済み_Mの月キー（monthYms/months）は実質月（シート2行目を直接読み取ったもの）。
// 整理済み_分析（生産実績）の月もカレンダー通りの暦月のため、オフセットなしの単純一致で突き合わせられる。

const productivityChartInstances = {};

function renderProductivityTab() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading">生産性データを計算中...</div>';

  Object.values(productivityChartInstances).forEach(c => c.destroy());
  Object.keys(productivityChartInstances).forEach(k => delete productivityChartInstances[k]);

  if (!allData) { main.innerHTML = '<div class="error-msg">勤務データが未ロードです</div>'; return; }

  fetchProductionSheet().then(prodData => {
    renderProductivityCharts(getActiveData(), prodData);
  }).catch(e => {

}

function renderProductivityCharts(workData, prodData) {
  const main = document.getElementById('main');
  const { employees } = workData;
  const { months: prodMonths, records } = prodData;

  // 表示列は「開始月から固定12本（シート実在最新月を超える分は見出しも空欄）」。
  // 生産実績側の実データは、選択範囲内(mi < originalCount)の月だけをnormalizeMonth()で
  // 突き合わせる。延長列・超過列には勤怠・生産実績いずれのデータも一切載せない
  const { months, originalCount } = getExtendedDisplayMonths();

  // 選択範囲内に生産実績側と共通する月が1つもなければ、以降の処理を打ち切る
  const hasOverlap = months.slice(0, originalCount).some(m => prodMonths.includes(normalizeMonth(m)));
  if (!hasOverlap) {
    main.innerHTML = '<div class="loading">共通月が見つかりません（月ラベル形式を確認してください）</div>';
    return;
  }

  // Collect all sites that appear in production data
  const prodSites = [...new Set(records.map(r => r.site))];
  // Use sites that appear in both work data and production data
  const sites = SITES.filter(s => prodSites.includes(s) && employees.some(e => e.base === s));
  if (!sites.length) {
    main.innerHTML = '<div class="loading">拠点データの突合ができませんでした</div>';
    return;
  }

  // Helper: sum hours by workType filter for a site, indexed by表示列(mi)
  function workHours(site, typeFilter) {
    const emps = employees.filter(e => e.base === site && e.workType && typeFilter(e.workType));
    return months.map((_, mi) => {
      if (mi >= originalCount) return null;
      const total = emps.reduce((s, e) => s + (e.hours[mi] ?? 0), 0);
      return total > 0 ? Math.round(total * 10) / 10 : null;
    });
  }

  // Helper: get production metric values aligned to 表示列(mi)
  function prodVals(site, metric) {
    const r = records.find(x => x.site === site && x.metric === metric);
    if (!r) return months.map(() => null);
    return months.map((m, mi) => {
      if (mi >= originalCount || !m) return null;
      const pi = prodMonths.indexOf(normalizeMonth(m));
      return (pi >= 0 && r.values[pi] !== null) ? r.values[pi] : null;
    });
  }

  // Calculate productivity per site
  const data = {};
  sites.forEach(site => {
    // Match summary table classification (配送・栽培 → 配送, not 栽培)
    const cultivationH = workHours(site, wt => workTypeClass(wt) === 'wt-栽培');
    const shippingH    = workHours(site, wt => workTypeClass(wt) === 'wt-出荷');
    const harvest      = prodVals(site, '収穫量(kg)');
    const shipKg       = prodVals(site, '出荷量(kg)');
    const shipPcs      = prodVals(site, '合計(点数)');

    const ratio = (a, b) => a.map((v, i) =>
      (v !== null && b[i] !== null && b[i] > 0) ? Math.round(v / b[i] * 10) / 10 : null
    );

    data[site] = {
      cultivationH,
      shippingH,
      harvestPerH:  ratio(harvest, cultivationH),
      shipKgPerH:   ratio(shipKg,  shippingH),
      shipPcsPerH:  ratio(shipPcs, shippingH),
      harvest,
      shipKg,
      shipPcs,
    };
  });

  // Build latest-month KPI values（延長・超過列は対象外。選択範囲内の最新月を基準にする）
  const lastIdx   = originalCount - 1;
  const lastMonth = months[lastIdx];

  function kpiHtml(label, site, key, unit, decimals = 1) {
    const v = data[site]?.[key]?.[lastIdx];
    const color = SITE_COLORS[site] || '#e2e8f0';
    return `<div class="kpi">
      <div class="kpi-label" style="color:${color}">${site}</div>
      <div class="kpi-value">${v !== null && v !== undefined ? v.toFixed(decimals) : '—'} <span style="font-size:0.7em;color:var(--muted)">${unit}</span></div>
    </div>`;
  }

  // Chart definitions: productivity line (left Y) + volume/time bars (right Y)
  const barMode = window._prodBarMode || 'volume';
  const metrics = [
    { key: 'harvestPerH', title: '① 栽培生産性', sub: '栽培時間あたり収穫量', unit: 'kg/h', decimals: 1,
      volKey: 'harvest',    volUnit: 'kg', volLabel: '収穫量',
      hKey:   'cultivationH', hUnit: 'h', hLabel: '栽培時間' },
    { key: 'shipKgPerH',  title: '② 出荷生産性（重量）', sub: '出荷時間あたり出荷量', unit: 'kg/h', decimals: 1,
      volKey: 'shipKg',     volUnit: 'kg', volLabel: '出荷量',
      hKey:   'shippingH',  hUnit: 'h', hLabel: '出荷時間' },
    { key: 'shipPcsPerH', title: '③ 出荷生産性（点数）', sub: '出荷時間あたり合計点数', unit: '点/h', decimals: 0,
      volKey: 'shipPcs',    volUnit: '点', volLabel: '合計点数',
      hKey:   'shippingH',  hUnit: 'h', hLabel: '出荷時間' },
  ];

  // Combo chart options: left Y = productivity (line), right Y = volume/time (bar)
  function comboOpts(ratioUnit, ratioDecimals, barUnit) {
    return {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8892a4', font: { size: 11 }, boxWidth: 12, padding: 8 } },
        tooltip: {
          backgroundColor: '#1e2235', borderColor: '#3a3f5c', borderWidth: 1,
          titleColor: '#e2e8f0', bodyColor: '#a0aec0',
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              if (v === null || v === undefined) return null;
              if (ctx.dataset.yAxisID === 'y') {
                return `${ctx.dataset.label}: ${ratioDecimals === 0 ? Math.round(v).toLocaleString('ja-JP') : v.toFixed(ratioDecimals)} ${ratioUnit}`;
              }
              const u = ctx.dataset._barUnit || barUnit;
              return `${ctx.dataset.label}: ${u === '点' ? Math.round(v).toLocaleString('ja-JP') : v.toLocaleString('ja-JP')} ${u}`;
            },
          },
        },
      },
      scales: {
        x: { ticks: { color: '#8892a4', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1e2235' } },
        y: {
          position: 'left',
          ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} ${ratioUnit}` },
          grid: { color: '#1e2235' }, suggestedMin: 0,
          title: { display: true, text: ratioUnit, color: '#8892a4', font: { size: 10 } },
        },
        y1: {
          position: 'right',
          ticks: { color: '#6b7a90', font: { size: 10 }, callback: v => v >= 1000 ? `${(v/1000).toFixed(0)}k` : `${v}` },
          grid: { drawOnChartArea: false }, suggestedMin: 0,
          title: { display: true, text: barUnit, color: '#6b7a90', font: { size: 10 } },
        },
      },
    };
  }

  // Render HTML
  let html = `<div class="prod-panel">
    <div class="chart-section-label">📈 生産性 ／ 最新月: ${lastMonth}
      <span style="float:right;display:flex;align-items:center;gap:6px;font-size:0.78rem">
        <span style="color:var(--muted)">棒グラフ:</span>
        <button id="prd-toggle-vol" class="select-btn" style="padding:2px 10px" onclick="switchProdBar('volume')">生産量</button>
        <button id="prd-toggle-time" class="select-btn" style="padding:2px 10px" onclick="switchProdBar('time')">時間</button>
      </span>
    </div>
    <div class="kpi-row">
      ${metrics.map(m => sites.map(s => kpiHtml(m.title, s, m.key, m.unit, m.decimals)).join('')).join('')}
    </div>`;

  metrics.forEach((m, i) => {
    html += `<div class="schart-section">
      <div class="schart-header">${m.title}
        <span style="font-weight:400;font-size:0.8rem;color:var(--muted)">${m.sub}</span>
        <span style="float:right;font-size:0.72rem;color:var(--muted)">折れ線(左軸): ${m.unit}　棒(右軸): 生産量/時間 切替</span>
      </div>
      ${chartWrapHtml(`prd-${i}`, months.length, { heightPx: 340, inlineHeight: true })}
    </div>`;
  });

  html += `</div>`;
  main.innerHTML = html;

  // Store references for toggle function
  window._prodBarMode = barMode;
  window._prodBarData = { metrics, data, sites };

  // Draw combo charts
  metrics.forEach((m, i) => {
    const ctx = document.getElementById(`prd-${i}`)?.getContext('2d');
    if (!ctx) return;

    const datasets = [];

    // Productivity lines per site (left Y)
    sites.forEach(site => {
      const color = SITE_COLORS[site] || '#fff';
      datasets.push({
        type: 'line',
        label: `${site} (${m.unit})`,
        data: data[site][m.key],
        borderColor: color,
        backgroundColor: color + '22',
        borderWidth: 2.5,
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.3,
        spanGaps: true,
        yAxisID: 'y',
        order: 0,
      });
    });

    // Volume/time bars per site (right Y) — controlled by barMode
    const barKey  = barMode === 'volume' ? m.volKey  : m.hKey;
    const barUnit = barMode === 'volume' ? m.volUnit : m.hUnit;
    const barLbl  = barMode === 'volume' ? m.volLabel : m.hLabel;
    sites.forEach(site => {
      const color = SITE_COLORS[site] || '#fff';
      datasets.push({
        type: 'bar',
        label: `${site} ${barLbl}(${barUnit})`,
        data: data[site][barKey],
        backgroundColor: color + '44',
        borderColor: color + '88',
        borderWidth: 1,
        yAxisID: 'y1',
        order: 2,
        _barUnit: barUnit,
      });
    });

    productivityChartInstances[`prd-${i}`] = new Chart(ctx, {
      data: { labels: months, datasets },
      options: comboOpts(m.unit, m.decimals, barUnit),
    });
  });

  // Set initial toggle button styles
  updateProdToggleButtons();
}

function updateProdToggleButtons() {
  const volBtn  = document.getElementById('prd-toggle-vol');
  const timeBtn = document.getElementById('prd-toggle-time');
  if (!volBtn || !timeBtn) return;
  const accentStyle = 'background:var(--accent-inabe);color:#000;border-color:var(--accent-inabe)';
  const plainStyle  = '';
  if (window._prodBarMode === 'time') {
    volBtn.style.cssText  = plainStyle;
    timeBtn.style.cssText = accentStyle;
  } else {
    volBtn.style.cssText  = accentStyle;
    timeBtn.style.cssText = plainStyle;
  }
}

window.switchProdBar = function(mode) {
  window._prodBarMode = mode;
  updateProdToggleButtons();
  // Need access to metrics and data; re-read from closure via a stored reference
  if (!window._prodBarData) return;
  const { metrics, data, sites } = window._prodBarData;
  metrics.forEach((m, i) => {
    const chart = productivityChartInstances[`prd-${i}`];
    if (!chart) return;
    const isVol   = mode === 'volume';
    const barKey  = isVol ? m.volKey  : m.hKey;
    const barUnit = isVol ? m.volUnit : m.hUnit;
    const barLbl  = isVol ? m.volLabel : m.hLabel;
    const n = sites.length;
    sites.forEach((site, si) => {
      const ds = chart.data.datasets[n + si];
      ds.data     = data[site][barKey];
      ds.label    = `${site} ${barLbl}(${barUnit})`;
      ds._barUnit = barUnit;
    });
    chart.options.scales.y1.title.text = barUnit;
    chart.update();
  });
};

/* ── Main ────────────────────────────────────────────────────────── */
async function loadAll() {
  // 更新前のタブ状態（メインタブ・サマリーのサブタブ・雇用区分フィルター）を保持しておき、
  // データ再取得後に同じ表示へ戻す（振替あり/なしのトグルはグローバル変数のままなので触れない）
  const prevActiveMode = activeMode;
  const prevActiveBase = activeBase;
  // ページ読み込み直後（まだ.summary-subtab要素が存在しない）はDOMから読めないため、
  // restoreSessionStateBeforeFirstLoad()が設定したrestoredSummarySubtabにフォールバックする
  const prevSummarySubtab = activeMode === 'summary'
    ? (document.querySelector('.summary-subtab.active')?.dataset.tab || restoredSummarySubtab || 'table')
    : null;
  const prevEmpTypeChecked = empTypeFilter ? new Set(empTypeFilter) : null;
  const prevEmpTypeAll = empTypeFilter ? new Set(Object.keys(empTypeColorMap)) : null;
  const prevPeriodStart = periodStartMonth;
  const prevPeriodCount = periodMonthCount;

  document.getElementById('main').innerHTML = '<div class="loading">データを読み込み中...</div>';
  document.getElementById('tabs').innerHTML = '';
  document.getElementById('last-updated').textContent = '';
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  if (countChartInstance) { countChartInstance.destroy(); countChartInstance = null; }
  productionData = null; // 生産実績タブ等に戻った際、更新ボタンで実際に再取得されるようキャッシュも破棄する

  try {
    const json = await fetchSheet();
    allData = buildDataset(json);
    renderPeriodFilterUI(prevPeriodStart, prevPeriodCount);
    renderEmpTypeFilterUI(prevEmpTypeChecked, prevEmpTypeAll);

    try {
      const adjJson = await fetchAdjustSheet();
      const adjustRecords = parseAdjustRecords(adjJson);
      transferAdjusted = computeTransferAdjustments(allData, adjustRecords);
    } catch (adjErr) {
      console.error(adjErr);
      transferAdjusted = { employees: allData.employees, alerts: [`「${ADJUST_SHEET_NAME}」シートの取得に失敗したため、振替は反映されていません（${adjErr.message}）`] };
    }

    const bases = SITES.filter(s => allData.employees.some(e => e.base === s));
    if (bases.length === 0) throw new Error('拠点データが見つかりません');

    // 更新前のタブ状態を復元する（拠点が無くなっていた場合のみ先頭拠点にフォールバック）
    if (prevActiveMode === 'site' && bases.includes(prevActiveBase)) {
      activeMode = 'site';
      activeBase = prevActiveBase;
    } else if (prevActiveMode && prevActiveMode !== 'site') {
      activeMode = prevActiveMode;
      activeBase = bases[0];
    } else {
      activeMode = 'site';
      activeBase = bases[0];
    }

    renderTabs(bases);
    document.getElementById('main').innerHTML = '';
    renderActiveTabContent(prevSummarySubtab);

    document.getElementById('last-updated').textContent =
      `最終更新: ${new Date().toLocaleString('ja-JP')}`;
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="error-msg">データ取得エラー: ${e.message}</div>`;
    console.error(e);
  }
}

// 現在の activeMode に応じたタブ内容を描画する（更新ボタン押下後、直前のタブ状態を復元するために使用）
function renderActiveTabContent(summarySubtab) {
  if (activeMode === 'site') {
    renderBasePanel();
  } else if (activeMode === 'summary') {
    renderSummary();
    switchToSummarySubtab(summarySubtab);
  } else if (activeMode === 'production') {

  } else if (activeMode === 'productivity') {
