<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>勤務時間ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #1e2235;
      --border: #2e3148;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent-inabe: #38bdf8;
      --accent-gunma: #a78bfa;
      --accent-nandan: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      min-height: 100vh;
    }
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.04em; }
    header .subtitle { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
    #last-updated { font-size: 0.8rem; color: var(--muted); }
    #refresh-btn {
      background: var(--border);
      border: none;
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    #refresh-btn:hover { background: #3a3f5c; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      padding: 20px 32px 0;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 10px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      font-size: 0.9rem;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
      border-bottom: 2px solid var(--surface2);
      margin-bottom: -1px;
    }
    .tab-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }


    main {
      padding: 0 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Site panel */
    .site-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-radius: 0 8px 8px 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* KPI row */
    .kpi-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 140px;
    }
    .kpi-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .kpi-value { font-size: 1.3rem; font-weight: 700; }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    .control-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .select-btns { display: flex; gap: 6px; flex-wrap: wrap; }
    .select-btn {
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: all 0.15s;
    }
    .select-btn:hover { border-color: #4a5070; color: var(--text); }

    /* Employee filter */
    .emp-filter {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      max-height: 180px;
      overflow-y: auto;
    }
    .emp-filter::-webkit-scrollbar { width: 4px; }
    .emp-filter::-webkit-scrollbar-track { background: transparent; }
    .emp-filter::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .emp-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 4px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.85rem;
      transition: background 0.1s;
    }
    .emp-checkbox:hover { background: var(--surface2); }
    .emp-checkbox input { cursor: pointer; accent-color: var(--accent-inabe); }
    .color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Chart section label */
    .chart-section-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-top: 4px;
    }

    /* Chart */
    .chart-wrap {
      position: relative;
      height: 380px;
    }

    /* Loading / error */
    .loading, .error-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 300px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .error-msg { color: #f87171; }

    /* ── Summary shell & sub-tabs ── */
    .summary-shell {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .summary-subtabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .summary-subtab {
      padding: 8px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      font-size: 0.85rem;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .summary-subtab.active {
      background: var(--surface2);
      color: var(--text);
      border-bottom: 2px solid var(--surface2);
      margin-bottom: -1px;
    }
    .summary-subtab:hover:not(.active) { background: var(--surface2); color: var(--text); }

    /* ── Summary table ── */
    .summary-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-radius: 0 8px 8px 8px;
      overflow-x: auto;
    }

    /* ── Summary chart ── */
    .schart-shell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-radius: 0 8px 8px 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .schart-section { display: flex; flex-direction: column; gap: 12px; }
    .schart-header {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .schart-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .series-check {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .series-check:has(input:checked) { border-color: #4a5070; color: var(--text); }
    .series-check input { display: none; }
    .schart-wrap { position: relative; height: 300px; }

    /* ── Roster table ── */
    .roster-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-radius: 0 8px 8px 8px;
      overflow-x: auto;
    }
    .roster-table {
      border-collapse: collapse;
      font-size: 0.82rem;
      min-width: 600px;
      width: 100%;
    }
    .roster-table th {
      background: var(--surface);
      color: var(--muted);
      padding: 8px 12px;
      border: 1px solid var(--border);
      white-space: nowrap;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      position: sticky;
      top: 0;
      z-index: 2;
      cursor: pointer;
      user-select: none;
    }
    .roster-table th:hover { color: var(--text); }
    .roster-table th.sort-asc::after  { content: ' ▲'; font-size: 0.7em; }
    .roster-table th.sort-desc::after { content: ' ▼'; font-size: 0.7em; }
    .roster-table th.col-site { position: sticky; left: 0; z-index: 3; text-align: left; }
    .roster-table td {
      padding: 5px 12px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .roster-table td.col-site {
      font-weight: 700;
      position: sticky;
      left: 0;
      background: var(--surface);
      z-index: 1;
    }
    .roster-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .roster-table tbody tr:hover td { background: var(--surface2) !important; }

    /* ── Roster filters ── */
    .roster-filters {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-bottom: none;
      border-radius: 0 8px 0 0;
    }
    .roster-filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .roster-filter-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 2px;
      white-space: nowrap;
    }
    .roster-pill {
      padding: 4px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      font-family: inherit;
      transition: all 0.15s;
    }
    .roster-pill.active {
      border-color: #4a5070;
      color: var(--text);
      background: var(--surface2);
    }
    .roster-panel {
      border-top: none;
      border-radius: 0 0 8px 8px;
    }
    .summary-table {
      border-collapse: collapse;
      font-size: 0.82rem;
      min-width: 700px;
      width: 100%;
    }
    .summary-table th {
      background: var(--surface);
      color: var(--muted);
      padding: 8px 12px;
      text-align: center;
      border: 1px solid var(--border);
      white-space: nowrap;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .summary-table th.col-site { text-align: left; position: sticky; left: 0; z-index: 3; }
    .summary-table th.col-work { text-align: left; }
    .summary-table th.col-emp  { text-align: left; }
    .summary-table td {
      padding: 5px 12px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .summary-table td.col-site {
      font-weight: 700;
      font-size: 0.85rem;
      vertical-align: top;
      color: var(--text);
      position: sticky;
      left: 0;
      background: var(--surface);
      z-index: 1;
    }
    .summary-table td.col-work {
      font-weight: 600;
      vertical-align: top;
    }
    .summary-table td.col-emp {
      color: var(--muted);
      padding-left: 8px;
    }
    .summary-table td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .summary-table td.total-row {
      font-weight: 700;
      color: var(--text);
    }
    /* Row type colors */
    .summary-table tr.wt-栽培      td:not(.col-site) { background: rgba(52,211,153,0.06); }
    .summary-table tr.wt-出荷      td:not(.col-site) { background: rgba(250,204,21,0.06); }
    .summary-table tr.wt-配送      td:not(.col-site) { background: rgba(248,113,113,0.06); }
    .summary-table tr.wt-拠点      td:not(.col-site) { background: rgba(249,115,22,0.08); }
    .summary-table tr.kind-total   td { font-weight: 700; }
    .summary-table tr.section-sep  td { border-top: 2px solid var(--border); }
    .summary-table tr.site-total   td { background: rgba(255,255,255,0.04); font-weight: 700; border-top: 2px solid var(--border); }
    .summary-table tr.site-total-last td { background: rgba(255,255,255,0.07); font-weight: 800; color: var(--text); }

    @media (max-width: 640px) {
      header, .tabs, main { padding-left: 16px; padding-right: 16px; }
      .chart-wrap { height: 280px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⏱ 勤務時間ダッシュボード</h1>
    <div class="subtitle">整理済み_M ／ 個人別・月別 実質勤務時間 (h)</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="last-updated"></span>
    <button id="refresh-btn" onclick="loadAll()">↻ 更新</button>
  </div>
</header>

<div class="tabs" id="tabs"></div>
<main id="main"></main>

<script>
const SHEET_ID = '1LtYb1feXR6jtIEfxaADLiTEWpPabKJDDlwoS1V-yuG0';
const SHEET_NAME = '整理済み_M';

const SITES = ['いなべ', '群馬', '南丹'];
const SITE_COLORS = {
  'いなべ': '#38bdf8',
  '群馬':   '#a78bfa',
  '南丹':   '#34d399',
};

const EMP_COLORS = [
  '#38bdf8','#a78bfa','#34d399','#f97316','#f43f5e','#facc15',
  '#fb923c','#4ade80','#818cf8','#e879f9','#2dd4bf','#fbbf24',
  '#60a5fa','#c084fc','#86efac','#fca5a5','#67e8f9','#fde68a',
  '#a3e635','#f9a8d4','#7dd3fc','#d8b4fe','#6ee7b7','#fcd34d',
  '#93c5fd','#c4b5fd','#bbf7d0','#fecaca','#99f6e4','#fef08a',
  '#bef264','#fbcfe8','#e0f2fe','#ede9fe','#dcfce7','#fef9c3',
  '#fce7f3',
];

// Map raw 雇用区分 value to summary category
function classifyEmp(emp) {
  if (!emp) return 'パート';
  if (emp.includes('社員') || emp.includes('技能実習')) return '社員・技能実習生';
  return 'パート'; // アルバイト, パート, etc.
}

// Work-type color class
function workTypeClass(wt) {
  if (!wt) return '';
  if (wt.includes('拠点')) return 'wt-拠点';
  if (wt.includes('配送')) return 'wt-配送';
  if (wt.includes('出荷')) return 'wt-出荷';
  if (wt.includes('栽培')) return 'wt-栽培';
  return '';
}

let allData = null; // { months, employees, nameLabel }
let activeBase = null;
let activeMode = null; // 'site' | 'summary'
let chartInstance = null;
let countChartInstance = null;

/* ── Fetch & parse ─────────────────────────────────────────────── */
async function fetchSheet() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&headers=2`;
  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text.replace(/^[^{]+/, '').replace(/[^}]+$/, ''));
}

function parseDuration(cell) {
  if (!cell) return null;
  if (typeof cell.v === 'number') {
    const h = cell.v * 24;
    return h > 0 ? Math.round(h * 10) / 10 : null;
  }
  if (cell.f) {
    const f = String(cell.f).replace(/^-/, '').trim();
    const parts = f.split(':').map(Number);
    if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
      const h = parts[0] > 500
        ? parts[0] / 60 + parts[1] / 3600
        : parts[0] + parts[1] / 60;
      return h > 0 ? Math.round(h * 10) / 10 : null;
    }
  }
  return null;
}

function shimeToMonth(label) {
  const m = label.match(/(\d+)\/\d+締/);
  if (!m) return label;
  let closeMonth = parseInt(m[1]);
  let workMonth = closeMonth - 1;
  let year = 2025;
  if (workMonth <= 0) { workMonth += 12; year = 2024; }
  if (closeMonth <= 6) year = 2026;
  else if (closeMonth <= 12) year = 2025;
  return `${year}年${workMonth}月`;
}

function buildDataset(json) {
  const cols = json.table.cols;
  const rows = json.table.rows || [];

  const jissituCols = [];

  // Step 1: detect monthly 実質勤務時間 columns from labels
  cols.forEach((c, i) => {
    if (!c) return;
    const label = (c.label || '').trim();
    if (label.includes('実質勤務時間')) {
      const shimeMatch = label.match(/(\d+\/\d+締)/);
      const monthLabel = shimeMatch ? shimeToMonth(shimeMatch[1]) : label;
      jissituCols.push({ month: monthLabel, idx: i });
    }
  });

  // Fallback: look for 締め日 pattern in label, use +2 offset for 実質勤務時間
  if (jissituCols.length === 0) {
    cols.forEach((c, i) => {
      if (!c) return;
      const label = (c.label || '').trim();
      if (/\d+\/\d+締/.test(label) && i + 2 < cols.length) {
        jissituCols.push({ month: shimeToMonth(label), idx: i + 2 });
      }
    });
  }

  const firstMonthIdx = jissituCols.length > 0 ? jissituCols[0].idx : cols.length;

  // Step 2: detect static columns by scanning data values
  const VALID_BASES   = new Set(['いなべ', '群馬', '南丹']);
  const VALID_WORKS   = new Set(['栽培', '出荷', '配送', '拠点業務']);
  const EMP_KEYWORDS  = ['社員', 'アルバイト', 'パート', '技能実習', '正社員', '契約社員'];

  // Tally how many rows have each known value type per column
  const baseScore = {}, workScore = {}, empScore = {};
  const sampleRows = rows.slice(0, 30);

  sampleRows.forEach(row => {
    const cells = row.c || [];
    for (let i = 0; i < firstMonthIdx; i++) {
      const v = String(cells[i]?.v ?? '').trim();
      if (!v) continue;
      if (VALID_BASES.has(v))                             baseScore[i] = (baseScore[i] || 0) + 1;
      if (VALID_WORKS.has(v) || ['栽培','出荷','配送'].some(w => v.includes(w)))
                                                          workScore[i] = (workScore[i] || 0) + 1;
      if (EMP_KEYWORDS.some(k => v.includes(k)))         empScore[i]  = (empScore[i]  || 0) + 1;
    }
  });

  function bestIdx(scores, fallback) {
    let best = -1, bestVal = 0;
    Object.entries(scores).forEach(([k, v]) => {
      if (v > bestVal) { bestVal = v; best = parseInt(k); }
    });
    return best === -1 ? fallback : best;
  }

  const baseIdx = bestIdx(baseScore, 3);
  const workIdx = bestIdx(workScore, 4);
  const empIdx  = bestIdx(empScore,  2);

  // 氏名: H列 (index 7) — confirmed by spreadsheet structure
  let nameIdx = 7;
  const col7HasNames = sampleRows.some(row => {
    const v = String(row.c?.[7]?.v ?? '').trim();
    return v.length > 1 && isNaN(Number(v)) && !VALID_BASES.has(v);
  });
  if (!col7HasNames) {
    nameIdx = -1;
    for (let i = 0; i < firstMonthIdx; i++) {
      if (i === baseIdx || i === workIdx || i === empIdx) continue;
      const hasNames = sampleRows.some(row => {
        const v = String(row.c?.[i]?.v ?? '').trim();
        return v.length > 1 && isNaN(Number(v)) && !VALID_BASES.has(v) &&
               !VALID_WORKS.has(v) && !EMP_KEYWORDS.some(k => v.includes(k));
      });
      if (hasNames) { nameIdx = i; break; }
    }
    if (nameIdx === -1) nameIdx = 7;
  }

  // Deduplicate months
  const monthCounts = {};
  const months = jissituCols.map(({ month }) => {
    monthCounts[month] = (monthCounts[month] || 0) + 1;
    if (monthCounts[month] > 1) return inferNextMonth(month, monthCounts[month]);
    return month;
  });

  const employees = [];

  rows.forEach(row => {
    const cells = row.c || [];
    const base = String(cells[baseIdx]?.v ?? '').trim();
    if (!VALID_BASES.has(base)) return;

    const name = String(cells[nameIdx]?.v ?? cells[nameIdx]?.f ?? '').trim();
    if (!name) return;

    const employment = String(cells[empIdx]?.v ?? '').trim();
    const workType   = String(cells[workIdx]?.v ?? '').trim();
    const empClass   = classifyEmp(employment);

    const hours = jissituCols.map(({ idx }) => parseDuration(cells[idx]));
    if (hours.every(h => h === null)) return;

    employees.push({ name, base, workType, employment, empClass, hours });
  });

  const nameLabel = (cols[nameIdx]?.label || '').trim() || '氏名';
  return { months, employees, nameLabel };
}

function inferNextMonth(base, occurrence) {
  const m = base.match(/^(\d+)年(\d+)月$/);
  if (!m) return `${base}(${occurrence})`;
  let year = parseInt(m[1]);
  let month = parseInt(m[2]) + (occurrence - 1);
  while (month > 12) { month -= 12; year++; }
  return `${year}年${month}月`;
}

/* ── Tabs ──────────────────────────────────────────────────────── */
function renderTabs(bases) {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';

  bases.forEach((base, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = base;
    btn.dataset.base = base;
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeBase = base;
      activeMode = 'site';
      document.getElementById('main').innerHTML = '';
      renderBasePanel();
    };
    tabsEl.appendChild(btn);
  });

  // Summary tab
  const sBtn = document.createElement('button');
  sBtn.className = 'tab-btn summary-tab';

/* ── Individual base panel ─────────────────────────────────────── */
function renderBasePanel() {
  const main = document.getElementById('main');
  const { months, employees } = allData;
  const baseEmps = employees.filter(e => e.base === activeBase && e.workType);
  const baseColor = SITE_COLORS[activeBase] || '#38bdf8';

  if (!document.getElementById('site-panel')) {
    main.innerHTML = `
      <div class="site-panel" id="site-panel">
        <div class="kpi-row" id="kpi-row"></div>
        <div class="controls">
          <div class="control-group">
            <div class="control-label">雇用区分フィルター</div>
            <div class="select-btns">
              <button class="select-btn" onclick="toggleAll(true)">全選択</button>
              <button class="select-btn" onclick="toggleAll(false)">全解除</button>
            </div>
            <div class="emp-filter" id="emp-filter"></div>
          </div>
        </div>
        <div class="chart-section-label">勤務時間グラフ</div>
        <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
        <div class="chart-section-label">人数グラフ（栽培 / 出荷 / 配送 ／ 社員 / パート / 技能実習生）</div>
        <div class="chart-wrap" style="height:260px"><canvas id="count-chart"></canvas></div>
      </div>`;
  }

  const kpiRow = document.getElementById('kpi-row');
  const validHours = baseEmps.flatMap(e => e.hours.filter(h => h !== null));
  const avgPerMonth = months.map((_, mi) => {
    const vals = baseEmps.map(e => e.hours[mi]).filter(h => h !== null);
    return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  }).filter(v => v !== null);
  const grandAvg = avgPerMonth.length ? avgPerMonth.reduce((a,b)=>a+b,0)/avgPerMonth.length : 0;
  const maxHours = validHours.length ? Math.max(...validHours) : 0;

  kpiRow.innerHTML = `
    <div class="kpi">
      <div class="kpi-label">従業員数</div>
      <div class="kpi-value" style="color:${baseColor}">${baseEmps.length} 名</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">月平均勤務時間（拠点平均）</div>
      <div class="kpi-value">${grandAvg.toFixed(1)} h</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">個人月間最大</div>
      <div class="kpi-value">${maxHours.toFixed(1)} h</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">集計月数</div>
      <div class="kpi-value">${months.length} ヶ月</div>
    </div>`;

  const empFilter = document.getElementById('emp-filter');
  empFilter.innerHTML = '';
  const empTypes = [...new Set(baseEmps.map(e => e.employment || '（未分類）'))].sort();
  empTypes.forEach((type, i) => {
    const color = EMP_COLORS[i % EMP_COLORS.length];
    const id = `emptype-${activeBase}-${i}`;
    const count = baseEmps.filter(e => (e.employment || '（未分類）') === type).length;
    const label = document.createElement('label');
    label.className = 'emp-checkbox';
    label.innerHTML = `
      <input type="checkbox" id="${id}" data-type="${type}" checked onchange="updateChart()">
      <span class="color-dot" style="background:${color}"></span>
      <span>${type} <span style="color:var(--muted);font-size:0.78rem">(${count}名)</span></span>`;
    empFilter.appendChild(label);
  });

  buildChart();
  buildCountChart();
}

function getSelectedEmployees() {
  const baseEmps = allData.employees.filter(e => e.base === activeBase && e.workType);
  const selectedTypes = new Set(
    [...document.querySelectorAll(`[id^="emptype-${activeBase}-"]`)]
      .filter(cb => cb.checked)
      .map(cb => cb.dataset.type)
  );
  return baseEmps.filter(e => selectedTypes.has(e.employment || '（未分類）'));
}

function buildChart() {
  const { months } = allData;
  const baseEmps = allData.employees.filter(e => e.base === activeBase && e.workType);
  const selected = getSelectedEmployees();

  const empTypes = [...new Set(baseEmps.map(e => e.employment || '（未分類）'))].sort();
  const typeColorIdx = {};
  empTypes.forEach((t, i) => { typeColorIdx[t] = i; });

  const datasets = selected.map(emp => {
    const typeIdx = typeColorIdx[emp.employment || '（未分類）'] ?? 0;
    const color = EMP_COLORS[typeIdx % EMP_COLORS.length];
    return {
      label: `${emp.name}（${emp.employment || '未分類'}）`,
      data: emp.hours,
      borderColor: color,
      backgroundColor: color + '22',
      borderWidth: 1.8,
      pointRadius: 3,
      pointHoverRadius: 5,
      tension: 0.3,
      spanGaps: true,
    };
  });

  const avgData = months.map((_, mi) => {
    const vals = baseEmps.map(e => e.hours[mi]).filter(h => h !== null);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length * 10)/10 : null;
  });
  datasets.push({
    label: '拠点平均',
    data: avgData,
    borderColor: '#f97316',
    backgroundColor: 'transparent',
    borderWidth: 2.5,
    borderDash: [6, 4],
    pointRadius: 0,
    tension: 0.3,
    spanGaps: true,
    order: -1,
  });

  const ctx = document.getElementById('main-chart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels: months, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: datasets.length <= 10,
          labels: { color: '#8892a4', font: { size: 11 }, boxWidth: 12, padding: 10 },
        },
        tooltip: {
          backgroundColor: '#1e2235',
          borderColor: '#3a3f5c',
          borderWidth: 1,
          titleColor: '#e2e8f0',
          bodyColor: '#a0aec0',
          callbacks: {
            label: ctx => {
              if (ctx.parsed.y === null) return null;
              return `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)} h`;
            },
          },
        },
      },
      scales: {
        x: {
          ticks: { color: '#8892a4', font: { size: 11 }, maxRotation: 45 },
          grid: { color: '#1e2235' },
        },
        y: {
          ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
          grid: { color: '#1e2235' },
          suggestedMin: 0,
          title: { display: true, text: '実質勤務時間 (h)', color: '#8892a4', font: { size: 11 } },
        },
      },
    },
  });
}

function updateChart() { buildChart(); }

function buildCountChart() {
  const { months } = allData;
  const baseEmps = allData.employees.filter(e => e.base === activeBase && e.workType);

  const WT_SERIES = [
    { label: '栽培', key: '栽培', color: '#34d399' },
    { label: '出荷', key: '出荷', color: '#facc15' },
    { label: '配送', key: '配送', color: '#f87171' },
  ];
  const ET_SERIES = [
    { label: '社員',       match: e => (e.employment||'').includes('社員') && !(e.employment||'').includes('技能'), color: '#60a5fa' },
    { label: 'パート',     match: e => ['パート','アルバイト'].some(k => (e.employment||'').includes(k)),          color: '#fb923c' },
    { label: '技能実習生', match: e => (e.employment||'').includes('技能実習'),                                    color: '#c084fc' },
  ];

  const datasets = [];

  WT_SERIES.forEach(wt => {
    const data = months.map((_, mi) =>
      baseEmps.filter(e => e.workType.includes(wt.key) && e.hours[mi] !== null).length || null
    );
    datasets.push({
      label: wt.label,
      data,
      borderColor: wt.color,
      backgroundColor: wt.color + '33',
      borderWidth: 2,
      pointRadius: 3,
      pointHoverRadius: 5,
      tension: 0.3,
      spanGaps: true,
    });
  });

  ET_SERIES.forEach(et => {
    const data = months.map((_, mi) =>
      baseEmps.filter(e => et.match(e) && e.hours[mi] !== null).length || null
    );
    datasets.push({
      label: et.label,
      data,
      borderColor: et.color,
      backgroundColor: 'transparent',
      borderWidth: 2,
      borderDash: [6, 3],
      pointRadius: 3,
      pointHoverRadius: 5,
      tension: 0.3,
      spanGaps: true,
    });
  });

  const ctx = document.getElementById('count-chart')?.getContext('2d');
  if (!ctx) return;
  if (countChartInstance) countChartInstance.destroy();

  countChartInstance = new Chart(ctx, {
    type: 'line',
    data: { labels: months, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          labels: { color: '#8892a4', font: { size: 11 }, boxWidth: 12, padding: 10 },
        },
        tooltip: {
          backgroundColor: '#1e2235',
          borderColor: '#3a3f5c',
          borderWidth: 1,
          titleColor: '#e2e8f0',
          bodyColor: '#a0aec0',
          callbacks: {
            label: ctx => ctx.parsed.y !== null ? `${ctx.dataset.label}: ${ctx.parsed.y} 名` : null,
          },
        },
      },
      scales: {
        x: {
          ticks: { color: '#8892a4', font: { size: 11 }, maxRotation: 45 },
          grid: { color: '#1e2235' },
        },
        y: {
          ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} 名`, stepSize: 1 },
          grid: { color: '#1e2235' },
          suggestedMin: 0,
          title: { display: true, text: '人数 (名)', color: '#8892a4', font: { size: 11 } },
        },
      },
    },
  });
}

function toggleAll(checked) {
  document.querySelectorAll(`[id^="emptype-${activeBase}-"]`).forEach(cb => { cb.checked = checked; });
  updateChart();
}

/* ── Summary helpers ───────────────────────────────────────────── */
function fmtH(h) {
  if (h === null || h === undefined || isNaN(h)) return '—';
  return h.toFixed(1) + ' h';
}

const SUMMARY_COLORS = [
  '#34d399','#6ee7b7',  // 栽培
  '#facc15','#fde68a',  // 出荷
  '#f87171','#fca5a5',  // 配送
  '#fb923c','#fed7aa',  // 拠点業務
  '#60a5fa','#93c5fd',  // その他
  '#c084fc','#e879f9',
];
const TOTAL_COLOR = '#e2e8f0';

function getOrderedWorkTypes(employees) {
  const order = [];
  employees.forEach(e => { if (e.workType && !order.includes(e.workType)) order.push(e.workType); });
  return [...order.filter(wt => !wt.includes('拠点')), ...order.filter(wt => wt.includes('拠点'))];
}

let summaryChartInstances = {};

function destroySummaryCharts() {
  Object.values(summaryChartInstances).forEach(c => c.destroy());
  summaryChartInstances = {};
}

/* ── Summary shell (sub-tabs) ──────────────────────────────────── */
function renderSummary() {
  destroySummaryCharts();
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="summary-shell">
      <div class="summary-subtabs" id="summary-subtabs">
        <button class="summary-subtab active" data-tab="table">📋 業務区分別</button>
        <button class="summary-subtab" data-tab="emptype">👥 雇用形態別</button>

        <button class="summary-subtab" data-tab="roster">👤 名簿</button>
      </div>
      <div id="summary-content"></div>
    </div>`;

  document.querySelectorAll('.summary-subtab').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.summary-subtab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      destroySummaryCharts();
      const tab = btn.dataset.tab;
      if (tab === 'table')       renderSummaryTable();
      else if (tab === 'emptype') renderSummaryByEmpType();
      else if (tab === 'chart')  renderSummaryChart();

}

/* ── Summary: 業務区分別タブ ───────────────────────────────────── */
function renderSummaryTable() {
  const { months, employees } = allData;
  const content = document.getElementById('summary-content');
  const orderedWorkTypes = getOrderedWorkTypes(employees);
  const EMP_CLASSES = ['社員・技能実習生', 'パート'];

  let html = `<div class="summary-panel"><table class="summary-table">
    <thead><tr>
      <th class="col-site">拠点</th>
      <th class="col-work">業務区分</th>
      <th class="col-emp">区分</th>
      ${months.map(m => `<th>${m}</th>`).join('')}
    </tr></thead><tbody>`;

  SITES.forEach(site => {
    const siteEmps = employees.filter(e => e.base === site && e.workType);
    if (!siteEmps.length) return;

    const siteWorkTypes = orderedWorkTypes.filter(wt => siteEmps.some(e => e.workType === wt));
    const totalRows = siteWorkTypes.length * 9;
    let siteRowSpan = totalRows + 6;
    let firstRow = true;

    siteWorkTypes.forEach((wt, wtIdx) => {
      const wtEmps = siteEmps.filter(e => e.workType === wt);
      const wtClass = workTypeClass(wt);
      const isSep = wtIdx > 0;

      const kinds = [
        { label: '計／時間', sub: EMP_CLASSES.map(ec => ({
            label: ec,
            vals: months.map((_, mi) => {
              const vals = wtEmps.filter(e => e.empClass === ec).map(e => e.hours[mi]).filter(h => h !== null);
              return vals.length ? vals.reduce((a,b)=>a+b,0) : null;
            }),
          })),
          total: months.map((_, mi) => {
            const vals = wtEmps.map(e => e.hours[mi]).filter(h => h !== null);
            return vals.length ? vals.reduce((a,b)=>a+b,0) : null;
          }),
        },
        { label: '計／人数', sub: EMP_CLASSES.map(ec => ({
            label: ec,
            vals: months.map((_, mi) => {
              const n = wtEmps.filter(e => e.empClass === ec && e.hours[mi] !== null).length;
              return n || null;
            }),
          })),
          total: months.map((_, mi) => {
            const n = wtEmps.filter(e => e.hours[mi] !== null).length;
            return n || null;
          }),
          isCount: true,
        },
        { label: '計／平均', sub: EMP_CLASSES.map(ec => ({
            label: ec,
            vals: months.map((_, mi) => {
              const vals = wtEmps.filter(e => e.empClass === ec).map(e => e.hours[mi]).filter(h => h !== null);
              return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
            }),
          })),
          total: months.map((_, mi) => {
            const vals = wtEmps.map(e => e.hours[mi]).filter(h => h !== null);
            return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
          }),
        },
      ];

      let wtFirstRow = true;
      const wtRowCount = 9;

      kinds.forEach(kind => {
        kind.sub.forEach(sub => {
          html += `<tr class="${wtClass}${isSep && wtFirstRow ? ' section-sep' : ''}">`;
          if (firstRow) {
            html += `<td class="col-site" rowspan="${siteRowSpan}" style="color:${SITE_COLORS[site]||'#fff'}">${site}</td>`;
            firstRow = false;
          }
          if (wtFirstRow) {
            html += `<td class="col-work" rowspan="${wtRowCount}">${wt}</td>`;
            wtFirstRow = false;
          }
          html += `<td class="col-emp">${sub.label}</td>`;
          sub.vals.forEach(v => {
            html += `<td class="num">${kind.isCount ? (v !== null ? v + ' 名' : '—') : fmtH(v)}</td>`;
          });
          html += '</tr>';
        });
        html += `<tr class="${wtClass} kind-total">`;
        html += `<td class="col-emp total-row">${kind.label}</td>`;
        kind.total.forEach(v => {
          html += `<td class="num total-row">${kind.isCount ? (v !== null ? v + ' 名' : '—') : fmtH(v)}</td>`;
        });
        html += '</tr>';
      });
    });

    const EMP_CLASSES_INNER = ['社員・技能実習生', 'パート'];
    EMP_CLASSES_INNER.forEach((ec, ecIdx) => {
      const vals = months.map((_, mi) =>
        siteEmps.filter(e => e.empClass === ec).map(e => e.hours[mi]).filter(h => h !== null)
          .reduce((a, b) => a + b, 0) || null
      );
      html += `<tr class="site-total">`;
      if (ecIdx === 0) html += `<td class="col-work" rowspan="6" style="font-weight:800;color:var(--text);vertical-align:top;border-top:2px solid var(--border)">合計</td>`;
      html += `<td class="col-emp">${ec}（時間）</td>`;
      vals.forEach(v => { html += `<td class="num">${fmtH(v)}</td>`; });
      html += '</tr>';
    });
    const grandHourVals = months.map((_, mi) =>
      siteEmps.map(e => e.hours[mi]).filter(h => h !== null).reduce((a, b) => a + b, 0) || null
    );
    html += `<tr class="site-total-last"><td class="col-emp">計／時間</td>`;
    grandHourVals.forEach(v => { html += `<td class="num">${fmtH(v)}</td>`; });
    html += '</tr>';

    EMP_CLASSES_INNER.forEach(ec => {
      const vals = months.map((_, mi) =>
        siteEmps.filter(e => e.empClass === ec && e.hours[mi] !== null).length || null
      );
      html += `<tr class="site-total"><td class="col-emp">${ec}（人数）</td>`;
      vals.forEach(v => { html += `<td class="num">${v !== null ? v + ' 名' : '—'}</td>`; });
      html += '</tr>';
    });
    const grandCountVals = months.map((_, mi) =>
      siteEmps.filter(e => e.hours[mi] !== null).length || null
    );
    html += `<tr class="site-total-last"><td class="col-emp">計／人数</td>`;
    grandCountVals.forEach(v => { html += `<td class="num">${v !== null ? v + ' 名' : '—'}</td>`; });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  content.innerHTML = html;
}

/* ── Summary: 雇用形態別タブ ───────────────────────────────────── */
function renderSummaryByEmpType() {
  const { months, employees } = allData;
  const content = document.getElementById('summary-content');

  function detailEmp(emp) {
    if (!emp) return 'パート';
    if (emp.includes('技能実習')) return '技能実習生';
    if (emp.includes('社員'))    return '社員';
    return 'パート';
  }

  const EMP_TYPES = ['社員', '技能実習生', 'パート'];
  const EMP_COLORS_MAP = { '社員': '#60a5fa', '技能実習生': '#c084fc', 'パート': '#fb923c' };
  const SITE_ROW_SPAN = EMP_TYPES.length * 2 + 2;

  let html = `<div class="summary-panel"><table class="summary-table">
    <thead><tr>
      <th class="col-site">拠点</th>
      <th class="col-work">雇用形態</th>
      <th class="col-emp">区分</th>
      ${months.map(m => `<th>${m}</th>`).join('')}
    </tr></thead><tbody>`;

  SITES.forEach(site => {
    const siteEmps = employees.filter(e => e.base === site && e.workType);
    if (!siteEmps.length) return;

    let firstRow = true;

    EMP_TYPES.forEach((et, etIdx) => {
      const etEmps = siteEmps.filter(e => detailEmp(e.employment) === et);
      const color = EMP_COLORS_MAP[et];
      const isSep = etIdx > 0;

      const hourVals = months.map((_, mi) => {
        const vals = etEmps.map(e => e.hours[mi]).filter(h => h !== null);
        return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
      });
      html += `<tr${isSep ? ' class="section-sep"' : ''}>`;
      if (firstRow) {
        html += `<td class="col-site" rowspan="${SITE_ROW_SPAN}" style="color:${SITE_COLORS[site]||'#fff'}">${site}</td>`;
        firstRow = false;
      }
      html += `<td class="col-work" rowspan="2" style="color:${color}">${et}</td>`;
      html += `<td class="col-emp">時間</td>`;
      hourVals.forEach(v => { html += `<td class="num">${fmtH(v)}</td>`; });
      html += '</tr>';

      const countVals = months.map((_, mi) => {
        const n = etEmps.filter(e => e.hours[mi] !== null).length;
        return n || null;
      });
      html += '<tr>';
      html += `<td class="col-emp">人数</td>`;
      countVals.forEach(v => { html += `<td class="num">${v !== null ? v + ' 名' : '—'}</td>`; });
      html += '</tr>';
    });

    const totalHours = months.map((_, mi) => {
      const vals = siteEmps.map(e => e.hours[mi]).filter(h => h !== null);
      return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
    });
    html += '<tr class="site-total-last"><td class="col-emp" colspan="2" style="font-weight:800">合計／時間</td>';
    totalHours.forEach(v => { html += `<td class="num">${fmtH(v)}</td>`; });
    html += '</tr>';

    const totalCount = months.map((_, mi) => siteEmps.filter(e => e.hours[mi] !== null).length || null);
    html += '<tr class="site-total-last"><td class="col-emp" colspan="2" style="font-weight:800">合計／人数</td>';
    totalCount.forEach(v => { html += `<td class="num">${v !== null ? v + ' 名' : '—'}</td>`; });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  content.innerHTML = html;
}

/* ── Summary: グラフタブ ───────────────────────────────────────── */
function buildSiteSeriesList(site) {
  const { employees, months } = allData;
  const orderedWorkTypes = getOrderedWorkTypes(employees);
  const EMP_CLASSES = ['社員・技能実習生', 'パート'];
  const siteEmps = employees.filter(e => e.base === site);
  const siteWTs = orderedWorkTypes.filter(wt => siteEmps.some(e => e.workType === wt));

  const series = [];
  let colorIdx = 0;
  siteWTs.forEach(wt => {
    EMP_CLASSES.forEach(ec => {
      const emps = siteEmps.filter(e => e.workType === wt && e.empClass === ec);
      if (!emps.length) return;
      const data = months.map((_, mi) => {
        const vals = emps.map(e => e.hours[mi]).filter(h => h !== null);
        return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0) * 10) / 10 : null;
      });
      series.push({
        label: `${wt} / ${ec}`,
        data,
        color: SUMMARY_COLORS[colorIdx++ % SUMMARY_COLORS.length],
        isTotal: false,
      });
    });
  });

  // 拠点合計
  const totalData = months.map((_, mi) => {
    const vals = siteEmps.map(e => e.hours[mi]).filter(h => h !== null);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0) * 10) / 10 : null;
  });
  series.push({ label: '拠点合計（時間）', data: totalData, color: TOTAL_COLOR, isTotal: true });

  return series;
}

function renderSummaryChart() {
  const content = document.getElementById('summary-content');
  const activeSites = SITES.filter(s => allData.employees.some(e => e.base === s));

  let html = '<div class="schart-shell">';
  activeSites.forEach(site => {
    const siteId = 'sc_' + site;
    const series = buildSiteSeriesList(site);
    html += `
      <div class="schart-section">
        <div class="schart-header" style="color:${SITE_COLORS[site]}">${site}</div>
        <div class="schart-controls" id="ctrl-${siteId}">
          ${series.map((s, i) => `
            <label class="series-check">
              <input type="checkbox" data-site="${siteId}" data-idx="${i}" checked
                     onchange="updateSummaryChart('${siteId}')">
              <span class="color-dot" style="background:${s.color}"></span>
              ${s.label}
            </label>`).join('')}
        </div>
        <div class="schart-wrap"><canvas id="${siteId}"></canvas></div>
      </div>`;
  });
  html += '</div>';
  content.innerHTML = html;

  activeSites.forEach(site => {
    const siteId = 'sc_' + site;
    const series = buildSiteSeriesList(site);
    const ctx = document.getElementById(siteId).getContext('2d');
    const datasets = series.map(s => ({
      label: s.label,
      data: s.data,
      borderColor: s.color,
      backgroundColor: s.color + '22',
      borderWidth: s.isTotal ? 2.5 : 1.8,
      borderDash: s.isTotal ? [6, 4] : [],
      pointRadius: s.isTotal ? 0 : 3,
      pointHoverRadius: 5,
      tension: 0.3,
      spanGaps: true,
      order: s.isTotal ? -1 : 0,
    }));
    summaryChartInstances[siteId] = new Chart(ctx, {
      type: 'line',
      data: { labels: allData.months, datasets },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1e2235',
            borderColor: '#3a3f5c',
            borderWidth: 1,
            titleColor: '#e2e8f0',
            bodyColor: '#a0aec0',
            callbacks: {
              label: ctx => ctx.parsed.y !== null
                ? `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)} h` : null,
            },
          },
        },
        scales: {
          x: {
            ticks: { color: '#8892a4', font: { size: 11 }, maxRotation: 45 },
            grid: { color: '#1e2235' },
          },
          y: {
            ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v} h` },
            grid: { color: '#1e2235' },
            suggestedMin: 0,
            title: { display: true, text: '実質勤務時間 (h)', color: '#8892a4', font: { size: 11 } },
          },
        },
      },
    });
  });
}

function updateSummaryChart(siteId) {
  const chart = summaryChartInstances[siteId];
  if (!chart) return;
  document.querySelectorAll(`[data-site="${siteId}"]`).forEach((cb, i) => {
    chart.data.datasets[i].hidden = !cb.checked;
  });
  chart.update();
}

/* ── Summary: 名簿タブ ─────────────────────────────────────────── */
let rosterSortCol = 'site';
let rosterSortAsc = true;
let rosterFilterSites = new Set(SITES);
let rosterFilterEmps  = null; // null = all; initialised on first render

function renderSummaryRoster() {
  const { months, employees, nameLabel } = allData;
  const content = document.getElementById('summary-content');

  const SITE_ORDER = { 'いなべ': 0, '群馬': 1, '南丹': 2 };
  const orderedWorkTypes = getOrderedWorkTypes(employees);

  // Unique employment values from data (preserve order of appearance)
  const allEmpTypes = [];
  employees.forEach(e => {
    const v = e.employment || '（未分類）';
    if (!allEmpTypes.includes(v)) allEmpTypes.push(v);
  });
  if (rosterFilterEmps === null) rosterFilterEmps = new Set(allEmpTypes);

  function filteredEmployees() {
    return employees.filter(e =>
      e.workType &&
      rosterFilterSites.has(e.base) &&
      rosterFilterEmps.has(e.employment || '（未分類）')
    );
  }

  function rosterSorted(col) {
    const copy = [...filteredEmployees()];
    copy.sort((a, b) => {
      let va, vb;
      if (col === 'site') {
        va = (SITE_ORDER[a.base] ?? 99) * 1000 + orderedWorkTypes.indexOf(a.workType) * 10;
        vb = (SITE_ORDER[b.base] ?? 99) * 1000 + orderedWorkTypes.indexOf(b.workType) * 10;
      } else if (col === 'work') { va = a.workType; vb = b.workType; }
      else if (col === 'emp')    { va = a.employment; vb = b.employment; }
      else if (col === 'name')   { va = a.name; vb = b.name; }
      if (typeof va === 'string') return rosterSortAsc ? va.localeCompare(vb,'ja') : vb.localeCompare(va,'ja');
      return rosterSortAsc ? va - vb : vb - va;
    });
    return copy;
  }

  function pillBtn(label, active, onclick) {
    return `<button class="roster-pill${active ? ' active' : ''}" onclick="${onclick}">${label}</button>`;
  }

  function buildContent() {
    const sorted = rosterSorted(rosterSortCol);
    const recentMonths = allData.months.slice(-3);
    const recentIdxs = recentMonths.map(m => allData.months.indexOf(m));

    const activeSites = SITES.filter(s => employees.some(e => e.base === s));

    // Filter bar
    let filterHtml = `<div class="roster-filters">
      <div class="roster-filter-group">
        <span class="roster-filter-label">拠点</span>`;
    activeSites.forEach(s => {
      const active = rosterFilterSites.has(s);
      filterHtml += pillBtn(s, active, `rosterToggleSite('${s}')`);
    });
    filterHtml += `</div><div class="roster-filter-group"><span class="roster-filter-label">雇用区分</span>`;
    allEmpTypes.forEach(et => {
      const active = rosterFilterEmps.has(et);
      filterHtml += pillBtn(et, active, `rosterToggleEmp('${et}')`);
    });
    filterHtml += `</div></div>`;

    const tableCols = [
      { key: 'site', label: '拠点' },
      { key: 'work', label: '業務区分' },
      { key: 'emp',  label: '雇用区分' },
      { key: 'name', label: nameLabel || '氏名' },
    ];

    let tableHtml = `<div class="roster-panel"><table class="roster-table"><thead><tr>`;
    tableCols.forEach(c => {
      const cls = c.key === 'site' ? ' col-site' : '';
      const sortCls = rosterSortCol === c.key ? (rosterSortAsc ? ' sort-asc' : ' sort-desc') : '';
      tableHtml += `<th class="${cls}${sortCls}" onclick="rosterSort('${c.key}')">${c.label}</th>`;
    });
    recentMonths.forEach(m => { tableHtml += `<th>${m}</th>`; });
    tableHtml += '</tr></thead><tbody>';

    if (sorted.length === 0) {
      tableHtml += `<tr><td colspan="${tableCols.length + recentMonths.length}" style="text-align:center;color:var(--muted);padding:24px">該当する従業員がいません</td></tr>`;
    } else {
      sorted.forEach(e => {
        tableHtml += `<tr>
          <td class="col-site" style="color:${SITE_COLORS[e.base]||'#fff'}">${e.base}</td>
          <td>${e.workType || '—'}</td>
          <td>${e.employment || '—'}</td>
          <td>${e.name}</td>`;
        recentIdxs.forEach(mi => {
          const h = e.hours[mi];
          tableHtml += `<td class="num">${h !== null ? h.toFixed(1) + ' h' : '—'}</td>`;
        });
        tableHtml += '</tr>';
      });
    }
    tableHtml += `</tbody></table></div>`;

    return filterHtml + tableHtml;
  }

  content.innerHTML = buildContent();

  window.rosterSort = function(col) {
    if (rosterSortCol === col) rosterSortAsc = !rosterSortAsc;
    else { rosterSortCol = col; rosterSortAsc = true; }
    content.innerHTML = buildContent();
  };
  window.rosterToggleSite = function(site) {
    if (rosterFilterSites.has(site)) rosterFilterSites.delete(site);
    else rosterFilterSites.add(site);
    content.innerHTML = buildContent();
  };
  window.rosterToggleEmp = function(et) {
    if (rosterFilterEmps.has(et)) rosterFilterEmps.delete(et);
    else rosterFilterEmps.add(et);
    content.innerHTML = buildContent();
  };
}

/* ── Main ────────────────────────────────────────────────────────── */
async function loadAll() {
  document.getElementById('main').innerHTML = '<div class="loading">データを読み込み中...</div>';
  document.getElementById('tabs').innerHTML = '';
  document.getElementById('last-updated').textContent = '';
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  if (countChartInstance) { countChartInstance.destroy(); countChartInstance = null; }

  try {
    const json = await fetchSheet();
    allData = buildDataset(json);

    const bases = SITES.filter(s => allData.employees.some(e => e.base === s));
    if (bases.length === 0) throw new Error('拠点データが見つかりません');

    activeBase = bases[0];
    activeMode = 'site';
    renderTabs(bases);
    document.getElementById('main').innerHTML = '';
    renderBasePanel();

    document.getElementById('last-updated').textContent =
      `最終更新: ${new Date().toLocaleString('ja-JP')}`;
  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="error-msg">データ取得エラー: ${e.message}</div>`;
    console.error(e);
  }
}

loadAll();
