<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>勤務時間ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #1e2235;
      --border: #2e3148;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent-inabe: #38bdf8;
      --accent-gunma: #a78bfa;
      --accent-nandan: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      flex-shrink: 0;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.04em; }
    header .subtitle { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
    #last-updated { font-size: 0.8rem; color: var(--muted); }
    #refresh-btn {
      background: var(--border);
      border: none;
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    #refresh-btn:hover { background: #3a3f5c; }

    /* Tabs */
    .tabs-group {
      flex-shrink: 0;
      display: flex;
      gap: 4px;
      padding: 16px 32px 0;
      flex-wrap: wrap;
    }
    .group-btn {
      padding: 7px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: 8px 8px 0 0;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .group-btn.active {
      background: #252c48;
      color: var(--text);
      border-color: var(--accent-inabe);
      border-bottom: 2px solid #252c48;
      margin-bottom: -1px;
    }
    .group-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
    .tabs-group-bar {
      border-bottom: 1px solid var(--accent-inabe);
      margin: 0 32px;
    }
    .tabs {
      flex-shrink: 0;
      display: flex;
      gap: 4px;
      padding: 4px 32px 0;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 8px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      font-size: 0.85rem;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active {
      background: var(--surface2);
      color: var(--text);
      border-bottom: 2px solid var(--surface2);
      margin-bottom: -1px;
    }
    .tab-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }

    /* Transfer mode toggle */
    .transfer-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .transfer-toggle-btn {
      flex: 1;
      white-space: nowrap;
      padding: 7px 14px;
      background: var(--surface);
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      text-align: center;
      transition: all 0.15s;
    }
    .transfer-toggle-btn + .transfer-toggle-btn { border-left: 1px solid var(--border); }
    .transfer-toggle-btn.active { background: var(--accent-inabe); color: #06202e; font-weight: 700; }
    .transfer-toggle-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }

    /* Transfer alerts */
    #transfer-alerts { flex-shrink: 0; }
    #summary-transfer-alerts { flex-shrink: 0; }
    #summary-transfer-alerts .transfer-alert-box { margin: 12px 0; }
    .transfer-alert-box {
      margin: 16px 32px 0;
      background: rgba(250,204,21,0.08);
      border: 1px solid rgba(250,204,21,0.35);
      border-radius: 8px;
      padding: 12px 16px;
    }
    .transfer-alert-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #facc15;
      margin-bottom: 6px;
      cursor: pointer;
      user-select: none;
    }
    .transfer-alert-toggle-icon { flex-shrink: 0; width: 12px; font-size: 0.7rem; text-align: center; }
    .transfer-alert-box ul { margin: 0; padding-left: 20px; }
    .transfer-alert-box li { font-size: 0.8rem; color: var(--text); line-height: 1.6; }

    main {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 0 32px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Site panel */
    .site-panel {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-radius: 0 8px 8px 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* KPI row */
    .kpi-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }
    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 140px;
    }
    .kpi-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .kpi-value { font-size: 1.3rem; font-weight: 700; }

    /* Controls */
    .select-btn {
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      transition: all 0.15s;
    }
    .select-btn:hover { border-color: #4a5070; color: var(--text); }

    /* Period filter (ヘッダー固定エリアのグローバル集計期間フィルターで使用) */
    .header-period-filter {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
    }
    .header-period-filter-col { display: flex; flex-direction: column; gap: 2px; }
    .header-period-filter-label {
      font-size: 0.62rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .header-period-filter select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.78rem;
      font-family: inherit;
      padding: 3px 6px;
      cursor: pointer;
    }
    .header-period-filter-sep { color: var(--muted); font-size: 0.8rem; margin-top: 13px; }

    /* Employee filter (ヘッダー固定エリアのグローバル雇用区分フィルターで使用) */
    .header-emp-filter {
      display: flex;
      align-items: stretch;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
    }
    .header-emp-filter-btns {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }
    .header-emp-filter-btns .select-btn { padding: 3px 10px; font-size: 0.7rem; }
    .header-emp-filter-checks {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1px;
      border-left: 1px solid var(--border);
      padding-left: 10px;
    }
    .header-emp-filter-checks .emp-checkbox { padding: 1px 2px; font-size: 0.78rem; }
    .emp-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 4px;
      cursor: pointer;
      border-radius: 4px;
      font-size: 0.85rem;
      transition: background 0.1s;
    }
    .emp-checkbox:hover { background: var(--surface2); }
    .emp-checkbox input { cursor: pointer; accent-color: var(--accent-inabe); }
    .color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Chart section label */
    .chart-section-label {
      flex-shrink: 0;
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding-top: 4px;
    }

    /* Chart */
    .chart-wrap {
      position: relative;
      height: 380px;
    }

    /* Loading / error */
    .loading, .error-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 300px;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .error-msg { color: #f87171; }

    /* ── Summary shell & sub-tabs ── */
    .summary-shell {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .summary-subtabs {
      flex-shrink: 0;
      display: flex;
      gap: 4px;
    }
    #summary-content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .summary-subtab {
      padding: 8px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      font-size: 0.85rem;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .summary-subtab.active {
      background: var(--surface2);
      color: var(--text);
      border-bottom: 2px solid var(--surface2);
      margin-bottom: -1px;
    }
    .summary-subtab:hover:not(.active) { background: var(--surface2); color: var(--text); }

    /* ── Summary table ── */
    .summary-panel {
      flex: 1;
      min-height: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-radius: 0 8px 8px 8px;
      overflow: auto;
    }

    /* ── Summary chart ── */
    .schart-shell {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-radius: 0 8px 8px 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .schart-section { display: flex; flex-direction: column; gap: 12px; }
    .schart-header {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .schart-controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .series-check {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.78rem;
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .series-check:has(input:checked) { border-color: #4a5070; color: var(--text); }
    .series-check input { display: none; }
    .schart-wrap { position: relative; height: 300px; }

    /* ── Roster table ── */
    .roster-panel {
      flex: 1;
      min-height: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-radius: 0 8px 8px 8px;
      overflow: auto;
    }
    .roster-table {
      border-collapse: collapse;
      font-size: 0.82rem;
      min-width: 600px;
      width: 100%;
    }
    .roster-table th {
      background: var(--surface);
      color: var(--muted);
      padding: 8px 12px;
      border: 1px solid var(--border);
      white-space: nowrap;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      position: sticky;
      top: 0;
      z-index: 2;
      cursor: pointer;
      user-select: none;
    }
    .roster-table th:hover { color: var(--text); }
    .roster-table th.sort-asc::after  { content: ' ▲'; font-size: 0.7em; }
    .roster-table th.sort-desc::after { content: ' ▼'; font-size: 0.7em; }
    .roster-table th.col-site { position: sticky; left: 0; z-index: 3; text-align: left; }
    .roster-table td {
      padding: 5px 12px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .roster-table td.col-site {
      font-weight: 700;
      position: sticky;
      left: 0;
      background: var(--surface);
      z-index: 1;
    }
    .roster-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .roster-table tbody tr:hover td { background: var(--surface2) !important; }

    /* ── Roster filters ── */
    .roster-filters {
      flex-shrink: 0;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-bottom: none;
      border-radius: 0 8px 0 0;
    }
    .roster-filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .roster-filter-label {
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-right: 2px;
      white-space: nowrap;
    }
    .roster-pill {
      padding: 4px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.78rem;
      font-family: inherit;
      transition: all 0.15s;
    }
    .roster-pill.active {
      border-color: #4a5070;
      color: var(--text);
      background: var(--surface2);
    }
    .roster-panel {
      border-top: none;
      border-radius: 0 0 8px 8px;
    }
    .summary-table {
      border-collapse: collapse;
      font-size: 0.82rem;
      min-width: 700px;
      width: 100%;
    }
    .summary-table th {
      background: var(--surface);
      color: var(--muted);
      padding: 8px 12px;
      text-align: center;
      border: 1px solid var(--border);
      white-space: nowrap;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .summary-table th.col-site { text-align: left; position: sticky; left: 0; z-index: 3; }
    .summary-table th.col-work { text-align: left; }
    .summary-table th.col-emp  { text-align: left; }
    .summary-table td {
      padding: 5px 12px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .summary-table td.col-site {
      font-weight: 700;
      font-size: 0.85rem;
      vertical-align: top;
      color: var(--text);
      position: sticky;
      left: 0;
      background: var(--surface);
      z-index: 1;
    }
    .summary-table td.col-work {
      font-weight: 600;
      vertical-align: top;
    }
    .summary-table td.col-emp {
      color: var(--muted);
      padding-left: 8px;
    }
    .summary-table td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .summary-table td.total-row {
      font-weight: 700;
      color: var(--text);
    }
    /* Row type colors */
    .summary-table tr.wt-栽培      td:not(.col-site) { background: rgba(52,211,153,0.06); }
    .summary-table tr.wt-出荷      td:not(.col-site) { background: rgba(250,204,21,0.06); }
    .summary-table tr.wt-配送      td:not(.col-site) { background: rgba(248,113,113,0.06); }
    .summary-table tr.wt-拠点      td:not(.col-site) { background: rgba(249,115,22,0.08); }
    .summary-table tr.kind-total   td { font-weight: 700; }
    .summary-table tr.section-sep  td { border-top: 2px solid var(--border); }
    .summary-table tr.site-total   td { background: rgba(255,255,255,0.04); font-weight: 700; border-top: 2px solid var(--border); }
    .summary-table tr.site-total-last td { background: rgba(255,255,255,0.07); font-weight: 800; color: var(--text); }

    @media (max-width: 640px) {
      header, .tabs, main { padding-left: 16px; padding-right: 16px; }
      .chart-wrap { height: 280px; }
    }

    /* ── Production table ── */
    .prod-panel {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-radius: 0 8px 8px 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .prod-table-wrap { flex: 1; min-height: 0; overflow: auto; }

    /* ── 比較タブ（サブタブ付き。ヘッダー行を固定し、下部のみスクロール） ── */
    .compare-shell {
      flex: 1;
      min-height: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-top: 2px solid var(--border);
      border-radius: 0 8px 8px 8px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .compare-header-row {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .compare-header-row .chart-section-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .compare-header-row .transfer-toggle { flex-shrink: 0; }
    #compare-subtabs.transfer-toggle .transfer-toggle-btn,
    #empchart-subtabs.transfer-toggle .transfer-toggle-btn { min-width: 100px; }
    #compare-content { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; }
    /* 要員計画タブ：固定サブタブエリア＋スクロール可能データエリア */
    .staffplan-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; flex-shrink: 0; }
    .staffplan-period-label { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; color: var(--muted); }
    .staffplan-period-label select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.82rem;
    }
    .staffplan-refresh-btn {
      background: var(--border);
      border: none;
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    .staffplan-refresh-btn:hover:not(:disabled) { background: #3a3f5c; }
    .staffplan-refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #staffplan-content { flex: 1; min-height: 0; overflow-y: auto; }
    .prod-table {
      border-collapse: collapse;
      font-size: 0.82rem;
      min-width: 700px;
      width: 100%;
    }
    .prod-table th {
      background: var(--surface);
      color: var(--muted);
      padding: 8px 12px;
      text-align: center;
      border: 1px solid var(--border);
      white-space: nowrap;
      font-weight: 600;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .prod-table th.th-left { text-align: left; }
    .prod-table td {
      padding: 5px 12px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }
    .prod-table td.col-site {
      font-weight: 700;
      font-size: 0.88rem;
      position: sticky;
      left: 0;
      background: var(--surface);
      z-index: 1;
      vertical-align: top;
    }
    .prod-table td.col-cat {
      font-weight: 600;
      vertical-align: top;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .prod-table td.col-metric { white-space: nowrap; }
    .prod-table td.col-num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .prod-table td.empty { color: var(--muted); }
    /* Category row colors */
    .prod-table tr.cat-seisan td { background: rgba(56,189,248,0.07); }
    .prod-table tr.cat-seisan td.col-site { background: var(--surface); }
    .prod-table tr.cat-saibai td { background: rgba(52,211,153,0.06); }
    .prod-table tr.cat-saibai td.col-site { background: var(--surface); }
    .prod-table tr.cat-syukka td { background: rgba(250,204,21,0.07); }
    .prod-table tr.cat-syukka td.col-site { background: var(--surface); }
    /* Special metric rows */
    .prod-table tr.metric-syukka-kg td { background: rgba(250,204,21,0.16); }
    .prod-table tr.metric-syukka-kg td.col-site { background: var(--surface); }
    .prod-table tr.metric-syukka-kg .col-metric { color: #facc15; font-weight: 600; }
    .prod-table tr.metric-goukei td { font-weight: 700; }
    /* Site separator */
    .prod-table tr.site-start td { border-top: 2px solid var(--border); }
    /* Standard settings table */
    .std-set-table input.std-input:focus { outline: 1px solid var(--accent-inabe); border-color: var(--accent-inabe); }
    .std-set-table input.std-input { transition: border-color 0.15s; }
    .std-set-table td { vertical-align: middle; }
  </style>

<script>

const SHEET_NAME = '整理済み_M';
const ADJUST_SHEET_NAME = '整理済み_増減'; // 工数振替（研修・応援）レコード
const PROD_GID = '2016642543'; // 整理済み_分析
const PLAN_GID = '530402103';  // 整理済み_計画_更新
const STD_SETTINGS_SHEET_NAME = '標準工数設定';

// 要員計画タブ：GAS側で計算しファーム勤務時間ファイル内「整理済み_計画_更新」シートに

// Map raw 雇用区分 value to summary category

let allData = null; // { months, monthYms, employees, nameLabel }

let periodMonthCount = 12;         // 集計期間フィルターの表示月数（1〜12）

// ページリロード（F5・Ctrl+Shift+R等）時に直前の表示状態を復元するための保持。
// タブ・ウィンドウを閉じると消えるsessionStorageを使う（複数人で共有する業務データではなく、
// あくまで個人のその場の操作状態のため）。既存の「更新ボタン押下時の状態保持」
// （loadAll()内のprevActiveBase等、タブを閉じなくても効く別の仕組み）とは役割が異なり、

      // empTypeColorMapがまだ空のため、全区分が「新しく現れた区分」と誤認され、

}

function loadSessionState() {

    const s = sessionStorage.getItem(SESSION_STATE_KEY);

}

function applyEmpTypeFilter(employees) {
  if (!empTypeFilter) return employees;
  return employees.filter(e => empTypeFilter.has(e.employment || '（未分類）'));
}

// allData.monthsのうち、実在する月のみを返す（末尾の「実質勤務時間」等、月ではない列を除外）
function getRealMonths() {
  return allData.months.filter((m, i) => allData.monthYms[i] !== null && allData.monthYms[i] !== undefined);
}

// 表示月数が少ないときの「間延び」対策：開始月から常にMONTH_COLUMN_TARGET本の列/棒に
// 揃えた拡張月リストを返す（開始月〜シート実在最新月がこれを超える場合は、その本数
// そのまま・縮小せず全て表示する。超過分は呼び出し側で横スクロール対応する）。
// 3段階の区分：
//   1. 選択中の表示月数の範囲内（inRange:true, hasData:true）→ 実データ
//   2. 表示月数の範囲外だが、シートに実在する月の範囲内 → 見出しのみ、データは空欄
//   3. シートの実在最新月を超えた埋め合わせ分 → 見出し自体も空欄（month: ''）
// 既存の月リスト生成処理（applyPeriodFilter等）を置き換えるものではなく、
// 呼び出し側で選択的に利用する追加のラップ関数
const MONTH_COLUMN_TARGET = 12;

function buildExtendedMonthList(selectedMonths, allRealMonths) {
  if (!selectedMonths.length) return [];
  const startIdx = allRealMonths.indexOf(selectedMonths[0]);
  if (startIdx === -1) return selectedMonths.map(m => ({ month: m, inRange: true, hasData: true }));

  const realCountFromStart = allRealMonths.length - startIdx;
  const totalColumns = Math.max(MONTH_COLUMN_TARGET, realCountFromStart);
  const selectedCount = selectedMonths.length;

  const extended = [];
  for (let i = 0; i < totalColumns; i++) {
    if (i < selectedCount) {
      extended.push({ month: selectedMonths[i], inRange: true, hasData: true });
    } else if (i < realCountFromStart) {
      extended.push({ month: allRealMonths[startIdx + i], inRange: false, hasData: false });
    } else {
      extended.push({ month: '', inRange: false, hasData: false });
    }
  }
  return extended;
}

// 月数がMONTH_COLUMN_TARGETを超える場合、棒を縮小せず横スクロールで見せるための
// キャンバスラッパーHTMLを返す（列/棒の最小幅を確保し、超過分は横スクロール）
function chartWrapHtml(canvasId, monthCount, opts) {
  const PX_PER_MONTH = 70;
  const wrapClass = (opts && opts.wrapClass) || 'schart-wrap';
  const heightPx = (opts && opts.heightPx) || 300;
  // forceResponsive: 月数に関わらず固定幅の横スクロール分岐に入らせず、
  // 常に親要素の幅に追従するレスポンシブ表示にする（棒が月数に応じて縮小する）
  if ((opts && opts.forceResponsive) || monthCount <= MONTH_COLUMN_TARGET) {
    const style = (opts && opts.inlineHeight) ? ` style="height:${heightPx}px"` : '';
    return `<div class="${wrapClass}"${style}><canvas id="${canvasId}"></canvas></div>`;
  }
  return `<div class="${wrapClass}" style="overflow-x:auto;height:${heightPx}px"><div style="position:relative;height:${heightPx}px;min-width:${monthCount * PX_PER_MONTH}px"><canvas id="${canvasId}"></canvas></div></div>`;
}

// 指定のフィルター済みデータ（months/employees）にbuildExtendedMonthList()を適用した
// 「拡張済み」データを返す共通ヘルパー。延長分の月はemployees[].hoursがnullになる
// （グラフは自然に棒なしになる。表側はoriginalCountを使って呼び出し側でinRange判定し、
// 空欄表示にする）
function getExtendedFromData(data) {
  const { months: selectedMonths, employees: selectedEmployees } = data;
  const extendedMonths = buildExtendedMonthList(selectedMonths, getRealMonths());
  const months = extendedMonths.map(e => e.month);
  const originalCount = selectedMonths.length;
  const employees = selectedEmployees.map(e => ({
    ...e,
    hours: extendedMonths.map((_, mi) => mi < originalCount ? e.hours[mi] : null),
  }));
  return { ...data, months, employees, originalCount, extendedMonths };
}

// getActiveData()を拡張済みにしたもの（振替の影響を受ける画面で使用）
function getExtendedActiveData() {
  return getExtendedFromData(getActiveData());
}

// getBaseFilteredData()を拡張済みにしたもの（従業員数・人数グラフ等、振替の影響を
// 受けない箇所で使用）
function getExtendedBaseFilteredData() {
  return getExtendedFromData(getBaseFilteredData());
}

// 生産実績（整理済み_分析）と突き合わせる画面向けに、固定12本の表示列（開始月から12本、
// シート実在最新月を超える分は見出しも空欄）の月ラベルだけを組み立てる軽量版。
// employees側のhours配列は持たない（生産実績側の実データ紐付けは呼び出し側で、
// normalizeMonth()を介して月文字列をキーに個別に行う。延長分・超過分
// （mi >= originalCount）には生産実績データを一切載せないことで、間延び対策の
// 表示列と「選択範囲内の実データ」を明確に分離する）
function getExtendedDisplayMonths() {
  const selectedMonths = getActiveData().months;
  const extendedMonths = buildExtendedMonthList(selectedMonths, getRealMonths());
  return { months: extendedMonths.map(e => e.month), originalCount: selectedMonths.length };
}

// months/monthYms/employees.hours を、選択中の開始月から表示月数分だけスライスする
// （表示月数が最新月を超える場合は自動的に存在する分だけになる）。
// 末尾の「実質勤務時間」等、月ではない疑似列（monthYms===null）はスライス対象外とし、常にそのまま残す
function applyPeriodFilter(data) {
  if (!periodStartMonth || !data.monthYms) return data;
  let realCount = data.monthYms.length;
  while (realCount > 0 && (data.monthYms[realCount - 1] === null || data.monthYms[realCount - 1] === undefined)) realCount--;

  const startIdx = data.months.slice(0, realCount).indexOf(periodStartMonth);
  if (startIdx === -1) {
    // 選択中の開始月がこのデータセットに存在しない（想定外のデータ欠損等）。
    // 「フィルタが効かず全件表示になる」誤解を防ぐため、全件ではなく空データを返す
    return { ...data, months: [], monthYms: [], employees: data.employees.map(e => ({ ...e, hours: [] })) };
  }
  const endIdx = Math.min(realCount, startIdx + periodMonthCount);

  const sliceKeepTail = arr => arr ? arr.slice(startIdx, endIdx).concat(arr.slice(realCount)) : arr;
  return {
    ...data,
    months: sliceKeepTail(data.months),
    monthYms: sliceKeepTail(data.monthYms),
    employees: data.employees.map(e => ({ ...e, hours: sliceKeepTail(e.hours) })),
  };
}

// 雇用区分・集計期間フィルターのみを適用した「振替なし」のデータ（従業員数KPI等、振替の影響を
// 受けない箇所で使用。getActiveData()と同じフィルターを共有しつつ振替だけを除外する）
function getBaseFilteredData() {
  return applyPeriodFilter({ ...allData, employees: applyEmpTypeFilter(allData.employees) });
}

/* ── Fetch & parse ─────────────────────────────────────────────── */
async function fetchSheet() {
  // 整理済み_Mシートは見出し3行構成（1行目=締め日ラベル、2行目=実質月、3行目=列種別）。
  // headers=3でgvizに3行分をヘッダーとして結合させ、各列のlabelから実質月を直接読み取る
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&headers=3`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^{]+/, '').replace(/[^}]+$/, ''));
  console.log('[fetchSheet] cols:', JSON.stringify(json.table.cols));
  return json;
}

async function fetchAdjustSheet() {
  // 整理済み_増減シートも1〜2行目が空白/結合、3行目が本当の見出し行という3行構成のため、
  // headers=2のままだと見出し行がデータの1行目として読み込まれてしまう（headers=3で修正）
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(ADJUST_SHEET_NAME)}&headers=3`;
  const res = await fetch(url);
  const text = await res.text();
  return JSON.parse(text.replace(/^[^{]+/, '').replace(/[^}]+$/, ''));
}

function parseDuration(cell) {
  if (!cell) return null;
  if (typeof cell.v === 'number') {
    const h = cell.v * 24;
    return h > 0 ? Math.round(h * 10) / 10 : null;
  }
  if (cell.f) {
    const f = String(cell.f).replace(/^-/, '').trim();
    const parts = f.split(':').map(Number);
    if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
      const h = parts[0] > 500
        ? parts[0] / 60 + parts[1] / 3600
        : parts[0] + parts[1] / 60;
      return h > 0 ? Math.round(h * 10) / 10 : null;
    }
  }
  return null;
}

// 2行目「実質月」（例: "2025/08"）のYYYY/M表記をラベルから直接抜き出してYYYYMM数値で返す
function realYearMonth(label) {
  const m = String(label).match(/(\d{4})\/(\d{1,2})(?!\d)/);
  if (!m) return null;
  return parseInt(m[1]) * 100 + parseInt(m[2]);
}

// 「N/10締」列の締め日そのものの年月をYYYYMM数値で返す。
// 2行目の実質月が読み取れない想定外のヘッダー構造だった場合のフォールバック専用
// （締め月と実質月は1ヵ月ずれているため、通常時の主ロジックには使わない）。
function closingYearMonth(label) {
  const m = String(label).match(/(\d+)\/\d+締/);
  if (!m) return null;
  const closeMonth = parseInt(m[1]);
  const year = closeMonth <= 6 ? 2026 : 2025;
  return year * 100 + closeMonth;
}

// YYYYMM数値を1ヵ月前にずらす（年をまたぐ場合も対応）
function monthMinusOne(ym) {
  let year = Math.floor(ym / 100);
  let month = (ym % 100) - 1;
  if (month < 1) { month += 12; year -= 1; }
  return year * 100 + month;
}

// YYYYMM数値 → "YYYY年M月" の表示ラベル（2行目の年月と常に一致させる）
function ymToLabel(ym) {
  if (ym == null) return null;
  return `${Math.floor(ym / 100)}年${ym % 100}月`;
}

// ラベルから月キー（YYYYMM）を解決する。まず2行目の実質月を直接読み取り、
// 想定外のヘッダー構造で読み取れない場合のみ、締め月-1（実質月相当）にフォールバックする
function resolveMonthYm(label) {
  const ym = realYearMonth(label);
  if (ym !== null) return ym;
  const shimeMatch = String(label).match(/(\d+\/\d+締)/);
  if (!shimeMatch) return null;
  const closeYm = closingYearMonth(shimeMatch[1]);
  if (closeYm === null) return null;
  const fallbackYm = monthMinusOne(closeYm);
  console.warn('[buildDataset] 実質月をラベルから読み取れませんでした。締め月-1のフォールバック計算を使用します:', label, '→', fallbackYm);
  return fallbackYm;
}

function buildDataset(json) {
  const cols = json.table.cols;
  const rows = json.table.rows || [];

  const jissituCols = [];

  // 月の検出は「総勤務時間」列のラベル（例:"9/10締 2025/08 総勤務時間"）からのみ行う。
  // 実機確認により、月情報を含む結合ラベルは各月ブロックの最初の列（総勤務時間）にのみ付与され、
  // 続く「有給取得時間」「実質勤務時間」列は単独ラベル（月情報なし）になることが判明したため、
  // 総勤務時間列から+2列後ろを実質勤務時間の実データ列として扱う
  cols.forEach((c, i) => {
    if (!c) return;
    const label = (c.label || '').trim();
    if (label.includes('総勤務時間') && i + 2 < cols.length) {
      const ym = resolveMonthYm(label);
      // ym===null（月が特定できない列。将来の月追加用の空の予備/テンプレート列など）は
      // 月ではないため、集計・表示対象から除外する
      if (ym === null) return;
      jissituCols.push({ month: ymToLabel(ym), idx: i + 2, ym });
    }
  });

  if (jissituCols.length === 0) {
    console.warn('[buildDataset] 「総勤務時間」列から月を1件も検出できませんでした。ヘッダー構造が想定と異なる可能性があります。cols:', JSON.stringify(cols));
    throw new Error('勤怠データの月列を検出できませんでした（整理済み_Mシートのヘッダー構造をご確認ください）');
  }

  const firstMonthIdx = jissituCols[0].idx;

  // Step 2: detect static columns by scanning data values
  const VALID_BASES   = new Set(['いなべ', '群馬', '南丹']);
  const VALID_WORKS   = new Set(['栽培', '出荷', '配送', '拠点業務']);
  const EMP_KEYWORDS  = ['社員', 'アルバイト', 'パート', '技能実習', '正社員', '契約社員'];

  // Tally how many rows have each known value type per column
  const baseScore = {}, workScore = {}, empScore = {}, nameScore = {};
  const sampleRows = rows.slice(0, 30);

  sampleRows.forEach(row => {
    const cells = row.c || [];
    for (let i = 0; i < firstMonthIdx; i++) {
      const v = String(cells[i]?.v ?? '').trim();
      if (!v) continue;
      if (VALID_BASES.has(v))                             baseScore[i] = (baseScore[i] || 0) + 1;
      if (VALID_WORKS.has(v) || ['栽培','出荷','配送'].some(w => v.includes(w)))
                                                          workScore[i] = (workScore[i] || 0) + 1;
      if (EMP_KEYWORDS.some(k => v.includes(k)))         empScore[i]  = (empScore[i]  || 0) + 1;
    }
  });

  function bestIdx(scores, fallback) {
    let best = -1, bestVal = 0;
    Object.entries(scores).forEach(([k, v]) => {
      if (v > bestVal) { bestVal = v; best = parseInt(k); }
    });
    return best === -1 ? fallback : best;
  }

  // 拠点判定はE列（PRJ、index4）を使用。想定と異なる場合はスコアリングにフォールバック
  let baseIdx = 4;
  const col4HasValidBase = sampleRows.some(row => VALID_BASES.has(String(row.c?.[4]?.v ?? '').trim()));
  if (!col4HasValidBase) baseIdx = bestIdx(baseScore, 3);

  const workIdx = bestIdx(workScore, 4);
  const empIdx  = bestIdx(empScore,  2);
  const flagIdx = 1; // B列：フラグ（工数振替の氏名重複解決に使用）

  // 氏名: H列 (index 7) — confirmed by spreadsheet structure
  // Verify col 7 has string values; if not, scan for a column with Japanese name-like strings
  let nameIdx = 7;
  const col7HasNames = sampleRows.some(row => {
    const v = String(row.c?.[7]?.v ?? '').trim();
    return v.length > 1 && isNaN(Number(v)) && !VALID_BASES.has(v);
  });
  if (!col7HasNames) {
    // fallback: find column with string values not matching base/work/emp known values
    nameIdx = -1;
    for (let i = 0; i < firstMonthIdx; i++) {
      if (i === baseIdx || i === workIdx || i === empIdx) continue;
      const hasNames = sampleRows.some(row => {
        const v = String(row.c?.[i]?.v ?? '').trim();
        return v.length > 1 && isNaN(Number(v)) && !VALID_BASES.has(v) &&
               !VALID_WORKS.has(v) && !EMP_KEYWORDS.some(k => v.includes(k));
      });
      if (hasNames) { nameIdx = i; break; }
    }
    if (nameIdx === -1) nameIdx = 7;
  }

  // Deduplicate months
  const monthCounts = {};
  const months = jissituCols.map(({ month }) => {
    monthCounts[month] = (monthCounts[month] || 0) + 1;
    if (monthCounts[month] > 1) return inferNextMonth(month, monthCounts[month]);
    return month;
  });
  // 実質月（YYYYMM）。整理済み_増減シート（I列も実質月基準）・整理済み_分析（暦月）との
  // 突き合わせに、いずれもオフセットなしの単純一致で使える
  const monthYms = jissituCols.map(({ ym }) => ym);

  const employees = [];

  rows.forEach(row => {
    const cells = row.c || [];
    const base = String(cells[baseIdx]?.v ?? '').trim();
    if (!VALID_BASES.has(base)) return;

    const name = String(cells[nameIdx]?.v ?? cells[nameIdx]?.f ?? '').trim();
    if (!name) return;

    const employment = String(cells[empIdx]?.v ?? '').trim();
    const workType   = String(cells[workIdx]?.v ?? '').trim();
    const empClass   = classifyEmp(employment);
    const flag       = cells[flagIdx]?.v;

    const hours = jissituCols.map(({ idx }) => parseDuration(cells[idx]));
    if (hours.every(h => h === null)) return;

    employees.push({ name, base, workType, employment, empClass, hours, flag });
  });

  const nameLabel = (cols[nameIdx]?.label || '').trim() || '氏名';
  return { months, monthYms, employees, nameLabel };
}

function inferNextMonth(base, occurrence) {
  const m = base.match(/^(\d+)年(\d+)月$/);
  if (!m) return `${base}(${occurrence})`;
  let year = parseInt(m[1]);
  let month = parseInt(m[2]) + (occurrence - 1);
  while (month > 12) { month -= 12; year++; }
  return `${year}年${month}月`;
}

/* ── 工数振替（整理済み_増減）───────────────────────────────────── */

// 「（」「(」（全角・半角）以降を除去し、空白を正規化した上で大文字化する
function normalizeName(raw) {
  if (!raw) return '';
  let s = String(raw);
  const idxFull = s.indexOf('（');
  const idxHalf = s.indexOf('(');
  const cut = [idxFull, idxHalf].filter(i => i >= 0).sort((a, b) => a - b)[0];
  if (cut !== undefined) s = s.slice(0, cut);
  s = s.replace(/[　\s]+/g, ' ').trim();
  return s.toUpperCase();
}

// gvizの日付セル（cell.v が "Date(y,m,d)" 文字列）からYYYYMM数値を取り出す
function parseGvizDateYm(cell) {
  if (!cell) return null;
  const v = cell.v;
  if (typeof v === 'string') {
    const m = v.match(/^Date\((\d+),\s*(\d+),\s*(\d+)/);
    if (m) return parseInt(m[1]) * 100 + (parseInt(m[2]) + 1); // gvizの月は0始まり
  }
  const text = cell.f || (typeof v === 'string' ? v : '');
  const m2 = String(text).match(/(\d{4})[\/\-](\d{1,2})/);
  if (m2) return parseInt(m2[1]) * 100 + parseInt(m2[2]);
  return null;
}

// 整理済み_増減シートの列位置（固定）
const ADJ_EMP_COL = 2, ADJ_BASE_COL = 3, ADJ_PRJ_COL = 4, ADJ_ROLE_COL = 5, ADJ_NAME_COL = 7, ADJ_YM_COL = 8, ADJ_HOURS_COL = 9;

function parseAdjustRecords(json) {
  const rows = json.table.rows || [];
  const records = [];
  rows.forEach((row, i) => {
    const cells = row.c || [];
    const rawName = String(cells[ADJ_NAME_COL]?.v ?? cells[ADJ_NAME_COL]?.f ?? '').trim();
    if (!rawName) return; // 空行はスキップ

    const base = String(cells[ADJ_BASE_COL]?.v ?? '').trim();
    const prj  = String(cells[ADJ_PRJ_COL]?.v ?? '').trim();
    const role = String(cells[ADJ_ROLE_COL]?.v ?? '').trim();
    const ym   = parseGvizDateYm(cells[ADJ_YM_COL]);
    const hours = parseDuration(cells[ADJ_HOURS_COL]) || 0;

    records.push({ rowNum: i + 1, rawName, base, prj, role, ym, hours });
  });
  return records;
}

function formatHM(hours) {
  const sign = hours < 0 ? '▲' : '';
  const abs = Math.abs(hours);
  let h = Math.floor(abs);
  let mm = Math.round((abs - h) * 60);
  if (mm === 60) { mm = 0; h += 1; }
  return `${sign}${h}:${String(mm).padStart(2, '0')}`;
}

// baseData（振替なしのallData）と整理済み_増減レコードから、
// 個人単位で加減算を反映した employees 配列とアラート一覧を作る
function computeTransferAdjustments(baseData, adjustRecords) {
  const { months, monthYms, employees: baseEmployees } = baseData;

  // 深いコピー（hours配列を独立させる）
  const employees = baseEmployees.map(e => ({ ...e, hours: e.hours.slice() }));

  const byName = new Map();
  employees.forEach(e => {
    const key = normalizeName(e.name);
    if (!byName.has(key)) byName.set(key, []);
    byName.get(key).push(e);
  });

  const alerts = [];
  const additions = []; // { emp, monthIdx, destBase, destRole, hours }

  adjustRecords.forEach(rec => {
    const monthIdx = monthYms.indexOf(rec.ym);
    if (monthIdx === -1) return; // 対象月が現在の集計範囲に無い（対象外期間）

    const key = normalizeName(rec.rawName);
    let matches = byName.get(key);

    // 氏名が複数件ヒットする場合（拠点間の恒久異動等）は、B列フラグ＝1のレコードのみに絞り込む
    if (matches && matches.length > 1) {
      matches = matches.filter(e => e.flag === 1);
    }

    if (!matches || matches.length !== 1) {
      const reason = matches && matches.length > 1 ? '（B列フラグ＝1のレコードが複数あり特定できません）'
        : (byName.get(key) && byName.get(key).length > 1 ? '（B列フラグ＝1のレコードが見つかりません）' : '');
      alerts.push(`氏名不一致：整理済み_増減シート${rec.rowNum}行目「${rec.rawName}」に一致する従業員が整理済み_Mシートで見つかりません${reason}`);
      return;
    }
    const emp = matches[0];

    const before = emp.hours[monthIdx] ?? 0;
    const after = before - rec.hours;
    emp.hours[monthIdx] = after;
    if (after < 0) {
      alerts.push(
        `${emp.name}さん：${months[monthIdx]}度、${rec.role || '振替'}による減算${formatHM(rec.hours)}` +
        `に対し実質勤務時間${formatHM(before)}のため${formatHM(after)}`
      );
    }

    if (rec.base !== rec.prj) {
      additions.push({ emp, monthIdx, destBase: rec.prj, destRole: rec.role, hours: rec.hours });
    }
  });

  // 応援先（拠点×担当）ごとに仮想の従業員レコードへ加算をまとめる
  const addMap = new Map();
  additions.forEach(a => {
    const k = `${normalizeName(a.emp.name)}|${a.destBase}|${a.destRole}`;
    if (!addMap.has(k)) {
      addMap.set(k, {
        name: `${a.emp.name}（応援）`,
        base: a.destBase,
        workType: a.destRole,
        employment: a.emp.employment,
        empClass: a.emp.empClass,
        hours: new Array(months.length).fill(null),
        isTransferVirtual: true,
      });
    }
    const v = addMap.get(k);
    v.hours[a.monthIdx] = (v.hours[a.monthIdx] ?? 0) + a.hours;
  });

  return { employees: employees.concat(Array.from(addMap.values())), alerts };
}

function buildChart() {
  const { months, employees } = getExtendedActiveData();
  const baseEmps = employees.filter(e => e.base === activeBase && e.workType);

  const datasets = baseEmps.map(emp => {
    const color = empTypeColor(emp.employment || '（未分類）');
    return {
      label: `${emp.name}（${emp.employment || '未分類'}）`,
      data: emp.hours,
      borderColor: color,
      backgroundColor: color + '22',
      borderWidth: 1.8,
      pointRadius: 3,
      pointHoverRadius: 5,
      tension: 0.3,
      spanGaps: true,
    };
  });

  const avgData = months.map((_, mi) => {
    const vals = baseEmps.map(e => e.hours[mi]).filter(h => h !== null);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)/vals.length * 10)/10 : null;
  });
  datasets.push({
    label: '拠点平均',
    data: avgData,
    borderColor: '#f97316',
    backgroundColor: 'transparent',

/* ── 集計期間フィルター（全タブ共通のグローバルな絞り込み。画面上段に1つだけ表示） ── */
// preserveStart/preserveCount を渡すと、更新（再読み込み）前の選択状態を維持する
function renderPeriodFilterUI(preserveStart, preserveCount) {
  const realMonths = getRealMonths();

  // デフォルトの開始月：直近（最新）の「10月」。データ更新でより新しい10月が
  // 現れれば自動的にそちらに切り替わる。10月が1件も無い場合は先頭月にフォールバック
  let defaultStart = realMonths[0];
  for (let i = realMonths.length - 1; i >= 0; i--) {
    if (/10月$/.test(realMonths[i])) { defaultStart = realMonths[i]; break; }
  }
  periodStartMonth = (preserveStart && realMonths.includes(preserveStart)) ? preserveStart : defaultStart;
  periodMonthCount = preserveCount || 12;

  const startSel = document.getElementById('period-start-select');
  startSel.innerHTML = realMonths.map(m =>
    `<option value="${m}"${m === periodStartMonth ? ' selected' : ''}>${m}</option>`
  ).join('');

  const countSel = document.getElementById('period-count-select');
  countSel.innerHTML = Array.from({ length: 12 }, (_, i) => i + 1).map(n =>
    `<option value="${n}"${n === periodMonthCount ? ' selected' : ''}>${n} ヵ月</option>`
  ).join('');
}

function onPeriodFilterChange() {
  periodStartMonth = document.getElementById('period-start-select').value;
  periodMonthCount = parseInt(document.getElementById('period-count-select').value, 10);
  saveSessionState();
  rerenderCurrentView();
}

// preserveChecked/preserveAllTypes を渡すと、更新（再読み込み）前の選択状態を維持する

  empTypeFilter = new Set(empTypes.filter(t =>

/* ── Summary helpers ───────────────────────────────────────────── */
function fmtH(h) {
  if (h === null || h === undefined || isNaN(h)) return '—';
  return h.toFixed(1) + ' h';
}

const SUMMARY_COLORS = [
  '#34d399','#6ee7b7',  // 栽培
  '#facc15','#fde68a',  // 出荷
  '#f87171','#fca5a5',  // 配送
  '#fb923c','#fed7aa',  // 拠点業務
  '#60a5fa','#93c5fd',  // その他
  '#c084fc','#e879f9',
];
const TOTAL_COLOR = '#e2e8f0';

function getOrderedWorkTypes(employees) {
  const order = [];
  employees.forEach(e => { if (e.workType && !order.includes(e.workType)) order.push(e.workType); });
  return [...order.filter(wt => !wt.includes('拠点')), ...order.filter(wt => wt.includes('拠点'))];
}

let summaryChartInstances = {};

function destroySummaryCharts() {
  Object.values(summaryChartInstances).forEach(c => c.destroy());

}

/* ── Summary: 表タブ ───────────────────────────────────────────── */
// 期間内に在籍している（当該月にhoursがnullでない）人数を数える。
// サマリータブの業務区分別集計・要員計画タブの在籍人数比較の両方から共通で呼び出す
function countActiveEmployees(emps, mi) {
  return emps.filter(e => e.hours[mi] !== null).length;
}

function renderSummaryTable() {
  // 表示月数が少ないときの間延び対策：開始月から常にMONTH_COLUMN_TARGET本に揃える
  // （実データはそのまま、延長分は見出しのみ・空欄。シート最新月を超えた分は見出しも空欄）
  const { months, employees, originalCount } = getExtendedActiveData();
  const content = document.getElementById('summary-content');

  // 延長分（inRange:false）は表では完全な空欄にする（在範囲内の0/データなしは既存通り「—」のまま）
  function cellText(v, mi, isCount) {
    if (mi >= originalCount) return '';
    return isCount ? (v !== null ? v + ' 名' : '—') : fmtH(v);
  }

  const orderedWorkTypes = getOrderedWorkTypes(employees);
  const EMP_CLASSES = ['社員・技能実習生', 'パート'];

  let html = `<div class="summary-panel"><table class="summary-table">
    <thead><tr>
      <th class="col-site">拠点</th>
      <th class="col-work">業務区分</th>
      <th class="col-emp">区分</th>
      ${months.map(m => `<th>${m}</th>`).join('')}
    </tr></thead><tbody>`;

  SITES.forEach(site => {
    const siteEmps = employees.filter(e => e.base === site && e.workType);
    if (!siteEmps.length) return;

    const siteWorkTypes = orderedWorkTypes.filter(wt => siteEmps.some(e => e.workType === wt));
    const totalRows = siteWorkTypes.length * 9;
    let siteRowSpan = totalRows + 6;
    let firstRow = true;

    siteWorkTypes.forEach((wt, wtIdx) => {
      const wtEmps = siteEmps.filter(e => e.workType === wt);
      const wtClass = workTypeClass(wt);
      const isSep = wtIdx > 0;

      const kinds = [
        { label: '計／時間', sub: EMP_CLASSES.map(ec => ({
            label: ec,
            vals: months.map((_, mi) => {
              const vals = wtEmps.filter(e => e.empClass === ec).map(e => e.hours[mi]).filter(h => h !== null);
              return vals.length ? vals.reduce((a,b)=>a+b,0) : null;
            }),
          })),
          total: months.map((_, mi) => {
            const vals = wtEmps.map(e => e.hours[mi]).filter(h => h !== null);
            return vals.length ? vals.reduce((a,b)=>a+b,0) : null;
          }),
        },
        { label: '計／人数', sub: EMP_CLASSES.map(ec => ({
            label: ec,
            vals: months.map((_, mi) => {
              const n = countActiveEmployees(wtEmps.filter(e => e.empClass === ec), mi);
              return n || null;
            }),
          })),
          total: months.map((_, mi) => {
            const n = countActiveEmployees(wtEmps, mi);
            return n || null;
          }),
          isCount: true,
        },
        { label: '計／平均', sub: EMP_CLASSES.map(ec => ({
            label: ec,
            vals: months.map((_, mi) => {
              const vals = wtEmps.filter(e => e.empClass === ec).map(e => e.hours[mi]).filter(h => h !== null);
              return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
            }),
          })),
          total: months.map((_, mi) => {
            const vals = wtEmps.map(e => e.hours[mi]).filter(h => h !== null);
            return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
          }),
        },
      ];

      let wtFirstRow = true;
      const wtRowCount = 9;

      kinds.forEach(kind => {
        kind.sub.forEach(sub => {
          html += `<tr class="${wtClass}${isSep && wtFirstRow ? ' section-sep' : ''}">`;
          if (firstRow) {
            html += `<td class="col-site" rowspan="${siteRowSpan}" style="color:${SITE_COLORS[site]||'#fff'}">${site}</td>`;
            firstRow = false;
          }
          if (wtFirstRow) {
            html += `<td class="col-work" rowspan="${wtRowCount}">${wt}</td>`;
            wtFirstRow = false;
          }
          html += `<td class="col-emp">${sub.label}</td>`;
          sub.vals.forEach((v, mi) => {
            html += `<td class="num">${cellText(v, mi, kind.isCount)}</td>`;
          });
          html += '</tr>';
        });
        html += `<tr class="${wtClass} kind-total">`;
        html += `<td class="col-emp total-row">${kind.label}</td>`;
        kind.total.forEach((v, mi) => {
          html += `<td class="num total-row">${cellText(v, mi, kind.isCount)}</td>`;
        });
        html += '</tr>';
      });
    });

    const EMP_CLASSES_INNER = ['社員・技能実習生', 'パート'];
    EMP_CLASSES_INNER.forEach((ec, ecIdx) => {
      const vals = months.map((_, mi) =>
        siteEmps.filter(e => e.empClass === ec).map(e => e.hours[mi]).filter(h => h !== null)
          .reduce((a, b) => a + b, 0) || null
      );
      html += `<tr class="site-total">`;
      if (ecIdx === 0) html += `<td class="col-work" rowspan="6" style="font-weight:800;color:var(--text);vertical-align:top;border-top:2px solid var(--border)">合計</td>`;
      html += `<td class="col-emp">${ec}（時間）</td>`;
      vals.forEach((v, mi) => { html += `<td class="num">${cellText(v, mi, false)}</td>`; });
      html += '</tr>';
    });
    const grandHourVals = months.map((_, mi) =>
      siteEmps.map(e => e.hours[mi]).filter(h => h !== null).reduce((a, b) => a + b, 0) || null
    );
    html += `<tr class="site-total-last"><td class="col-emp">計／時間</td>`;
    grandHourVals.forEach((v, mi) => { html += `<td class="num">${cellText(v, mi, false)}</td>`; });
    html += '</tr>';

    EMP_CLASSES_INNER.forEach(ec => {
      const vals = months.map((_, mi) =>
        siteEmps.filter(e => e.empClass === ec && e.hours[mi] !== null).length || null
      );
      html += `<tr class="site-total"><td class="col-emp">${ec}（人数）</td>`;
      vals.forEach((v, mi) => { html += `<td class="num">${cellText(v, mi, true)}</td>`; });
      html += '</tr>';
    });
    const grandCountVals = months.map((_, mi) =>
      siteEmps.filter(e => e.hours[mi] !== null).length || null
    );
    html += `<tr class="site-total-last"><td class="col-emp">計／人数</td>`;
    grandCountVals.forEach((v, mi) => { html += `<td class="num">${cellText(v, mi, true)}</td>`; });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  content.innerHTML = html;
}

/* ── Summary: グラフタブ ───────────────────────────────────────── */
function buildSiteSeriesList(site) {
  const { employees, months } = getExtendedActiveData();
  const orderedWorkTypes = getOrderedWorkTypes(employees);
  const EMP_CLASSES = ['社員・技能実習生', 'パート'];
  const siteEmps = employees.filter(e => e.base === site);
  const siteWTs = orderedWorkTypes.filter(wt => siteEmps.some(e => e.workType === wt));

  const series = [];
  let colorIdx = 0;
  siteWTs.forEach(wt => {
    EMP_CLASSES.forEach(ec => {
      const emps = siteEmps.filter(e => e.workType === wt && e.empClass === ec);
      if (!emps.length) return;
      const data = months.map((_, mi) => {
        const vals = emps.map(e => e.hours[mi]).filter(h => h !== null);
        return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0) * 10) / 10 : null;
      });
      series.push({
        label: `${wt} / ${ec}`,
        data,
        color: SUMMARY_COLORS[colorIdx++ % SUMMARY_COLORS.length],
        isTotal: false,
      });
    });
  });

  // 拠点合計
  const totalData = months.map((_, mi) => {
    const vals = siteEmps.map(e => e.hours[mi]).filter(h => h !== null);
    return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0) * 10) / 10 : null;
  });
  series.push({ label: '拠点合計（時間）', data: totalData, color: TOTAL_COLOR, isTotal: true });

  return series;
}

/* ── Shared: 同一ページ内に並ぶ同種グラフのY軸統一（雇用区分フィルター等、絞り込み条件の
   種類に依存しない汎用ヘルパー。フィルターが増えても、呼び出し側が「フィルター適用後の
   軸表示値」を渡す限りこの仕組み自体は変更不要） ───────────────────────────── */
// valueArrays: グラフごとの「軸に表示され得る値」の配列（積み上げ棒なら月ごとの合計値、
// 折れ線なら各系列の値）を、ページ内の対象グラフの数だけ集めた配列の配列。
// roundTo: 丸め単位。padding: 最大値に対する余裕率（積み上げ棒は上端が窮屈にならないよう1.1を指定）。
function computeSharedAxisMax(valueArrays, roundTo = 1, padding = 1) {
  let max = 0;
  valueArrays.forEach(values => {
    (values || []).forEach(v => {
      if (v !== null && v !== undefined && v > max) max = v;
    });
  });
  if (max <= 0) return roundTo;
  return Math.ceil((max * padding) / roundTo) * roundTo;
}

// 積み上げ棒グラフ1本分の「月ごとの合計値」（＝軸上で実際に到達し得る高さ）を求める
function stackedMonthlyTotals(months, datasets) {
  return months.map((_, mi) => datasets.reduce((s, ds) => s + (ds.data[mi] || 0), 0));
}

/* ── Shared: stacked bar chart builder ─────────────────────────── */
// hMax/nMax はページ内の同種グラフ群から computeSharedAxisMax() で算出した共通値を渡す
function buildStackedBarSection(containerId, months, datasetsH, datasetsN, hMax, nMax) {
  function barOpts(yLabel, isCount, dynMax) {
    return {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#8892a4', font: { size: 11 }, boxWidth: 12, padding: 8 } },
        tooltip: {
          backgroundColor: '#1e2235', borderColor: '#3a3f5c', borderWidth: 1,
          titleColor: '#e2e8f0', bodyColor: '#a0aec0',
          footerColor: '#e2e8f0',
          callbacks: {
            label: ctx => {
              if (ctx.parsed.y == null || ctx.parsed.y === 0) return null;
              return `${ctx.dataset.label}: ${isCount ? ctx.parsed.y + ' 名' : ctx.parsed.y.toFixed(1) + ' h'}`;
            },
            footer: items => {
              const total = items.reduce((s, ctx) => s + (ctx.parsed.y || 0), 0);
              if (!total) return '';
              return `合計: ${isCount ? total + ' 名' : total.toFixed(1) + ' h'}`;
            },
          },
        },

/* ── Summary: 業務区分別グラフ ─────────────────────────────────── */
function renderSummaryWorkChart() {
  const { months, employees } = getExtendedActiveData();
  const content = document.getElementById('summary-content');
  const activeSites = SITES.filter(s => employees.some(e => e.base === s));
  const orderedWorkTypes = getOrderedWorkTypes(employees);
  const WT_COLORS = { '栽培': '#34d399', '出荷': '#facc15', '配送': '#f87171', '拠点業務': '#fb923c' };
  // 上記4種に完全一致しない業務区分（配送・出荷、配送・栽培等の複合区分）が
  // 全て同じ色にならないよう、インデックスでフォールバック色を割り当てる
  const WT_FALLBACK_COLORS = ['#60a5fa', '#c084fc', '#2dd4bf', '#f472b6', '#a3e635', '#fbbf24'];
  let wtFallbackIdx = 0;
  const wtColorMap = {};
  function wtColor(wt) {
    if (WT_COLORS[wt]) return WT_COLORS[wt];
    if (!wtColorMap[wt]) wtColorMap[wt] = WT_FALLBACK_COLORS[wtFallbackIdx++ % WT_FALLBACK_COLORS.length];
    return wtColorMap[wt];
  }

  let html = '<div class="schart-shell">';
  activeSites.forEach((site, si) => {
    const cid = 'wc_' + si;
    html += `
      <div class="schart-section">
        <div class="schart-header" style="color:${SITE_COLORS[site]}">${site}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div><div class="chart-section-label" style="padding-top:0;margin-bottom:6px">時間（h）</div>${chartWrapHtml(cid + '_h', months.length)}</div>
          <div><div class="chart-section-label" style="padding-top:0;margin-bottom:6px">人数（名）</div>${chartWrapHtml(cid + '_n', months.length)}</div>
        </div>
      </div>`;
  });
  html += '</div>';
  content.innerHTML = html;

  // 各拠点のデータセットを先に組み立てる（ページ内全拠点でY軸を統一するため）
  const perSite = activeSites.map((site, si) => {
    const cid = 'wc_' + si;
    const siteEmps = employees.filter(e => e.base === site && e.workType);
    const siteWTs = orderedWorkTypes.filter(wt => siteEmps.some(e => e.workType === wt));
    const datasetsH = siteWTs.map(wt => ({
      label: wt,
      data: months.map((_, mi) => {
        const vals = siteEmps.filter(e => e.workType === wt).map(e => e.hours[mi]).filter(h => h !== null);
        return vals.length ? Math.round(vals.reduce((a,b)=>a+b,0)*10)/10 : null;
      }),
      backgroundColor: wtColor(wt),
    }));
    const datasetsN = siteWTs.map(wt => ({
      label: wt,
      data: months.map((_, mi) => siteEmps.filter(e => e.workType === wt && e.hours[mi] !== null).length || null),
      backgroundColor: wtColor(wt),
    }));
    return { cid, datasetsH, datasetsN };
  });

  // フィルター適用後のデータをもとに、ページ内の全拠点グラフで時間・人数それぞれ共通の軸上限を算出
  const hMax = computeSharedAxisMax(perSite.map(p => stackedMonthlyTotals(months, p.datasetsH)), 100, 1.1);
  const nMax = computeSharedAxisMax(perSite.map(p => stackedMonthlyTotals(months, p.datasetsN)), 5, 1.1);

  perSite.forEach(({ cid, datasetsH, datasetsN }) => {
    buildStackedBarSection(cid, months, datasetsH, datasetsN, hMax, nMax);
  });
}

function renderSummaryByEmpType() {
  // 表示月数が少ないときの間延び対策：開始月から常にMONTH_COLUMN_TARGET本に揃える
  // （実データはそのまま、延長分は見出しのみ・空欄。シート最新月を超えた分は見出しも空欄）
  const { months, employees, originalCount } = getExtendedActiveData();
  const content = document.getElementById('summary-content');

  // 延長分（inRange:false）は表では完全な空欄にする（在範囲内の0/データなしは既存通り「—」のまま）
  function cellText(v, mi, isCount) {
    if (mi >= originalCount) return '';
    return isCount ? (v !== null ? v + ' 名' : '—') : fmtH(v);
  }

  function detailEmp(emp) {
    if (!emp) return 'パート';
    if (emp.includes('技能実習')) return '技能実習生';
    if (emp.includes('社員'))    return '社員';
    return 'パート';
  }

  const EMP_TYPES = ['社員', '技能実習生', 'パート'];
  const EMP_COLORS_MAP = { '社員': '#60a5fa', '技能実習生': '#c084fc', 'パート': '#fb923c' };
  const SITE_ROW_SPAN = EMP_TYPES.length * 2 + 2;

  let html = `<div class="summary-panel"><table class="summary-table">
    <thead><tr>
      <th class="col-site">拠点</th>
      <th class="col-work">雇用形態</th>
      <th class="col-emp">区分</th>
      ${months.map(m => `<th>${m}</th>`).join('')}
    </tr></thead><tbody>`;

  SITES.forEach(site => {
    const siteEmps = employees.filter(e => e.base === site && e.workType);
    if (!siteEmps.length) return;

    let firstRow = true;

    EMP_TYPES.forEach((et, etIdx) => {
      const etEmps = siteEmps.filter(e => detailEmp(e.employment) === et);
      const color = EMP_COLORS_MAP[et];
      const isSep = etIdx > 0;

      const hourVals = months.map((_, mi) => {
        const vals = etEmps.map(e => e.hours[mi]).filter(h => h !== null);
        return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
      });
      html += `<tr${isSep ? ' class="section-sep"' : ''}>`;
      if (firstRow) {
        html += `<td class="col-site" rowspan="${SITE_ROW_SPAN}" style="color:${SITE_COLORS[site]||'#fff'}">${site}</td>`;
        firstRow = false;
      }
      html += `<td class="col-work" rowspan="2" style="color:${color}">${et}</td>`;
      html += `<td class="col-emp">時間</td>`;
      hourVals.forEach((v, mi) => { html += `<td class="num">${cellText(v, mi, false)}</td>`; });
      html += '</tr>';

      const countVals = months.map((_, mi) => {
        const n = etEmps.filter(e => e.hours[mi] !== null).length;
        return n || null;
      });
      html += '<tr>';
      html += `<td class="col-emp">人数</td>`;
      countVals.forEach((v, mi) => { html += `<td class="num">${cellText(v, mi, true)}</td>`; });
      html += '</tr>';
    });

    const totalHours = months.map((_, mi) => {
      const vals = siteEmps.map(e => e.hours[mi]).filter(h => h !== null);
      return vals.length ? vals.reduce((a, b) => a + b, 0) : null;
    });
    html += '<tr class="site-total-last"><td class="col-emp" colspan="2" style="font-weight:800">合計／時間</td>';
    totalHours.forEach((v, mi) => { html += `<td class="num">${cellText(v, mi, false)}</td>`; });
    html += '</tr>';

    const totalCount = months.map((_, mi) => siteEmps.filter(e => e.hours[mi] !== null).length || null);
    html += '<tr class="site-total-last"><td class="col-emp" colspan="2" style="font-weight:800">合計／人数</td>';
    totalCount.forEach((v, mi) => { html += `<td class="num">${cellText(v, mi, true)}</td>`; });
    html += '</tr>';
  });

  html += '</tbody></table></div>';
  content.innerHTML = html;
}

/* ── Summary: 名簿タブ ─────────────────────────────────────────── */
let rosterSortCol = 'site';
let rosterSortAsc = true;
let rosterFilterSites = new Set(SITES);
let rosterFilterEmps  = null; // null = all; initialised on first render

function renderSummaryRoster() {
  // 表示月数が少ないときの間延び対策：開始月から常にMONTH_COLUMN_TARGET本に揃える
  // （実データはそのまま、延長分は見出しのみ・空欄。シート最新月を超えた分は見出しも空欄）
  const { months, employees, originalCount, nameLabel } = getExtendedActiveData();
  const content = document.getElementById('summary-content');

  const SITE_ORDER = { 'いなべ': 0, '群馬': 1, '南丹': 2 };
  const orderedWorkTypes = getOrderedWorkTypes(employees);

  // Unique employment values from data (preserve order of appearance)
  const allEmpTypes = [];
  employees.forEach(e => {
    const v = e.employment || '（未分類）';
    if (!allEmpTypes.includes(v)) allEmpTypes.push(v);
  });
  if (rosterFilterEmps === null) rosterFilterEmps = new Set(allEmpTypes);

  function filteredEmployees() {
    return employees.filter(e =>
      e.workType &&
      rosterFilterSites.has(e.base) &&
      rosterFilterEmps.has(e.employment || '（未分類）')
    );
  }

  function rosterSorted(col) {
    const copy = [...filteredEmployees()];
    copy.sort((a, b) => {
      let va, vb;
      if (col === 'site') {
        va = (SITE_ORDER[a.base] ?? 99) * 1000 + orderedWorkTypes.indexOf(a.workType) * 10;
        vb = (SITE_ORDER[b.base] ?? 99) * 1000 + orderedWorkTypes.indexOf(b.workType) * 10;
      } else if (col === 'work') { va = a.workType; vb = b.workType; }
      else if (col === 'emp')    { va = a.employment; vb = b.employment; }
      else if (col === 'name')   { va = a.name; vb = b.name; }
      if (typeof va === 'string') return rosterSortAsc ? va.localeCompare(vb,'ja') : vb.localeCompare(va,'ja');
      return rosterSortAsc ? va - vb : vb - va;
    });
    return copy;
  }

  function pillBtn(label, active, onclick) {
    return `<button class="roster-pill${active ? ' active' : ''}" onclick="${onclick}">${label}</button>`;
  }

  function buildContent() {
    const sorted = rosterSorted(rosterSortCol);
    const activeSites = SITES.filter(s => employees.some(e => e.base === s));

    // Filter bar
    let filterHtml = `<div class="roster-filters">
      <div class="roster-filter-group">
        <span class="roster-filter-label">拠点</span>`;
    activeSites.forEach(s => {
      const active = rosterFilterSites.has(s);
      filterHtml += pillBtn(s, active, `rosterToggleSite('${s}')`);
    });
    filterHtml += `</div><div class="roster-filter-group"><span class="roster-filter-label">雇用区分</span>`;
    allEmpTypes.forEach(et => {
      const active = rosterFilterEmps.has(et);
      filterHtml += pillBtn(et, active, `rosterToggleEmp('${et}')`);
    });
    filterHtml += `</div></div>`;

    const tableCols = [
      { key: 'site', label: '拠点' },
      { key: 'work', label: '業務区分' },
      { key: 'emp',  label: '雇用区分' },
      { key: 'name', label: nameLabel || '氏名' },
    ];

    let tableHtml = `<div class="roster-panel"><table class="roster-table"><thead><tr>`;
    tableCols.forEach(c => {
      const cls = c.key === 'site' ? ' col-site' : '';
      const sortCls = rosterSortCol === c.key ? (rosterSortAsc ? ' sort-asc' : ' sort-desc') : '';
      tableHtml += `<th class="${cls}${sortCls}" onclick="rosterSort('${c.key}')">${c.label}</th>`;
    });
    months.forEach(m => { tableHtml += `<th>${m}</th>`; });
    tableHtml += '</tr></thead><tbody>';

    if (sorted.length === 0) {
      tableHtml += `<tr><td colspan="${tableCols.length + months.length}" style="text-align:center;color:var(--muted);padding:24px">該当する従業員がいません</td></tr>`;
    } else {
      sorted.forEach(e => {
        tableHtml += `<tr>
          <td class="col-site" style="color:${SITE_COLORS[e.base]||'#fff'}">${e.base}</td>
          <td>${e.workType || '—'}</td>
          <td>${e.employment || '—'}</td>
          <td>${e.name}</td>`;
        months.forEach((_, mi) => {
          // 延長分（表示月数の範囲外）は空欄、範囲内はデータなしを「—」で表示
          if (mi >= originalCount) { tableHtml += '<td class="num"></td>'; return; }
          const h = e.hours[mi];
          tableHtml += `<td class="num">${h !== null ? h.toFixed(1) + ' h' : '—'}</td>`;
        });
        tableHtml += '</tr>';
      });
    }
    tableHtml += `</tbody></table></div>`;

    return filterHtml + tableHtml;
  }

  content.innerHTML = buildContent();

  window.rosterSort = function(col) {
    if (rosterSortCol === col) rosterSortAsc = !rosterSortAsc;
    else { rosterSortCol = col; rosterSortAsc = true; }
    content.innerHTML = buildContent();
  };
  window.rosterToggleSite = function(site) {
    if (rosterFilterSites.has(site)) rosterFilterSites.delete(site);
    else rosterFilterSites.add(site);
    content.innerHTML = buildContent();
  };
  window.rosterToggleEmp = function(et) {
    if (rosterFilterEmps.has(et)) rosterFilterEmps.delete(et);
    else rosterFilterEmps.add(et);
    content.innerHTML = buildContent();
  };
}

let productionData = null;

async function fetchProductionSheet() {
  if (productionData) return productionData;
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${PROD_GID}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^{]+/, '').replace(/[^}]+$/, ''));
  productionData = parseProductionData(json);
  return productionData;
}

let planData = null;

async function fetchPlanSheet() {
  if (planData) return planData;
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${PLAN_GID}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^{]+/, '').replace(/[^}]+$/, ''));
  planData = parseProductionData(json);
  return planData;
}

function parseProductionData(json) {
  const cols = json.table.cols;
  const rows = json.table.rows;

  // Detect month columns: index 3+ that have date-like labels (e.g. "2025/10")
  const monthCols = [];
  for (let i = 3; i < cols.length; i++) {
    const label = (cols[i]?.label || '').trim();
    if (/^\d{4}\/\d{1,2}$/.test(label)) monthCols.push({ idx: i, label });
  }

  const records = [];
  let currentSite = '';
  let currentCat = '';

  rows.forEach(row => {
    if (!row || !row.c) return;
    const cells = row.c;
    const raw = v => {
      const c = cells[v];
      return c ? (c.f || c.v || '') : '';
    };
    const siteVal = String(raw(0)).trim();
    const catVal  = String(raw(1)).trim();
    const metric  = String(raw(2)).trim();

    if (siteVal) currentSite = siteVal;
    if (catVal)  currentCat  = catVal;
    if (!metric || metric === 'null') return;

    const values = monthCols.map(m => {
      const c = cells[m.idx];
      if (!c || c.v === null || c.v === undefined || c.v === '') return null;
      if (typeof c.v === 'number') return c.v;
      const parsed = parseFloat(String(c.v).replace(/,/g, ''));
      return isNaN(parsed) ? null : parsed;
    });

    records.push({ site: currentSite, cat: currentCat, metric, values });
  });

  return { months: monthCols.map(m => m.label), records };
}

// カテゴリ列の表示統合用ヘルパー（勤務実績「整理済み_分析」・予実「整理済み_計画_更新」の
// 両テーブルで共用）。シート上は「栽培内訳」と「(コンテナ数)」が別カテゴリ値として隣接して
// おり、そのまま表示すると別カテゴリのように見えてしまうため、表示ラベル・グルーピング上は
// 1つの「栽培内訳（コンテナ数）」として統合する。元データのcat値・行・数値・計算ロジックは
// 一切変更しない（あくまで見た目のカテゴリ列の罫線・ラベルの結合のみ）
function displayCatLabel(cat) {
  if (cat === '栽培内訳' || cat === '(コンテナ数)') return '栽培内訳（コンテナ数）';
  return cat;
}

// 出荷関連（パック数・袋数・バラ数・合計(点数)）の4指標。実シート上はこの4指標が
// 複数の生カテゴリ文言（例:「出荷内訳」→パック数のみ、次いで別文言→残り3指標）に
// またがって記録されているため、生カテゴリ文言の一致では正しくグルーピングできない
const SHIPPING_METRICS = new Set(['パック数', '袋数', 'バラ数', '合計(点数)']);

// 拠点内のレコード列を、カテゴリ列に表示する「ブロック」（1ブロック＝1つの結合セル）に
// グルーピングする。非出荷系は displayCatLabel() 統合後の文言が隣接していれば1ブロックに
// まとめる（従来通り）。出荷系（SHIPPING_METRICSに含まれる指標）は、生カテゴリ文言の
// 変化ではなく「4指標が揃った時点」でブロックを閉じる方式で判定し、閉じたブロックごとに
// labelForOccurrence(1始まりの出現回数)でラベルを割り当てる。これにより生カテゴリ文言の
// 違いに依存せず、1つの出荷概念グループ＝1ブロックとして復元できる
function groupIntoLabeledBlocks(siteRecs, labelForOccurrence) {
  const raw = [];
  let shippingRun = null;
  let shippingCount = 0;

  function closeShippingRun() {
    if (!shippingRun) return;
    shippingCount += 1;
    raw.push({ label: labelForOccurrence(shippingCount), records: shippingRun.records });
    shippingRun = null;
  }

  siteRecs.forEach(r => {
    if (SHIPPING_METRICS.has(r.metric)) {
      if (!shippingRun) shippingRun = { records: [], seen: new Set() };
      shippingRun.records.push(r);
      shippingRun.seen.add(r.metric);
      if (shippingRun.seen.size >= SHIPPING_METRICS.size) closeShippingRun();
      return;
    }
    closeShippingRun();
    raw.push({ label: displayCatLabel(r.cat), records: [r] });
  });
  closeShippingRun();

  // 隣接ブロックが同一ラベルになった場合（栽培内訳/(コンテナ数)の統合、および
  // 勤務実績側で全出荷ブロックを1つの「出荷内訳（実績）」にまとめる場合）は
  // 1つの結合セルにまとめる
  const merged = [];
  raw.forEach(b => {
    const last = merged[merged.length - 1];
    if (last && last.label === b.label) last.records = last.records.concat(b.records);
    else merged.push({ label: b.label, records: b.records.slice() });
  });
  return merged;
}

function renderPlanTable({ months: planMonths, records }) {
  const main = document.getElementById('main');

  if (!records.length) {
    main.innerHTML = '<div class="loading">データが見つかりませんでした</div>';
    return;
  }

  // Group records by site
  const siteOrder = [];
  const bySite = {};
  records.forEach(r => {
    if (!bySite[r.site]) { bySite[r.site] = []; siteOrder.push(r.site); }
    bySite[r.site].push(r);
  });

  function rowClass(r, cat) {
    const classes = [];
    if (r.metric === '出荷量(kg)') return 'metric-syukka-kg';
    if (r.metric === '合計(点数)') classes.push('metric-goukei');
    if (cat.includes('生産実績') || cat.includes('生産計画')) classes.push('cat-seisan');
    else if (cat.includes('栽培')) classes.push('cat-saibai');
    else if (cat.includes('出荷')) classes.push('cat-syukka');
    return classes.join(' ');
  }

  let html = `<div class="prod-panel">
    <div class="chart-section-label">📅 生産計画 ／ 整理済み_計画_更新</div>
    <div class="prod-table-wrap">
    <table class="prod-table">
      <thead><tr>
        <th class="th-left" style="min-width:70px">拠点</th>
        <th class="th-left" style="min-width:120px">カテゴリ</th>
        <th class="th-left" style="min-width:130px">指標</th>
        ${planMonths.map(m => `<th>${m}</th>`).join('')}
      </tr></thead>
      <tbody>`;

  siteOrder.forEach((site, si) => {
    const siteRecs = bySite[site];
    const siteColor = SITE_COLORS[site] || '#e2e8f0';

    // カテゴリ列は「行ごと」ではなく「カテゴリのまとまりごと」に1つの結合セル(rowspan)で表示する。
    // 出荷関連の2グループ（構成比データ側・実数計画データ側）は、シート上の生カテゴリ文言に
    // 依存せず指標の内容と出現順で「出荷内訳（構成比）」「出荷内訳（計画）」を割り当てる
    const blocks = groupIntoLabeledBlocks(
      siteRecs,
      n => (n === 1 ? '出荷内訳（構成比）' : '出荷内訳（計画）')
    );

    let rowIdx = 0;
    blocks.forEach(block => {
      block.records.forEach((r, bi) => {
        const isFirstRow = rowIdx === 0;
        const isFirstOfBlock = bi === 0;

        const siteCell = isFirstRow
          ? `<td rowspan="${siteRecs.length}" style="color:${siteColor};font-weight:600;vertical-align:top;padding-top:10px">${site}</td>`
          : '';
        const catCell = isFirstOfBlock
          ? `<td class="col-cat" rowspan="${block.records.length}" style="color:var(--muted);font-size:0.78rem;vertical-align:top;padding-top:6px">${block.label}</td>`
          : '';

        const cls = rowClass(r, block.label);
        html += `<tr class="${cls}">${siteCell}${catCell}
          <td style="font-size:0.82rem">${r.metric}</td>
          ${r.values.map(v => `<td>${v !== null ? (Number.isInteger(v) ? v.toLocaleString('ja-JP') : v.toLocaleString('ja-JP', { maximumFractionDigits: 1 })) : ''}</td>`).join('')}
        </tr>`;
        rowIdx++;
      });
    });
  });

  html += '</tbody></table></div></div>';
  main.innerHTML = html;
}

function renderPlanStdHoursTable({ months: planMonths, records }) {
  const main = document.getElementById('main');
  const rows = loadYojitsuStdSettings();
  const conv = loadYojitsuCsConv();

  const originalCount = planMonths.length;
  const { calcRow } = createStdHoursEngine(records, planMonths, planMonths, originalCount, conv, null, '実数計画');

  const availSites = [...new Set(records.map(r => r.site))].filter(s => SITE_COLORS[s]);
  const divCount = {};
  rows.forEach(r => { divCount[r.div] = (divCount[r.div] || 0) + 1; });

    main.innerHTML = '<div class="loading">計画データが見つかりませんでした</div>';
