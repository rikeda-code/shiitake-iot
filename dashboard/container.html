<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>収穫状況ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3148;
      --text: #e2e8f0;
      --muted: #8892a4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.04em; }
    header .subtitle { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
    #last-updated { font-size: 0.8rem; color: var(--muted); }
    #refresh-btn {
      background: var(--border); border: none; color: var(--text);
      padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
      transition: background 0.2s;
    }
    #refresh-btn:hover { background: #3a3f5c; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      background: var(--surface);
    }
    .tab-btn {
      padding: 12px 24px;
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 0.9rem; font-weight: 500;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color 0.15s, border-color 0.15s;
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Main ── */
    main { padding: 28px 32px; display: flex; flex-direction: column; gap: 28px; }

    .section-title {
      font-size: 1rem; font-weight: 600; margin-bottom: 14px;
    }
    .section-title .sub {
      color: var(--muted); font-size: 0.78rem; font-weight: 400; margin-left: 8px;
    }

    /* ── KPI cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 12px;
    }
    .container-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      cursor: default;
      transition: border-color 0.15s;
    }
    .container-card:hover { border-color: #4a5070; }
    .card-no { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .card-name { font-size: 0.88rem; font-weight: 600; margin: 4px 0 10px; }
    .card-total { font-size: 1.55rem; font-weight: 700; }
    .card-unit { font-size: 0.7rem; font-weight: 400; color: var(--muted); }
    .card-breakdown { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
    .size-chip {
      font-size: 0.68rem; padding: 2px 7px; border-radius: 4px; font-weight: 600;
    }

    /* ── Chart sections ── */
    .chart-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }
    .chart-wrap { height: 340px; position: relative; }

    /* ── Container selector ── */
    .selector-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .selector-row label { font-size: 0.83rem; color: var(--muted); }
    .selector-row select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px; font-size: 0.83rem;
    }

    /* ── States ── */
    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 100px; color: var(--muted); font-size: 0.9rem;
    }
    .error-msg { color: #f87171; font-size: 0.85rem; padding: 16px; line-height: 1.6; }
    .setup-notice {
      background: rgba(251,191,36,0.08);
      border: 1px solid rgba(251,191,36,0.25);
      border-radius: 10px;
      padding: 20px 24px;
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--text);
    }
    .setup-notice strong { color: #fbbf24; }
    .setup-notice code {
      background: rgba(255,255,255,0.08);
      padding: 1px 6px; border-radius: 3px; font-size: 0.82rem;
    }

    /* ── Mgmt table ── */
    .mgmt-table-wrap { overflow-x: auto; margin-top: 4px; }
    .mgmt-table { width: 100%; border-collapse: collapse; font-size: 0.79rem; }
    .mgmt-table th, .mgmt-table td {
      padding: 8px 12px; border-bottom: 1px solid var(--border);
      text-align: right; white-space: nowrap;
    }
    .mgmt-table th { color: var(--muted); font-weight: 500; background: rgba(0,0,0,0.25); position: sticky; top: 0; }
    .mgmt-table td:first-child, .mgmt-table th:first-child,
    .mgmt-table td:nth-child(2), .mgmt-table th:nth-child(2),
    .mgmt-table td:nth-child(3), .mgmt-table th:nth-child(3),
    .mgmt-table td:nth-child(4), .mgmt-table th:nth-child(4) { text-align: left; }
    .mgmt-table tr:hover td { background: rgba(255,255,255,0.03); }
    .mgmt-table .col-increase { color: #34d399; }
    .mgmt-table .col-decrease { color: #f87171; }
    .mgmt-sub-header { font-size: 0.72rem; color: var(--muted); margin: 20px 0 6px; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── Sort bar ── */
    .weekly-sort-bar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .sort-label { font-size: 0.78rem; color: var(--muted); }
    .sort-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted); padding: 4px 10px; border-radius: 5px;
      cursor: pointer; font-size: 0.78rem; transition: all 0.15s;
    }
    .sort-btn:hover { border-color: #4a5568; color: var(--text); }
    .sort-btn.active { background: #3b82f622; border-color: #3b82f6; color: #93c5fd; }

    /* ── Card colors ── */
    .card-cn { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .card-sd { font-size: 0.72rem; color: var(--muted); margin-bottom: 6px; }
    .card-harvest { font-size: 1.1rem; font-weight: 700; color: #60a5fa; margin-bottom: 6px; }
    .card-harvest.card-red { color: #f87171; }
    .card-unit { font-size: 0.7rem; font-weight: 400; color: var(--muted); }
    .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .card-chip {
      font-size: 0.72rem; padding: 2px 7px; border-radius: 4px;
      background: #ffffff11; color: var(--muted);
    }
    .card-chip-red { background: #ef444422 !important; color: #f87171 !important; }

    /* ── Weekly charts ── */
    #weekly-section .section-title { margin-bottom: 0; }
    .weekly-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .weekly-chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px 16px;
    }
    .weekly-chart-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .weekly-legend {
      display: flex; gap: 12px; flex-wrap: wrap;
      font-size: 0.72rem; margin-bottom: 6px;
    }
    .weekly-legend-item { display: flex; align-items: center; gap: 4px; }
    .weekly-legend-dot { width: 10px; height: 3px; border-radius: 2px; }

    @media (max-width: 640px) {
      header, main { padding: 16px; }
      .tabs { padding: 0 16px; }
      .tab-btn { padding: 10px 14px; font-size: 0.82rem; }
      .chart-wrap { height: 260px; }
      #weekly-section { margin: 0 16px 32px; }
      .weekly-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<script>
// ── Config ─────────────────────────────────────────────────────────────────────

const SITES = [

  { name: '群馬',   id: '1oNBFKF2_mRCqs3uxHXwjCQP3ymLY42nyzTYtpRzXM0A', color: '#a78bfa', indexSheet: '収穫実績集計表' },
  { name: '南丹',   id: '1bAdmTLPGtwn6JH6C16m2nzr3RJhZpgAuSMaVtIL1aRc', color: '#34d399', indexSheet: '収穫実績集計表' },

const SIZES = [
  { key: 'm',       label: 'M秀',  color: '#38bdf8' },
  { key: 'l',       label: 'L秀',  color: '#34d399' },

];

const MGMT_ID = '1xD3RJ3NaxFPERZGBNEL3gwn3Zg8hIsh7nyM-ekgwHUI';

const CONTAINER_PALETTE = [
  '#38bdf8','#34d399','#a78bfa','#f97316','#fb7185','#facc15',
  '#4ade80','#c084fc','#f472b6','#60a5fa','#fb923c','#2dd4bf',
  '#818cf8','#e879f9','#a3e635','#fbbf24',
];

// ── State ──────────────────────────────────────────────────────────────────────

let currentSiteIdx = 0;
const cache     = {}; // { [siteId]: { summary: [], containers: [], data: {} } }
const mgmtCache = {}; // { [siteName]: { sansui: [], chusui: [], mekaki: [] } }
let chartCumul = null;
let chartStack = null;
let weeklyCharts = [];

const SITE_WEEKLY_COLORS = {
  'いなべ': '#3b82f6',
  '群馬':   '#f97316',
  '南丹':   '#34d399',
};

// ── Chart.js loader ────────────────────────────────────────────────────────────
function waitForChart(ms = 15000) {
  if (typeof Chart !== 'undefined') return Promise.resolve();
  return new Promise((resolve, reject) => {
    const deadline = Date.now() + ms;
    const poll = () => {
      if (typeof Chart !== 'undefined') { resolve(); return; }
      if (Date.now() > deadline) {
        // Last resort: inject script dynamically
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Chart.js failed to load'));
        document.head.appendChild(s);
        return;
      }
      setTimeout(poll, 100);
    };
    setTimeout(poll, 100);
  });
}

// ── Data helpers ───────────────────────────────────────────────────────────────

async function fetchSheet(sheetId, sheetName, headers = 1) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&headers=${headers}`;
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 8000);
  try {
    const res = await fetch(url, { signal: controller.signal });
    if (!res.ok) throw new Error(`HTTP ${res.status}: ${sheetName}`);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^{]+/, '').replace(/[^}]+$/, ''));
    if (json.status === 'error') throw new Error(json.errors?.[0]?.detailed_message || 'シートエラー');
    return json.table;
  } finally {
    clearTimeout(timer);
  }
}

function gvizDateStr(v, f) {
  // Prefer formatted string
  if (f && typeof f === 'string') return f;
  if (!v) return null;
  const s = String(v);
  // "Date(2025,5,14)" → month is 0-based
  const m = s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (m) return `${m[1]}/${parseInt(m[2]) + 1}/${m[3]}`;
  return s;
}

// コンテナ名から番号部分を抽出: "2-4(6/19)L3" → "2-4", "5(6/17)L3" → "5"
function extractContainerNo(name) {
  const m = String(name).match(/^(.+?)\(/);
  return m ? m[1].trim() : String(name).trim();
}

// サイト別ソートキー: [group, subNo]
function containerSortKey(siteName, no) {
  const simple   = /^\d+$/.test(no);
  const compound = no.match(/^(\d+)-(\d+)$/);

  if (siteName === 'いなべ') {
    return [0, simple ? parseInt(no) : 999];
  }
  if (siteName === '群馬') {
    if (simple)    return [0, parseInt(no)];
    if (compound) {
      const [, p, s] = compound;
      if (p === '3') return [1, parseInt(s)];
      if (p === '2') return [2, parseInt(s)];
    }
    return [99, 0];
  }
  if (siteName === '南丹') {
    if (simple)    return [0, simple ? parseInt(no) : 999];
    if (compound) {
      const [, p, s] = compound;
      if (p === '1') return [1, parseInt(s)];
      if (p === '2') return [2, parseInt(s)];
      if (p === '3') return [3, parseInt(s)];
    }
    return [99, 0];
  }
  return [0, simple ? parseInt(no) : 999];
}

async function fetchSummaryRows(site) {
  const table = await fetchSheet(site.id, site.indexSheet);
  // C(2)=栽培開始日 E(4)=栽培日数 F(5)=コンテナ名 J(9)=収穫量g/菌床 M(12)=パック品率
  const SKIP = new Set(['コンテナ名', '号機', '見本', '']);
  const raw = [];
  (table.rows || []).forEach(row => {
    const cells = row.c || [];
    const nameCell = cells[5];
    const name = (nameCell?.v != null ? String(nameCell.v) : (nameCell?.f ?? '')).trim();
    if (SKIP.has(name)) return;

    // Prefer raw Date() value for reliable parsing downstream
    const sdCell    = cells[2];
    const startDate = sdCell?.v ? (gvizDateStr(sdCell.v, null) ?? gvizDateStr(null, sdCell?.f) ?? '') : (gvizDateStr(null, sdCell?.f) ?? '');
    const edCell    = cells[3];
    const endDate   = edCell?.v ? (gvizDateStr(edCell.v, null) ?? gvizDateStr(null, edCell?.f) ?? '') : (gvizDateStr(null, edCell?.f) ?? '');
    const days      = cells[4]?.v != null ? parseInt(cells[4].v) : null;
    const harvest   = cells[9]?.v != null ? parseFloat(cells[9].v) : null;
    const packRaw   = cells[12]?.v;
    // パック品率: 0-1の小数か0-100の整数かを自動判定
    let packRate = null;
    if (packRaw != null && packRaw !== '') {
      const n = parseFloat(packRaw);
      if (!isNaN(n)) packRate = n <= 1 ? Math.round(n * 100) : Math.round(n);
    }
    raw.push({ name, startDate, endDate, days, harvest, packRate, no: extractContainerNo(name) });
  });

  // 同一コンテナNo.の重複処理: 最新の startDate を持つ行を残す
  const best = {};
  raw.forEach(r => {
    const key = r.no;
    if (!best[key]) { best[key] = r; return; }
    const curr = parseDateStr(r.startDate);
    const prev = parseDateStr(best[key].startDate);
    if (curr && (!prev || curr > prev)) best[key] = r;
  });

  // ソート
  const sorted = Object.values(best).sort((a, b) => {
    const ka = containerSortKey(site.name, a.no);
    const kb = containerSortKey(site.name, b.no);
    return ka[0] !== kb[0] ? ka[0] - kb[0] : ka[1] - kb[1];
  });

  return sorted;
}

function parseContainerRows(table) {
  const colMap = {};
  (table.cols || []).forEach((c, i) => {
    const lbl = (c.label || '').replace(/\s/g, '');
    if (lbl.includes('日付'))      colMap.date    = i;
    if (/^M秀/.test(lbl))          colMap.m       = i;
    if (/^L秀/.test(lbl))          colMap.l       = i;
    if (/^2L秀/.test(lbl))         colMap.xl      = i;
    if (/^優/.test(lbl))           colMap.premium = i;
  });

  const rows = [];
  (table.rows || []).forEach(row => {
    const cells = row.c || [];
    if (colMap.date == null) return;
    const dc = cells[colMap.date];
    const date = gvizDateStr(dc?.v, dc?.f);
    if (!date) return;

    const m       = parseFloat(cells[colMap.m]?.v)       || 0;
    const l       = parseFloat(cells[colMap.l]?.v)       || 0;
    const xl      = parseFloat(cells[colMap.xl]?.v)      || 0;
    const premium = parseFloat(cells[colMap.premium]?.v) || 0;
    const total   = m + l + xl + premium;
    if (total > 0) rows.push({ date, m, l, xl, premium, total });
  });

  return rows.sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
}

// Parse "M/D" or "M月D日" short dates — uses current year as default
function parseDateMD(v, f) {
  const s = String(v ?? f ?? '');
  let m = s.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (m) return new Date(new Date().getFullYear(), parseInt(m[1]) - 1, parseInt(m[2]));
  m = s.match(/^(\d{1,2})月(\d{1,2})日/);
  if (m) return new Date(new Date().getFullYear(), parseInt(m[1]) - 1, parseInt(m[2]));
  return null;
}

// Parse individual container sheet (headers=0).
// Supports two layouts:
//   Type A (いなべ/群馬): dayIdx in some col (0-based int), date ~5 cols later, dailyKg ~12 cols later
//   Type B (南丹): YYYYMMDD string in col3, actual date in col5, dailyKg in cols 13-16
function parseContainerRowsV2(table, startDateStr) {
  const allRows = table.rows || [];
  if (!allRows.length) return { bedCount: null, rows: [] };

  // Detect Type B (南丹): YYYYMMDD in col3 around rows 6-18
  let isTypeB = false;
  for (let ri = 6; ri < Math.min(18, allRows.length); ri++) {
    const v = allRows[ri]?.c?.[3]?.v;
    if (typeof v === 'string' && /^\d{8}$/.test(v)) { isTypeB = true; break; }
  }

  // Helper: parse integer from cell value
  const toInt = v => {
    if (typeof v === 'number' && v >= 0 && Number.isInteger(v)) return v;
    if (typeof v === 'string' && /^\d+$/.test(v.trim())) return parseInt(v);
    return NaN;
  };

  // If not TypeB, attempt TypeA dayCol detection first
  // TypeA (いなべ): sheet has integer dayIdx (0,1,2...) in some column
  let dayCol = -1;
  if (!isTypeB) {
    const colCandidates = {};
    for (let ri = 2; ri < Math.min(14, allRows.length); ri++) {
      const cells = allRows[ri]?.c || [];
      for (let ci = 0; ci <= 6; ci++) {
        const n = toInt(cells[ci]?.v);
        if (!isNaN(n) && n <= 5) {
          if (!colCandidates[ci]) colCandidates[ci] = new Set();
          colCandidates[ci].add(n);
        }
      }
    }
    for (const ci of [0,1,2,3,4,5,6]) {
      if (colCandidates[ci]?.has(0) && colCandidates[ci]?.has(1)) { dayCol = ci; break; }
    }
    if (dayCol === -1) for (const ci of [0,1,2,3,4,5]) {
      if (colCandidates[ci]?.has(0)) { dayCol = ci; break; }
    }
  }

  // Detect Type C (群馬 wide) ONLY if TypeA dayCol not found
  // TypeC: YYYYMMDD in col2, "号基" in col3 — each row is one day, columns span all beds
  let isTypeC = false;
  if (!isTypeB && dayCol === -1) {
    for (let ri = 1; ri < Math.min(8, allRows.length); ri++) {
      const cells = allRows[ri]?.c || [];
      const v2 = cells[2]?.v != null ? String(cells[2].v) : '';
      const v3 = String(cells[3]?.v ?? '');
      if (/^\d{8}$/.test(v2) && v3.includes('号基')) {
        isTypeC = true; break;
      }
    }
  }

  // bedCount location differs by type
  let bedCount = null;
  const nearInt = (v, lo = 10, hi = 9999) => {
    const n = parseFloat(v);
    const r = Math.round(n);
    return (r >= lo && r <= hi && Math.abs(n - r) < 0.5) ? r : null;
  };
  if (isTypeB) {
    // Type B: bedCount is at H3 (row index 2, col index 7)
    bedCount = nearInt(allRows[2]?.c?.[7]?.v);
  } else if (isTypeC) {
    // Type C: scan rows 0-2 for bedCount
    for (let ri = 0; ri <= 2 && bedCount === null; ri++) {
      const cells = allRows[ri]?.c || [];
      for (let ci = 0; ci < Math.min(cells.length, 60); ci++) {
        bedCount = nearInt(cells[ci]?.v, 10, 9999);
        if (bedCount !== null) break;
      }
    }
    console.log('[TypeC bedCount]', startDateStr, 'bedCount=', bedCount,
      'row0=', (allRows[0]?.c||[]).slice(0,15).map(c=>c?.v).join('|'),
      'row1=', (allRows[1]?.c||[]).slice(0,15).map(c=>c?.v).join('|'));
  } else {
    // Type A: scan rows 1-4, cols 4-12
    for (let ri = 1; ri <= 4 && bedCount === null; ri++) {
      for (let ci = 4; ci <= 12 && bedCount === null; ci++) {
        bedCount = nearInt(allRows[ri]?.c?.[ci]?.v);
      }
    }
  }

  const rows = [];
  if (isTypeB) {
    // Type B (南丹): date in col5, daily total in col13
    const startD = parseDateStr(startDateStr);
    for (let ri = 0; ri < allRows.length; ri++) {
      const cells = allRows[ri]?.c || [];
      const ds = cells[3]?.v;
      if (typeof ds !== 'string' || !/^\d{8}$/.test(ds)) continue;
      const rowDate = cellToDate(cells[5]?.v, cells[5]?.f);
      if (!rowDate) continue;
      const v13 = parseFloat(cells[13]?.v);
      const daily = (!isNaN(v13) && v13 > 0) ? v13 : [6, 7, 8, 9].reduce((s, ci) => {
        const v = parseFloat(cells[ci]?.v);
        return s + (isNaN(v) || v < 0 ? 0 : v);
      }, 0);
      if (!startD) continue;
      const dayNum = Math.round((rowDate - startD) / 86400000) + 1;
      if (dayNum >= 1 && dayNum <= 200) rows.push({ rowDate, dayNum, daily });
    }
  } else if (isTypeC) {
    // Type C (群馬 wide): col1="N日", col2=YYYYMMDD, cols4+ = per-bed harvest values
    for (let ri = 0; ri < allRows.length; ri++) {
      const cells = allRows[ri]?.c || [];
      const dayLabel = String(cells[1]?.v ?? '');
      const dm = dayLabel.match(/^(\d+)日$/);
      if (!dm) continue;
      const dayNum = parseInt(dm[1]);
      if (dayNum < 1 || dayNum > 200) continue;
      let daily = 0;
      for (let ci = 4; ci < cells.length; ci++) {
        const v = parseFloat(cells[ci]?.v);
        if (!isNaN(v) && v > 0 && v < 10000) daily += v;
      }
      // Parse rowDate from col2 YYYYMMDD for future-row cutoff
      const ds2 = String(cells[2]?.v ?? '');
      let rowDate = null;
      if (/^\d{8}$/.test(ds2)) {
        rowDate = new Date(parseInt(ds2.slice(0,4)), parseInt(ds2.slice(4,6))-1, parseInt(ds2.slice(6,8)));
      }
      rows.push({ dayNum, daily, rowDate });
    }
  } else {
    // Type A (いなべ): integer dayIdx in dayCol (already detected above)
    if (dayCol === -1) dayCol = 1;

    for (let ri = 0; ri < allRows.length; ri++) {
      const cells = allRows[ri]?.c || [];
      const dayIdx = toInt(cells[dayCol]?.v);
      if (isNaN(dayIdx)) continue;
      let rowDate = null;
      for (let dc = dayCol + 2; dc <= dayCol + 10; dc++) {
        rowDate = cellToDate(cells[dc]?.v, cells[dc]?.f);
        if (rowDate) break;
      }
      if (!rowDate) continue;
      let daily = 0;
      for (const offset of [12, 11, 13, 10]) {
        const v = parseFloat(cells[dayCol + offset]?.v);
        if (!isNaN(v) && v >= 0) { daily = v; break; }
      }
      rows.push({ rowDate, dayNum: dayIdx + 1, daily });
    }
  }

  rows.sort((a, b) => a.dayNum - b.dayNum);
  return { bedCount, rows };
}

// Return Sun-Sat week info for a date string (e.g. "2025/6/14")
function getSunSatWeek(dateStr) {
  const p = dateStr.split('/');
  if (p.length < 3) return null;
  const d   = new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
  if (isNaN(d)) return null;
  const dow = d.getDay(); // 0=Sun
  const sun = new Date(d); sun.setDate(d.getDate() - dow);
  const sat = new Date(d); sat.setDate(d.getDate() + (6 - dow));
  const fmt = dt => `${dt.getMonth() + 1}/${dt.getDate()}`;
  return {
    key:   sun.toISOString().slice(0, 10),
    label: `${fmt(sun)}~${fmt(sat)}`,
  };
}

// Parse date string to Date object — handles "2025/6/14", "2025年6月14日", "R7/6/14" etc.
function parseDateStr(s) {
  if (!s) return null;
  // "2025/6/14" or "2025/06/14"
  let m = String(s).match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
  // "2025年6月14日"
  m = String(s).match(/^(\d{4})年(\d{1,2})月(\d{1,2})日/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2]) - 1, parseInt(m[3]));
  // "6/17/2026" M/D/YYYY (gviz formatted string in some locales)
  m = String(s).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(parseInt(m[3]), parseInt(m[1]) - 1, parseInt(m[2]));
  // Fallback: let browser parse
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

// Extract a JS Date directly from a gviz cell value (prefer raw Date() value over formatted string)
function cellToDate(v, f) {
  if (v) {
    const s = String(v);
    const m = s.match(/Date\((\d+),(\d+),(\d+)\)/);
    if (m) return new Date(parseInt(m[1]), parseInt(m[2]), parseInt(m[3])); // month is 0-based from gviz
  }
  return parseDateStr(f);
}

        .catch(() => [])
    ))).flat().filter(r => r.startDate);

    async function fetchWithLimit(items, fn, limit = 15) {

function renderWeeklySection(section, state, groupMode, sortOrder) {
  const { containerData, targetData } = state;
  const valid = containerData.filter(c => c.rows.length > 0 && c.bedCount > 0);
  if (!valid.length) {
    section.innerHTML = `<div class="section-title">週別 累計収穫量推移<span class="sub">全拠点・栽培開始週別 (g/菌床)</span></div>
      <div class="error-msg" style="padding:16px 0">表示できるデータがありません</div>`;
    return;
  }

  // Build groups
  const groups = {};
  let groupKeys = [];
  if (groupMode === 'site') {
    valid.forEach(c => {
      if (!groups[c.siteName]) groups[c.siteName] = { label: c.siteName, containers: [] };
      groups[c.siteName].containers.push(c);
    });
    groupKeys = Object.keys(groups);
  } else if (groupMode === 'month') {
    valid.forEach(c => {
      let week = c.startDate ? getSunSatWeek(c.startDate) : null;
      if (!week && c.rows[0]?.rowDate) {
        const rd = c.rows[0].rowDate;
        week = getSunSatWeek(`${rd.getFullYear()}/${rd.getMonth()+1}/${rd.getDate()}`);
      }
      if (!week) return;
      const monthKey = week.key.slice(0, 7); // "2026-01"
      const monthLabel = `${parseInt(week.key.slice(5,7))}月`;
      if (!groups[monthKey]) groups[monthKey] = { label: monthLabel, containers: [] };
      groups[monthKey].containers.push(c);
    });
    groupKeys = Object.keys(groups).sort();
    if (sortOrder === 'desc') groupKeys.reverse();
  } else {
    // week (default)
    valid.forEach(c => {
      let week = c.startDate ? getSunSatWeek(c.startDate) : null;
      if (!week && c.rows[0]?.rowDate) {
        const rd = c.rows[0].rowDate;
        week = getSunSatWeek(`${rd.getFullYear()}/${rd.getMonth()+1}/${rd.getDate()}`);
      }
      if (!week) return;
      if (!groups[week.key]) groups[week.key] = { label: week.label, containers: [] };
      groups[week.key].containers.push(c);
    });
    groupKeys = Object.keys(groups).sort();
    if (sortOrder === 'desc') groupKeys.reverse();
  }

  const legendHtml = Object.entries(SITE_WEEKLY_COLORS).map(([name, color]) =>
    `<div class="weekly-legend-item"><span class="weekly-legend-dot" style="background:${color}"></span>${name}</div>`
  ).join('');

  const sortBar = `
    <div class="weekly-sort-bar">
      <span class="sort-label">並び順:</span>
      <button class="sort-btn${sortOrder==='desc'?' active':''}" onclick="weeklySetSort('desc')">新しい順</button>
      <button class="sort-btn${sortOrder==='asc'?' active':''}" onclick="weeklySetSort('asc')">古い順</button>
      <span class="sort-label" style="margin-left:12px">グループ:</span>
      <button class="sort-btn${groupMode==='week'?' active':''}" onclick="weeklySetGroup('week')">週別</button>
      <button class="sort-btn${groupMode==='month'?' active':''}" onclick="weeklySetGroup('month')">月別</button>
      <button class="sort-btn${groupMode==='site'?' active':''}" onclick="weeklySetGroup('site')">拠点別</button>
    </div>`;

  // Use index-based canvas IDs to avoid collisions with non-ASCII group keys
  const cardsHtml = groupKeys.map((k, idx) => `
    <div class="weekly-chart-card">
      <div class="weekly-chart-title">${groups[k].label}</div>
      <div class="chart-wrap" style="height:260px"><canvas id="wc-${idx}"></canvas></div>
    </div>`).join('');

  section.innerHTML = `
    <div class="section-title" style="margin-bottom:4px">週別 累計収穫量推移<span class="sub">全拠点・栽培開始週別 (g/菌床)</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px">
      <div class="weekly-legend">${legendHtml}</div>
      ${sortBar}
    </div>
    <div class="weekly-grid">${cardsHtml}</div>`;

  // Persist current mode for button callbacks
  section.dataset.groupMode = groupMode;
  section.dataset.sortOrder = sortOrder;

  weeklyCharts.forEach(c => { try { c.destroy(); } catch(e) {} });
  weeklyCharts = [];
  groupKeys.forEach((k, idx) => {
    const canvasId = `wc-${idx}`;
    const canvas = document.getElementById(canvasId);
    if (canvas) buildWeeklyLineChart(canvasId, groups[k].containers, targetData);
  });
}

function weeklySetSort(order) {
  const section = document.getElementById('weekly-section');
  if (!section || !weeklyState) return;
  const groupMode = section.dataset.groupMode || 'week';
  weeklyCharts.forEach(c => { try { c.destroy(); } catch(e) {} });
  weeklyCharts = [];
  renderWeeklySection(section, weeklyState, groupMode, order);
}

function weeklySetGroup(mode) {
  const section = document.getElementById('weekly-section');
  if (!section || !weeklyState) return;
  const sortOrder = section.dataset.sortOrder || 'desc';
  weeklyCharts.forEach(c => { try { c.destroy(); } catch(e) {} });
  weeklyCharts = [];
  renderWeeklySection(section, weeklyState, mode, sortOrder);
}

function buildWeeklyLineChart(canvasId, containers, targetData) {
  if (typeof Chart === 'undefined') { console.warn('[buildChart] Chart.js not loaded'); return; }
  const canvas = document.getElementById(canvasId);
  if (!canvas) { console.warn('[buildChart] canvas not found:', canvasId); return; }
  const ctx = canvas.getContext('2d');

  const MAX_DAY = 65;
  const xLabels = Array.from({ length: MAX_DAY + 1 }, (_, i) => i);
  const today = new Date(); today.setHours(0,0,0,0);

  const tomorrow = new Date(today.getTime() + 86400000);

  const datasets = containers.map(c => {
    const color = SITE_WEEKLY_COLORS[c.siteName] || '#888';
    const cumArr = new Array(MAX_DAY + 1).fill(null);
    const bedCount = c.bedCount > 0 ? c.bedCount : null;
    let cumKg = 0;
    let cutoffDay = 0;

    c.rows.forEach(r => {
      // Use rowDate (from sheet F column) to skip today and future rows
      if (r.rowDate && r.rowDate >= today) return;
      cumKg += r.daily;
      const d = Math.round(r.dayNum);
      if (d >= 0 && d <= MAX_DAY) {
        cumArr[d] = bedCount ? Math.round((cumKg * 1000) / bedCount) : null;
        cutoffDay = Math.max(cutoffDay, d);
      }
    });

    // Fallback for Type C rows without rowDate: use startDate calculation
    if (cutoffDay === 0) {
      const startD = parseDateStr(c.startDate);
      if (startD) {
        cutoffDay = Math.min(Math.round((today - startD) / 86400000), MAX_DAY);
      } else {
        const harvestDays = c.rows.filter(r => r.daily > 0).map(r => r.dayNum);
        cutoffDay = harvestDays.length > 0 ? Math.min(Math.max(...harvestDays), MAX_DAY) : 0;
      }
    }

    // Forward-fill only up to cutoffDay (fills zero-harvest days between real data)
    let last = null;
    for (let i = 0; i <= MAX_DAY; i++) {
      if (cumArr[i] !== null) { last = cumArr[i]; }
      else if (last !== null && i <= cutoffDay) { cumArr[i] = last; }
    }

    return {
      label: `${c.siteName} ${c.name}`,
      data: cumArr,
      borderColor: color,
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      pointRadius: 0,
      pointHoverRadius: 4,
      tension: 0.2,
      spanGaps: false,
    };
  });

  // Target line: index i = day i
  const tData = targetData || HARDCODED_TARGET;
  const targetArr = xLabels.map((d, i) => tData[i] != null ? tData[i] : null);
  datasets.push({
    label: '目標',
    data: targetArr,
    borderColor: '#94a3b8',
    backgroundColor: 'transparent',
    borderWidth: 1.5,
    borderDash: [6, 4],
    pointRadius: 0,
    tension: 0,
    spanGaps: false,
  });

  const chart = new Chart(ctx, {
    type: 'line',
    data: { labels: xLabels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          ...tooltipDefaults,
          callbacks: {
            title: items => `栽培${items[0].label}日目`,
            label: c => c.raw !== null ? `${c.dataset.label}: ${c.raw}g/菌床` : null,
          },
        },
      },
      scales: {
        x: {
          type: 'category',
          title: { display: true, text: '栽培日数', color: '#8892a4', font: { size: 10 } },
          ticks: {
            color: '#8892a4', font: { size: 10 },
            callback: (val, idx) => idx % 10 === 0 ? xLabels[idx] : '',
          },
          grid: { color: '#1e2235' },
        },
        y: {
          min: 0,
          ticks: { color: '#8892a4', font: { size: 10 }, callback: v => `${v}g` },
          grid: { color: '#1e2235' },
        },
      },
    },
  });

  weeklyCharts.push(chart);
}

// "47(6/14)志摩L3" → { no:"47", startDate:"6/14", location:"志摩", type:"L3" }
function parseContainerName(raw) {
  const s = String(raw);
  const m = s.match(/^(\d+)\(([^)]+)\)(.+?)([A-Za-z]\d*)$/);
  if (m) return { no: m[1], startDate: m[2], location: m[3], type: m[4], raw: s };
  return { no: s, startDate: '', location: '', type: '', raw: s };
}

    }

    const harvestVal = Math.round(row.harvest);
    const harvestOk  = harvestVal >= 660;
    const packOk     = row.packRate == null || row.packRate >= 80;
    const sd   = row.startDate || '—';
    const days = row.days != null ? `${row.days}日` : '—';
    const packStr = row.packRate != null ? `${row.packRate}%` : '—';

    return `<div class="container-card">
      <div class="card-cn" title="${row.name}">${displayName}</div>
      <div class="card-sd">開始: ${sd}</div>
      <div class="card-harvest${harvestOk ? '' : ' card-red'}">${harvestVal.toLocaleString('ja-JP')}<span class="card-unit"> g/菌床</span></div>
      <div class="card-meta">
        <span class="card-chip">${days}</span>
        <span class="card-chip${packOk ? '' : ' card-chip-red'}">${packStr}</span>
      </div>
    </div>`;
  }).join('');

  return `<div class="cards-grid">${html}</div>`;
}

// ── Mgmt data ─────────────────────────────────────────────────────────────────

function parseMgmtRows(table) {
  const colMap = {};
  (table.cols || []).forEach((c, i) => {
    const lbl = (c.label || '').replace(/\s/g, '');
    if (lbl.includes('菌床種類'))                    colMap.type     = i;
    if (lbl.includes('散水開始時間'))                 colMap.time     = i;
    if (lbl.includes('栽培開始日'))                   colMap.startD   = i;
    if (lbl.includes('号機'))                         colMap.no       = i;
    if (lbl.includes('上下段'))                       colMap.ud       = i;
    // Avoid matching "(ave.)" columns
    if (lbl.includes('散水前重量') && !lbl.includes('ave')) colMap.before  = i;
    if (lbl.includes('散水20h')   && !lbl.includes('ave')) colMap.after20 = i;
    if (/^0-20h増加量/.test(lbl)  && !lbl.includes('ave')) colMap.inc20   = i;
    // 注水 sheets may use same col names; also accept 注水前 / 注水後
    if (lbl.includes('注水前重量') && !lbl.includes('ave')) colMap.before  = i;
    if (lbl.includes('注水20h')   && !lbl.includes('ave')) colMap.after20 = i;
  });

  const rows = [];
  (table.rows || []).forEach(row => {
    const cells = row.c || [];
    const get = (idx) => {
      if (idx == null) return null;
      const c = cells[idx];
      if (!c) return null;
      return c.v ?? c.f ?? null;
    };
    const no = get(colMap.no);
    if (no == null || String(no).trim() === '') return;

    const startD  = get(colMap.startD);
    const ud      = get(colMap.ud);
    const type    = get(colMap.type);
    const time    = get(colMap.time);
    const before  = parseFloat(get(colMap.before))  || null;
    const after20 = parseFloat(get(colMap.after20)) || null;
    const inc20   = parseFloat(get(colMap.inc20))   || null;

    rows.push({
      no: String(no).trim(),
      startD: startD != null ? String(startD).trim() : '',
      ud:     ud     != null ? String(ud).trim()     : '',
      type:   type   != null ? String(type).trim()   : '',
      time:   time   != null ? String(time).trim()   : '',
      before, after20, inc20,
    });
  });
  return rows;
}

function parseMekakiRows(table) {
  // 1回目収穫芽かき: flexible — find 号機/上下段/栽培開始日/芽かき量
  const colMap = {};
  (table.cols || []).forEach((c, i) => {
    const lbl = (c.label || '').replace(/\s/g, '');
    if (lbl.includes('号機'))      colMap.no    = i;
    if (lbl.includes('上下段'))    colMap.ud    = i;
    if (lbl.includes('栽培開始日')) colMap.startD = i;
    if (lbl.includes('菌床種類'))  colMap.type  = i;
    if (lbl.includes('芽かき'))    colMap.mekaki = i;
  });

  const rows = [];
  (table.rows || []).forEach(row => {
    const cells = row.c || [];
    const get = (idx) => {
      if (idx == null) return null;
      const c = cells[idx];
      return c ? (c.v ?? c.f ?? null) : null;
    };
    const no = get(colMap.no);
    if (no == null || String(no).trim() === '') return;
    rows.push({
      no:     String(no).trim(),
      startD: get(colMap.startD) != null ? String(get(colMap.startD)).trim() : '',
      ud:     get(colMap.ud)     != null ? String(get(colMap.ud)).trim()     : '',
      type:   get(colMap.type)   != null ? String(get(colMap.type)).trim()   : '',
      mekaki: parseFloat(get(colMap.mekaki)) || null,
    });
  });
  return rows;
}

function fmt(v) {
  if (v == null) return '<span style="color:var(--muted)">—</span>';
  return v.toLocaleString('ja-JP');
}

function fmtInc(v) {
  if (v == null) return '<span style="color:var(--muted)">—</span>';
  const cls = v >= 0 ? 'col-increase' : 'col-decrease';
  return `<span class="${cls}">${v >= 0 ? '+' : ''}${v.toLocaleString('ja-JP')}</span>`;
}

function renderMgmtTable(rows, cols) {
  if (!rows.length) return '<div class="loading" style="height:60px">データなし</div>';
  const head = cols.map(c => `<th>${c.label}</th>`).join('');
  const body = rows.map(row =>
    `<tr>${cols.map(c => `<td>${c.render(row)}</td>`).join('')}</tr>`
  ).join('');
  return `<div class="mgmt-table-wrap">
    <table class="mgmt-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>
  </div>`;
}

function renderMgmtSection(siteName, mgmt) {
  const sansuiCols = [
    { label: '号機',     render: r => r.no },
    { label: '上下段',   render: r => r.ud },
    { label: '栽培開始日', render: r => r.startD },
    { label: '菌床種類', render: r => r.type },
    { label: '散水前重量(g)', render: r => fmt(r.before) },
    { label: '散水20h(g)',    render: r => fmt(r.after20) },
    { label: '0-20h増加量(g)', render: r => fmtInc(r.inc20) },
  ];
  const chusuiCols = [
    { label: '号機',     render: r => r.no },
    { label: '上下段',   render: r => r.ud },
    { label: '栽培開始日', render: r => r.startD },
    { label: '菌床種類', render: r => r.type },
    { label: '注水前重量(g)', render: r => fmt(r.before) },
    { label: '注水20h(g)',    render: r => fmt(r.after20) },
    { label: '増加量(g)',     render: r => fmtInc(r.inc20) },
  ];
  const mekakiCols = [
    { label: '号機',     render: r => r.no },
    { label: '上下段',   render: r => r.ud },
    { label: '栽培開始日', render: r => r.startD },
    { label: '菌床種類', render: r => r.type },
    { label: '芽かき量(g)', render: r => fmt(r.mekaki) },
  ];

  let html = '';
  if (mgmt.sansui.length) {
    html += `<div class="mgmt-sub-header">散水データ</div>${renderMgmtTable(mgmt.sansui, sansuiCols)}`;
  }
  if (mgmt.chusui.length) {
    html += `<div class="mgmt-sub-header">注水データ</div>${renderMgmtTable(mgmt.chusui, chusuiCols)}`;
  }
  if (mgmt.mekaki.length) {
    html += `<div class="mgmt-sub-header">芽かきデータ</div>${renderMgmtTable(mgmt.mekaki, mekakiCols)}`;
  }
  if (!html) html = renderSetupNotice().replace('コンテナ一覧シート', '菌床管理シート');

  return html;
}

async function loadMgmt(siteName, forceRefresh = false) {
  if (!forceRefresh && mgmtCache[siteName]) return mgmtCache[siteName];

  const results = { sansui: [], chusui: [], mekaki: [] };
  const silentFetch = (id, sheet, fn) =>
    fetchSheet(id, sheet).then(t => fn(t)).catch(_e => {});
  await Promise.all([
    silentFetch(MGMT_ID, siteName,           t => { results.sansui = parseMgmtRows(t); }),
    silentFetch(MGMT_ID, `${siteName}注水`,  t => { results.chusui = parseMgmtRows(t); }),
    silentFetch(MGMT_ID, '1回目収穫芽かき', t => { results.mekaki = parseMekakiRows(t); }),
  ]);
  mgmtCache[siteName] = results;
  return results;
}

// ── Rendering ─────────────────────────────────────────────────────────────────

function renderMain(site, summary, containers, data) {
  destroyCharts();
  const main = document.getElementById('main');
  main.innerHTML = '';

  // Section 1 – KPI cards (from 収穫実績集計表: C=栽培開始日 E=栽培日数 F=コンテナ名 J=収穫量g/菌床)
  const s1 = document.createElement('section');
  s1.innerHTML = `<div class="section-title">現時点収穫量<span class="sub">1菌床当たり (g)</span></div>
    ${renderCards(summary)}`;
  main.appendChild(s1);

  if (!containers.length) return;

  // Section 3 – Stacked bar
  const options = containers.map(name =>
    `<option value="${name}">${name}</option>`
  ).join('');

  const s3 = document.createElement('section');
  s3.className = 'chart-section';
  s3.innerHTML = `<div class="section-title">日次サイズ別収穫量<span class="sub">積み上げ棒グラフ</span></div>
    <div class="selector-row">
      <label>コンテナ：</label>
      <select id="container-select" onchange="onContainerChange()">${options}</select>
    </div>
    <div class="chart-wrap"><canvas id="stack-chart"></canvas></div>`;
  main.appendChild(s3);

  requestAnimationFrame(() => {
    buildStackChart(data[containers[0]] || []);
  });

  // Section 4 – Mgmt data (async, fills in after load)
  const s4 = document.createElement('section');
  s4.className = 'chart-section';
  s4.id = 'mgmt-section';
  s4.innerHTML = `<div class="section-title">菌床管理データ<span class="sub">散水・注水・芽かき</span></div>
    <div class="loading" style="height:60px">読み込み中...</div>`;
  main.appendChild(s4);

  loadMgmt(site.name).then(mgmt => {
    const sec = document.getElementById('mgmt-section');
    if (!sec) return;
    sec.innerHTML = `<div class="section-title">菌床管理データ<span class="sub">散水・注水・芽かき</span></div>
      ${renderMgmtSection(site.name, mgmt)}`;
  }).catch(() => {});
}

function onContainerChange() {
  const sel = document.getElementById('container-select');
  if (!sel) return;
  const site = SITES[currentSiteIdx];
  const rows = (cache[site.id]?.data || {})[sel.value] || [];
  if (chartStack) { chartStack.destroy(); chartStack = null; }
  buildStackChart(rows);
}

// ── Load ───────────────────────────────────────────────────────────────────────

async function loadCurrentSite(forceRefresh = false) {
  const site = SITES[currentSiteIdx];

  if (!forceRefresh && cache[site.id]) {
    const { summary, containers, data } = cache[site.id];
    renderMain(site, summary, containers, data);
    return;
  }

  if (forceRefresh) delete mgmtCache[site.name];

  document.getElementById('main').innerHTML = '<div class="loading">データを読み込み中...</div>';
  document.getElementById('last-updated').textContent = '';

  let summary    = [];
  let containers = [];
  let listError  = null;

  try {
    summary    = await fetchSummaryRows(site);
    containers = summary.map(r => r.name);
  } catch (e) {
    listError = e.message || String(e);
  }

  const data = {};
  if (containers.length) {
    await Promise.all(containers.map(async name => {
      try {
        const table = await fetchSheet(site.id, name);
        data[name] = parseContainerRows(table);
      } catch {
        data[name] = [];
      }
    }));
  }

  cache[site.id] = { summary, containers, data };
  renderMain(site, summary, containers, data);

  if (listError) {
    const msg = document.createElement('div');
    msg.className = 'error-msg';
    msg.textContent = `データ取得エラー: ${listError}`;
    document.getElementById('main').prepend(msg);
  }

  document.getElementById('last-updated').textContent =
    `最終更新: ${new Date().toLocaleString('ja-JP')}`;
}

// ── Tabs ───────────────────────────────────────────────────────────────────────

let weeklyTabActive = false;

function updateTabVisibility() {
  document.getElementById('main').style.display = weeklyTabActive ? 'none' : '';
  const ws = document.getElementById('weekly-section');
  ws.style.display = weeklyTabActive ? '' : 'none';
  // Re-render charts when section becomes visible (avoids Chart.js 0-size issue)
  if (weeklyTabActive) {
    const section = document.getElementById('weekly-section');
    if (weeklyState) {
      const groupMode = document.querySelector('.group-btn.active')?.dataset?.mode || 'week';
      const sortOrder = document.querySelector('.sort-btn.active')?.dataset?.order || 'desc';
      renderWeeklySection(section, weeklyState, groupMode, sortOrder);
    }
  }
}

function initTabs() {
  const tabsEl = document.getElementById('tabs');

  // Site tabs
  SITES.forEach((site, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.textContent = site.name;
    if (i === 0) {
      btn.style.color = site.color;
      btn.style.borderBottomColor = site.color;
    }
    btn.addEventListener('click', () => {
      if (!weeklyTabActive && currentSiteIdx === i) return;
      weeklyTabActive = false;
      currentSiteIdx = i;
      tabsEl.querySelectorAll('.tab-btn').forEach((b, j) => {
        b.classList.toggle('active', j === i);
        if (j < SITES.length) {
          const s = SITES[j];
          if (j === i) { b.style.color = s.color; b.style.borderBottomColor = s.color; }
          else          { b.style.color = ''; b.style.borderBottomColor = ''; }
        } else {
          b.style.color = ''; b.style.borderBottomColor = '';
        }
      });
      updateTabVisibility();
      loadCurrentSite();
    });
    tabsEl.appendChild(btn);
  });

  // Standalone weekly tab
  const weeklyBtn = document.createElement('button');
  weeklyBtn.className = 'tab-btn';
  weeklyBtn.textContent = '週別累計';
  weeklyBtn.addEventListener('click', () => {
    if (weeklyTabActive) return;
    weeklyTabActive = true;
    tabsEl.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.remove('active');
      b.style.color = '';
      b.style.borderBottomColor = '';
    });
    weeklyBtn.classList.add('active');
    weeklyBtn.style.color = '#94a3b8';
    weeklyBtn.style.borderBottomColor = '#94a3b8';
    updateTabVisibility();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
  tabsEl.appendChild(weeklyBtn);
}

initTabs();
updateTabVisibility();
loadCurrentSite();
loadWeeklySection();
</script>
