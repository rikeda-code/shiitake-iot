<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>配送シフト管理</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Hiragino Sans', 'Meiryo', sans-serif; background: #f5f5f5; color: #333; }
    #app { max-width: 100%; padding: 20px; }
    .nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 8px; }
    .nav-center { display: flex; align-items: center; gap: 12px; }
    .nav button { padding: 6px 14px; border: 1px solid #ccc; background: white; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    .nav button:disabled { opacity: 0.3; cursor: default; }
    .nav button:not(:disabled):hover { background: #f0f0f0; }
    .month-label { font-size: 1.3rem; font-weight: bold; min-width: 120px; text-align: center; }
    .pdf-btn { padding: 8px 18px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .pdf-btn:disabled { opacity: 0.5; }
    .pdf-btn:not(:disabled):hover { background: #1d4ed8; }
    .summary-section { margin-bottom: 20px; }
    .section-title { font-size: 0.85rem; font-weight: 600; color: #666; margin-bottom: 8px; }
    .summary-table { border-collapse: collapse; font-size: 0.88rem; }
    .summary-table th, .summary-table td { border: 1px solid #d1d5db; padding: 5px 12px; text-align: center; }
    .summary-table th { background: #f3f4f6; }
    .summary-table td:first-child { text-align: left; font-weight: 600; }
    .table-wrap { overflow-x: auto; }
    table.shift { border-collapse: collapse; font-size: 0.75rem; }
    table.shift th, table.shift td { border: 1px solid #d1d5db; }
    table.shift thead th { background: white; padding: 4px 2px; text-align: center; min-width: 44px; position: sticky; top: 0; z-index: 1; }
    table.shift thead th.dest-header { position: sticky; left: 0; z-index: 2; background: white; min-width: 96px; font-size: 0.8rem; }
    table.shift .day-num { font-size: 0.75rem; }
    table.shift .day-name { font-size: 0.7rem; }
    .sat { color: #2563eb; }
    .sun { color: #dc2626; }
    table.shift td.dest-label { position: sticky; left: 0; background: white; z-index: 1; padding: 4px 8px; font-weight: 600; font-size: 0.75rem; min-width: 96px; }
    table.shift td.holiday { background: #f3f4f6; color: #9ca3af; text-align: center; height: 52px; }
    table.shift td.cell { padding: 0; }
    table.shift td.footer-dest { position: sticky; left: 0; background: #f9fafb; z-index: 1; padding: 2px 4px; font-size: 0.7rem; color: #6b7280; text-align: center; }
    table.shift td.footer-cell { background: #f9fafb; text-align: center; padding: 2px 1px; line-height: 1.3; font-size: 0.68rem; }
    select.member-select { width: 100%; height: 52px; border: none; background: transparent; text-align: center; cursor: pointer; padding: 6px 2px; font-size: 0.75rem; appearance: none; outline: none; }
    select.member-select:focus { outline: 2px solid #93c5fd; }
    .kubo  { background: #E6F1FB; color: #0C447C; border-color: #85B7EB !important; }
    .furuta { background: #EAF3DE; color: #27500A; border-color: #97C459 !important; }
    .ota   { background: #FAEEDA; color: #633806; border-color: #EF9F27 !important; }
    thead th.clickable { cursor: pointer; }
    thead th.clickable:hover { background: #f0f0f0; }
  </style>
</head>
<body>
<div id="app">
  <div class="nav">
    <div class="nav-center">
      <button id="prev-btn" onclick="prevMonth()">◀</button>
      <div class="month-label" id="month-label"></div>
      <button onclick="nextMonth()">▶</button>
    </div>
    <button class="pdf-btn" id="pdf-btn" onclick="exportPdf()">PDF出力</button>
  </div>
  <div class="summary-section">
    <div class="section-title">行き先別 担当回数</div>
    <div id="summary-wrap"></div>
  </div>
  <div class="shift-section">
    <div class="section-title">シフト表（日付ヘッダーをクリックで休日トグル）</div>
    <div class="table-wrap" id="table-wrap"></div>
  </div>
</div>
<script>
const MEMBERS = ['久保', '古田', '太田'];
const DESTINATIONS = ['志摩⇔いなべ①', '志摩⇔いなべ②', '志摩⇔南丹①', '志摩⇔南丹②'];
const GROUPS = [
  { label: '志摩⇔いなべ', keys: ['志摩⇔いなべ①', '志摩⇔いなべ②'] },
  { label: '志摩⇔南丹',   keys: ['志摩⇔南丹①',   '志摩⇔南丹②']   },
];
const START_YEAR = 2026, START_MONTH = 6;
const DAY_NAMES = ['日','月','火','水','木','金','土'];
const STORAGE_KEY = 'shift_store';
let currentYear = START_YEAR, currentMonth = START_MONTH;
function loadStore() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
function saveStore(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
function monthKey(y, m) { return `${y}-${String(m).padStart(2,'0')}`; }
function daysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function getDow(y, m, d) { return new Date(y, m-1, d).getDay(); }
function getShiftData(y, m) { return loadStore()[monthKey(y, m)] || {}; }
function setCell(y, m, day, dest, val) {
  const store = loadStore(); const key = monthKey(y, m);
  if (!store[key]) store[key] = {};
  if (!store[key][day]) store[key][day] = {};
  store[key][day][dest] = val; saveStore(store);
}
function toggleHoliday(y, m, day) {
  const store = loadStore(); const key = monthKey(y, m);
  if (!store[key]) store[key] = {};
  const dayData = store[key][day] || {};
  const isHol = DESTINATIONS.every(d => dayData[d] === 'holiday');
  if (isHol) { DESTINATIONS.forEach(d => { dayData[d] = ''; }); }
  else { DESTINATIONS.forEach(d => { dayData[d] = 'holiday'; }); }
  store[key][day] = dayData; saveStore(store); render();
}
function isHoliday(shiftData, day) {
  const d = shiftData[day]; return d && DESTINATIONS.every(dest => d[dest] === 'holiday');
}
function getSummary(y, m) {
  const data = getShiftData(y, m); const days = daysInMonth(y, m); const result = {};
  DESTINATIONS.forEach(dest => { result[dest] = { '久保':0, '古田':0, '太田':0, unassigned:0 }; });
  for (let d = 1; d <= days; d++) {
    DESTINATIONS.forEach(dest => {
      const val = data[d]?.[dest];
      if (val === 'holiday') return;
      if (MEMBERS.includes(val)) result[dest][val]++;
      else result[dest].unassigned++;
    });
  }
  return result;
}
function memberClass(m) {
  if (m === '久保') return 'kubo'; if (m === '古田') return 'furuta'; if (m === '太田') return 'ota'; return '';
}
function render() {
  const y = currentYear, m = currentMonth;
  document.getElementById('month-label').textContent = `${y}年${m}月`;
  document.getElementById('prev-btn').disabled = (y === START_YEAR && m === START_MONTH);
  const days = daysInMonth(y, m); const shiftData = getShiftData(y, m); const summary = getSummary(y, m);
  // Summary table (①②を合算して表示)
  let shtml = `<table class="summary-table"><thead><tr><th>行き先</th>${MEMBERS.map(mem=>`<th>${mem}</th>`).join('')}<th style="color:#6b7280">未割当</th></tr></thead><tbody>`;
  GROUPS.forEach(g => {
    const merged = { '久保':0, '古田':0, '太田':0, unassigned:0 };
    g.keys.forEach(k => { MEMBERS.forEach(mem => { merged[mem] += summary[k][mem]; }); merged.unassigned += summary[k].unassigned; });
    shtml += `<tr><td>${g.label}</td>${MEMBERS.map(mem=>`<td>${merged[mem]}</td>`).join('')}<td style="color:#6b7280">${merged.unassigned}</td></tr>`;
  });
  shtml += '</tbody></table>';
  document.getElementById('summary-wrap').innerHTML = shtml;
  // Shift table
  let html = `<table class="shift"><thead><tr><th class="dest-header">行き先</th>`;
  for (let d = 1; d <= days; d++) {
    const dow = getDow(y, m, d); const cls = dow === 6 ? 'sat' : dow === 0 ? 'sun' : '';
    html += `<th class="clickable" onclick="toggleHoliday(${y},${m},${d})" title="クリックで休日トグル"><div class="day-num">${d}</div><div class="day-name ${cls}">${DAY_NAMES[dow]}</div></th>`;
  }
  html += '</tr></thead><tbody>';
  DESTINATIONS.forEach((dest, i) => {
    const sep = i === 2 ? ' style="border-top:2px solid #9ca3af"' : '';
    html += `<tr><td class="dest-label"${sep}>${dest}</td>`;
    for (let d = 1; d <= days; d++) {
      if (isHoliday(shiftData, d)) { html += `<td class="holiday"${sep}>－</td>`; }
      else {
        const val = shiftData[d]?.[dest] || ''; const cls = memberClass(val);
        html += `<td class="cell ${cls}"${sep}><select class="member-select" onchange="onSelect(${d},'${dest}',this.value)">`;
        html += `<option value="">－</option>`;
        MEMBERS.forEach(mem => { html += `<option value="${mem}"${val===mem?' selected':''}>${mem}</option>`; });
        html += `</select></td>`;
      }
    }
    html += '</tr>';
  });
  html += `<tr><td class="footer-dest">担当</td>`;
  for (let d = 1; d <= days; d++) {
    if (isHoliday(shiftData, d)) { html += `<td class="footer-cell" style="color:#9ca3af">休</td>`; }
    else {
      const members = [...new Set(DESTINATIONS.map(dest => { const val = shiftData[d]?.[dest]; return (val && val !== 'holiday') ? val : ''; }).filter(Boolean))];
      const inner = members.map(mem => `<div style="color:${memberClass(mem)==='kubo'?'#0C447C':memberClass(mem)==='furuta'?'#27500A':'#633806'}">${mem}</div>`).join('');
      html += `<td class="footer-cell">${inner}</td>`;
    }
  }
  html += '</tr></tbody></table>';
  document.getElementById('table-wrap').innerHTML = html;
}
function onSelect(day, dest, val) {
  setCell(currentYear, currentMonth, day, dest, val); render();
}
function prevMonth() {
  if (currentYear === START_YEAR && currentMonth === START_MONTH) return;
  if (currentMonth === 1) { currentYear--; currentMonth = 12; } else currentMonth--;
  render();
}
function nextMonth() {
  if (currentMonth === 12) { currentYear++; currentMonth = 1; } else currentMonth++;
  render();
}
async function exportPdf() {
  const btn = document.getElementById('pdf-btn');
  btn.disabled = true; btn.textContent = '出力中…';
  try {
    const el = document.getElementById('app');
    const canvas = await html2canvas(el, { scale: 2, useCORS: true });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
    const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight();
    const ratio = Math.min(pw / canvas.width, ph / canvas.height);
    pdf.addImage(imgData, 'PNG', 0, 0, canvas.width * ratio, canvas.height * ratio);
    pdf.save(`配送シフト_${currentYear}年${currentMonth}月.pdf`);
  } catch(e) { alert('PDF出力に失敗しました: ' + e.message); }
  btn.disabled = false; btn.textContent = 'PDF出力';
}
render();
</script>
</body>
</html>
