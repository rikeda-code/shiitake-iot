<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>収穫実績ダッシュボード</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3148;
      --text: #e2e8f0;
      --muted: #8892a4;
      --accent-inabe: #38bdf8;
      --accent-gunma: #a78bfa;
      --accent-nandan: #34d399;
      --target: #f97316;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', 'Hiragino Sans', sans-serif;
      min-height: 100vh;
    }
    header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.04em; }
    header .subtitle { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }
    #last-updated { font-size: 0.8rem; color: var(--muted); }
    #refresh-btn {
      background: var(--border);
      border: none;
      color: var(--text);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    #refresh-btn:hover { background: #3a3f5c; }
    main { padding: 28px 32px; display: flex; flex-direction: column; gap: 32px; }
    .site-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .site-header {
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .site-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .site-header h2 { font-size: 1.1rem; font-weight: 600; }
    .site-stats {
      display: flex; gap: 32px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      flex-wrap: wrap;
    }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-value { font-size: 1.15rem; font-weight: 700; }
    .chart-wrap { padding: 20px 24px; height: 320px; position: relative; }
    .loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: var(--muted);
    }
    .error-msg { color: #f87171; font-size: 0.85rem; padding: 20px 24px; }
    @media (max-width: 640px) {
      header, main { padding: 16px; }
      .site-stats { gap: 16px; }
      .chart-wrap { height: 260px; }
    }
  </style>
</head>
<body>
<header>
  <div>
    <h1>🍄 収穫実績ダッシュボード</h1>
    <div class="subtitle">各拠点・栽培開始月別 ／ 1菌床当り平均収穫量 (g)</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <span id="last-updated"></span>
    <button id="refresh-btn" onclick="loadAll()">↻ 更新</button>
  </div>
</header>
<main id="main"></main>

<script>
const SHEET_ID = '1RBIXcz6SGZ9AoVN6Ym4SsrGSqVVg2iM-YO_yxYLrR6Q';
const SITES = [
  { name: 'いなべ', color: '#38bdf8' },
  { name: '群馬',   color: '#a78bfa' },
  { name: '南丹',   color: '#34d399' },
];
const TARGET_G = 660;

/* Month sort order: "25/10" < "25/11" < ... < "26/6" */
function parseMonth(s) {
  if (!s || !s.trim()) return null;
  const m = s.trim().match(/^(\d+)\/(\d+)$/);
  if (!m) return null;
  return parseInt(m[1]) * 100 + parseInt(m[2]);
}
function monthLabel(s) {
  const m = s.trim().match(/^(\d+)\/(\d+)$/);
  if (!m) return s;
  return `20${m[1]}年${m[2]}月`;
}

async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}&headers=1`;
  const res = await fetch(url);
  const text = await res.text();
  // Strip JSONP wrapper: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
  const json = JSON.parse(text.replace(/^[^{]+/, '').replace(/[^}]+$/, ''));
  return json.table;
}

function parseTable(table) {
  // Find column indices
  const colMap = {};
  table.cols.forEach((c, i) => {
    const label = (c.label || '').replace(/\s/g, '');
    if (label.includes('栽培開始月')) colMap.month = i;
    if (label.includes('菌床当り') || label.includes('1菌床')) colMap.harvest = i;
    if (label.includes('菌床数')) colMap.beds = i;
  });

  const rows = [];
  (table.rows || []).forEach(row => {
    const cells = row.c || [];
    const monthVal = colMap.month != null ? (cells[colMap.month]?.v ?? cells[colMap.month]?.f ?? '') : '';
    const harvestVal = colMap.harvest != null ? cells[colMap.harvest]?.v : null;

    const month = String(monthVal || '').trim();
    const harvest = typeof harvestVal === 'number' ? harvestVal : parseFloat(String(harvestVal || '').replace(/[^\d.]/g, ''));

    if (parseMonth(month) && harvest > 0) {
      rows.push({ month, harvest });
    }
  });
  return rows;
}

function aggregateByMonth(rows) {
  const map = {};
  rows.forEach(({ month, harvest }) => {
    if (!map[month]) map[month] = { sum: 0, count: 0 };
    map[month].sum += harvest;
    map[month].count++;
  });
  return Object.entries(map)
    .sort((a, b) => parseMonth(a[0]) - parseMonth(b[0]))
    .map(([month, { sum, count }]) => ({
      month,
      avg: Math.round(sum / count),
      count,
    }));
}

function renderSection(site, data, error) {
  const id = `site-${site.name}`;
  const existing = document.getElementById(id);
  const section = existing || document.createElement('div');
  section.className = 'site-section';
  section.id = id;

  if (error) {
    section.innerHTML = `
      <div class="site-header">
        <span class="site-dot" style="background:${site.color}"></span>
        <h2>${site.name}</h2>
      </div>
      <div class="error-msg">データ取得エラー: ${error}</div>`;
    if (!existing) document.getElementById('main').appendChild(section);
    return;
  }

  const overallAvg = data.length ? Math.round(data.reduce((s, d) => s + d.avg * d.count, 0) / data.reduce((s, d) => s + d.count, 0)) : 0;
  const maxAvg = data.length ? Math.max(...data.map(d => d.avg)) : 0;
  const totalRuns = data.reduce((s, d) => s + d.count, 0);
  const aboveTarget = data.filter(d => d.avg >= TARGET_G).length;

  const labels = data.map(d => monthLabel(d.month));
  const values = data.map(d => d.avg);
  const bgColors = values.map(v => v >= TARGET_G ? `${site.color}cc` : `${site.color}66`);
  const borderColors = values.map(v => v >= TARGET_G ? site.color : `${site.color}99`);

  section.innerHTML = `
    <div class="site-header">
      <span class="site-dot" style="background:${site.color}"></span>
      <h2>${site.name}</h2>
    </div>
    <div class="site-stats">
      <div class="stat">
        <span class="stat-label">全体平均</span>
        <span class="stat-value" style="color:${site.color}">${overallAvg.toLocaleString()} g</span>
      </div>
      <div class="stat">
        <span class="stat-label">最高月平均</span>
        <span class="stat-value">${maxAvg.toLocaleString()} g</span>
      </div>
      <div class="stat">
        <span class="stat-label">総栽培数</span>
        <span class="stat-value">${totalRuns} 件</span>
      </div>
      <div class="stat">
        <span class="stat-label">目標達成月数</span>
        <span class="stat-value">${aboveTarget} / ${data.length} 月</span>
      </div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart-${site.name}"></canvas>
    </div>`;

  if (!existing) document.getElementById('main').appendChild(section);

  const ctx = document.getElementById(`chart-${site.name}`).getContext('2d');

  // Destroy existing chart if any
  const chartKey = `_chart_${site.name}`;
  if (window[chartKey]) window[chartKey].destroy();

  window[chartKey] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '1菌床当り平均収穫量 (g)',
        data: values,
        backgroundColor: bgColors,
        borderColor: borderColors,
        borderWidth: 1.5,
        borderRadius: 4,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => {
              const d = data[ctx.dataIndex];
              return [`平均: ${ctx.parsed.y.toLocaleString()} g`, `件数: ${d.count} 件`];
            },
            afterLabel: (ctx) => {
              const diff = ctx.parsed.y - TARGET_G;
              return `目標比: ${diff >= 0 ? '+' : ''}${diff.toLocaleString()} g`;
            },
          },
          backgroundColor: '#1e2235',
          borderColor: '#3a3f5c',
          borderWidth: 1,
          titleColor: '#e2e8f0',
          bodyColor: '#a0aec0',
        },
        annotation: undefined,
      },
      scales: {
        x: {
          ticks: { color: '#8892a4', font: { size: 11 } },
          grid: { color: '#1e2235' },
        },
        y: {
          ticks: { color: '#8892a4', font: { size: 11 }, callback: v => `${v.toLocaleString()} g` },
          grid: { color: '#1e2235' },
          suggestedMin: 300,
        },
      },
    },
    plugins: [{
      id: 'targetLine',
      afterDraw(chart) {
        const { ctx, scales: { y }, chartArea: { left, right } } = chart;
        const yPx = y.getPixelForValue(TARGET_G);
        ctx.save();
        ctx.setLineDash([6, 4]);
        ctx.strokeStyle = '#f97316';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(left, yPx);
        ctx.lineTo(right, yPx);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#f97316';
        ctx.font = 'bold 11px sans-serif';
        ctx.fillText(`目標 ${TARGET_G}g`, right - 72, yPx - 5);
        ctx.restore();
      },
    }],
  });
}

async function loadSite(site) {
  const id = `site-${site.name}`;
  // Show loading state
  let section = document.getElementById(id);
  if (!section) {
    section = document.createElement('div');
    section.className = 'site-section';
    section.id = id;
    section.innerHTML = `
      <div class="site-header">
        <span class="site-dot" style="background:${site.color}"></span>
        <h2>${site.name}</h2>
      </div>
      <div class="chart-wrap"><div class="loading">データを読み込み中...</div></div>`;
    document.getElementById('main').appendChild(section);
  }

  try {
    const table = await fetchSheet(site.name);
    const rows = parseTable(table);
    const data = aggregateByMonth(rows);
    renderSection(site, data, null);
  } catch (e) {
    renderSection(site, [], e.message || String(e));
  }
}

async function loadAll() {
  document.getElementById('last-updated').textContent = '';
  await Promise.all(SITES.map(loadSite));
  document.getElementById('last-updated').textContent =
    `最終更新: ${new Date().toLocaleString('ja-JP')}`;
}

loadAll();
</script>
</body>
</html>
